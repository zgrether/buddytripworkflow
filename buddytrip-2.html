                          <span>{r.course}</span>
                          {r.modifiers?.carryOver && <span style={{ fontSize: 9, fontWeight: 700, color: '#f59e0b', background: '#f59e0b20', borderRadius: 3, padding: '1px 4px', letterSpacing: '.04em' }}>⊕ carry</span>}
                          {r.modifiers?.movingTees?.enabled && <span style={{ fontSize: 9, fontWeight: 700, color: '#8b5cf6', background: '#8b5cf620', borderRadius: 3, padding: '1px 4px', letterSpacing: '.04em' }}>↕ tees</span>}
                        </div>
                      </div>
                      {editMode ? (
                        <>
                          {teams.map(team => (
                            <div key={team._id} style={{ textAlign: 'center' }}>
                              <input type="number" min="0" step="0.5" value={edit[team._id] !== undefined ? edit[team._id] : (res ? res[team._id] : '')} placeholder="—"
                                onChange={e => {
                                  const val = e.target.value
                                  setRoundEdits(re => ({ ...re, [r._id]: { ...re[r._id], [team._id]: val } }))
                                  if (val !== '') {
                                    if (!ROUND_RESULTS[r._id]) ROUND_RESULTS[r._id] = {}
                                    ROUND_RESULTS[r._id][team._id] = Number(val)
                                    setScoreNonce(n => n + 1)
                                  }
                                }}
                                style={{ width: 44, fontSize: 15, fontWeight: 700, textAlign: 'center', padding: '4px', borderRadius: 6, background: 'var(--bt-base)', border: `1px solid ${team.color}60`, color: team.color, outline: 'none' }} />
                            </div>
                          ))}
                        </>
                      ) : (
                        <>
                          {teams.map(team => {
                            const pts = res ? res[team._id] : null
                            const maxPts = res ? Math.max(...teams.map(t => res[t._id] || 0)) : 0
                            return (
                              <div key={team._id} style={{ textAlign: 'center' }}>
                                <span style={{ color: pts != null ? (pts === maxPts && pts > 0 ? team.color : 'var(--bt-text-3)') : 'var(--bt-text-3)', fontWeight: 700, fontSize: 16 }}>{pts != null ? pts : '—'}</span>
                              </div>
                            )
                          })}
                        </>
                      )}
                      <div style={{ textAlign: 'center', color: 'var(--bt-text-3)', fontSize: 12 }}>{r.pointsAvailable}{roundMultipliers[r._id] !== '1' ? <span style={{ color: 'var(--bt-accent)', fontSize: 10 }}> {roundMultipliers[r._id]}×</span> : ''}</div>
                    </div>
                  )
                })}
                <div style={{ display: 'grid', gridTemplateColumns: `1fr ${teams.map(() => '54px').join(' ')} 40px`, padding: '12px 14px', background: 'var(--bt-base)' }}>
                  <span style={{ color: 'var(--bt-text-3)', fontSize: 12, fontWeight: 700 }}>TOTAL</span>
                  {teams.map(team => (
                    <span key={team._id} style={{ color: team.color, fontWeight: 900, fontSize: 22, textAlign: 'center' }}>{scores[team._id] || 0}</span>
                  ))}
                  <span style={{ color: 'var(--bt-text-3)', fontSize: 12, textAlign: 'center' }}>{totalPts + remaining}</span>
                </div>
              </Card>

              {/* Team rosters */}
              <div style={{ display: 'grid', gridTemplateColumns: teamCount <= 3 ? teams.map(() => '1fr').join(' ') : '1fr 1fr', gap: 10 }}>
                {teams.map(team => (
                  <Card key={team._id} style={{ border: `1px solid ${team.color}25` }}>
                    <div style={{ color: team.color, fontSize: 12, fontWeight: 700, marginBottom: 10 }}>{team.name}</div>
                    {event.players.filter(p => getTeamId(event._id, p._id) === team._id).map(p => (
                      <div key={p._id} style={{ display: 'flex', alignItems: 'center', gap: 6, marginBottom: 4 }}>
                        <div style={{ width: 18, height: 18, borderRadius: '50%', background: team.color + '25', display: 'flex', alignItems: 'center', justifyContent: 'center', fontSize: 7, fontWeight: 700, color: team.color, flexShrink: 0 }}>{p.nickname.slice(0, 2).toUpperCase()}</div>
                        <span style={{ color: 'var(--bt-text-1)', fontSize: 12 }}>{p.nickname}</span>
                        <span style={{ color: 'var(--bt-text-3)', fontSize: 10, marginLeft: 'auto' }}>+{p.handicap}</span>
                      </div>
                    ))}
                  </Card>
                ))}
              </div>
            </>
          )}

          {tab === 'groups' && (() => {
            const isScrambleRound = activeRound.format?.toLowerCase() === 'scramble'
            // Scramble uses one group per team; all other formats use mixed groups
            const displayGroups = isScrambleRound
              ? (event.scrambleGroups || event.groups)
              : event.groups
            return (
              <div>
                {/* Day header */}
                <div style={{ display: 'flex', alignItems: 'center', justifyContent: 'space-between', marginBottom: 14 }}>
                  <div>
                    <div style={{ fontSize: 13, fontWeight: 700, color: 'var(--bt-text-1)' }}>Day {activeRound.day} — {activeRound.title}</div>
                    <div style={{ fontSize: 11, color: 'var(--bt-text-3)', marginTop: 1 }}>{activeRound.course}</div>
                  </div>
                  <div style={{ display: 'flex', alignItems: 'center', gap: 4, background: 'var(--bt-accent)15', borderRadius: 8, padding: '4px 10px' }}>
                    <LiveDot />
                    <span style={{ color: 'var(--bt-accent)', fontSize: 11, fontWeight: 700 }}>LIVE</span>
                  </div>
                </div>

                {isScrambleRound && (
                  <div style={{ marginBottom: 14, padding: '8px 12px', borderRadius: 8, background: '#0a1a10', border: '1px solid var(--bt-accent)30', fontSize: 12, color: 'var(--bt-text-2)' }}>
                    Scramble — each team plays as one unit. One ball, one score per hole. Lowest 18-hole total wins.
                  </div>
                )}

                {displayGroups.map(group => {
                  const groupPlayers = event.players.filter(p => group.playerIds.includes(p._id))
                  const isMyGroup = group.playerIds.includes(CURRENT_USER._id)
                  const groupResult = GROUP_RESULTS[activeRound._id]?.[group._id]
                  const scored = !!groupResult

                  if (isScrambleRound) {
                    // Scramble: single-team card — whole roster, tee time, running total
                    const team = teams.find(t => t._id === group.teamId)
                    const holeData = HOLE_RESULTS[activeRound._id]?.[group._id]
                    const runningTotal = holeData
                      ? holeData.holes.reduce((sum, h) => {
                          const val = h.strokes[group.playerIds[0]]
                          return val !== '' ? sum + Number(val) : sum
                        }, 0)
                      : 0
                    const holesIn = holeData
                      ? holeData.holes.filter(h => h.strokes[group.playerIds[0]] !== '').length
                      : 0
                    const parSoFar = PARS_MOCK.slice(0, holesIn).reduce((s, p) => s + p, 0)
                    const toPar = holesIn > 0 ? runningTotal - parSoFar : null
                    const toParLabel = toPar === null ? null : toPar === 0 ? 'E' : toPar > 0 ? `+${toPar}` : `${toPar}`
                    const toParColor = toPar === null ? 'var(--bt-text-3)' : toPar < 0 ? '#3b82f6' : toPar === 0 ? 'var(--bt-text-2)' : '#c0765a'
                    return (
                      <div key={group._id}
                        onClick={() => canScore && setHoleByHoleGroup(group)}
                        style={{ marginBottom: 12, borderRadius: 12, overflow: 'hidden', cursor: canScore ? 'pointer' : 'default',
                          border: `1px solid ${team ? team.color + (isMyGroup ? '70' : '35') : 'var(--bt-border)'}`,
                          background: isMyGroup ? (team?.colorDim || '#0a1a10') : 'var(--bt-card)' }}>
                        {/* Team header bar */}
                        <div style={{ display: 'flex', alignItems: 'center', justifyContent: 'space-between', padding: '10px 14px',
                          background: team ? team.color + '18' : 'var(--bt-base)',
                          borderBottom: `1px solid ${team ? team.color + '25' : 'var(--bt-border)'}` }}>
                          <div style={{ display: 'flex', alignItems: 'center', gap: 10 }}>
                            <div style={{ width: 12, height: 12, borderRadius: '50%', background: team?.color || 'var(--bt-text-3)', flexShrink: 0 }} />
                            <div>
                              <div style={{ fontSize: 14, fontWeight: 800, color: team?.color || 'var(--bt-text-1)' }}>{group.name}</div>
                              <div style={{ fontSize: 11, color: 'var(--bt-text-3)' }}>⏰ {group.teeTime}</div>
                            </div>
                            {isMyGroup && <span style={{ background: 'var(--bt-accent)22', color: 'var(--bt-accent)', fontSize: 9, padding: '1px 6px', borderRadius: 6, fontWeight: 700 }}>YOU</span>}
                          </div>
                          <div style={{ textAlign: 'right' }}>
                            {toParLabel && <div style={{ fontSize: 11, fontWeight: 700, color: toParColor }}>{toParLabel} · {holesIn} holes</div>}
                            {runningTotal > 0 && <div style={{ fontSize: 20, fontWeight: 900, color: team?.color || 'var(--bt-text-1)' }}>{runningTotal}</div>}
                            {!runningTotal && canScore && (
                              <div style={{ display: 'flex', alignItems: 'center', gap: 4, color: 'var(--bt-accent)', fontSize: 11, fontWeight: 700 }}>
                                <Ic n="Edit2" size={12} color="var(--bt-accent)" /> Enter Score
                              </div>
                            )}
                          </div>
                        </div>
                        {/* Roster — compact pills */}
                        <div style={{ padding: '10px 14px', display: 'flex', flexWrap: 'wrap', gap: 6 }}>
                          {groupPlayers.map(p => (
                            <div key={p._id} style={{ display: 'flex', alignItems: 'center', gap: 5, padding: '3px 8px', borderRadius: 6,
                              background: 'var(--bt-base)', border: `1px solid ${team ? team.color + '30' : 'var(--bt-border)'}` }}>
                              <div style={{ width: 18, height: 18, borderRadius: '50%', background: team?.color || 'var(--bt-text-3)',
                                display: 'flex', alignItems: 'center', justifyContent: 'center',
                                fontSize: 7, fontWeight: 800, color: '#0d1117', flexShrink: 0 }}>
                                {p.nickname.slice(0, 2).toUpperCase()}
                              </div>
                              <span style={{ fontSize: 12, color: p._id === CURRENT_USER._id ? 'var(--bt-accent)' : 'var(--bt-text-1)',
                                fontWeight: p._id === CURRENT_USER._id ? 700 : 400 }}>{p.nickname}</span>
                            </div>
                          ))}
                        </div>
                      </div>
                    )
                  }

                  // Non-scramble: matchup layout (2 players per team side by side)
                  const sides = teams.map(team => ({
                    team,
                    players: groupPlayers.filter(p => getTeamId(event._id, p._id) === team._id)
                  }))
                  const scored2 = scored
                  return (
                    <div key={group._id}
                      onClick={() => canScore && setHoleByHoleGroup(group)}
                      style={{ marginBottom: 10, borderRadius: 12, overflow: 'hidden',
                        border: `1px solid ${isMyGroup ? 'var(--bt-accent)50' : 'var(--bt-border)'}`,
                        background: isMyGroup ? '#0a1a10' : 'var(--bt-card)',
                        cursor: canScore ? 'pointer' : 'default', transition: 'border-color .15s' }}>
                      {/* Header bar */}
                      <div style={{ display: 'flex', alignItems: 'center', justifyContent: 'space-between', padding: '8px 14px', background: 'var(--bt-base)', borderBottom: `1px solid ${isMyGroup ? 'var(--bt-accent)25' : 'var(--bt-border)'}` }}>
                        <div style={{ display: 'flex', alignItems: 'center', gap: 8 }}>
                          <span style={{ fontSize: 12, fontWeight: 700, color: 'var(--bt-text-2)' }}>{group.teeTime}</span>
                          <span style={{ fontSize: 11, color: 'var(--bt-text-3)' }}>· {group.name}</span>
                          {isMyGroup && <span style={{ background: 'var(--bt-accent)22', color: 'var(--bt-accent)', fontSize: 9, padding: '1px 6px', borderRadius: 6, fontWeight: 700 }}>YOU</span>}
                        </div>
                        {scored2 ? (
                          <div style={{ display: 'flex', alignItems: 'center', gap: 8 }}>
                            {teams.map((t, i) => {
                              const pts = groupResult[t._id] ?? 0
                              const won = pts > (groupResult[teams[1-i]?._id] ?? 0)
                              return <span key={t._id} style={{ fontSize: 13, fontWeight: 900, color: won ? t.color : 'var(--bt-text-3)' }}>{t.shortName} {pts}</span>
                            })}
                            <Ic n="CheckCircle" size={14} color="var(--bt-accent)" />
                          </div>
                        ) : canScore ? (
                          <div style={{ display: 'flex', alignItems: 'center', gap: 4, color: 'var(--bt-accent)', fontSize: 11, fontWeight: 700 }}>
                            <Ic n="Edit2" size={12} color="var(--bt-accent)" /> Score
                          </div>
                        ) : (
                          <div style={{ fontSize: 11, color: 'var(--bt-text-3)' }}>Pending</div>
                        )}
                      </div>
                      {/* Teams side by side */}
                      <div style={{ display: 'grid', gridTemplateColumns: '1fr 24px 1fr', alignItems: 'stretch' }}>
                        {sides.map((side, si) => (
                          <div key={side.team._id} style={{ padding: '10px 12px', display: 'flex', flexDirection: 'column', gap: 8, alignItems: si === 0 ? 'flex-start' : 'flex-end' }}>
                            <div style={{ fontSize: 10, fontWeight: 700, color: side.team.color, letterSpacing: '.06em' }}>{side.team.shortName}</div>
                            {side.players.map(p => (
                              <div key={p._id} style={{ display: 'flex', alignItems: 'center', gap: 6, flexDirection: si === 0 ? 'row' : 'row-reverse' }}>
                                <div style={{ width: 28, height: 28, borderRadius: '50%', background: side.team.color, display: 'flex', alignItems: 'center', justifyContent: 'center', fontSize: 10, fontWeight: 800, color: '#0d1117', flexShrink: 0 }}>
                                  {p.nickname.slice(0, 2).toUpperCase()}
                                </div>
                                <div style={{ textAlign: si === 0 ? 'left' : 'right' }}>
                                  <div style={{ fontSize: 13, fontWeight: 700, color: p._id === CURRENT_USER._id ? 'var(--bt-accent)' : 'var(--bt-text-1)' }}>{p.nickname}</div>
                                  {p.handicap > 0 && <div style={{ fontSize: 10, color: 'var(--bt-text-3)' }}>HCP {p.handicap}</div>}
                                </div>
                              </div>
                            ))}
                          </div>
                        ))}
                        <div style={{ display: 'flex', alignItems: 'center', justifyContent: 'center', borderLeft: '1px solid var(--bt-border)', borderRight: '1px solid var(--bt-border)' }}>
                          <span style={{ fontSize: 9, fontWeight: 900, color: 'var(--bt-text-3)', letterSpacing: '.05em', writingMode: 'vertical-rl' }}>VS</span>
                        </div>
                      </div>
                    </div>
                  )
                })}
              </div>
            )
          })()}

          {tab === 'info' && (
            <div>
              <Card style={{ marginBottom: 12, border: '2px solid var(--bt-accent)30' }}>
                <div style={{ fontSize: 11, letterSpacing: 2, color: 'var(--bt-text-3)', marginBottom: 6 }}>🔑 DOOR CODE</div>
                <div style={{ fontSize: 48, fontWeight: 900, fontFamily: 'monospace', letterSpacing: 8, color: 'var(--bt-accent)', lineHeight: 1 }}>4892</div>
                <div style={{ fontSize: 12, color: 'var(--bt-text-3)', marginTop: 8 }}>Bandon Dunes Lodge</div>
              </Card>
              <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: 10, marginBottom: 12 }}>
                {[{ label: 'CHECK IN', val: 'March 11, 3:00 PM' }, { label: 'CHECK OUT', val: 'March 15, 11:00 AM' }].map(item => (
                  <Card key={item.label}>
                    <div style={{ fontSize: 10, letterSpacing: 1, color: 'var(--bt-text-3)', marginBottom: 4 }}>{item.label}</div>
                    <div style={{ fontSize: 13, fontWeight: 600, color: 'var(--bt-text-1)' }}>{item.val}</div>
                  </Card>
                ))}
              </div>
              <Card>
                <SectionLabel>Today's Schedule</SectionLabel>
                {['7:00 AM — Breakfast (don\'t be late)', '8:00 AM — Tee off, Pacific Dunes', '7:00 PM — Final dinner + awards'].map((item, i) => (
                  <div key={i} style={{ fontSize: 14, color: 'var(--bt-text-1)', padding: '8px 0', borderBottom: i < 2 ? '1px solid var(--bt-border)' : 'none' }}>{item}</div>
                ))}
              </Card>
            </div>
          )}

          {tab === 'history' && (
            <div>
              <h2 style={{ fontSize: 20, fontWeight: 800, color: 'var(--bt-text-1)', marginBottom: 4 }}>BBMI All-Time</h2>
              <p style={{ fontSize: 13, color: 'var(--bt-text-2)', marginBottom: 20 }}>2005–2025 · 20 years running</p>
              {HISTORY.map((entry, i) => (
                <div key={entry.year} style={{ display: 'flex', gap: 14, padding: '12px 0', borderBottom: '1px solid var(--bt-border)' }}>
                  <div style={{ minWidth: 46, textAlign: 'center' }}>
                    <div style={{ color: i === 0 ? '#f59e0b' : 'var(--bt-text-2)', fontWeight: 800, fontSize: 16 }}>{entry.year}</div>
                    {i === 0 && <div style={{ color: '#f59e0b', fontSize: 9 }}>★ LATEST</div>}
                  </div>
                  <div style={{ flex: 1 }}>
                    <div style={{ color: 'var(--bt-text-1)', fontWeight: 600, fontSize: 14 }}>{entry.team}</div>
                    <div style={{ color: "var(--bt-text-3)", fontSize: 11, marginTop: 2, display:"flex", alignItems:"center", gap:4 }}><Ic n="MapPin" size={11} color="var(--bt-text-3)" />{entry.location}</div>
                  </div>
                </div>
              ))}
            </div>
          )}
        </div>
      </div>
      <BottomNav active="live-leaderboard" navigate={navigate} currentTripId={tripId} />
      {holeByHoleGroup && (
        <HoleByHoleEntry
          group={holeByHoleGroup}
          round={activeRound}
          event={event}
          onSubmit={handleScoreSubmit}
          onClose={() => setHoleByHoleGroup(null)}
          onOfflineResult={() => { setScoreEntryGroup(holeByHoleGroup); setScoreEntryRound(activeRound); setHoleByHoleGroup(null) }}
        />
      )}
      {scoreEntryGroup && (
        <ScoreEntry
          group={scoreEntryGroup}
          round={scoreEntryRound || activeRound}
          event={event}
          onSubmit={handleScoreSubmit}
          onClose={() => { setScoreEntryGroup(null); setScoreEntryRound(null) }}
        />
      )}
      {roundSummaryId && (() => {
        const r = rounds.find(x => x._id === roundSummaryId)
        const groupResults = GROUP_RESULTS[roundSummaryId] || {}
        const roundIsSubmitted = r.status === 'submitted'
        const roundIsClosed = r.status === 'closed'
        return (
          <div style={{ position: 'fixed', inset: 0, zIndex: 200, display: 'flex', flexDirection: 'column', justifyContent: 'flex-end' }}>
            <div onClick={() => setRoundSummaryId(null)} style={{ position: 'absolute', inset: 0, background: 'rgba(0,0,0,.6)' }} />
            <div style={{ position: 'relative', background: 'var(--bt-card)', borderRadius: '20px 20px 0 0', padding: '20px 16px 40px', maxHeight: '75vh', overflowY: 'auto' }}>
              <div style={{ width: 36, height: 4, borderRadius: 2, background: 'var(--bt-border)', margin: '0 auto 16px' }} />
              <div style={{ display: 'flex', alignItems: 'center', justifyContent: 'space-between', marginBottom: 12 }}>
                <div>
                  <div style={{ display: 'flex', alignItems: 'center', gap: 8, marginBottom: 2 }}>
                    <span style={{ fontSize: 16, fontWeight: 700, color: 'var(--bt-text-1)' }}>Day {r.day}: {r.title}</span>
                    {roundIsSubmitted && <span style={{ fontSize: 10, fontWeight: 700, padding: '2px 7px', borderRadius: 9999, background: '#1a120030', color: '#f59e0b', border: '1px solid #f59e0b40' }}>⚠ Pending Close</span>}
                    {roundIsClosed && <span style={{ fontSize: 10, fontWeight: 700, padding: '2px 7px', borderRadius: 9999, background: 'var(--bt-base)', color: 'var(--bt-text-3)', border: '1px solid var(--bt-border)' }}>✓ Closed</span>}
                  </div>
                  <div style={{ fontSize: 12, color: 'var(--bt-text-3)' }}>{r.course}</div>
                </div>
                <button onClick={() => setRoundSummaryId(null)} style={{ background: 'none', border: 'none', fontSize: 20, cursor: 'pointer', color: 'var(--bt-text-3)' }}>×</button>
              </div>
              {roundIsSubmitted && (
                <div style={{ marginBottom: 14, fontSize: 11, color: '#f59e0b', padding: '8px 12px', borderRadius: 8, background: '#1a120030', border: '1px solid #f59e0b30' }}>
                  ⚠ This round is submitted but not yet closed. Tap "Edit Scores" on any group to correct a misentry.
                </div>
              )}
              {/* Round totals */}
              {ROUND_RESULTS[roundSummaryId] && (
                <div style={{ display: 'flex', gap: 10, marginBottom: 16 }}>
                  {teams.map(team => {
                    const pts = ROUND_RESULTS[roundSummaryId][team._id]
                    return (
                      <div key={team._id} style={{ flex: 1, textAlign: 'center', borderRadius: 10, padding: '10px', background: `${team.color}15`, border: `1px solid ${team.color}40` }}>
                        <div style={{ fontSize: 11, fontWeight: 700, color: team.color }}>{team.shortName}</div>
                        <div style={{ fontSize: 28, fontWeight: 900, color: team.color }}>{pts}</div>
                        <div style={{ fontSize: 10, color: 'var(--bt-text-3)' }}>pts</div>
                      </div>
                    )
                  })}
                </div>
              )}
              {/* Per-group results */}
              <div style={{ fontSize: 11, fontWeight: 700, textTransform: 'uppercase', letterSpacing: '.08em', color: 'var(--bt-text-3)', marginBottom: 10 }}>Group Results</div>
              <div style={{ display: 'flex', flexDirection: 'column', gap: 8 }}>
                {event.groups.map(group => {
                  const gr = groupResults[group._id]
                  const players = event.players.filter(p => group.playerIds.includes(p._id))
                  const hasHoleData = !!HOLE_RESULTS[roundSummaryId]?.[group._id]
                  return (
                    <div key={group._id}
                      onClick={hasHoleData ? () => { setViewingScorecardGroup(group); setViewingScorecardRound(r); setRoundSummaryId(null) } : undefined}
                      style={{ borderRadius: 10, padding: '12px 14px', background: 'var(--bt-base)', border: '1px solid var(--bt-border)', cursor: hasHoleData ? 'pointer' : 'default', transition: 'border-color .15s' }}
                      onMouseEnter={hasHoleData ? e => e.currentTarget.style.borderColor = 'var(--bt-accent)' : undefined}
                      onMouseLeave={hasHoleData ? e => e.currentTarget.style.borderColor = 'var(--bt-border)' : undefined}>
                      <div style={{ display: 'flex', alignItems: 'center', justifyContent: 'space-between', marginBottom: 6 }}>
                        <span style={{ fontWeight: 600, fontSize: 13, color: 'var(--bt-text-1)' }}>{group.name}</span>
                        {gr ? (
                          <div style={{ display: 'flex', gap: 8, alignItems: 'center' }}>
                            {teams.map(team => (
                              <span key={team._id} style={{ fontSize: 13, fontWeight: 700, color: team.color }}>{gr[team._id] ?? '—'}</span>
                            ))}
                            {hasHoleData && <span style={{ color: 'var(--bt-text-3)', fontSize: 11, marginLeft: 4 }}>View scorecard ›</span>}
                          </div>
                        ) : <span style={{ fontSize: 12, color: 'var(--bt-text-3)' }}>Not submitted</span>}
                      </div>
                      <div style={{ fontSize: 11, color: 'var(--bt-text-3)', marginBottom: roundIsSubmitted && canScore ? 8 : 0 }}>{players.map(p => p.nickname).join(' · ')}</div>
                      {roundIsSubmitted && canScore && (
                        <button
                          onClick={e => { e.stopPropagation(); setScoreEntryGroup(group); setScoreEntryRound(r); setRoundSummaryId(null) }}
                          style={{ width: '100%', fontSize: 12, fontWeight: 700, padding: '7px', borderRadius: 7, border: '1px solid #f59e0b60', background: '#1a120030', color: '#f59e0b', cursor: 'pointer', display: 'flex', alignItems: 'center', justifyContent: 'center', gap: 5 }}>
                          <Ic n="Edit2" size={12} color="#f59e0b" /> Edit Scores
                        </button>
                      )}
                    </div>
                  )
                })}
              </div>
            </div>
          </div>
        )
      })()}
      {/* Read-only scorecard viewer */}
      {viewingScorecardGroup && viewingScorecardRound && (
        <HoleByHoleEntry
          group={viewingScorecardGroup}
          round={viewingScorecardRound}
          event={event}
          readOnly={true}
          onClose={() => { setViewingScorecardGroup(null); setViewingScorecardRound(null) }}
          onSubmit={() => {}}
          onOfflineResult={() => {}}
        />
      )}
    </div>
  )
}

// ── SCREEN: CourseSetup — 3-step golf course + tee time + pairings ──
function CourseSetup({ navigate, showToast, tripId, roundId, viewerRole, trips, notifications, onMarkAllRead, theme, onToggleTheme }) {
  const { useState, useMemo } = React
  const trip = trips.find(t => t._id === tripId) || trips[1]
  const canEdit = viewerRole === 'owner' || viewerRole === 'planner'

  // Look up round from event or trip's comp setup rounds
  const eventForTrip = getEventForTrip(tripId, trips)
  const eventRound = (eventForTrip || BBMI_EVENT).rounds.find(r => r._id === roundId)
  const roundLabel = eventRound ? `Day ${eventRound.day}: ${eventRound.title}` : 'Round'

  const [step, setStep] = useState(1)

  // Step 1 — Course details
  const [courseName, setCourseName] = useState(eventRound?.course || '')
  const [courseLocation, setCourseLocation] = useState('')
  const [holes, setHoles] = useState(18)
  const [par, setPar] = useState(72)
  const [roundDate, setRoundDate] = useState(trip.startDate || '')

  // Step 2 — Tee times
  const [firstTeeTime, setFirstTeeTime] = useState('8:00 AM')
  const [numGroups, setNumGroups] = useState(4)
  const [interval, setIntervalMin] = useState(12)
  const teeTimeSlots = useMemo(() => {
    const slots = []
    const [time, ampm] = firstTeeTime.split(' ')
    const [h, m] = time.split(':').map(Number)
    let totalMin = (ampm === 'PM' && h !== 12 ? h + 12 : h) * 60 + m
    for (let i = 0; i < numGroups; i++) {
      const hh = Math.floor(totalMin / 60) % 24
      const mm = totalMin % 60
      const ap = hh < 12 ? 'AM' : 'PM'
      const disp = `${hh === 0 ? 12 : hh > 12 ? hh - 12 : hh}:${String(mm).padStart(2, '0')} ${ap}`
      slots.push(disp)
      totalMin += interval
    }
    return slots
  }, [firstTeeTime, numGroups, interval])

  // Step 3 — Pairings
  const roster = trip.attendees.filter(a => a.status === 'in' || a.status === 'likely')
  const [pairings, setPairings] = useState(() => teeTimeSlots.map(() => []))
  const [draggingPlayer, setDraggingPlayer] = useState(null)

  // Update pairings count when numGroups changes
  React.useEffect(() => {
    setPairings(teeTimeSlots.map((_, i) => pairings[i] || []))
  }, [numGroups, teeTimeSlots.length])

  const assignedPlayerIds = new Set(pairings.flat())
  const unassignedPlayers = roster.filter(m => !assignedPlayerIds.has(m.userId))

  function addToGroup(groupIdx, userId) {
    if (assignedPlayerIds.has(userId)) return
    setPairings(ps => ps.map((g, i) => i === groupIdx ? [...g, userId] : g))
  }

  function removeFromGroup(groupIdx, userId) {
    setPairings(ps => ps.map((g, i) => i === groupIdx ? g.filter(id => id !== userId) : g))
  }

  function handleSave() {
    showToast(`Course saved — ${courseName || 'TBD'}`)
    navigate('trip-detail', { tripId: trip._id })
  }

  const stepLabels = ['Course Details', 'Tee Times', 'Pairings']

  return (
    <div style={{ minHeight: '100vh', paddingBottom: 40, background: 'var(--bt-base)' }}>
      <TopNav navigate={navigate} notifications={notifications} onMarkAllRead={onMarkAllRead} theme={theme} onToggleTheme={onToggleTheme} />
      <div style={{ maxWidth: 600, margin: '0 auto', padding: '24px 16px' }}>
        <Breadcrumb items={[{ label: 'Trips', screen: 'trips' }, { label: trip.title, screen: 'trip-detail', extra: { tripId: trip._id } }, { label: 'Course Setup' }]} navigate={navigate} />
        <div style={{ marginBottom: 24 }}>
          <h1 style={{ fontSize: 24, fontWeight: 700, color: 'var(--bt-text-1)', marginBottom: 4 }}>Course Setup</h1>
          <p style={{ fontSize: 14, color: 'var(--bt-text-2)' }}>{roundLabel}</p>
        </div>

        {/* Step indicator */}
        <div style={{ display: 'flex', gap: 8, marginBottom: 28 }}>
          {stepLabels.map((label, i) => {
            const n = i + 1
            const active = step === n
            const done = step > n
            return (
              <button key={n} onClick={() => step > n && setStep(n)} style={{ flex: 1, display: 'flex', flexDirection: 'column', alignItems: 'center', gap: 4, background: 'none', border: 'none', cursor: step > n ? 'pointer' : 'default', padding: '8px 4px' }}>
                <div style={{ width: 28, height: 28, borderRadius: '50%', display: 'flex', alignItems: 'center', justifyContent: 'center', fontSize: 12, fontWeight: 700, background: active ? 'var(--bt-accent)' : done ? 'var(--bt-accent)30' : 'var(--bt-card)', border: `2px solid ${active || done ? 'var(--bt-accent)' : 'var(--bt-border)'}`, color: active ? '#0d1117' : done ? 'var(--bt-accent)' : 'var(--bt-text-3)' }}>
                  {done ? '✓' : n}
                </div>
                <span style={{ fontSize: 10, fontWeight: 600, color: active ? 'var(--bt-accent)' : 'var(--bt-text-3)', textTransform: 'uppercase', letterSpacing: '.06em' }}>{label}</span>
              </button>
            )
          })}
        </div>

        {/* ── STEP 1: Course details ── */}
        {step === 1 && (
          <div style={{ display: 'flex', flexDirection: 'column', gap: 14 }}>
            <div>
              <label style={{ fontSize: 12, fontWeight: 700, color: 'var(--bt-text-3)', textTransform: 'uppercase', letterSpacing: '.06em', display: 'block', marginBottom: 6 }}>Course Name *</label>
              <input value={courseName} onChange={e => setCourseName(e.target.value)} placeholder="e.g. Bandon Dunes"
                style={{ width: '100%', fontSize: 15, padding: '10px 14px', borderRadius: 10, background: 'var(--bt-card)', border: '1px solid var(--bt-border)', color: 'var(--bt-text-1)', outline: 'none', boxSizing: 'border-box' }} />
            </div>
            <div>
              <label style={{ fontSize: 12, fontWeight: 700, color: 'var(--bt-text-3)', textTransform: 'uppercase', letterSpacing: '.06em', display: 'block', marginBottom: 6 }}>Location</label>
              <input value={courseLocation} onChange={e => setCourseLocation(e.target.value)} placeholder="e.g. Bandon, OR"
                style={{ width: '100%', fontSize: 15, padding: '10px 14px', borderRadius: 10, background: 'var(--bt-card)', border: '1px solid var(--bt-border)', color: 'var(--bt-text-1)', outline: 'none', boxSizing: 'border-box' }} />
            </div>
            <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: 12 }}>
              <div>
                <label style={{ fontSize: 12, fontWeight: 700, color: 'var(--bt-text-3)', textTransform: 'uppercase', letterSpacing: '.06em', display: 'block', marginBottom: 6 }}>Holes</label>
                <div style={{ display: 'flex', gap: 6 }}>
                  {[9, 18].map(n => (
                    <button key={n} onClick={() => setHoles(n)}
                      style={{ flex: 1, padding: '10px', borderRadius: 8, border: `1px solid ${holes === n ? 'var(--bt-accent)' : 'var(--bt-border)'}`, background: holes === n ? 'var(--bt-tag-bg)' : 'var(--bt-card)', color: holes === n ? 'var(--bt-accent)' : 'var(--bt-text-2)', fontWeight: 700, cursor: 'pointer' }}>
                      {n}
                    </button>
                  ))}
                </div>
              </div>
              <div>
                <label style={{ fontSize: 12, fontWeight: 700, color: 'var(--bt-text-3)', textTransform: 'uppercase', letterSpacing: '.06em', display: 'block', marginBottom: 6 }}>Par</label>
                <input type="number" value={par} onChange={e => setPar(Number(e.target.value))} min="27" max="80"
                  style={{ width: '100%', fontSize: 15, padding: '10px 14px', borderRadius: 10, background: 'var(--bt-card)', border: '1px solid var(--bt-border)', color: 'var(--bt-text-1)', outline: 'none', boxSizing: 'border-box' }} />
              </div>
            </div>
            <div>
              <label style={{ fontSize: 12, fontWeight: 700, color: 'var(--bt-text-3)', textTransform: 'uppercase', letterSpacing: '.06em', display: 'block', marginBottom: 6 }}>Round Date</label>
              <input type="date" value={roundDate} onChange={e => setRoundDate(e.target.value)}
                style={{ width: '100%', fontSize: 15, padding: '10px 14px', borderRadius: 10, background: 'var(--bt-card)', border: '1px solid var(--bt-border)', color: 'var(--bt-text-1)', outline: 'none', boxSizing: 'border-box' }} />
            </div>
            <div style={{ display: 'flex', justifyContent: 'flex-end', marginTop: 8 }}>
              <button onClick={() => { if (!courseName.trim()) { showToast('Enter a course name'); return } setStep(2) }}
                style={{ fontSize: 14, fontWeight: 700, padding: '12px 28px', borderRadius: 10, border: 'none', background: 'var(--bt-accent)', color: '#0d1117', cursor: 'pointer' }}>
                Next: Tee Times →
              </button>
            </div>
          </div>
        )}

        {/* ── STEP 2: Tee times ── */}
        {step === 2 && (
          <div style={{ display: 'flex', flexDirection: 'column', gap: 14 }}>
            <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: 12 }}>
              <div>
                <label style={{ fontSize: 12, fontWeight: 700, color: 'var(--bt-text-3)', textTransform: 'uppercase', letterSpacing: '.06em', display: 'block', marginBottom: 6 }}>First Tee Time</label>
                <input value={firstTeeTime} onChange={e => setFirstTeeTime(e.target.value)} placeholder="8:00 AM"
                  style={{ width: '100%', fontSize: 15, padding: '10px 14px', borderRadius: 10, background: 'var(--bt-card)', border: '1px solid var(--bt-border)', color: 'var(--bt-text-1)', outline: 'none', boxSizing: 'border-box' }} />
              </div>
              <div>
                <label style={{ fontSize: 12, fontWeight: 700, color: 'var(--bt-text-3)', textTransform: 'uppercase', letterSpacing: '.06em', display: 'block', marginBottom: 6 }}>Interval (min)</label>
                <div style={{ display: 'flex', gap: 6 }}>
                  {[8, 10, 12, 15].map(n => (
                    <button key={n} onClick={() => setIntervalMin(n)}
                      style={{ flex: 1, padding: '10px 4px', borderRadius: 8, border: `1px solid ${interval === n ? 'var(--bt-accent)' : 'var(--bt-border)'}`, background: interval === n ? 'var(--bt-tag-bg)' : 'var(--bt-card)', color: interval === n ? 'var(--bt-accent)' : 'var(--bt-text-2)', fontWeight: 700, fontSize: 12, cursor: 'pointer' }}>
                      {n}
                    </button>
                  ))}
                </div>
              </div>
            </div>
            <div>
              <label style={{ fontSize: 12, fontWeight: 700, color: 'var(--bt-text-3)', textTransform: 'uppercase', letterSpacing: '.06em', display: 'block', marginBottom: 6 }}>Number of Groups</label>
              <div style={{ display: 'flex', gap: 6 }}>
                {[2, 3, 4, 5, 6].map(n => (
                  <button key={n} onClick={() => setNumGroups(n)}
                    style={{ flex: 1, padding: '10px', borderRadius: 8, border: `1px solid ${numGroups === n ? 'var(--bt-accent)' : 'var(--bt-border)'}`, background: numGroups === n ? 'var(--bt-tag-bg)' : 'var(--bt-card)', color: numGroups === n ? 'var(--bt-accent)' : 'var(--bt-text-2)', fontWeight: 700, cursor: 'pointer' }}>
                    {n}
                  </button>
                ))}
              </div>
            </div>
            {/* Preview tee time slots */}
            <div>
              <div style={{ fontSize: 12, fontWeight: 700, color: 'var(--bt-text-3)', textTransform: 'uppercase', letterSpacing: '.06em', marginBottom: 8 }}>Preview</div>
              <div style={{ borderRadius: 12, overflow: 'hidden', border: '1px solid var(--bt-border)' }}>
                {teeTimeSlots.map((slot, i) => (
                  <div key={i} style={{ display: 'flex', alignItems: 'center', gap: 12, padding: '10px 14px', borderBottom: i < teeTimeSlots.length - 1 ? '1px solid var(--bt-base)' : 'none', background: 'var(--bt-card)' }}>
                    <Ic n="Flag" size={13} color="var(--bt-accent)" />
                    <span style={{ fontSize: 13, fontWeight: 600, color: 'var(--bt-text-1)', flex: 1 }}>Group {i + 1}</span>
                    <span style={{ fontSize: 13, color: 'var(--bt-accent)', fontFamily: 'monospace' }}>{slot}</span>
                  </div>
                ))}
              </div>
            </div>
            <div style={{ display: 'flex', justifyContent: 'space-between', marginTop: 8 }}>
              <Btn variant="secondary" onClick={() => setStep(1)}>← Back</Btn>
              <button onClick={() => setStep(3)}
                style={{ fontSize: 14, fontWeight: 700, padding: '12px 28px', borderRadius: 10, border: 'none', background: 'var(--bt-accent)', color: '#0d1117', cursor: 'pointer' }}>
                Next: Pairings →
              </button>
            </div>
          </div>
        )}

        {/* ── STEP 3: Pairings ── */}
        {step === 3 && (
          <div>
            <p style={{ fontSize: 13, color: 'var(--bt-text-2)', marginBottom: 16 }}>Assign players to groups. Pairings can be done day-of — skip if not ready.</p>

            {/* Unassigned players */}
            {unassignedPlayers.length > 0 && (
              <div style={{ marginBottom: 16 }}>
                <div style={{ fontSize: 11, fontWeight: 700, color: 'var(--bt-text-3)', textTransform: 'uppercase', letterSpacing: '.08em', marginBottom: 8 }}>Unassigned ({unassignedPlayers.length})</div>
                <div style={{ display: 'flex', flexWrap: 'wrap', gap: 6 }}>
                  {unassignedPlayers.map(m => (
                    <div key={m.userId} style={{ display: 'flex', alignItems: 'center', gap: 6, padding: '6px 10px', borderRadius: 8, background: 'var(--bt-card)', border: '1px solid var(--bt-border)' }}>
                      <Avatar name={m.name} size="sm" />
                      <span style={{ fontSize: 12, color: 'var(--bt-text-1)' }}>{m.name.split(' ')[0]}</span>
                    </div>
                  ))}
                </div>
              </div>
            )}

            {/* Tee time group slots */}
            <div style={{ display: 'flex', flexDirection: 'column', gap: 10, marginBottom: 24 }}>
              {teeTimeSlots.map((slot, gi) => (
                <div key={gi} style={{ borderRadius: 12, background: 'var(--bt-card)', border: '1px solid var(--bt-border)', overflow: 'hidden' }}>
                  <div style={{ display: 'flex', alignItems: 'center', justifyContent: 'space-between', padding: '10px 14px', background: 'var(--bt-base)', borderBottom: '1px solid var(--bt-border)' }}>
                    <span style={{ fontSize: 13, fontWeight: 700, color: 'var(--bt-text-1)' }}>Group {gi + 1}</span>
                    <span style={{ fontSize: 12, color: 'var(--bt-accent)', fontFamily: 'monospace', fontWeight: 600 }}>{slot}</span>
                  </div>
                  <div style={{ padding: '10px 14px' }}>
                    {pairings[gi]?.length > 0 ? (
                      <div style={{ display: 'flex', flexWrap: 'wrap', gap: 6, marginBottom: 8 }}>
                        {pairings[gi].map(userId => {
                          const member = roster.find(m => m.userId === userId)
                          if (!member) return null
                          return (
                            <div key={userId} style={{ display: 'flex', alignItems: 'center', gap: 6, padding: '5px 8px', borderRadius: 8, background: 'var(--bt-base)', border: '1px solid var(--bt-border)' }}>
                              <Avatar name={member.name} size="sm" />
                              <span style={{ fontSize: 12, color: 'var(--bt-text-1)' }}>{member.name.split(' ')[0]}</span>
                              <button onClick={() => removeFromGroup(gi, userId)} style={{ background: 'none', border: 'none', cursor: 'pointer', color: 'var(--bt-text-3)', fontSize: 14, padding: 0, lineHeight: 1 }}>×</button>
                            </div>
                          )
                        })}
                      </div>
                    ) : (
                      <div style={{ fontSize: 12, color: 'var(--bt-text-3)', fontStyle: 'italic', marginBottom: 8 }}>No players assigned</div>
                    )}
                    {unassignedPlayers.length > 0 && (
                      <div style={{ display: 'flex', flexWrap: 'wrap', gap: 4 }}>
                        {unassignedPlayers.slice(0, 6).map(m => (
                          <button key={m.userId} onClick={() => addToGroup(gi, m.userId)}
                            style={{ fontSize: 11, padding: '3px 8px', borderRadius: 6, border: '1px dashed var(--bt-accent)60', background: 'var(--bt-tag-bg)', color: 'var(--bt-accent)', cursor: 'pointer' }}>
                            + {m.name.split(' ')[0]}
                          </button>
                        ))}
                      </div>
                    )}
                  </div>
                </div>
              ))}
            </div>

            <div style={{ display: 'flex', alignItems: 'center', justifyContent: 'space-between', flexWrap: 'wrap', gap: 10 }}>
              <Btn variant="secondary" onClick={() => setStep(2)}>← Back</Btn>
              <div style={{ display: 'flex', gap: 8 }}>
                <button onClick={() => { showToast('Pairings skipped — assign day of'); navigate('trip-detail', { tripId: trip._id }) }}
                  style={{ fontSize: 13, fontWeight: 600, padding: '10px 18px', borderRadius: 10, border: '1px solid var(--bt-border)', background: 'transparent', color: 'var(--bt-text-2)', cursor: 'pointer' }}>
                  Skip — assign day of
                </button>
                <button onClick={handleSave}
                  style={{ fontSize: 14, fontWeight: 700, padding: '10px 24px', borderRadius: 10, border: 'none', background: 'var(--bt-accent)', color: '#0d1117', cursor: 'pointer' }}>
                  Save Pairings ✓
                </button>
              </div>
            </div>
          </div>
        )}
      </div>
    </div>
  )
}

// ── SCREEN: TripMessages ─────────────────────────────────────────
function TripMessages({ navigate, showToast, tripId, viewerRole, trips, notify, notifications, onMarkAllRead, theme, onToggleTheme }) {
  const { useState } = React
  const trip = trips.find(t => t._id === tripId) || trips[0]
  const hasComp = !!trip.eventId
  const hasTeams = hasComp && BBMI_EVENT.teams.length > 0

  // Determine the current user's team for this event. Team is fixed by TEAM_ASSIGNMENTS
  // regardless of which dev role is active — the role switcher changes viewerRole, not team.
  const myTeamId = hasTeams ? getTeamId(BBMI_EVENT._id, CURRENT_USER._id) : null
  const myTeam   = myTeamId ? BBMI_EVENT.teams.find(t => t._id === myTeamId) : null

  // Team messages are keyed by teamId. Only load messages for the current user's team.
  const myTeamMsgs = myTeamId ? (TRIP_MESSAGES[tripId]?.team?.[myTeamId] || []) : []

  const [tripMsgs, setTripMsgs]   = useState(TRIP_MESSAGES[tripId]?.trip || [])
  const [teamMsgs, setTeamMsgs]   = useState(myTeamMsgs)
  const [tripDraft, setTripDraft] = useState('')
  const [teamDraft, setTeamDraft] = useState('')

  return (
    <div style={{ minHeight: '100vh', paddingBottom: 96, background: 'var(--bt-base)' }}>
      <TopNav navigate={navigate} notifications={notifications} onMarkAllRead={onMarkAllRead} theme={theme} onToggleTheme={onToggleTheme} />
      <div style={{ maxWidth: 680, margin: '0 auto', padding: '16px 16px 0' }}>
        <Breadcrumb items={[{ label: 'Trips', screen: 'trips' }, { label: trip.title, screen: 'trip-detail', extra: { tripId } }, { label: 'Messages' }]} navigate={navigate} />
        <h1 style={{ fontSize: 20, fontWeight: 700, color: 'var(--bt-text-1)', margin: '12px 0 16px' }}>Messages</h1>
      </div>

      <div style={{ maxWidth: 680, margin: '0 auto', padding: '0 16px', display: 'flex', flexDirection: 'column', gap: 16 }}>

        {/* ── Trip Chat ── */}
        <div>
          <div style={{ display: 'flex', alignItems: 'center', gap: 8, marginBottom: 8 }}>
            <Ic n="Users" size={14} color="var(--bt-text-3)" />
            <span style={{ fontSize: 12, fontWeight: 700, textTransform: 'uppercase', letterSpacing: '.07em', color: 'var(--bt-text-3)' }}>Trip Chat</span>
            <span style={{ fontSize: 11, color: 'var(--bt-text-3)' }}>· Everyone</span>
          </div>
          <TripChat messages={tripMsgs} setMessages={setTripMsgs} msgDraft={tripDraft} setMsgDraft={setTripDraft} maxHeight={280}
            onSend={(text) => { if (notify) notify({ type: 'chat_message', tripId, actorId: CURRENT_USER._id, payload: { preview: text } }) }} />
        </div>

        {/* ── Team Chat ── */}
        {hasTeams && (
          <div>
            <div style={{ display: 'flex', alignItems: 'center', gap: 8, marginBottom: 8 }}>
              <Ic n="Lock" size={14} color="var(--bt-purple)" />
              <span style={{ fontSize: 12, fontWeight: 700, textTransform: 'uppercase', letterSpacing: '.07em', color: 'var(--bt-purple)' }}>
                {myTeam?.name || 'Team Chat'}
              </span>
              <span style={{ fontSize: 11, color: 'var(--bt-text-3)' }}>· Teammates only</span>
            </div>
            {myTeamId ? (
              <TripChat messages={teamMsgs} setMessages={setTeamMsgs} msgDraft={teamDraft} setMsgDraft={setTeamDraft} maxHeight={280}
                onSend={(text) => { if (notify) notify({ type: 'chat_message', tripId, actorId: CURRENT_USER._id, payload: { preview: text } }) }} />
            ) : (
              <div style={{ padding: '20px 16px', textAlign: 'center', color: 'var(--bt-text-3)', fontSize: 13, background: 'var(--bt-card)', borderRadius: 10, border: '1px solid var(--bt-border)' }}>
                You're not on a team yet — check back once teams are assigned.
              </div>
            )}
          </div>
        )}

      </div>
      <BottomNav active="trip-messages" navigate={navigate} currentTripId={tripId} />
    </div>
  )
}

// ── App Shell ────────────────────────────────────────────────────
const ROLE_USERS = {
  owner:   { name: 'Brad',    desc: 'Full control' },
  planner: { name: 'Grether', desc: 'Can edit' },
  member:  { name: 'Rob',     desc: 'Read-only' },
}

function App() {
  const [screen, setScreen] = useState('trips')
  const [tripId, setTripId] = useState(null)
  const [roundId, setRoundId] = useState(null)
  const [toast, setToast] = useState(null)
  const [viewerRole, setViewerRole] = useState('planner')
  const [trips, setTrips] = useState(MOCK_TRIPS)
  // Notification state — backed by module-level NOTIFICATION_EVENTS array.
  // The nonce counter forces re-renders when new notifications are pushed.
  const [notifNonce, setNotifNonce] = useState(0)
  const notifyAndRefresh = (opts) => { pushNotification(opts); setNotifNonce(n => n + 1) }
  const markAllRead = () => {
    const now = new Date()
    NOTIFICATION_EVENTS.forEach(ev => { if (!ev.readAt) ev.readAt = now })
    setNotifNonce(n => n + 1)
  }

  // ── Theme — persisted to localStorage, defaults to prefers-color-scheme ──
  const [theme, setTheme] = useState(() => {
    try { const saved = localStorage.getItem('bt-theme'); if (saved) return saved } catch(_) {}
    return window.matchMedia('(prefers-color-scheme: light)').matches ? 'light' : 'dark'
  })
  useEffect(() => {
    document.documentElement.setAttribute('data-theme', theme)
    try { localStorage.setItem('bt-theme', theme) } catch(_) {}
  }, [theme])
  const toggleTheme = () => setTheme(t => t === 'dark' ? 'light' : 'dark')

  const navigate = (s, extra = {}) => {
    setScreen(s)
    setTripId(extra.tripId || null)
    if (extra.roundId !== undefined) setRoundId(extra.roundId)
    window.scrollTo(0, 0)
  }

  const showToast = msg => {
    setToast(msg)
    setTimeout(() => setToast(null), 2800)
  }

  // Common props passed to every screen that renders TopNav
  const navProps = { notifications: NOTIFICATION_EVENTS, onMarkAllRead: markAllRead, theme, onToggleTheme: toggleTheme }

  return (
    <>
      {screen === 'trips'            && <Dashboard navigate={navigate} viewerRole={viewerRole} trips={trips} {...navProps} />}
      {screen === 'trip-new'         && <TripNew navigate={navigate} showToast={showToast} setTrips={setTrips} {...navProps} />}
      {screen === 'trip-detail'      && <TripDetail navigate={navigate} showToast={showToast} tripId={tripId} viewerRole={viewerRole} trips={trips} setTrips={setTrips} notify={notifyAndRefresh} {...navProps} />}
      {screen === 'comp-setup'       && <CompetitionSetup navigate={navigate} showToast={showToast} tripId={tripId} viewerRole={viewerRole} trips={trips} {...navProps} />}
      {screen === 'idea-comparison'  && <IdeaComparison navigate={navigate} showToast={showToast} tripId={tripId} viewerRole={viewerRole} trips={trips} setTrips={setTrips} notify={notifyAndRefresh} {...navProps} />}
      {screen === 'trip-messages'    && <TripMessages navigate={navigate} showToast={showToast} tripId={tripId} viewerRole={viewerRole} trips={trips} notify={notifyAndRefresh} {...navProps} />}
      {screen === 'live-leaderboard' && <LiveLeaderboard navigate={navigate} showToast={showToast} tripId={tripId} viewerRole={viewerRole} notify={notifyAndRefresh} {...navProps} />}
      {screen === 'course-setup'     && <CourseSetup navigate={navigate} showToast={showToast} tripId={tripId} roundId={roundId} viewerRole={viewerRole} trips={trips} {...navProps} />}

      {/* Dev role switcher */}
      <div style={{ position: 'fixed', bottom: 80, right: 16, zIndex: 200, display: 'flex', flexDirection: 'column', gap: 6 }}>
        <div style={{ background: 'var(--bt-card)', border: '1px solid var(--bt-border)', borderRadius: 8, overflow: 'hidden', boxShadow: '0 4px 16px var(--bt-shadow)' }}>
          <div style={{ padding: '4px 10px', fontSize: 9, fontWeight: 700, color: 'var(--bt-text-3)', textTransform: 'uppercase', letterSpacing: '.08em', borderBottom: '1px solid var(--bt-border)' }}>Viewing as</div>
          {Object.entries(ROLE_USERS).map(([role, info]) => (
            <button key={role} onClick={() => setViewerRole(role)}
              style={{ display: 'block', width: '100%', textAlign: 'left', padding: '6px 10px', border: 'none', cursor: 'pointer', fontSize: 12, background: viewerRole === role ? 'var(--bt-tag-bg)' : 'transparent', color: viewerRole === role ? 'var(--bt-accent)' : 'var(--bt-text-2)', fontWeight: viewerRole === role ? 700 : 400, borderLeft: `2px solid ${viewerRole === role ? 'var(--bt-accent)' : 'transparent'}` }}>
              {info.name} <span style={{ opacity: .6, fontSize: 10 }}>({info.desc})</span>
            </button>
          ))}
        </div>
      </div>

      {toast && (
        <div className="animate-slide-up" style={{ position: 'fixed', zIndex: 200, left: '50%', transform: 'translateX(-50%)', bottom: 88, display: 'flex', alignItems: 'center', gap: 8, fontSize: 14, fontWeight: 500, padding: '12px 20px', borderRadius: 12, boxShadow: '0 8px 32px rgba(0,0,0,.4)', background: 'var(--bt-card)', color: 'var(--bt-text-1)', border: '1px solid var(--bt-accent)50', whiteSpace: 'nowrap' }}>
          <span style={{ color: 'var(--bt-accent)' }}>✓</span> {toast}
        </div>
      )}
    </>
  )
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />)
</script>
</body>
</html>
