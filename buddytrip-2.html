  function ScheduleTab() {
    const RES_ICONS = { accommodation: 'Building2', 'tee-time': 'Flag', restaurant: 'UtensilsCrossed', transportation: 'Car', activity: 'Target', other: 'ClipboardList' }
    const RES_TYPES = [
      { value: 'accommodation', label: 'Lodging' },
      { value: 'tee-time',      label: 'Tee Time' },
      { value: 'restaurant',    label: 'Restaurant' },
      { value: 'transportation',label: 'Transportation' },
      { value: 'activity',      label: 'Activity' },
      { value: 'other',         label: 'Other' },
    ]
    const [resList, setResList] = useState(RESERVATIONS.filter(r => r.tripId === trip._id))
    const [addBookingOpen, setAddBookingOpen] = useState(false)
    const dateVotes = DATE_VOTES.filter(v => v.tripId === trip._id)
    const getDateScore = dateId => {
      const vs = dateVotes.filter(v => v.dateId === dateId)
      return { yes: vs.filter(v => v.availability === 'yes').length, maybe: vs.filter(v => v.availability === 'maybe').length, no: vs.filter(v => v.availability === 'no').length }
    }

    function AddBookingForm({ onClose }) {
      const [type,   setType]   = useState('tee-time')
      const [title,  setTitle]  = useState('')
      const [date,   setDate]   = useState('')
      const [time,   setTime]   = useState('')
      const [conf,   setConf]   = useState('')
      const [cost,   setCost]   = useState('')
      const [notes,  setNotes]  = useState('')
      const canSubmit = title.trim() && date
      function handleSubmit() {
        const newRes = {
          _id: 'res-' + Date.now(),
          tripId: trip._id,
          type,
          title: title.trim(),
          date,
          startTime: time.trim() || null,
          confirmationNumber: conf.trim() || null,
          cost: parseFloat(cost) || 0,
          notes: notes.trim() || null,
          createdAt: new Date(),
        }
        RESERVATIONS.push(newRes)
        setResList(RESERVATIONS.filter(r => r.tripId === trip._id))
        showToast(title.trim() + ' added')
        onClose()
      }
      const inp = { fontSize: 14, padding: '9px 12px', borderRadius: 8, outline: 'none', background: 'var(--bt-input)', border: '1px solid var(--bt-border-input)', color: 'var(--bt-text-1)', width: '100%', transition: 'border-color .15s' }
      return (
        <Card style={{ marginBottom: 8 }}>
          <div style={{ display: 'flex', flexDirection: 'column', gap: 10 }}>
            <div style={{ fontSize: 13, fontWeight: 700, color: 'var(--bt-text-1)', marginBottom: 2 }}>Add Booking</div>
            {/* Type selector */}
            <div style={{ display: 'flex', flexWrap: 'wrap', gap: 6 }}>
              {RES_TYPES.map(rt => (
                <button key={rt.value} onClick={() => setType(rt.value)}
                  style={{ display: 'flex', alignItems: 'center', gap: 5, fontSize: 12, fontWeight: 600, padding: '5px 10px', borderRadius: 9999, cursor: 'pointer', border: `1px solid ${type === rt.value ? 'var(--bt-accent)' : 'var(--bt-border)'}`, background: type === rt.value ? 'var(--bt-tag-bg)' : 'transparent', color: type === rt.value ? 'var(--bt-accent)' : 'var(--bt-text-2)' }}>
                  <Ic n={RES_ICONS[rt.value]} size={12} color={type === rt.value ? 'var(--bt-accent)' : 'var(--bt-text-3)'} />
                  {rt.label}
                </button>
              ))}
            </div>
            {/* Title + Date row */}
            <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: 8 }}>
              <input placeholder="Title *" value={title} onChange={e => setTitle(e.target.value)}
                style={inp}
                onFocus={e => e.target.style.borderColor = 'var(--bt-accent)'}
                onBlur={e => e.target.style.borderColor = 'var(--bt-border-input)'} />
              <input type="date" value={date} onChange={e => setDate(e.target.value)}
                style={{ ...inp, colorScheme: 'dark' }}
                onFocus={e => e.target.style.borderColor = 'var(--bt-accent)'}
                onBlur={e => e.target.style.borderColor = 'var(--bt-border-input)'} />
            </div>
            {/* Time + Confirmation row */}
            <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: 8 }}>
              <input placeholder="Start time (optional)" value={time} onChange={e => setTime(e.target.value)}
                style={inp}
                onFocus={e => e.target.style.borderColor = 'var(--bt-accent)'}
                onBlur={e => e.target.style.borderColor = 'var(--bt-border-input)'} />
              <input placeholder="Confirmation # (optional)" value={conf} onChange={e => setConf(e.target.value)}
                style={inp}
                onFocus={e => e.target.style.borderColor = 'var(--bt-accent)'}
                onBlur={e => e.target.style.borderColor = 'var(--bt-border-input)'} />
            </div>
            {/* Cost + Notes row */}
            <div style={{ display: 'grid', gridTemplateColumns: '120px 1fr', gap: 8 }}>
              <input placeholder="Cost $" type="number" min="0" value={cost} onChange={e => setCost(e.target.value)}
                style={inp}
                onFocus={e => e.target.style.borderColor = 'var(--bt-accent)'}
                onBlur={e => e.target.style.borderColor = 'var(--bt-border-input)'} />
              <input placeholder="Notes (optional)" value={notes} onChange={e => setNotes(e.target.value)}
                style={inp}
                onFocus={e => e.target.style.borderColor = 'var(--bt-accent)'}
                onBlur={e => e.target.style.borderColor = 'var(--bt-border-input)'} />
            </div>
            <div style={{ display: 'flex', gap: 8, marginTop: 2 }}>
              <Btn variant="secondary" onClick={onClose} style={{ flex: 1 }}>Cancel</Btn>
              <Btn onClick={handleSubmit} disabled={!canSubmit} style={{ flex: 2, opacity: canSubmit ? 1 : 0.4, cursor: canSubmit ? 'pointer' : 'default' }}>Add Booking</Btn>
            </div>
          </div>
        </Card>
      )
    }

    return (
      <div style={{ display: 'flex', flexDirection: 'column', gap: 16 }}>
        <div>
          <div style={{ display: 'flex', alignItems: 'center', justifyContent: 'space-between', marginBottom: 12 }}>
            <SectionLabel>Bookings & Tee Times</SectionLabel>
            {canEdit && !addBookingOpen && <Btn variant="secondary" onClick={() => setAddBookingOpen(true)}>+ Add</Btn>}
          </div>
          {addBookingOpen && <AddBookingForm onClose={() => setAddBookingOpen(false)} />}
          {resList.length === 0
            ? <Card><div style={{ textAlign: 'center', padding: '32px 0' }}>
                <Ic n="ClipboardList" size={28} color="var(--bt-text-3)" style={{ marginBottom: 8 }} />
                <p style={{ fontSize: 14, color: 'var(--bt-text-3)', margin: '0 0 4px' }}>No bookings yet</p>
                {canEdit && <p style={{ fontSize: 12, color: 'var(--bt-text-3)', margin: 0 }}>Use + Add to log lodging, tee times, and more.</p>}
              </div></Card>
            : resList.map(r => (
              <Card key={r._id} style={{ marginBottom: 8, display: 'flex', gap: 12, alignItems: 'flex-start' }}>
                <Ic n={RES_ICONS[r.type] || 'ClipboardList'} size={18} color="var(--bt-text-3)" style={{ marginTop: 2 }} />
                <div style={{ flex: 1, minWidth: 0 }}>
                  <div style={{ fontWeight: 600, fontSize: 14, marginBottom: 2, color: 'var(--bt-text-1)' }}>{r.title}</div>
                  <div style={{ fontSize: 12, marginBottom: 6, color: 'var(--bt-text-3)' }}>{fmtDate(r.date)}{r.startTime ? ` · ${r.startTime}` : ''}</div>
                  {r.confirmationNumber && <span style={{ fontSize: 11, fontFamily: 'monospace', padding: '2px 8px', borderRadius: 4, background: 'var(--bt-tag-bg)', color: 'var(--bt-accent)' }}>#{r.confirmationNumber}</span>}
                  {r.notes ? <div style={{ fontSize: 12, marginTop: 6, color: 'var(--bt-text-3)' }}>{r.notes}</div> : null}
                </div>
                {r.cost > 0 && <div style={{ fontWeight: 700, fontSize: 14, flexShrink: 0, color: 'var(--bt-text-1)' }}>${r.cost.toLocaleString()}</div>}
              </Card>
            ))
          }
        </div>

      </div>
    )
  }

  function CrewTab() {
    // ── "Frequently trips with" — BBMI series history ────────────
    const BBMI_HISTORY = [
      { userId: 'kevin',  name: 'Kevin Stoll',   hasAccount: true  },
      { userId: 'matt',   name: 'Matt Siders',   hasAccount: true  },
      { userId: 'derek',  name: 'Derek Lund',    hasAccount: false },
      { userId: 'scott',  name: 'Scott Harwick', hasAccount: true  },
      { userId: 'nick',   name: 'Nick Paulson',  hasAccount: false },
    ]

    // ── Local roster state now lifted to TripDetail ──────────────
    const currentIds = new Set(roster.map(a => a.userId))

    // ── Add-to-roster form ────────────────────────────────────────
    const [addName,  setAddName]  = useState('')
    const [addEmail, setAddEmail] = useState('')
    const [addError, setAddError] = useState('')

    function handleAddToRoster() {
      const name = addName.trim()
      if (!name) { setAddError('Name is required'); return }
      const id = 'ghost-' + Date.now()
      const emailTrimmed = addEmail.trim()
      // Check if email matches a known account in USERS
      const account = emailTrimmed ? Object.values(USERS).find(u => u.email?.toLowerCase() === emailTrimmed.toLowerCase()) : null
      setRoster(r => [...r, {
        name,
        userId: account ? account._id : id,
        status: 'maybe',
        role: 'Member',
        hasAccount: !!account,
        isGhost: !account,
        email: emailTrimmed || null,
        inviteSent: false,
      }])
      setAddName('')
      setAddEmail('')
      setAddError('')
      if (notify) notify({ type: 'crew_added', tripId: trip._id, actorId: CURRENT_USER._id, payload: { memberName: name.split(' ')[0] } })
      showToast(name.split(' ')[0] + ' added to roster')
    }

    // ── Frequently trips with quick-add ──────────────────────────
    const freqSuggestions = BBMI_HISTORY.filter(h => !currentIds.has(h.userId))

    function quickAdd(person) {
      setRoster(r => [...r, {
        name: person.name,
        userId: person.userId,
        status: 'maybe',
        role: 'Member',
        hasAccount: person.hasAccount,
        isGhost: !person.hasAccount,
        inviteSent: false,
      }])
      if (notify) notify({ type: 'crew_added', tripId: trip._id, actorId: CURRENT_USER._id, payload: { memberName: person.name.split(' ')[0] } })
      showToast(person.name.split(' ')[0] + ' added')
    }

    // ── Per-person expand panel ───────────────────────────────────
    const [expandedId, setExpandedId] = useState(null)
    const [editEmailId, setEditEmailId] = useState(null)
    const [editEmailVal, setEditEmailVal] = useState('')
    // Confirm state: { type: 'demote'|'remove', userId, name }
    const [confirmAction, setConfirmAction] = useState(null)

    function saveEmail(userId) {
      setRoster(r => r.map(m => m.userId === userId ? { ...m, email: editEmailVal.trim() || m.email } : m))
      setEditEmailId(null)
      showToast('Email saved')
    }

    function sendInvite(member) {
      setRoster(r => r.map(m => m.userId === member.userId ? { ...m, inviteSent: true } : m))
      const msg = member.hasAccount
        ? `${member.name.split(' ')[0]} invited to join this trip`
        : `Email invite sent to ${member.email}`
      showToast(msg)
    }

    function promoteToPlanner(userId) {
      setRoster(r => r.map(m => m.userId === userId ? { ...m, role: 'Planner' } : m))
      showToast('Promoted to Planner')
    }
    function demoteToMember(userId) {
      setRoster(r => r.map(m => m.userId === userId ? { ...m, role: 'Member' } : m))
      showToast('Moved to Member')
    }
    function removeMember(userId) {
      setRoster(r => r.filter(m => m.userId !== userId))
      setExpandedId(null)
      showToast('Removed from trip')
    }

    const confirmed = roster.filter(a => a.status === 'in')
    const pending   = roster.filter(a => a.status !== 'in')

    // ── Member row component ──────────────────────────────────────
    // ── Mock BBMI series history per person ──────────────────────
    const SERIES_HISTORY = {
      'brad':    { years: ['2019','2020','2021','2022','2023','2024','2025'], wins: 3, losses: 4, hcp: 8  },
      'zach':    { years: ['2019','2020','2021','2022','2023','2024','2025'], wins: 4, losses: 3, hcp: 12 },
      'jd':      { years: ['2020','2021','2022','2023','2024','2025'],        wins: 2, losses: 4, hcp: 18 },
      'rob':     { years: ['2021','2022','2023','2024','2025'],               wins: 1, losses: 4, hcp: 22 },
      'tyler':   { years: ['2022','2023','2024','2025'],                      wins: 2, losses: 2, hcp: 15 },
      'charlie': { years: ['2023','2024','2025'],                             wins: 1, losses: 2, hcp: 20 },
      'bj':      { years: ['2021','2022','2023','2024','2025'],               wins: 3, losses: 2, hcp: 10 },
      'ben':     { years: ['2024','2025'],                                    wins: 0, losses: 2, hcp: 24 },
    }

    function MemberRow({ member }) {
      const isExpanded = expandedId === member.userId
      const isMe = (viewerRole === 'Owner' && member.userId === 'brad') ||
                   (viewerRole === 'Planner' && member.userId === 'zach') ||
                   (viewerRole === 'Member' && member.userId === 'rob')
      const history = SERIES_HISTORY[member.userId]

      return (
        <div style={{ borderRadius: 10, overflow: 'hidden', border: `1px solid ${isExpanded ? 'var(--bt-accent)40' : 'transparent'}`, marginBottom: 2, transition: 'border-color .2s' }}>
          {/* Main row */}
          <div
            onClick={() => setExpandedId(isExpanded ? null : member.userId)}
            style={{ display: 'flex', alignItems: 'center', gap: 12, padding: '10px 8px', borderRadius: isExpanded ? '10px 10px 0 0' : 10, cursor: 'pointer', background: isExpanded ? 'var(--bt-card)' : 'transparent' }}>
            {/* Avatar — ghost gets faded */}
            <div style={{ opacity: member.isGhost ? 0.45 : 1, flexShrink: 0 }}>
              <Avatar name={member.name} size="sm" />
            </div>
            <div style={{ flex: 1, minWidth: 0 }}>
              <div style={{ display: 'flex', alignItems: 'center', gap: 7, flexWrap: 'wrap' }}>
                {member.isGhost && <Ic n="Ghost" size={14} color="var(--bt-text-3)" />}
                <span style={{
                  fontSize: 14, fontWeight: 600,
                  color: member.isGhost ? 'var(--bt-text-3)' : 'var(--bt-text-1)',
                  fontStyle: member.isGhost ? 'italic' : 'normal'
                }}>
                  {member.name}{isMe ? ' (you)' : ''}
                </span>
                {/* BuddyTrip account dot */}
                {!member.isGhost && <span title="BuddyTrip account" style={{ fontSize: 8, color: 'var(--bt-blue)' }}>●</span>}
                <RoleBadge role={member.role} />
                {member.inviteSent && <span style={{ fontSize: 10, fontWeight: 700, padding: '1px 6px', borderRadius: 4, background: 'var(--bt-tag-bg)', color: 'var(--bt-accent)', border: '1px solid var(--bt-accent)30' }}>Invited</span>}
              </div>
              {member.isGhost && (
                <div style={{ fontSize: 11, color: 'var(--bt-text-3)', marginTop: 2 }}>
                  {member.email ? `No account · ${member.email}` : 'No account · no email on file'}
                </div>
              )}
            </div>
            <span style={{ color: 'var(--bt-text-3)', fontSize: 14, transition: 'transform .2s', transform: isExpanded ? 'rotate(90deg)' : 'none', flexShrink: 0 }}>›</span>
          </div>

          {/* Expanded panel */}
          {isExpanded && (
            <div style={{ padding: '12px 14px 14px', background: 'var(--bt-base)', borderTop: '1px solid var(--bt-border)' }}>

              {/* Series history — shown for account holders */}
              {history && (
                <div style={{ marginBottom: 14, padding: '10px 12px', borderRadius: 8, background: 'var(--bt-card)', border: '1px solid var(--bt-border)' }}>
                  <div style={{ fontSize: 11, fontWeight: 700, textTransform: 'uppercase', letterSpacing: '.07em', color: 'var(--bt-text-3)', marginBottom: 8 }}>BBMI History</div>
                  <div style={{ display: 'flex', gap: 16, marginBottom: 8, flexWrap: 'wrap' }}>
                    <div style={{ textAlign: 'center' }}>
                      <div style={{ fontSize: 18, fontWeight: 800, color: 'var(--bt-text-1)', fontFamily: 'monospace' }}>{history.years.length}</div>
                      <div style={{ fontSize: 10, color: 'var(--bt-text-3)', textTransform: 'uppercase', letterSpacing: '.05em' }}>Trips</div>
                    </div>
                    <div style={{ textAlign: 'center' }}>
                      <div style={{ fontSize: 18, fontWeight: 800, fontFamily: 'monospace', color: history.wins > history.losses ? 'var(--bt-accent)' : 'var(--bt-text-2)' }}>{history.wins}-{history.losses}</div>
                      <div style={{ fontSize: 10, color: 'var(--bt-text-3)', textTransform: 'uppercase', letterSpacing: '.05em' }}>W-L</div>
                    </div>
                    <div style={{ textAlign: 'center' }}>
                      <div style={{ fontSize: 18, fontWeight: 800, color: 'var(--bt-text-1)', fontFamily: 'monospace' }}>{history.hcp}</div>
                      <div style={{ fontSize: 10, color: 'var(--bt-text-3)', textTransform: 'uppercase', letterSpacing: '.05em' }}>HCP</div>
                    </div>
                  </div>
                  <div style={{ display: 'flex', gap: 4, flexWrap: 'wrap' }}>
                    {history.years.map(y => (
                      <span key={y} style={{ fontSize: 10, fontFamily: 'monospace', padding: '2px 6px', borderRadius: 4, background: 'var(--bt-tag-bg)', color: 'var(--bt-accent)', border: '1px solid var(--bt-accent)20' }}>{y}</span>
                    ))}
                  </div>
                </div>
              )}

              {/* RSVP — self-service for the current user (disabled when completed) */}
              {isMe && !isCompleted && (
                <div style={{ marginBottom: 14 }}>
                  <div style={{ fontSize: 11, fontWeight: 700, textTransform: 'uppercase', letterSpacing: '.07em', color: 'var(--bt-text-3)', marginBottom: 8 }}>Your RSVP</div>
                  <div style={{ display: 'flex', gap: 6, flexWrap: 'wrap' }}>
                    {[
                      { value: 'in',     label: "✅ I'm in",    accent: 'var(--bt-accent)' },
                      { value: 'likely', label: "🤙 Likely",    accent: 'var(--bt-text-2)' },
                      { value: 'maybe',  label: "🤷 Maybe",     accent: 'var(--bt-text-2)' },
                      { value: 'out',    label: "❌ Can't go",  accent: 'var(--bt-danger)'  },
                    ].map(opt => {
                      const isSelected = member.status === opt.value
                      return (
                        <button key={opt.value}
                          onClick={() => {
                            setRoster(r => r.map(a => a.userId === member.userId ? { ...a, status: opt.value } : a))
                            showToast(`RSVP updated: ${opt.label.replace(/^.+?\s/, '')}`)
                          }}
                          style={{ fontSize: 12, fontWeight: isSelected ? 700 : 500, padding: '5px 12px', borderRadius: 7, cursor: 'pointer', border: `1px solid ${isSelected ? opt.accent : 'var(--bt-border)'}`, background: isSelected ? `${opt.accent}18` : 'transparent', color: isSelected ? opt.accent : 'var(--bt-text-2)', transition: 'all .15s' }}>
                          {opt.label}
                        </button>
                      )
                    })}
                  </div>
                </div>
              )}

              {/* Invite action — owner/planner only, not self */}
              {canEdit && !isMe && (
                <div style={{ marginBottom: 12 }}>
                  {member.email ? (
                    member.inviteSent ? (
                      <div style={{ fontSize: 13, color: 'var(--bt-accent)', fontWeight: 600 }}>✓ Invite already sent</div>
                    ) : (
                      <button onClick={() => sendInvite(member)}
                        style={{ fontSize: 13, fontWeight: 700, padding: '7px 18px', borderRadius: 8, border: 'none', cursor: 'pointer', background: 'var(--bt-accent)', color: '#0d1117' }}>
                        {member.hasAccount ? '📲 Send Trip Invite' : '📧 Send Email Invite'}
                      </button>
                    )
                  ) : (
                    <div>
                      <div style={{ fontSize: 12, color: 'var(--bt-text-3)', marginBottom: 8 }}>Add an email address to send an invite.</div>
                      {editEmailId === member.userId ? (
                        <div style={{ display: 'flex', gap: 6 }}>
                          <input autoFocus placeholder="email@example.com" value={editEmailVal}
                            onChange={e => setEditEmailVal(e.target.value)}
                            onKeyDown={e => e.key === 'Enter' && saveEmail(member.userId)}
                            style={{ flex: 1, fontSize: 13, padding: '7px 10px', borderRadius: 7, background: 'var(--bt-input)', border: '1px solid var(--bt-accent)', color: 'var(--bt-text-1)', outline: 'none' }} />
                          <button onClick={() => saveEmail(member.userId)}
                            style={{ fontSize: 12, fontWeight: 700, padding: '7px 14px', borderRadius: 7, border: 'none', cursor: 'pointer', background: 'var(--bt-accent)', color: '#0d1117' }}>Save</button>
                          <button onClick={() => setEditEmailId(null)}
                            style={{ fontSize: 12, padding: '7px 10px', borderRadius: 7, background: 'transparent', border: '1px solid var(--bt-border)', color: 'var(--bt-text-3)', cursor: 'pointer' }}>✕</button>
                        </div>
                      ) : (
                        <button onClick={() => { setEditEmailId(member.userId); setEditEmailVal('') }}
                          style={{ fontSize: 12, fontWeight: 600, padding: '6px 12px', borderRadius: 7, background: 'transparent', border: '1px dashed var(--bt-accent)60', color: 'var(--bt-accent)', cursor: 'pointer' }}>
                          + Add email
                        </button>
                      )}
                    </div>
                  )}
                </div>
              )}

              {/* Role management — owner only, not self, not completed */}
              {isOwnerActive && !isMe && (
                <div style={{ paddingTop: canEdit ? 10 : 0, borderTop: canEdit ? '1px solid var(--bt-border)' : 'none' }}>
                  {confirmAction?.userId === member.userId ? (
                    /* Inline confirmation prompt */
                    <div style={{ display: 'flex', alignItems: 'center', gap: 8, padding: '8px 10px', borderRadius: 8, background: 'var(--bt-danger-bg)', border: '1px solid var(--bt-danger-border)' }}>
                      <span style={{ fontSize: 12, color: 'var(--bt-text-2)', flex: 1 }}>
                        {confirmAction.type === 'remove' ? `Remove ${confirmAction.name} from this trip?` : `Move ${confirmAction.name} to Member?`}
                      </span>
                      <button onClick={() => {
                        if (confirmAction.type === 'remove') removeMember(confirmAction.userId)
                        else demoteToMember(confirmAction.userId)
                        setConfirmAction(null)
                      }} style={{ fontSize: 12, fontWeight: 700, padding: '4px 12px', borderRadius: 6, border: 'none', cursor: 'pointer', background: 'var(--bt-danger)', color: '#fff' }}>
                        Confirm
                      </button>
                      <button onClick={() => setConfirmAction(null)} style={{ fontSize: 12, padding: '4px 10px', borderRadius: 6, cursor: 'pointer', background: 'transparent', border: '1px solid var(--bt-border)', color: 'var(--bt-text-3)' }}>
                        Cancel
                      </button>
                    </div>
                  ) : (
                    <div style={{ display: 'flex', gap: 6, flexWrap: 'wrap' }}>
                      {member.role === 'Member' && (
                        <button onClick={() => promoteToPlanner(member.userId)}
                          style={{ fontSize: 12, fontWeight: 600, padding: '5px 12px', borderRadius: 7, cursor: 'pointer', background: 'transparent', border: '1px solid var(--bt-border)', color: 'var(--bt-text-2)' }}>
                          ⬆️ Promote to Planner
                        </button>
                      )}
                      {member.role === 'Planner' && (
                        <button onClick={() => setConfirmAction({ type: 'demote', userId: member.userId, name: member.name.split(' ')[0] })}
                          style={{ fontSize: 12, fontWeight: 600, padding: '5px 12px', borderRadius: 7, cursor: 'pointer', background: 'transparent', border: '1px solid var(--bt-border)', color: 'var(--bt-text-2)' }}>
                          ⬇️ Move to Member
                        </button>
                      )}
                      <button onClick={() => setConfirmAction({ type: 'remove', userId: member.userId, name: member.name.split(' ')[0] })}
                        style={{ fontSize: 12, fontWeight: 600, padding: '5px 12px', borderRadius: 7, cursor: 'pointer', background: 'transparent', border: '1px solid var(--bt-danger)40', color: 'var(--bt-danger)' }}>
                        🚫 Remove
                      </button>
                    </div>
                  )}
                </div>
              )}
            </div>
          )}
        </div>
      )
    }

    return (
      <div style={{ display: 'flex', flexDirection: 'column', gap: 18 }}>

        {/* BuddyTrip account legend */}
        <div style={{ display: 'flex', alignItems: 'center', gap: 6, padding: '6px 10px', borderRadius: 7, background: 'var(--bt-card)', border: '1px solid var(--bt-border)', alignSelf: 'flex-start' }}>
          <span style={{ fontSize: 11, color: 'var(--bt-blue)', fontWeight: 900 }}>●</span>
          <span style={{ fontSize: 11, color: 'var(--bt-text-3)' }}>BuddyTrip account</span>
          <span style={{ fontSize: 11, color: 'var(--bt-text-3)', margin: '0 4px' }}>·</span>
          <Ic n="Ghost" size={14} color="var(--bt-text-3)" />
          <span style={{ fontSize: 11, color: 'var(--bt-text-3)' }}>No account (ghost)</span>
        </div>

        {/* ── ADD TO ROSTER ─────────────────────────────────────── */}
        {canEdit && (
          <Card>
            <SectionLabel>Add to Roster</SectionLabel>
            <p style={{ fontSize: 12, marginBottom: 12, color: 'var(--bt-text-3)' }}>
              Add anyone — name only is fine. Email is optional and only used to send an invite.
            </p>
            <div style={{ display: 'flex', gap: 8, marginBottom: 8 }}>
              <input
                placeholder="Full name *"
                value={addName}
                onChange={e => { setAddName(e.target.value); setAddError('') }}
                onKeyDown={e => e.key === 'Enter' && handleAddToRoster()}
                style={{ flex: 2, fontSize: 14, padding: '9px 12px', borderRadius: 8, outline: 'none', background: 'var(--bt-input)', border: `1px solid ${addError ? 'var(--bt-danger)' : 'var(--bt-border-input)'}`, color: 'var(--bt-text-1)', transition: 'border-color .15s' }}
                onFocus={e => e.target.style.borderColor = 'var(--bt-accent)'}
                onBlur={e => e.target.style.borderColor = addError ? 'var(--bt-danger)' : 'var(--bt-border-input)'}
              />
              <input
                placeholder="Email (optional)"
                value={addEmail}
                onChange={e => setAddEmail(e.target.value)}
                onKeyDown={e => e.key === 'Enter' && handleAddToRoster()}
                style={{ flex: 3, fontSize: 14, padding: '9px 12px', borderRadius: 8, outline: 'none', background: 'var(--bt-input)', border: '1px solid var(--bt-border-input)', color: 'var(--bt-text-1)', transition: 'border-color .15s' }}
                onFocus={e => e.target.style.borderColor = 'var(--bt-accent)'}
                onBlur={e => e.target.style.borderColor = 'var(--bt-border-input)'}
              />
              <button onClick={handleAddToRoster}
                style={{ fontSize: 13, fontWeight: 700, padding: '9px 16px', borderRadius: 8, border: 'none', cursor: 'pointer', background: 'var(--bt-accent)', color: '#0d1117', flexShrink: 0 }}>
                Add
              </button>
            </div>
            {addError && <div style={{ fontSize: 12, color: 'var(--bt-danger)', marginBottom: 8 }}>{addError}</div>}

            {/* Frequently trips with */}
            {freqSuggestions.length > 0 && (
              <div style={{ marginTop: 10 }}>
                <div style={{ fontSize: 11, fontWeight: 700, textTransform: 'uppercase', letterSpacing: '.07em', color: 'var(--bt-text-3)', marginBottom: 8 }}>Frequently trips with (BBMI)</div>
                <div style={{ display: 'flex', flexWrap: 'wrap', gap: 6 }}>
                  {freqSuggestions.map(p => (
                    <button key={p.userId} onClick={() => quickAdd(p)}
                      style={{ display: 'flex', alignItems: 'center', gap: 6, fontSize: 12, fontWeight: 600, padding: '5px 10px', borderRadius: 9999, cursor: 'pointer', background: 'var(--bt-card)', border: '1px solid var(--bt-border)', color: 'var(--bt-text-2)', transition: 'border-color .15s, color .15s' }}
                      onMouseEnter={e => { e.currentTarget.style.borderColor = 'var(--bt-accent)'; e.currentTarget.style.color = 'var(--bt-accent)' }}
                      onMouseLeave={e => { e.currentTarget.style.borderColor = 'var(--bt-border)'; e.currentTarget.style.color = 'var(--bt-text-2)' }}>
                      <Avatar name={p.name} size="xs" />
                      {p.name.split(' ')[0]}
                      {p.hasAccount && <span style={{ fontSize: 10, color: 'var(--bt-blue)' }}>●</span>}
                    </button>
                  ))}
                </div>

              </div>
            )}
          </Card>
        )}

        {/* ── CONFIRMED ROSTER ──────────────────────────────────── */}
        <div>
          <SectionLabel>Roster ({confirmed.length})</SectionLabel>
          {confirmed.map(a => <MemberRow key={a.userId} member={a} />)}
        </div>

        {/* ── PENDING / AWAITING ─────────────────────────────────── */}
        {pending.filter(m => m.status !== 'out').length > 0 && (
          <div>
            <SectionLabel>Awaiting ({pending.filter(m => m.status !== 'out').length})</SectionLabel>
            {pending.filter(m => m.status !== 'out').map(a => <MemberRow key={a.userId} member={a} />)}
          </div>
        )}
      </div>
    )
  }

    function CompetitionTab() {
      const [compOn, setCompOn] = useState(!!trip.eventId)

      const [openSection, setOpenSection] = useState(null)
      const toggleSection = id => setOpenSection(o => o === id ? null : id)

      // Nonce to force re-render when BBMI_EVENT.rounds status mutates
      const [roundNonce, setRoundNonce] = useState(0)

      const hasTeams   = !!trip.eventId
      const hasRounds  = !!trip.eventId
      const hasCourses = !!trip.eventId

      const statusBg     = s => s === 'set' ? 'var(--bt-tag-bg)' : s === 'draft' ? '#1a1200' : 'var(--bt-card)'
      const statusBorder = s => s === 'set' ? 'var(--bt-accent)30' : s === 'draft' ? '#f59e0b30' : 'var(--bt-border)'

            <button onClick={() => toggleSection(id)}
              style={{ width: '100%', display: 'flex', alignItems: 'center', gap: 14, padding: '14px 16px', background: isOpen ? 'var(--bt-card)' : statusBg(status), border: 'none', cursor: 'pointer', textAlign: 'left' }}>
              <Ic n={icon} size={20} color="var(--bt-accent)" />
              <div style={{ flex: 1, minWidth: 0 }}>
                <div style={{ display: 'flex', alignItems: 'center', gap: 8, marginBottom: summary ? 3 : 0 }}>
                  <span style={{ fontSize: 14, fontWeight: 700, color: 'var(--bt-text-1)' }}>{label}</span>
                  <span style={{ fontSize: 10, fontWeight: 700, padding: '2px 7px', borderRadius: 9999, background: 'var(--bt-base)', color: statusColor(status), border: `1px solid ${statusBorder(status)}` }}>
                    {statusLabel(status)}
                  </span>
                </div>

                {children}

        { id: 'r3', name: 'Sabotage',   format: 'Sabotage',   course: 'Pacific Dunes',  pts: 4 },
        { id: 'r4', name: 'Skins',      format: 'Skins',      course: 'Old Macdonald',  pts: 4 },
      ] : [])
      const [addingRound, setAddingRound] = useState(false)
      const [roundDraft, setRoundDraft] = useState({ name: '', format: 'Scramble', course: '', pts: 4, movingTees: false, startBox: 'white', eagleShift: -2, birdieShift: -1, parShift: 0, bogeyShift: 1 })
      const FORMATS = ['Scramble', 'Stableford', 'Skins', 'Sabotage', 'Match Play', 'Stroke Play']

      // Inline mock state for sides
      const [sides, setSides] = useState([])
      const [addingSide, setAddingSide] = useState(false)
      const [sideDraft, setSideDraft] = useState({ name: '', pts: 2 })

      return (
        <div style={{ display: 'flex', flexDirection: 'column', gap: 12 }}>

          {/* Header strip */}
          <div style={{ display: 'flex', alignItems: 'center', justifyContent: 'space-between', padding: '10px 14px', borderRadius: 10, background: 'var(--bt-tag-bg)', border: '1px solid var(--bt-accent)30' }}>
            <div style={{ display: 'flex', alignItems: 'center', gap: 8 }}>
              {trip.eventId && <LiveDot />}
              <span style={{ fontSize: 13, fontWeight: 700, color: 'var(--bt-accent)' }}>
                {trip.eventId ? 'Competition Active' : 'Competition — In Progress'}
              </span>
            </div>

                    <span style={{ fontSize: 11, color: 'var(--bt-text-3)', fontFamily: 'monospace', width: 20 }}>R{i+1}</span>
                    <span style={{ fontSize: 13, color: 'var(--bt-text-1)', flex: 1 }}>{r.name}</span>

                  <span style={{ fontSize: 13, fontWeight: 600, color: 'var(--bt-text-1)', flex: 1 }}>{s.name}</span>
                  <span style={{ fontSize: 12, color: 'var(--bt-text-3)' }}>{s.pts} pts</span>

    function MoreTab() {
    const [expenseList, setExpenseList] = useState(() => EXPENSES.filter(e => e.tripId === trip._id))
    const [addExpenseOpen, setAddExpenseOpen] = useState(false)
    const total = expenseList.reduce((s, e) => s + e.amount, 0)
    const myShare = Math.round(total / (trip.attendees.length || 1))

    function AddExpenseForm({ onClose }) {
      const [title, setTitle]       = useState('')
      const [amount, setAmount]     = useState('')
      const [paidBy, setPaidBy]     = useState(CURRENT_USER._id)
      const [splitIds, setSplitIds] = useState(new Set(trip.attendees.map(a => a.userId)))
      const nameById = Object.fromEntries(trip.attendees.map(a => [a.userId, (USERS[a.userId]?.nickname || a.name.split(' ')[0])]))
      const toggleSplit = userId => setSplitIds(prev => {
        const next = new Set(prev)
        if (next.has(userId)) { if (next.size > 1) next.delete(userId) }
        else next.add(userId)
        return next
      })
      const parsedAmount = parseFloat(amount) || 0
      const perPerson = splitIds.size > 0 ? Math.round(parsedAmount / splitIds.size) : 0
      const canSubmit = title.trim() && parsedAmount > 0
      const handleSubmit = () => {
        if (!canSubmit) return
        const newExp = {
          _id: 'exp-' + Date.now(),
          tripId: trip._id,
          title: title.trim(),
          amount: parsedAmount,
          paidByUserId: paidBy,
          splitAmong: Array.from(splitIds).map(userId => ({ userId })),
          createdAt: new Date(),
          updatedAt: new Date(),
        }
        EXPENSES.push(newExp)
        setExpenseList(EXPENSES.filter(e => e.tripId === trip._id))
        onClose()
      }
      const inputStyle = { width: '100%', padding: '9px 12px', borderRadius: 8, background: 'var(--bt-base)', border: '1px solid var(--bt-border)', color: 'var(--bt-text-1)', fontSize: 14, boxSizing: 'border-box', outline: 'none' }
      return (
        <Card style={{ marginBottom: 12, padding: 16 }}>
          <div style={{ fontWeight: 700, fontSize: 14, color: 'var(--bt-text-1)', marginBottom: 14 }}>Add Expense</div>
          <div style={{ display: 'flex', flexDirection: 'column', gap: 10 }}>
            <div>
              <label style={{ fontSize: 11, fontWeight: 700, textTransform: 'uppercase', letterSpacing: '.07em', color: 'var(--bt-text-3)', display: 'block', marginBottom: 4 }}>Title</label>
              <input value={title} onChange={e => setTitle(e.target.value)} placeholder="e.g. Lodge & Rooms" style={inputStyle} />
            </div>
            <div>
              <label style={{ fontSize: 11, fontWeight: 700, textTransform: 'uppercase', letterSpacing: '.07em', color: 'var(--bt-text-3)', display: 'block', marginBottom: 4 }}>Amount ($)</label>
              <input type="number" min="0" step="0.01" value={amount} onChange={e => setAmount(e.target.value)} placeholder="0.00" style={inputStyle} />
            </div>
            <div>
              <label style={{ fontSize: 11, fontWeight: 700, textTransform: 'uppercase', letterSpacing: '.07em', color: 'var(--bt-text-3)', display: 'block', marginBottom: 4 }}>Paid by</label>
              <select value={paidBy} onChange={e => setPaidBy(e.target.value)} style={{ ...inputStyle, cursor: 'pointer' }}>
                {trip.attendees.map(a => (
                  <option key={a.userId} value={a.userId}>{nameById[a.userId] || a.userId}</option>
                ))}
              </select>
            </div>
            <div>
              <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: 6 }}>
                <label style={{ fontSize: 11, fontWeight: 700, textTransform: 'uppercase', letterSpacing: '.07em', color: 'var(--bt-text-3)' }}>Split among</label>
                <div style={{ display: 'flex', gap: 8 }}>
                  <button onClick={() => setSplitIds(new Set(trip.attendees.map(a => a.userId)))} style={{ fontSize: 11, padding: '3px 8px', borderRadius: 4, background: 'none', border: '1px solid var(--bt-border)', color: 'var(--bt-text-3)', cursor: 'pointer' }}>All</button>
                  <button onClick={() => setSplitIds(new Set([paidBy]))} style={{ fontSize: 11, padding: '3px 8px', borderRadius: 4, background: 'none', border: '1px solid var(--bt-border)', color: 'var(--bt-text-3)', cursor: 'pointer' }}>Just me</button>
                </div>
              </div>
              <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: 4 }}>
                {trip.attendees.map(a => {
                  const checked = splitIds.has(a.userId)
                  return (
                    <button key={a.userId} onClick={() => toggleSplit(a.userId)} style={{ display: 'flex', alignItems: 'center', gap: 8, padding: '6px 8px', borderRadius: 8, cursor: 'pointer', background: checked ? 'var(--bt-tag-bg)' : 'transparent', border: `1px solid ${checked ? 'var(--bt-accent)30' : 'var(--bt-border)'}`, fontSize: 12, color: checked ? 'var(--bt-text-1)' : 'var(--bt-text-3)' }}>
                      <div style={{ width: 16, height: 16, borderRadius: 4, flexShrink: 0, display: 'flex', alignItems: 'center', justifyContent: 'center', background: checked ? 'var(--bt-accent)' : 'transparent', border: `1.5px solid ${checked ? 'var(--bt-accent)' : 'var(--bt-border)'}` }}>
                        {checked && <span style={{ color: '#0d1117', fontSize: 10, fontWeight: 900 }}>✓</span>}
                      </div>
                      {nameById[a.userId] || a.userId}
                    </button>
                  )
                })}
              </div>
              {parsedAmount > 0 && splitIds.size > 0 && (
                <div style={{ marginTop: 8, fontSize: 12, textAlign: 'right', fontWeight: 600, color: 'var(--bt-accent)' }}>${perPerson}/ea · {splitIds.size} people</div>
              )}
            </div>
            <div style={{ display: 'flex', gap: 8, marginTop: 4 }}>
              <Btn variant="secondary" onClick={onClose} style={{ flex: 1 }}>Cancel</Btn>
              <Btn onClick={handleSubmit} disabled={!canSubmit} style={{ flex: 2, opacity: canSubmit ? 1 : 0.4, cursor: canSubmit ? 'pointer' : 'default' }}>Add Expense</Btn>
            </div>
          </div>
        </Card>
      )
    }

    function ExpenseRow({ exp }) {
      const [editing, setEditing] = useState(false)
      const nameById = Object.fromEntries(trip.attendees.map(a => [a.userId, a.name.split(' ')[0]]))
      const initialIds = new Set(exp.splitAmong?.map(s => s.userId) || trip.attendees.map(a => a.userId))
      const [assigned, setAssigned] = useState(initialIds)
      const perPerson = assigned.size > 0 ? Math.round(exp.amount / assigned.size) : 0
      const toggle = userId => {
        setAssigned(prev => {
          const next = new Set(prev)
          if (next.has(userId)) { if (next.size > 1) next.delete(userId) }
          else next.add(userId)
          return next
        })
      }
      return (
        <Card style={{ padding: 0, overflow: 'hidden', marginBottom: 8 }}>
          <div style={{ display: 'flex', alignItems: 'flex-start', justifyContent: 'space-between', gap: 12, padding: 16 }}>
            <div style={{ flex: 1 }}>
              <div style={{ fontWeight: 600, fontSize: 14, marginBottom: 2, color: 'var(--bt-text-1)' }}>{exp.title}</div>
              <div style={{ fontSize: 12, color: 'var(--bt-text-3)' }}>Paid by {USERS[exp.paidByUserId]?.nickname || exp.paidByUserId} · {assigned.size} people</div>
            </div>
            <div style={{ display: 'flex', alignItems: 'center', gap: 12, flexShrink: 0 }}>
              <div style={{ textAlign: 'right' }}>
                <div style={{ fontWeight: 700, fontSize: 14, color: 'var(--bt-text-1)' }}>${exp.amount.toLocaleString()}</div>
                <div style={{ fontSize: 12, color: 'var(--bt-text-3)' }}>${perPerson}/ea</div>
              </div>
              {isOwner && <button onClick={() => { if (editing) showToast('Split updated'); setEditing(e => !e) }} style={{ fontSize: 11, padding: '4px 8px', borderRadius: 6, background: editing ? 'var(--bt-tag-bg)' : 'transparent', border: `1px solid ${editing ? 'var(--bt-accent)50' : 'var(--bt-border)'}`, color: editing ? 'var(--bt-accent)' : 'var(--bt-text-3)', cursor: 'pointer' }}>{editing ? 'Done' : 'Edit'}</button>}
            </div>
          </div>
          {editing && (
            <div style={{ borderTop: '1px solid var(--bt-border)', padding: '12px 16px 16px', background: '#0d1117' }}>
              <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: 8 }}>
                <span style={{ fontSize: 11, fontWeight: 700, textTransform: 'uppercase', letterSpacing: '.08em', color: 'var(--bt-text-3)' }}>Assign to</span>
                <div style={{ display: 'flex', gap: 8 }}>
                  <button onClick={() => setAssigned(new Set(trip.attendees.map(a => a.userId)))} style={{ fontSize: 11, padding: '3px 8px', borderRadius: 4, background: 'none', border: '1px solid var(--bt-border)', color: 'var(--bt-text-3)', cursor: 'pointer' }}>All</button>
                  <button onClick={() => setAssigned(new Set())} style={{ fontSize: 11, padding: '3px 8px', borderRadius: 4, background: 'none', border: '1px solid var(--bt-border)', color: 'var(--bt-text-3)', cursor: 'pointer' }}>None</button>
                </div>
              </div>
              <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: 4 }}>
                {trip.attendees.map(a => {
                  const isChecked = assigned.has(a.userId)
                  return (
                    <button key={a.userId} onClick={() => toggle(a.userId)} style={{ display: 'flex', alignItems: 'center', gap: 8, padding: '6px 8px', borderRadius: 8, cursor: 'pointer', background: isChecked ? 'var(--bt-tag-bg)' : 'transparent', border: `1px solid ${isChecked ? 'var(--bt-accent)30' : 'var(--bt-border)'}`, fontSize: 12, color: isChecked ? 'var(--bt-text-1)' : 'var(--bt-text-3)' }}>
                      <div style={{ width: 16, height: 16, borderRadius: 4, flexShrink: 0, display: 'flex', alignItems: 'center', justifyContent: 'center', background: isChecked ? 'var(--bt-accent)' : 'transparent', border: `1.5px solid ${isChecked ? 'var(--bt-accent)' : 'var(--bt-border)'}` }}>
                        {isChecked && <span style={{ color: '#0d1117', fontSize: 10, fontWeight: 900 }}>✓</span>}
                      </div>
                      {nameById[a.userId] || a.name.split(' ')[0]}
                    </button>
                  )
                })}
              </div>
              <div style={{ marginTop: 10, fontSize: 12, textAlign: 'right', fontWeight: 600, color: 'var(--bt-accent)' }}>${perPerson}/ea · {assigned.size} people</div>
            </div>
          )}
        </Card>
      )
    }

    return (
      <div style={{ display: 'flex', flexDirection: 'column', gap: 16 }}>
        {isCompleted && (
          <div style={{ padding: '10px 14px', borderRadius: 10, background: 'var(--bt-card)', border: '1px solid var(--bt-border)', display: 'flex', alignItems: 'center', gap: 8 }}>
            <span style={{ fontSize: 14 }}>🔒</span>
            <span style={{ fontSize: 13, color: 'var(--bt-text-3)' }}>This trip is complete. Most editing is disabled.</span>
          </div>
        )}
        <div>
          <div style={{ display: 'flex', alignItems: 'center', justifyContent: 'space-between', marginBottom: 12 }}>
            <SectionLabel>Expenses</SectionLabel>
            {!addExpenseOpen && <Btn variant="secondary" onClick={() => setAddExpenseOpen(true)}>+ Add</Btn>}
          </div>
          {addExpenseOpen && <AddExpenseForm onClose={() => setAddExpenseOpen(false)} />}
          <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: 12, marginBottom: 12 }}>
            {[{ label: 'Trip Total', val: `$${total.toLocaleString()}`, accent: false }, { label: 'Your Share', val: `$${myShare.toLocaleString()}`, accent: true }].map(s => (
              <Card key={s.label} style={{ textAlign: 'center' }}>
                <div style={{ fontSize: 11, fontWeight: 700, textTransform: 'uppercase', letterSpacing: '.08em', marginBottom: 6, color: 'var(--bt-text-3)' }}>{s.label}</div>
                <div style={{ fontSize: 22, fontWeight: 700, color: s.accent ? 'var(--bt-accent)' : 'var(--bt-text-1)' }}>{s.val}</div>
              </Card>
            ))}
          </div>
          {expenseList.length === 0
            ? <Card><div style={{ textAlign: 'center', padding: '24px 0', fontSize: 14, color: 'var(--bt-text-3)' }}>No expenses yet</div></Card>
            : expenseList.map(exp => <ExpenseRow key={exp._id} exp={exp} />)
          }
        </div>
        {isOwner && <TripSettingsPanel trip={trip} showToast={showToast} navigate={navigate} notify={notify} isCompleted={isCompleted} />}
      </div>
    )
  }

  return (
    <div style={{ minHeight: '100vh', paddingBottom: 96, background: 'var(--bt-base)' }}>
      <TopNav navigate={navigate} notifications={notifications} onMarkAllRead={onMarkAllRead} theme={theme} onToggleTheme={onToggleTheme} />
      <div style={{ maxWidth: 672, margin: '0 auto', padding: '20px 16px' }}>
        <Breadcrumb items={[{ label: 'Trips', screen: 'trips' }, { label: trip.title }]} navigate={navigate} />

        {/* Header card */}
        <div style={{ position: 'relative', borderRadius: 12, overflow: 'hidden', marginBottom: 20, padding: 16, background: 'var(--bt-card)', border: '1px solid var(--bt-border)' }}>
          {sp && effectiveLocation && !effectiveComparisonMode && (
            <div style={{ position: 'absolute', right: 12, top: 12, opacity: .2, pointerEvents: 'none' }}>
              <svg width="52" height="58" viewBox={sp.vb}>
                <path d={sp.path} fill="var(--bt-accent)" stroke="var(--bt-accent)" strokeWidth="1.5" strokeLinejoin="round" />
                <circle cx={sp.pinX} cy={sp.pinY} r="6" fill="var(--bt-base)" />
                <circle cx={sp.pinX} cy={sp.pinY} r="4" fill="var(--bt-accent)" />
              </svg>
            </div>
          )}
          <div style={{ display: 'flex', alignItems: 'center', gap: 8, flexWrap: 'wrap', marginBottom: 6, paddingRight: 56 }}>
            <h1 style={{ fontSize: 22, fontWeight: 700, color: 'var(--bt-text-1)' }}>{trip.title}</h1>
            {tripStatus === 'active' && (
              <span style={{ display: 'flex', alignItems: 'center', gap: 4, fontSize: 11, fontWeight: 700, padding: '2px 8px', borderRadius: 9999, background: 'var(--bt-tag-bg)', color: 'var(--bt-accent)', border: '1px solid var(--bt-accent)40' }}>
                <span className="animate-pulse-dot" style={{ display: 'inline-block', width: 6, height: 6, borderRadius: '50%', background: 'var(--bt-accent)' }} />
                LIVE
              </span>
            )}
            {isCompleted && (
              <span style={{ fontSize: 11, fontWeight: 700, padding: '2px 8px', borderRadius: 9999, background: 'var(--bt-base)', color: 'var(--bt-text-3)', border: '1px solid var(--bt-border)' }}>
                Complete
              </span>
            )}
          </div>

          {/* ── Destination line — four states ── */}
          {/* 1. Known/locked destination — show location + owner change option */}
          {effectiveLocation && !effectiveComparisonMode && (
            <div style={{ display: 'flex', alignItems: 'center', gap: 8, marginBottom: 4, flexWrap: 'wrap' }}>
              <div style={{ fontSize: 14, color: 'var(--bt-text-2)', display:'flex', alignItems:'center', gap:5 }}><Ic n="MapPin" size={14} color="var(--bt-text-3)" />{effectiveLocation}</div>
              {effectiveLockedDest && isOwnerActive && (
                <button onClick={() => {
                  setLockedDest(null)
                  setInlineIdeas(trip.ideas || [])
                  setInlineVotes(IDEA_VOTES.filter(v => v.tripId === trip._id))
                  showToast('Destination unlocked — vote is back open')
                }}
                  style={{ fontSize: 11, fontWeight: 600, padding: '2px 8px', borderRadius: 9999, cursor: 'pointer', background: 'transparent', border: '1px solid var(--bt-border)', color: 'var(--bt-text-3)' }}
                  onMouseEnter={e => { e.currentTarget.style.borderColor = 'var(--bt-accent)'; e.currentTarget.style.color = 'var(--bt-accent)' }}
                  onMouseLeave={e => { e.currentTarget.style.borderColor = 'var(--bt-border)'; e.currentTarget.style.color = 'var(--bt-text-3)' }}>
                  Edit
                </button>
              )}
            </div>
          )}
          {/* 3. Voting in progress — member read-only */}
          {effectiveComparisonMode && !canEdit && (
            <div style={{ fontSize: 14, color: 'var(--bt-text-3)', marginBottom: 4 }}><Ic n="MapPin" size={14} color="var(--bt-text-3)" style={{marginRight:5}} /> Destination TBD — voting in progress</div>
          )}
          {/* 4. No destination, no comparison mode (TBD, skip chosen at creation) */}
          {!effectiveLocation && !effectiveComparisonMode && canEdit && (
            <div style={{ fontSize: 14, color: 'var(--bt-text-3)', marginBottom: 4 }}>
              <><Ic n="MapPin" size={14} color="var(--bt-text-3)" style={{marginRight:5}} />No destination yet —{' '}</>
              <span onClick={() => navigate('idea-comparison', { tripId: trip._id })} style={{ color: 'var(--bt-accent)', cursor: 'pointer', textDecoration: 'underline' }}>set one</span>
            </div>
          )}

          <div style={{ display: 'flex', alignItems: 'center', gap: 12, fontSize: 12, color: 'var(--bt-text-3)', flexWrap: 'wrap' }}>
            {/* Date line */}
            {effectiveStartDate ? (
              <span style={{ display: 'flex', alignItems: 'center', gap: 6, flexWrap: 'wrap' }}>
                <><Ic n="Calendar" size={14} color="var(--bt-accent)" style={{marginRight:5}} />{fmtDateRange(effectiveStartDate, effectiveEndDate)}</>
                {datePoll.open && datePoll.lockedId === null && (
                  <span style={{ fontSize: 10, fontWeight: 700, padding: '1px 6px', borderRadius: 9999, background: '#1a1200', color: '#f59e0b', border: '1px solid #f59e0b40' }}>
                    TENTATIVE · Poll active
                  </span>
                )}
                {(lockedWindow || knownDateSet.start) && canEdit && (
                  <button onClick={() => {
                    if (lockedWindow) syncDatePoll(p => ({ ...p, lockedId: null, open: true }))
                    setKnownDateSet({ start: null, end: null })
                    setTab('home')
                  }}
                    style={{ fontSize: 10, fontWeight: 600, padding: '1px 6px', borderRadius: 9999, cursor: 'pointer', background: 'transparent', border: '1px solid var(--bt-border)', color: 'var(--bt-text-3)', marginLeft: 2 }}
                    onMouseEnter={e => { e.currentTarget.style.borderColor = 'var(--bt-accent)'; e.currentTarget.style.color = 'var(--bt-accent)' }}
                    onMouseLeave={e => { e.currentTarget.style.borderColor = 'var(--bt-border)'; e.currentTarget.style.color = 'var(--bt-text-3)' }}>
                    Change
                  </button>
                )}
              </span>
            ) : datePoll.open ? (
              <button onClick={() => setTab('home')}
                style={{ display: 'inline-flex', alignItems: 'center', gap: 6, fontSize: 12, fontWeight: 700, padding: '4px 10px', borderRadius: 8, cursor: 'pointer', background: '#1a1200', border: '1px solid #f59e0b40', color: '#f59e0b' }}
                onMouseEnter={e => e.currentTarget.style.borderColor = '#f59e0b'}
                onMouseLeave={e => e.currentTarget.style.borderColor = '#f59e0b40'}>
                <><Ic n="Calendar" size={14} color="#f59e0b" style={{marginRight:5}} />Dates TBD · Poll active ↓</>
              </button>
            ) : canEdit ? (
              <button onClick={() => setTab('home')}
                style={{ display: 'inline-flex', alignItems: 'center', gap: 6, fontSize: 12, fontWeight: 700, padding: '4px 10px', borderRadius: 8, cursor: 'pointer', background: 'var(--bt-tag-bg)', border: '1px dashed var(--bt-accent)40', color: 'var(--bt-accent)' }}
                onMouseEnter={e => e.currentTarget.style.borderColor = 'var(--bt-accent)'}
                onMouseLeave={e => e.currentTarget.style.borderColor = 'var(--bt-accent)40'}>
                <><Ic n="Calendar" size={14} color="var(--bt-accent)" style={{marginRight:5}} />Set dates</>
              </button>
            ) : (
              <span style={{display:"flex",alignItems:"center",gap:5}}><Ic n="Calendar" size={14} color="var(--bt-text-3)" />Dates TBD</span>
            )}
            {trip.eventId && !isCompleted && <span style={{display:"flex",alignItems:"center",gap:5}}><Ic n="Trophy" size={14} color="var(--bt-accent)" />Competition active</span>}
            {trip.eventId && isCompleted && (() => {
              const ev = getEventForTrip(trip._id, trips)
              if (!ev) return null
              const sc = computeScores(ev, ROUND_RESULTS)
              const sorted = ev.teams.map(t => ({ team: t, pts: sc[t._id] || 0 })).sort((a, b) => b.pts - a.pts)
              const winner = sorted[0]
              return winner.pts > 0 ? (
                <span style={{display:"flex",alignItems:"center",gap:5, color: winner.team.color, fontWeight: 700, fontSize: 12}}>🏆 {winner.team.name} won · {sorted.map(s => s.pts).join('–')}</span>
              ) : null
            })()}
          </div>
        </div>

        {/* ── Destination vote panel — always visible when voting active ── */}
        {effectiveComparisonMode && (
          <div style={{ borderRadius: 14, border: '1px solid var(--bt-accent)40', background: 'var(--bt-card)', overflow: 'hidden', marginBottom: 4 }}>

            {/* Panel header */}
            <div style={{ display: 'flex', alignItems: 'center', justifyContent: 'space-between', padding: '12px 16px', borderBottom: '1px solid var(--bt-border)' }}>
              <div style={{ display: 'flex', alignItems: 'center', gap: 8 }}>
                <Ic n="Map" size={16} color="var(--bt-accent)" />
                <span style={{ fontSize: 14, fontWeight: 700, color: 'var(--bt-text-1)' }}>Where are we going?</span>
                {inlineVotes.length > 0 && (
                  <span style={{ fontSize: 11, color: 'var(--bt-text-3)' }}>{inlineVotes.length}/{trip.attendees.length} voted</span>
                )}
              </div>
              <div style={{ display: 'flex', gap: 8, alignItems: 'center' }}>
                <button onClick={() => navigate('idea-comparison', { tripId: trip._id })}
                  style={{ fontSize: 11, fontWeight: 600, padding: '4px 10px', borderRadius: 6, border: '1px solid var(--bt-border)', background: 'transparent', color: 'var(--bt-text-3)', cursor: 'pointer', display: 'flex', alignItems: 'center', gap: 4 }}
                  onMouseEnter={e => { e.currentTarget.style.borderColor = 'var(--bt-accent)'; e.currentTarget.style.color = 'var(--bt-accent)' }}
                  onMouseLeave={e => { e.currentTarget.style.borderColor = 'var(--bt-border)'; e.currentTarget.style.color = 'var(--bt-text-3)' }}>
                  <Ic n="LayoutGrid" size={11} color="currentColor" /> Full view
                </button>
              </div>
            </div>

            {/* Idea cards — responsive grid, 3-wide max */}
            <div style={{ padding: '14px 16px' }}>
              {inlineIdeas.length === 0 && (
                <p style={{ fontSize: 13, color: 'var(--bt-text-3)', margin: '0 0 10px' }}>No ideas yet — add the first one below.</p>
              )}
              <div style={{ display: 'grid', gridTemplateColumns: `repeat(${Math.min(inlineIdeas.length || 1, 3)}, minmax(0, 1fr))`, gap: 8, marginBottom: inlineIdeas.length ? 10 : 0 }}>
                {inlineIdeas.map((idea) => {
                  const voters = inlineVotes.filter(v => v.tripId === trip._id && v.ideaId === idea._id).map(v => USERS[v.userId]?.name || v.userId)
                  const isMyPick = inlineMyVote === idea._id
                  return (
                    <div key={idea._id} style={{ borderRadius: 10, border: `1px solid ${isMyPick ? 'var(--bt-accent)80' : 'var(--bt-border)'}`, background: 'var(--bt-base)', overflow: 'hidden', display: 'flex', flexDirection: 'column', transition: 'border-color .2s' }}>
                      {/* Hero image — shorter since cards are narrower */}
                      <div style={{ position: 'relative', height: 60, flexShrink: 0 }}>
                        {idea.imageUrl
                          ? <div style={{ position: 'absolute', inset: 0, background: `url(${idea.imageUrl}) center/cover` }} />
                          : <div style={{ position: 'absolute', inset: 0, background: 'linear-gradient(135deg, #0f2027, #203a43, #2c5364)' }} />
                        }
                        {/* Voter avatars top-right */}
                        {voters.length > 0 && (
                          <div style={{ position: 'absolute', top: 5, right: 5, display: 'flex' }}>
                            {voters.slice(0,2).map((v,i) => <div key={i} style={{ marginLeft: i>0?-4:0, borderRadius:'50%', border:'1.5px solid rgba(0,0,0,.5)' }}><Avatar name={v} size="sm" /></div>)}
                            {voters.length > 2 && <div style={{ marginLeft:-4, width:20, height:20, borderRadius:'50%', background:'var(--bt-card)', border:'1.5px solid rgba(0,0,0,.5)', fontSize:8, fontWeight:700, color:'var(--bt-text-2)', display:'flex', alignItems:'center', justifyContent:'center' }}>+{voters.length-2}</div>}
                          </div>
                        )}
                      </div>
                      {/* Title */}
                      <div style={{ padding: '7px 9px 4px', fontSize: 12, fontWeight: 700, color: 'var(--bt-text-1)', lineHeight: 1.3, minHeight: 32 }}>{idea.title}</div>
                      {/* Actions */}
                      <div style={{ display: 'flex', gap: 4, padding: '4px 8px 8px', marginTop: 'auto' }}>
                        {inlineIdeas.length >= 2 && (
                          <button onClick={() => {
                            const filtered = inlineVotes.filter(v => !(v.tripId===trip._id && v.userId===CURRENT_USER._id))
                            setInlineVotes([...filtered, { tripId:trip._id, ideaId:idea._id, userId:CURRENT_USER._id, createdAt:new Date() }])
                            setInlineMyVote(idea._id)
                            showToast(`Voted for ${idea.title}!`)
                          }}
                            style={{ flex:1, padding:'6px 4px', borderRadius:6, fontSize:11, fontWeight:700, cursor:'pointer', border:'none', background:isMyPick?'var(--bt-accent)':'var(--bt-tag-bg)', color:isMyPick?'#0d1117':'var(--bt-accent)', display:'flex', alignItems:'center', justifyContent:'center', gap:3 }}>
                            <Ic n={isMyPick?'Check':'ThumbsUp'} size={10} color={isMyPick?'#0d1117':'var(--bt-accent)'} />
                            {isMyPick ? 'Voted' : 'Vote'}
                          </button>
                        )}
                        {isOwnerActive && (
                          <button onClick={() => {
                            const lock = { title: idea.title, location: idea.location || idea.title, createdAt: new Date() }
                            setLockedDest(lock)
                            if (notify) notify({ type: 'destination_locked', tripId: trip._id, actorId: CURRENT_USER._id, payload: { destination: idea.title } })
                            showToast(`🎯 Locked in: ${idea.title}`)
                          }}
                            style={{ flex:1, padding:'6px 4px', borderRadius:6, fontSize:11, fontWeight:700, cursor:'pointer', border:'1px solid var(--bt-accent)40', background:'transparent', color:'var(--bt-accent)', display:'flex', alignItems:'center', justifyContent:'center', gap:3 }}>
                            <Ic n="Lock" size={10} color="var(--bt-accent)" /> Lock
                          </button>
                        )}
                      </div>
                    </div>
                  )
                })}
              </div>

              {/* Add idea inline */}
              {canEdit && (inlineAddOpen ? (
                <div style={{ display:'flex', gap:8 }}>
                  <input autoFocus value={inlineNewTitle} onChange={e=>setInlineNewTitle(e.target.value)}
                    onKeyDown={e => { if(e.key==='Enter' && inlineNewTitle.trim()) { setInlineIdeas(l=>[...l,{_id:'idea-'+Date.now(),title:inlineNewTitle.trim(),imageUrl:null,pros:[],cons:[],golfCourses:[],activities:[]}]); setInlineNewTitle(''); setInlineAddOpen(false) }}}
                    placeholder="Add a destination…" style={{ flex:1, fontSize:13, padding:'8px 10px', borderRadius:7, background:'var(--bt-input)', border:'1px solid var(--bt-accent)60', color:'var(--bt-text-1)', outline:'none' }} />
                  <button onClick={() => { if(inlineNewTitle.trim()) { setInlineIdeas(l=>[...l,{_id:'idea-'+Date.now(),title:inlineNewTitle.trim(),imageUrl:null,pros:[],cons:[],golfCourses:[],activities:[]}]); setInlineNewTitle(''); setInlineAddOpen(false) }}}
                    style={{ padding:'8px 12px', borderRadius:7, border:'none', background:'var(--bt-accent)', color:'#0d1117', fontWeight:700, fontSize:12, cursor:'pointer' }}>Add</button>
                  <button onClick={()=>setInlineAddOpen(false)} style={{ padding:'8px', borderRadius:7, border:'1px solid var(--bt-border)', background:'transparent', color:'var(--bt-text-3)', cursor:'pointer' }}><Ic n="X" size={14} color="currentColor" /></button>
                </div>
              ) : (
                <button onClick={()=>setInlineAddOpen(true)}
                  style={{ width:'100%', padding:'8px', borderRadius:8, border:'1px dashed var(--bt-accent)40', background:'transparent', color:'var(--bt-accent)', fontSize:12, fontWeight:600, cursor:'pointer', display:'flex', alignItems:'center', justifyContent:'center', gap:6 }}>
                  <Ic n="Plus" size={13} color="var(--bt-accent)" sw={2.5} /> Add another destination
                </button>
              ))}
            </div>
          </div>
        )}

        {/* ── Date panel — always visible when dates not locked ── */}
        {datePoll.lockedId === null && (() => {
          const myVote = (wId) => datePoll.votes.find(v => v.windowId === wId && v.userId === CURRENT_USER._id)?.answer || null
          const getTally = (wId) => ({
            yes: datePoll.votes.filter(v => v.windowId === wId && v.answer === 'yes').length,
            no:  datePoll.votes.filter(v => v.windowId === wId && v.answer === 'no').length,
          })
          const castVote = (wId, answer) => syncDatePoll(p => {
            const filtered = p.votes.filter(v => !(v.windowId === wId && v.userId === CURRENT_USER._id))
            return { ...p, votes: [...filtered, { windowId: wId, userId: CURRENT_USER._id, answer, createdAt: new Date() }] }
          })
          const lockWindow = (wId) => {
            const w = datePoll.windows.find(w => w._id === wId)
            syncDatePoll(p => ({ ...p, lockedId: wId, open: false }))
            if (notify) notify({ type: 'dates_locked', tripId: trip._id, actorId: CURRENT_USER._id, payload: { dateRange: fmtDateRange(w.start, w.end) } })
            const noVoters = datePoll.votes.filter(v => v.windowId === wId && v.answer === 'no')
            if (noVoters.length > 0) { setCleanupWindowId(wId); setShowNoVoterCleanup(true) }
            else showToast(`📅 ${fmtDateRange(w.start, w.end)} locked in!`)
          }
          const addWindow = () => {
            if (!windowDraft.start || !windowDraft.end) return
            const newId = 'dw-' + Date.now()
            syncDatePoll(p => ({ ...p, windows: [...p.windows, { _id: newId, start: windowDraft.start, end: windowDraft.end }] }))
            setWindowDraft({ start: '', end: '' })
            setAddingWindow(false)
          }
          const bestIdx = datePoll.windows.reduce((best, w, i) => {
            const t = getTally(w._id), bT = getTally(datePoll.windows[best]._id)
            return t.yes > bT.yes ? i : best
          }, 0)

          // Dates confirmed — compact green state
          if (effectiveStartDate && !datePoll.open) return (
            <div style={{ borderRadius: 14, border: '1px solid var(--bt-accent)40', background: 'var(--bt-card)', padding: '12px 16px', display: 'flex', alignItems: 'center', justifyContent: 'space-between', marginBottom: 4 }}>
              <div style={{ display: 'flex', alignItems: 'center', gap: 10 }}>
                <Ic n="CheckCircle" size={18} color="var(--bt-accent)" />
                <div>
                  <div style={{ fontSize: 13, fontWeight: 700, color: 'var(--bt-text-1)' }}>{fmtDateRange(effectiveStartDate, effectiveEndDate)}</div>
                  <div style={{ fontSize: 11, color: 'var(--bt-text-3)', marginTop: 1 }}>Dates confirmed</div>
                </div>
              </div>
              {canEdit && (
                <div style={{ display: 'flex', gap: 6 }}>
                  <button onClick={() => { setKnownDateSet({ start: null, end: null }) }}
                    style={{ fontSize: 11, fontWeight: 600, padding: '4px 10px', borderRadius: 6, cursor: 'pointer', background: 'transparent', border: '1px solid var(--bt-border)', color: 'var(--bt-text-3)' }}
                    onMouseEnter={e => { e.currentTarget.style.borderColor='var(--bt-accent)'; e.currentTarget.style.color='var(--bt-accent)' }}
                    onMouseLeave={e => { e.currentTarget.style.borderColor='var(--bt-border)'; e.currentTarget.style.color='var(--bt-text-3)' }}>Change</button>
                  <button onClick={() => syncDatePoll(p => ({ ...p, open: true, windows: [...p.windows, { _id: 'dw-' + Date.now(), start: effectiveStartDate, end: effectiveEndDate }] }))}
                    style={{ fontSize: 11, fontWeight: 600, padding: '4px 10px', borderRadius: 6, cursor: 'pointer', background: 'transparent', border: '1px solid var(--bt-border)', color: 'var(--bt-text-3)' }}
                    onMouseEnter={e => { e.currentTarget.style.borderColor='#f59e0b'; e.currentTarget.style.color='#f59e0b' }}
                    onMouseLeave={e => { e.currentTarget.style.borderColor='var(--bt-border)'; e.currentTarget.style.color='var(--bt-text-3)' }}>Poll crew</button>
                </div>
              )}
            </div>
          )

          // No dates yet — set dates card
          if (!datePoll.open) return (
            <div style={{ borderRadius: 14, border: '1px dashed var(--bt-accent)30', background: 'var(--bt-card)', overflow: 'hidden', marginBottom: 4 }}>
              <div style={{ padding: '12px 16px', borderBottom: '1px solid var(--bt-border)', display: 'flex', alignItems: 'center', gap: 8 }}>
                <Ic n="Calendar" size={16} color="var(--bt-accent)" />
                <span style={{ fontSize: 14, fontWeight: 700, color: 'var(--bt-text-1)' }}>When are we going?</span>
              </div>
              {canEdit ? (
                <div style={{ padding: '14px 16px' }}>
                  <div style={{ display: 'flex', gap: 10, flexWrap: 'wrap', marginBottom: 12 }}>
                    <div style={{ flex: 1, minWidth: 130 }}>
                      <label style={{ fontSize: 10, fontWeight: 700, textTransform: 'uppercase', letterSpacing: '.06em', color: 'var(--bt-text-3)', display: 'block', marginBottom: 4 }}>Start</label>
                      <input type="date" value={knownDateDraft.start} onChange={e => setKnownDateDraft(d => ({ ...d, start: e.target.value }))}
                        style={{ fontSize: 13, padding: '8px 10px', borderRadius: 7, background: 'var(--bt-input)', border: '1px solid var(--bt-border-input)', color: 'var(--bt-text-1)', outline: 'none', width: '100%' }} />
                    </div>
                    <div style={{ flex: 1, minWidth: 130 }}>
                      <label style={{ fontSize: 10, fontWeight: 700, textTransform: 'uppercase', letterSpacing: '.06em', color: 'var(--bt-text-3)', display: 'block', marginBottom: 4 }}>End</label>
                      <input type="date" value={knownDateDraft.end} onChange={e => setKnownDateDraft(d => ({ ...d, end: e.target.value }))}
                        style={{ fontSize: 13, padding: '8px 10px', borderRadius: 7, background: 'var(--bt-input)', border: '1px solid var(--bt-border-input)', color: 'var(--bt-text-1)', outline: 'none', width: '100%' }} />
                    </div>
                  </div>
                  <div style={{ display: 'flex', gap: 8 }}>
                    <button onClick={() => {
                      if (!knownDateDraft.start || !knownDateDraft.end) return
                      setKnownDateSet({ start: knownDateDraft.start, end: knownDateDraft.end })
                      showToast(`📅 ${fmtDateRange(knownDateDraft.start, knownDateDraft.end)} set`)
                    }}
                      style={{ flex: 1, padding: '9px', borderRadius: 7, border: 'none', background: knownDateDraft.start && knownDateDraft.end ? 'var(--bt-accent)' : 'var(--bt-border)', color: knownDateDraft.start && knownDateDraft.end ? '#0d1117' : 'var(--bt-text-3)', fontWeight: 700, fontSize: 13, cursor: knownDateDraft.start && knownDateDraft.end ? 'pointer' : 'not-allowed', transition: 'all .15s' }}>
                      Set Dates
                    </button>
                    <button onClick={() => {
                      if (knownDateDraft.start && knownDateDraft.end)
                        syncDatePoll(p => ({ ...p, open: true, windows: [...p.windows, { _id: 'dw-' + Date.now(), start: knownDateDraft.start, end: knownDateDraft.end }] }))
                      else syncDatePoll(p => ({ ...p, open: true }))
                      showToast('Poll opened')
                    }}
                      style={{ padding: '9px 14px', borderRadius: 7, border: '1px solid var(--bt-border)', background: 'transparent', color: 'var(--bt-text-3)', fontSize: 12, fontWeight: 600, cursor: 'pointer', whiteSpace: 'nowrap' }}
                      onMouseEnter={e => { e.currentTarget.style.borderColor='#f59e0b'; e.currentTarget.style.color='#f59e0b' }}
                      onMouseLeave={e => { e.currentTarget.style.borderColor='var(--bt-border)'; e.currentTarget.style.color='var(--bt-text-3)' }}>
                      Poll the crew
                    </button>
                  </div>
                </div>
              ) : (
                <div style={{ padding: '16px', display: 'flex', alignItems: 'center', gap: 8 }}>
                  <Ic n="Calendar" size={14} color="var(--bt-text-3)" />
                  <span style={{ fontSize: 13, color: 'var(--bt-text-3)' }}>Dates TBD</span>
                </div>
              )}
            </div>
          )

          // Poll open — full panel
          return (
            <div style={{ borderRadius: 14, border: '1px solid #f59e0b40', background: 'var(--bt-card)', overflow: 'hidden', marginBottom: 4 }}>
              <div style={{ display: 'flex', alignItems: 'center', justifyContent: 'space-between', padding: '12px 16px', borderBottom: '1px solid var(--bt-border)' }}>
                <div style={{ display: 'flex', alignItems: 'center', gap: 8 }}>
                  <Ic n="Calendar" size={16} color="#f59e0b" />
                  <span style={{ fontSize: 14, fontWeight: 700, color: 'var(--bt-text-1)' }}>When are we going?</span>
                  {datePoll.windows.length > 0 && (
                    <span style={{ fontSize: 11, color: 'var(--bt-text-3)' }}>
                      {datePoll.votes.filter((v,i,a)=>a.findIndex(x=>x.userId===v.userId)===i).length}/{trip.attendees.length} responded
                    </span>
                  )}
                </div>
                {canEdit && (
                  <button onClick={() => syncDatePoll(p => ({ ...p, open: false }))}
                    style={{ fontSize: 11, padding: '3px 8px', borderRadius: 6, background: 'transparent', border: '1px solid var(--bt-border)', color: 'var(--bt-text-3)', cursor: 'pointer' }}>
                    Close poll
                  </button>
                )}
              </div>
              <div style={{ padding: '14px 16px', display: 'flex', flexDirection: 'column', gap: 8 }}>
                {datePoll.windows.length === 0 && (
                  <div style={{ padding: '20px 14px', borderRadius: 10, background: 'var(--bt-base)', border: '1px dashed var(--bt-border)', textAlign: 'center' }}>
                    <Ic n="CalendarPlus" size={28} color="var(--bt-text-3)" style={{ marginBottom: 8 }} />
                    <div style={{ fontSize: 13, fontWeight: 600, color: 'var(--bt-text-2)', marginBottom: 4 }}>No date options yet</div>
                    <div style={{ fontSize: 12, color: 'var(--bt-text-3)' }}>Add a window below — crew can vote once options are in.</div>
                  </div>
                )}
                {datePoll.windows.map((w, wIdx) => {
                  const t = getTally(w._id)
                  const total = trip.attendees.length || 1
                  const isBest = datePoll.windows.length > 1 && wIdx === bestIdx && t.yes > 0
                  const mv = myVote(w._id)
                  return (
                    <div key={w._id} style={{ borderRadius: 10, padding: '12px 14px', background: 'var(--bt-base)', border: `1px solid ${isBest ? 'var(--bt-accent)50' : 'var(--bt-border)'}` }}>
                      <div style={{ display: 'flex', alignItems: 'center', justifyContent: 'space-between', marginBottom: 8 }}>
                        <div>
                          {isBest && <div style={{ fontSize: 10, fontWeight: 700, color: 'var(--bt-accent)', marginBottom: 2, textTransform: 'uppercase', letterSpacing: '.06em' }}>Best availability</div>}
                          <div style={{ fontSize: 14, fontWeight: 600, color: 'var(--bt-text-1)' }}>{fmtDateRange(w.start, w.end)}</div>
                        </div>
                        {canEdit && (
                          <button onClick={() => lockWindow(w._id)}
                            style={{ fontSize: 12, fontWeight: 700, padding: '5px 12px', borderRadius: 8, cursor: 'pointer', background: 'transparent', border: '1px solid var(--bt-accent)60', color: 'var(--bt-accent)' }}
                            onMouseEnter={e => { e.currentTarget.style.background = 'var(--bt-accent)'; e.currentTarget.style.color = '#0d1117' }}
                            onMouseLeave={e => { e.currentTarget.style.background = 'transparent'; e.currentTarget.style.color = 'var(--bt-accent)' }}>
                            Lock In →
                          </button>
                        )}
                      </div>
                      <div style={{ display: 'flex', height: 4, borderRadius: 9999, overflow: 'hidden', background: 'var(--bt-card)', marginBottom: 8 }}>
                        <div style={{ width: `${(t.yes/total)*100}%`, background: 'var(--bt-accent)', transition: 'width .4s' }} />
                        <div style={{ width: `${(t.no/total)*100}%`, background: 'var(--bt-danger)', transition: 'width .4s' }} />
                      </div>
                      <div style={{ display: 'flex', alignItems: 'center', justifyContent: 'space-between' }}>
                        <div style={{ display: 'flex', gap: 12, fontSize: 12 }}>
                          <span style={{ color: 'var(--bt-accent)' }}>✓ {t.yes}</span>
                          <span style={{ color: 'var(--bt-danger)' }}>✗ {t.no}</span>
                          <span style={{ color: 'var(--bt-text-3)' }}>{total - t.yes - t.no} pending</span>
                        </div>
                        <div style={{ display: 'flex', gap: 6 }}>
                          {['yes','no'].map(ans => (
                            <button key={ans} onClick={() => castVote(w._id, ans)}
                              style={{ fontSize: 12, fontWeight: 600, padding: '4px 10px', borderRadius: 6, cursor: 'pointer', transition: 'all .15s',
                                background: mv === ans ? (ans === 'yes' ? 'var(--bt-accent)' : 'var(--bt-danger)') : 'transparent',
                                color: mv === ans ? '#0d1117' : (ans === 'yes' ? 'var(--bt-accent)' : 'var(--bt-danger)'),
                                border: `1px solid ${ans === 'yes' ? 'var(--bt-accent)' : 'var(--bt-danger)'}60` }}>
                              {ans === 'yes' ? "I'm in" : "Can't do it"}
                            </button>
                          ))}
                        </div>
                      </div>
                    </div>
                  )
                })}
                {canEdit && (
                  <div>
                    {addingWindow ? (
                      <div style={{ display: 'flex', gap: 8, alignItems: 'flex-end', flexWrap: 'wrap' }}>
                        <div style={{ flex: 1, minWidth: 120 }}>
