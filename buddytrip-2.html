                          <label style={{ fontSize: 10, fontWeight: 700, textTransform: 'uppercase', letterSpacing: '.06em', color: 'var(--bt-text-3)', display: 'block', marginBottom: 4 }}>Start</label>
                          <input type="date" value={windowDraft.start} onChange={e => setWindowDraft(d => ({ ...d, start: e.target.value }))}
                            style={{ fontSize: 13, padding: '7px 10px', borderRadius: 7, background: 'var(--bt-input)', border: '1px solid var(--bt-border-input)', color: 'var(--bt-text-1)', outline: 'none', width: '100%' }} />
                        </div>
                        <div style={{ flex: 1, minWidth: 120 }}>
                          <label style={{ fontSize: 10, fontWeight: 700, textTransform: 'uppercase', letterSpacing: '.06em', color: 'var(--bt-text-3)', display: 'block', marginBottom: 4 }}>End</label>
                          <input type="date" value={windowDraft.end} onChange={e => setWindowDraft(d => ({ ...d, end: e.target.value }))}
                            style={{ fontSize: 13, padding: '7px 10px', borderRadius: 7, background: 'var(--bt-input)', border: '1px solid var(--bt-border-input)', color: 'var(--bt-text-1)', outline: 'none', width: '100%' }} />
                        </div>
                        <button onClick={addWindow} style={{ padding: '8px 14px', borderRadius: 8, fontSize: 13, fontWeight: 700, background: 'var(--bt-accent)', color: '#0d1117', border: 'none', cursor: 'pointer' }}>Add</button>
                        <button onClick={() => { setAddingWindow(false); setWindowDraft({ start: '', end: '' }) }}
                          style={{ padding: '8px 10px', borderRadius: 8, fontSize: 13, background: 'transparent', border: '1px solid var(--bt-border)', color: 'var(--bt-text-3)', cursor: 'pointer' }}>✕</button>
                      </div>
                    ) : (
                      <button onClick={() => setAddingWindow(true)}
                        style={{ width: '100%', marginTop: 4, padding: '8px', borderRadius: 8, fontSize: 13, fontWeight: 600, background: 'transparent', border: '1px dashed var(--bt-border)', color: 'var(--bt-text-3)', cursor: 'pointer' }}
                        onMouseEnter={e => { e.currentTarget.style.borderColor = 'var(--bt-accent)'; e.currentTarget.style.color = 'var(--bt-accent)' }}
                        onMouseLeave={e => { e.currentTarget.style.borderColor = 'var(--bt-border)'; e.currentTarget.style.color = 'var(--bt-text-3)' }}>
                        + Add a date option
                      </button>
                    )}
                  </div>
                )}
              </div>
            </div>
          )
        })()}

        <TabBar tabs={[
          { id: 'home', label: 'Home' },
          { id: 'schedule', label: 'Schedule' },
          { id: 'crew', label: 'Crew' },
          ...(hasComp ? [{ id: 'competition', label: 'Comp', icon: 'Swords' }] : []),
          { id: 'more', label: 'More' },
        ]} active={tab} onChange={setTab} />

        {tab === 'home'        && <HomeTab />}
        {tab === 'schedule'    && <ScheduleTab />}
        {tab === 'crew'        && <CrewTab />}
        {tab === 'competition' && hasComp && <CompetitionTab />}
        {tab === 'more'        && <MoreTab />}
      </div>

      {/* ── No-voter cleanup sheet — shown after locking a date ── */}
      {showNoVoterCleanup && cleanupWindowId !== null && (() => {
        const w = datePoll.windows.find(w => w._id === cleanupWindowId)
        const noVoterIds = datePoll.votes
          .filter(v => v.windowId === cleanupWindowId && v.answer === 'no')
          .map(v => v.userId)
        const noVoters = roster.filter(m => noVoterIds.includes(m.userId))
        if (noVoters.length === 0) { setShowNoVoterCleanup(false); return null }
        return (
          <div style={{ position: 'fixed', inset: 0, zIndex: 200, background: '#000a', display: 'flex', alignItems: 'flex-end', justifyContent: 'center' }}
            onClick={() => setShowNoVoterCleanup(false)}>
            <div onClick={e => e.stopPropagation()} style={{ width: '100%', maxWidth: 600, borderRadius: '16px 16px 0 0', background: 'var(--bt-card)', border: '1px solid var(--bt-border)', padding: '24px 20px 40px' }}>
              <div style={{ fontSize: 32, textAlign: 'center', marginBottom: 10, display:"flex", alignItems:"center", justifyContent:"center" }}><Ic n="Calendar" size={32} color="var(--bt-accent)" /></div>
              <h2 style={{ fontSize: 17, fontWeight: 700, color: 'var(--bt-text-1)', textAlign: 'center', marginBottom: 4 }}>
                {fmtDateRange(w.start, w.end)} is locked in!
              </h2>
              <p style={{ fontSize: 13, color: 'var(--bt-text-2)', textAlign: 'center', lineHeight: 1.6, marginBottom: 16 }}>
                {noVoters.length === 1
                  ? `${noVoters[0].name} voted no for this window.`
                  : `${noVoters.length} people voted no for this window.`}{' '}
                We'll move them to <strong style={{ color: 'var(--bt-text-1)' }}>"Can't make it"</strong> — you can remove them from the roster whenever it becomes official.
              </p>

              {/* No-voter list */}
              <div style={{ display: 'flex', flexDirection: 'column', gap: 6, marginBottom: 20 }}>
                {noVoters.map(m => (
                  <div key={m.userId} style={{ display: 'flex', alignItems: 'center', justifyContent: 'space-between', padding: '10px 14px', borderRadius: 8, background: 'var(--bt-base)', border: '1px solid var(--bt-border)' }}>
                    <div style={{ display: 'flex', alignItems: 'center', gap: 10 }}>
                      <div style={{ width: 32, height: 32, borderRadius: '50%', background: 'var(--bt-card)', border: '1px solid var(--bt-border)', display: 'flex', alignItems: 'center', justifyContent: 'center', fontSize: 13, fontWeight: 700, color: 'var(--bt-text-3)' }}>
                        {m.name.charAt(0)}
                      </div>
                      <div>
                        <div style={{ fontSize: 13, fontWeight: 600, color: 'var(--bt-text-1)' }}>{m.name}</div>
                        <div style={{ fontSize: 11, color: 'var(--bt-danger)' }}>✗ Voted no</div>
                      </div>
                    </div>
                    <button onClick={() => {
                      setRoster(r => r.filter(x => x.userId !== m.userId))
                      showToast(`${m.name.split(' ')[0]} removed from roster`)
                    }}
                      style={{ fontSize: 11, fontWeight: 600, padding: '4px 10px', borderRadius: 6, cursor: 'pointer', background: 'transparent', border: '1px solid var(--bt-danger)50', color: 'var(--bt-danger)' }}>
                      Remove
                    </button>
                  </div>
                ))}
              </div>

              <button onClick={() => {
                setRoster(r => r.map(m =>
                  noVoterIds.includes(m.userId) ? { ...m, status: "can't make it" } : m
                ))
                showToast(`📅 Dates locked — ${noVoters.length} moved to "Can't make it"`)
                setShowNoVoterCleanup(false)
              }}
                style={{ width: '100%', fontSize: 14, fontWeight: 700, padding: '13px', borderRadius: 10, border: 'none', cursor: 'pointer', background: 'var(--bt-accent)', color: '#0d1117', marginBottom: 10 }}>
                Got it — move them to "Can't make it"
              </button>
              <button onClick={() => {
                showToast(`📅 ${fmtDateRange(w.start, w.end)} locked in!`)
                setShowNoVoterCleanup(false)
              }}
                style={{ width: '100%', fontSize: 13, padding: '10px', borderRadius: 10, border: '1px solid var(--bt-border)', background: 'transparent', color: 'var(--bt-text-3)', cursor: 'pointer' }}>
                Skip for now
              </button>
            </div>
          </div>
        )
      })()}

      <BottomNav active="trip-home" navigate={navigate} currentTripId={tripId} unreadCount={messages.filter(m => m.userId !== CURRENT_USER._id).length + teamMessages.filter(m => m.userId !== CURRENT_USER._id).length} />
    </div>
  )
}

// ── SCREEN: CompetitionSetup ─────────────────────────────────────
function CompetitionSetup({ navigate, showToast, tripId, viewerRole, trips, notifications, onMarkAllRead, theme, onToggleTheme }) {
  const trip = trips.find(t => t._id === tripId) || trips[1]
  const roster = trip.attendees.filter(a => a.status === 'in')

  // ── Shared state ────────────────────────────────────────────────
  const [mode, setMode] = useState(null)           // null | 'manual' | 'draft'
  const [teamCount, setTeamCount] = useState(2)
  const [teamNames, setTeamNames] = useState(['Team Alpha', 'Team Bravo', 'Team Charlie', 'Team Delta', 'Team Echo', 'Team Foxtrot', 'Team Golf', 'Team Hotel'])
  const [teamColors] = useState(['#00d4aa', '#f97316', '#8b5cf6', '#3b82f6', '#ef4444', '#22c55e', '#eab308', '#ec4899'])

  // ── Manual assignment state ──────────────────────────────────────
  // assignments: { [userId]: 0 | 1 | null }  (0 = team A, 1 = team B, null = unassigned)
  const [assignments, setAssignments] = useState(() => {
    const a = {}
    roster.forEach(m => { a[m.userId] = null })
    return a
  })

  // ── Draft state ──────────────────────────────────────────────────
  const [captains, setCaptains] = useState([null, null])          // one per team
  const [draftOrder, setDraftOrder] = useState([0, 1, 1, 0, 0, 1, 1, 0])  // serpentine
  const [draftStarted, setDraftStarted] = useState(false)
  const [draftPicks, setDraftPicks] = useState([])  // [userId, ...]  in pick order
  const [draftDone, setDraftDone] = useState(false)
  const [editingName, setEditingName] = useState(null)
  const [nameDraft, setNameDraft] = useState('')

  // ── Done state ───────────────────────────────────────────────────
  const [done, setDone] = useState(false)

  // ── Helpers ──────────────────────────────────────────────────────
  const memberName  = uid => roster.find(m => m.userId === uid)?.name || uid
  const firstName   = uid => memberName(uid).split(' ')[0]

  const teamIdxs = Array.from({ length: teamCount }, (_, i) => i)
  const getTeamRoster = ti => roster.filter(m => assignments[m.userId] === ti)
  const unassigned = roster.filter(m => assignments[m.userId] === null)

  function assignPlayer(userId, team) {
    setAssignments(a => ({ ...a, [userId]: a[userId] === team ? null : team }))
  }

  function autoBalance() {
    const shuffled = [...roster].sort(() => Math.random() - .5)
    const a = {}
    shuffled.forEach((m, i) => { a[m.userId] = i % teamCount })
    setAssignments(a)
  }

  function genSerpentine(n, rosterSize) {
    const total = rosterSize - n
    const order = []
    let round = 0, pos = 0
    for (let i = 0; i < total; i++) {
      order.push(round % 2 === 0 ? pos % n : (n - 1 - pos % n))
      pos++
      if (pos % n === 0) { round++; pos = 0 }
    }
    return order
  }

  // When team count changes before mode is chosen, reset dependent state
  React.useEffect(() => {
    if (mode) return
    setCaptains(Array(teamCount).fill(null))
    setDraftOrder(genSerpentine(teamCount, roster.length))
  }, [teamCount])

  // Draft helpers
  const pickCount = draftPicks.length
  const currentPickTeam = draftOrder[pickCount] ?? null
  const currentCaptainId = currentPickTeam !== null ? captains[currentPickTeam] : null
  const draftedIds = new Set([...captains.filter(Boolean), ...draftPicks])
  const draftPool = roster.filter(m => !draftedIds.has(m.userId))

  function getDraftTeam(uid) {
    const capIdx = captains.indexOf(uid)
    if (capIdx !== -1) return capIdx
    const pickIdx = draftPicks.indexOf(uid)
    if (pickIdx === -1) return null
    return draftOrder[pickIdx]
  }

  function makePick(uid) {
    const next = [...draftPicks, uid]
    setDraftPicks(next)
    const remaining = roster.filter(m => !new Set([...captains.filter(Boolean), ...next]).has(m.userId))
    if (remaining.length === 0) setDraftDone(true)
    else showToast(`${firstName(uid)} drafted by ${teamNames[currentPickTeam]}!`)
  }

  function moveDraftSlot(i, dir) {
    const arr = [...draftOrder]
    const j = i + dir
    if (j < 0 || j >= arr.length) return
    ;[arr[i], arr[j]] = [arr[j], arr[i]]
    setDraftOrder(arr)
  }

  // Final submit
  function handleCreate() {
    setDone(true)
    setTimeout(() => {
      showToast('Competition created!')
      navigate('trip-detail', { tripId: trip._id })
    }, 1800)
  }

  const canSubmitManual = unassigned.length === 0 && teamIdxs.every(ti => getTeamRoster(ti).length > 0)
  const canStartDraft   = captains.every(Boolean) && new Set(captains).size === captains.length

  // ── Done screen ─────────────────────────────────────────────────
  if (done) return (
    <div style={{ minHeight: '100vh', background: 'var(--bt-base)', display: 'flex', alignItems: 'center', justifyContent: 'center', padding: 24 }}>
      <div style={{ textAlign: 'center', maxWidth: 360 }}>
        <div style={{ fontSize: 64, marginBottom: 16, display:"flex", alignItems:"center", justifyContent:"center" }}><Ic n="Swords" size={64} color="var(--bt-accent)" /></div>
        <div style={{ color: 'var(--bt-accent)', fontFamily: 'monospace', fontSize: 11, letterSpacing: 3, marginBottom: 10 }}>COMPETITION CREATED</div>
        <h2 style={{ color: 'var(--bt-text-1)', fontSize: 24, fontWeight: 700, marginBottom: 8 }}>{teamNames.slice(0, teamCount).join(' vs ')}</h2>
        <p style={{ color: 'var(--bt-text-2)', fontSize: 14, marginBottom: 24 }}>Returning to trip…</p>
        <div style={{ display: 'flex', justifyContent: 'center', gap: 12, flexWrap: 'wrap' }}>
          {teamIdxs.map(i => (
            <div key={i} style={{ background: 'var(--bt-card)', border: `1px solid ${teamColors[i]}40`, borderRadius: 10, padding: '12px 20px', minWidth: 110 }}>
              <div style={{ color: teamColors[i], fontSize: 12, fontWeight: 700, marginBottom: 8 }}>{teamNames[i]}</div>
              {roster.filter(m => (mode === 'manual' ? assignments[m.userId] === i : getDraftTeam(m.userId) === i)).map(m => (
                <div key={m.userId} style={{ fontSize: 13, color: 'var(--bt-text-1)', marginBottom: 2 }}>{firstName(m.userId)}</div>
              ))}
            </div>
          ))}
        </div>
      </div>
    </div>
  )

  // ── Shared header / layout ───────────────────────────────────────
  return (
    <div style={{ minHeight: '100vh', paddingBottom: 40, background: 'var(--bt-base)' }}>
      <TopNav navigate={navigate} notifications={notifications} onMarkAllRead={onMarkAllRead} theme={theme} onToggleTheme={onToggleTheme} />
      <div style={{ maxWidth: 600, margin: '0 auto', padding: '24px 16px' }}>
        <Breadcrumb items={[{ label: 'Trips', screen: 'trips' }, { label: trip.title, screen: 'trip-detail', extra: { tripId: trip._id } }, { label: 'Competition Setup' }]} navigate={navigate} />

        <div style={{ marginBottom: 28 }}>
          <h1 style={{ fontSize: 24, fontWeight: 700, color: 'var(--bt-text-1)', marginBottom: 4 }}>Competition Setup</h1>
          <p style={{ fontSize: 14, color: 'var(--bt-text-2)' }}>{trip.title} · {roster.length} players</p>
        </div>

        {/* ── STEP 0: Mode picker ─────────────────────────────── */}
        {!mode && (
          <>
            {/* Team count selector */}
            <p style={{ fontSize: 13, fontWeight: 600, color: 'var(--bt-text-3)', textTransform: 'uppercase', letterSpacing: '.08em', marginBottom: 10 }}>How many teams?</p>
            <div style={{ display: 'flex', gap: 8, marginBottom: 24 }}>
              {[2, 3, 4].map(n => (
                <button key={n} onClick={() => setTeamCount(n)}
                  style={{ flex: 1, padding: '10px 0', borderRadius: 10, fontWeight: 700, fontSize: 16, cursor: 'pointer', border: `2px solid ${teamCount === n ? 'var(--bt-accent)' : 'var(--bt-border)'}`, background: teamCount === n ? 'var(--bt-tag-bg)' : 'var(--bt-card)', color: teamCount === n ? 'var(--bt-accent)' : 'var(--bt-text-2)', transition: 'all .15s' }}>
                  {n}
                </button>
              ))}
            </div>

            <p style={{ fontSize: 13, fontWeight: 600, color: 'var(--bt-text-3)', textTransform: 'uppercase', letterSpacing: '.08em', marginBottom: 14 }}>How do you want to form teams?</p>
            <div style={{ display: 'flex', flexDirection: 'column', gap: 12 }}>
              {[
                {
                  id: 'manual', icon: '✏️',
                  label: 'Manual Assignment',
                  desc: 'You assign everyone to a team. Fast, simple, owner has full control.',
                  badge: 'Default',
                },
                {
                  id: 'draft', icon: 'Target',
                  label: "Captain's Draft",
                  desc: `Designate ${teamCount} captain${teamCount > 1 ? 's' : ''}. Set the pick order. Captains draft their own teams.`,
                  badge: 'More fun',
                },
              ].map(opt => (
                <button key={opt.id} onClick={() => setMode(opt.id)}
                  style={{ display: 'flex', alignItems: 'flex-start', gap: 16, padding: '20px', borderRadius: 14, textAlign: 'left', cursor: 'pointer', background: 'var(--bt-card)', border: '1px solid var(--bt-border)', transition: 'border-color .15s, box-shadow .15s' }}
                  onMouseEnter={e => { e.currentTarget.style.borderColor = 'var(--bt-accent)'; e.currentTarget.style.boxShadow = '0 0 0 1px var(--bt-accent)22' }}
                  onMouseLeave={e => { e.currentTarget.style.borderColor = 'var(--bt-border)'; e.currentTarget.style.boxShadow = 'none' }}>
                  <Ic n={opt.icon} size={26} color="var(--bt-accent)" style={{ marginTop: 2 }} />
                  <div style={{ flex: 1 }}>
                    <div style={{ display: 'flex', alignItems: 'center', gap: 8, marginBottom: 4 }}>
                      <span style={{ fontSize: 16, fontWeight: 700, color: 'var(--bt-text-1)' }}>{opt.label}</span>
                      <span style={{ fontSize: 10, fontWeight: 700, padding: '2px 7px', borderRadius: 9999, background: 'var(--bt-tag-bg)', color: 'var(--bt-accent)', border: '1px solid var(--bt-accent)40' }}>{opt.badge}</span>
                    </div>
                    <p style={{ fontSize: 13, color: 'var(--bt-text-2)', lineHeight: 1.5 }}>{opt.desc}</p>
                  </div>
                  <span style={{ color: 'var(--bt-text-3)', fontSize: 20, flexShrink: 0, alignSelf: 'center' }}>›</span>
                </button>
              ))}
            </div>
            <div style={{ marginTop: 16 }}>
              <Btn variant="secondary" onClick={() => navigate('trip-detail', { tripId: trip._id })}>← Cancel</Btn>
            </div>
          </>
        )}

        {/* ── MANUAL ASSIGNMENT ───────────────────────────────── */}
        {mode === 'manual' && (
          <>
            {/* Team name editors */}
            <div style={{ display: 'grid', gridTemplateColumns: teamIdxs.map(() => '1fr').join(' '), gap: 10, marginBottom: 20 }}>
              {teamIdxs.map(i => (
                <div key={i} style={{ borderRadius: 10, padding: '12px 14px', background: 'var(--bt-card)', border: `1px solid ${teamColors[i]}40` }}>
                  <div style={{ display: 'flex', alignItems: 'center', gap: 8, marginBottom: 8 }}>
                    <div style={{ width: 10, height: 10, borderRadius: '50%', background: teamColors[i], flexShrink: 0 }} />
                    {editingName === i ? (
                      <input autoFocus value={nameDraft} onChange={e => setNameDraft(e.target.value)}
                        onBlur={() => { setTeamNames(n => { const a = [...n]; a[i] = nameDraft || n[i]; return a }); setEditingName(null) }}
                        onKeyDown={e => { if (e.key === 'Enter') { setTeamNames(n => { const a = [...n]; a[i] = nameDraft || n[i]; return a }); setEditingName(null) } }}
                        style={{ flex: 1, fontSize: 14, fontWeight: 700, background: 'var(--bt-base)', border: '1px solid var(--bt-accent)', borderRadius: 6, padding: '3px 8px', color: 'var(--bt-text-1)', outline: 'none' }} />
                    ) : (
                      <button onClick={() => { setEditingName(i); setNameDraft(teamNames[i]) }}
                        style={{ flex: 1, textAlign: 'left', background: 'none', border: 'none', cursor: 'pointer', fontSize: 14, fontWeight: 700, color: teamColors[i], display: 'flex', alignItems: 'center', gap: 6 }}>
                        {teamNames[i]} <span style={{ fontSize: 11, color: 'var(--bt-text-3)' }}>✏</span>
                      </button>
                    )}
                  </div>
                  <div style={{ fontSize: 12, color: 'var(--bt-text-3)' }}>{getTeamRoster(i).length} players</div>
                  {getTeamRoster(i).map(m => (
                    <div key={m.userId} style={{ display: 'flex', alignItems: 'center', gap: 8, marginTop: 6 }}>
                      <Avatar name={m.name} size="sm" />
                      <span style={{ fontSize: 13, color: 'var(--bt-text-1)', flex: 1 }}>{firstName(m.userId)}</span>
                      <button onClick={() => assignPlayer(m.userId, i)} style={{ width: 20, height: 20, borderRadius: '50%', background: 'var(--bt-base)', border: '1px solid var(--bt-border)', cursor: 'pointer', fontSize: 11, color: 'var(--bt-text-3)', display: 'flex', alignItems: 'center', justifyContent: 'center' }}>×</button>
                    </div>
                  ))}
                </div>
              ))}
            </div>

            {/* Unassigned pool */}
            {unassigned.length > 0 ? (
              <div style={{ marginBottom: 24 }}>
                <p style={{ fontSize: 11, fontWeight: 700, textTransform: 'uppercase', letterSpacing: '.08em', color: 'var(--bt-text-3)', marginBottom: 12 }}>Unassigned — tap a player, then pick their team</p>
                <div style={{ display: 'flex', flexDirection: 'column', gap: 6 }}>
                  {unassigned.map(m => (
                    <div key={m.userId} style={{ display: 'flex', alignItems: 'center', gap: 12, padding: '10px 14px', borderRadius: 10, background: 'var(--bt-card)', border: '1px solid var(--bt-border)' }}>
                      <Avatar name={m.name} size="sm" />
                      <span style={{ flex: 1, fontSize: 14, color: 'var(--bt-text-1)' }}>{m.name}</span>
                      <div style={{ display: 'flex', gap: 6, flexWrap: 'wrap' }}>
                        {teamIdxs.map(ti => (
                          <button key={ti} onClick={() => assignPlayer(m.userId, ti)}
                            style={{ fontSize: 12, fontWeight: 700, padding: '5px 12px', borderRadius: 9999, cursor: 'pointer', border: `1px solid ${teamColors[ti]}60`, background: `${teamColors[ti]}15`, color: teamColors[ti] }}>
                            {teamNames[ti].split(' ')[0]}
                          </button>
                        ))}
                      </div>
                    </div>
                  ))}
                </div>
              </div>
            ) : (
              <div style={{ display: 'flex', alignItems: 'center', gap: 8, padding: '12px 16px', borderRadius: 10, marginBottom: 24, background: 'var(--bt-tag-bg)', border: '1px solid var(--bt-accent)30' }}>
                <span style={{ color: 'var(--bt-accent)', fontSize: 16 }}>✓</span>
                <span style={{ fontSize: 14, fontWeight: 600, color: 'var(--bt-accent)' }}>Everyone assigned</span>
                <span style={{ fontSize: 13, color: 'var(--bt-text-2)', marginLeft: 4 }}>— {teamIdxs.map(ti => `${teamNames[ti]} (${getTeamRoster(ti).length})`).join(' · ')}</span>
              </div>
            )}

            {/* Actions */}
            <div style={{ display: 'flex', alignItems: 'center', justifyContent: 'space-between', flexWrap: 'wrap', gap: 10 }}>
              <div style={{ display: 'flex', gap: 8 }}>
                <Btn variant="secondary" onClick={() => setMode(null)}>← Back</Btn>
                <Btn variant="ghost" onClick={autoBalance}>⚖ Auto-balance</Btn>
              </div>
              <button onClick={handleCreate} disabled={!canSubmitManual}
                style={{ fontSize: 14, fontWeight: 700, padding: '10px 24px', borderRadius: 8, border: 'none', cursor: canSubmitManual ? 'pointer' : 'not-allowed', background: canSubmitManual ? 'var(--bt-accent)' : 'var(--bt-border)', color: canSubmitManual ? '#0d1117' : 'var(--bt-text-3)', boxShadow: canSubmitManual ? '0 0 20px var(--bt-accent)40' : 'none', transition: 'all .2s' }}>
                Create Competition →
              </button>
            </div>
            {!canSubmitManual && unassigned.length > 0 && (
              <p style={{ fontSize: 12, color: 'var(--bt-text-3)', marginTop: 10, textAlign: 'right' }}>{unassigned.length} player{unassigned.length !== 1 ? 's' : ''} still unassigned</p>
            )}
          </>
        )}

        {/* ── DRAFT SETUP ─────────────────────────────────────── */}
        {mode === 'draft' && !draftStarted && (
          <>
            {/* Captain pickers */}
            <div style={{ marginBottom: 24 }}>
              <p style={{ fontSize: 11, fontWeight: 700, textTransform: 'uppercase', letterSpacing: '.08em', color: 'var(--bt-text-3)', marginBottom: 14 }}>Step 1 — Choose your {teamCount} captains</p>
              <div style={{ display: 'grid', gridTemplateColumns: teamIdxs.map(() => '1fr').join(' '), gap: 10, marginBottom: 14 }}>
                {teamIdxs.map(ci => (
                  <div key={ci} style={{ borderRadius: 12, padding: '14px', background: 'var(--bt-card)', border: `1px solid ${captains[ci] ? teamColors[ci] + '60' : 'var(--bt-border)'}` }}>
                    <div style={{ display: 'flex', alignItems: 'center', gap: 6, marginBottom: 10 }}>
                      <div style={{ width: 8, height: 8, borderRadius: '50%', background: teamColors[ci] }} />
                      {editingName === `cap${ci}` ? (
                        <input autoFocus value={nameDraft} onChange={e => setNameDraft(e.target.value)}
                          onBlur={() => { setTeamNames(n => { const a = [...n]; a[ci] = nameDraft || n[ci]; return a }); setEditingName(null) }}
                          onKeyDown={e => { if (e.key === 'Enter') { setTeamNames(n => { const a = [...n]; a[ci] = nameDraft || n[ci]; return a }); setEditingName(null) } }}
                          style={{ flex: 1, fontSize: 13, fontWeight: 700, background: 'var(--bt-base)', border: '1px solid var(--bt-accent)', borderRadius: 6, padding: '3px 8px', color: teamColors[ci], outline: 'none' }} />
                      ) : (
                        <button onClick={() => { setEditingName(`cap${ci}`); setNameDraft(teamNames[ci]) }}
                          style={{ flex: 1, textAlign: 'left', background: 'none', border: 'none', cursor: 'pointer', fontSize: 13, fontWeight: 700, color: teamColors[ci], display: 'flex', alignItems: 'center', gap: 6 }}>
                          {teamNames[ci]} <span style={{ fontSize: 10, color: 'var(--bt-text-3)' }}>✏</span>
                        </button>
                      )}
                    </div>
                    {captains[ci] ? (
                      <div style={{ display: 'flex', alignItems: 'center', gap: 8 }}>
                        <Avatar name={memberName(captains[ci])} size="sm" />
                        <span style={{ fontSize: 14, fontWeight: 600, color: 'var(--bt-text-1)', flex: 1 }}>{firstName(captains[ci])}</span>
                        <button onClick={() => setCaptains(cs => cs.map((c, i) => i === ci ? null : c))} style={{ background: 'none', border: 'none', cursor: 'pointer', color: 'var(--bt-text-3)', fontSize: 14 }}>×</button>
                      </div>
                    ) : (
                      <div style={{ fontSize: 13, color: 'var(--bt-text-3)', fontStyle: 'italic' }}>No captain yet</div>
                    )}
                  </div>
                ))}
              </div>
              <div style={{ display: 'flex', flexDirection: 'column', gap: 6 }}>
                {roster.filter(m => !captains.includes(m.userId)).map(m => (
                  <div key={m.userId} style={{ display: 'flex', alignItems: 'center', gap: 12, padding: '10px 14px', borderRadius: 10, background: 'var(--bt-card)', border: '1px solid var(--bt-border)' }}>
                    <Avatar name={m.name} size="sm" />
                    <span style={{ flex: 1, fontSize: 14, color: 'var(--bt-text-1)' }}>{m.name}</span>
                    <div style={{ display: 'flex', gap: 6, flexWrap: 'wrap' }}>
                      {teamIdxs.filter(ci => !captains[ci]).map(ci => (
                        <button key={ci} onClick={() => setCaptains(cs => { const next = [...cs]; next[ci] = m.userId; return next })}
                          style={{ fontSize: 12, fontWeight: 700, padding: '5px 10px', borderRadius: 9999, cursor: 'pointer', border: `1px solid ${teamColors[ci]}60`, background: `${teamColors[ci]}15`, color: teamColors[ci] }}>
                          Cap {ci + 1}
                        </button>
                      ))}
                    </div>
                  </div>
                ))}
              </div>
            </div>

            {/* Draft order editor */}
            <div style={{ marginBottom: 24 }}>
              <div style={{ display: 'flex', alignItems: 'center', justifyContent: 'space-between', marginBottom: 12 }}>
                <p style={{ fontSize: 11, fontWeight: 700, textTransform: 'uppercase', letterSpacing: '.08em', color: 'var(--bt-text-3)' }}>Step 2 — Draft order</p>
                <button onClick={() => setDraftOrder(genSerpentine(teamCount, roster.length))} style={{ fontSize: 11, padding: '3px 10px', borderRadius: 6, background: 'transparent', border: '1px solid var(--bt-border)', color: 'var(--bt-text-3)', cursor: 'pointer' }}>Reset serpentine</button>
              </div>
              <div style={{ background: 'var(--bt-card)', border: '1px solid var(--bt-border)', borderRadius: 12, overflow: 'hidden' }}>
                {draftOrder.map((teamIdx, i) => {
                  const capId = captains[teamIdx]
                  const isCaptainPick = i < teamCount
                  return (
                    <div key={i} style={{ display: 'flex', alignItems: 'center', gap: 12, padding: '10px 14px', borderBottom: i < draftOrder.length - 1 ? '1px solid var(--bt-base)' : 'none', background: isCaptainPick ? 'var(--bt-base)' : 'transparent' }}>
                      <span style={{ width: 24, fontSize: 12, fontWeight: 700, color: 'var(--bt-text-3)', textAlign: 'center', flexShrink: 0 }}>#{i + 1}</span>
                      <div style={{ width: 8, height: 8, borderRadius: '50%', background: teamColors[teamIdx], flexShrink: 0 }} />
                      <span style={{ flex: 1, fontSize: 13, color: 'var(--bt-text-1)', fontWeight: isCaptainPick ? 600 : 400 }}>
                        {isCaptainPick ? `${teamNames[teamIdx]} Captain${capId ? ` — ${firstName(capId)}` : ''}` : teamNames[teamIdx]}
                        {isCaptainPick && <span style={{ fontSize: 11, color: 'var(--bt-text-3)', fontWeight: 400, marginLeft: 6 }}>(auto)</span>}
                      </span>
                      {!isCaptainPick && (
                        <div style={{ display: 'flex', gap: 4 }}>
                          <button onClick={() => moveDraftSlot(i, -1)} disabled={i <= teamCount} style={{ width: 26, height: 26, borderRadius: 6, background: i > teamCount ? 'var(--bt-base)' : 'transparent', border: `1px solid ${i > teamCount ? 'var(--bt-border)' : 'transparent'}`, cursor: i > teamCount ? 'pointer' : 'not-allowed', fontSize: 13, color: 'var(--bt-text-3)' }}>↑</button>
                          <button onClick={() => moveDraftSlot(i, 1)} disabled={i >= draftOrder.length - 1} style={{ width: 26, height: 26, borderRadius: 6, background: i < draftOrder.length - 1 ? 'var(--bt-base)' : 'transparent', border: `1px solid ${i < draftOrder.length - 1 ? 'var(--bt-border)' : 'transparent'}`, cursor: i < draftOrder.length - 1 ? 'pointer' : 'not-allowed', fontSize: 13, color: 'var(--bt-text-3)' }}>↓</button>
                        </div>
                      )}
                    </div>
                  )
                })}
              </div>
              <p style={{ fontSize: 12, color: 'var(--bt-text-3)', marginTop: 8 }}>Captains always pick first (slots 1–{teamCount}). Reorder the remaining picks freely.</p>
            </div>

            {/* Start Draft */}
            {!canStartDraft && (
              <div style={{ padding: '12px 16px', borderRadius: 10, marginBottom: 16, background: '#1a1200', border: '1px solid #f59e0b30', fontSize: 13, color: '#f59e0b' }}>
                ⚠️ Assign all {teamCount} captains before starting the draft.
              </div>
            )}
            <div style={{ display: 'flex', alignItems: 'center', justifyContent: 'space-between' }}>
              <Btn variant="secondary" onClick={() => setMode(null)}>← Back</Btn>
              <button onClick={() => { if (!canStartDraft) return; setDraftStarted(true); showToast(`Draft started! ${firstName(captains[draftOrder[0]])} picks first.`) }} disabled={!canStartDraft}
                style={{ fontSize: 14, fontWeight: 700, padding: '10px 24px', borderRadius: 8, border: 'none', cursor: canStartDraft ? 'pointer' : 'not-allowed', background: canStartDraft ? 'var(--bt-accent)' : 'var(--bt-border)', color: canStartDraft ? '#0d1117' : 'var(--bt-text-3)', boxShadow: canStartDraft ? '0 0 20px var(--bt-accent)40' : 'none', transition: 'all .2s' }}>
                <span style={{ display:'flex', alignItems:'center', justifyContent:'center', gap:8 }}><Ic n="Target" size={15} color="#0d1117" /> Start Draft</span>
              </button>
            </div>
          </>
        )}

        {/* ── LIVE DRAFT BOARD ────────────────────────────────── */}
        {mode === 'draft' && draftStarted && !draftDone && (
          <>
            {/* Pick tracker header */}
            <div style={{ borderRadius: 12, padding: '14px 16px', marginBottom: 20, background: '#0a1a14', border: '1px solid var(--bt-accent)40' }}>
              <div style={{ display: 'flex', alignItems: 'center', gap: 8, marginBottom: 6 }}>
                <LiveDot />
                <span style={{ fontSize: 11, fontFamily: 'monospace', letterSpacing: 2, color: 'var(--bt-accent)' }}>DRAFT LIVE</span>
              </div>
              <div style={{ fontSize: 16, fontWeight: 700, color: 'var(--bt-text-1)' }}>
                Pick #{pickCount + 1} &mdash; {currentCaptainId ? `${firstName(currentCaptainId)}'s turn` : 'Awaiting captain'}
              </div>
              <div style={{ fontSize: 13, color: 'var(--bt-text-2)', marginTop: 2 }}>
                <span style={{ color: teamColors[currentPickTeam] }}>{teamNames[currentPickTeam]}</span> is on the clock
              </div>
            </div>

            {/* Pick order progress */}
            <div style={{ display: 'flex', gap: 4, marginBottom: 20, flexWrap: 'wrap' }}>
              {draftOrder.map((teamIdx, i) => {
                const isPast = i < pickCount
                const isCurrent = i === pickCount
                return (
                  <div key={i} style={{ display: 'flex', flexDirection: 'column', alignItems: 'center', gap: 2 }}>
                    <div style={{ width: 28, height: 28, borderRadius: '50%', display: 'flex', alignItems: 'center', justifyContent: 'center', fontSize: 11, fontWeight: 700, transition: 'all .2s',
                      background: isCurrent ? teamColors[teamIdx] : isPast ? `${teamColors[teamIdx]}40` : 'var(--bt-card)',
                      color: isCurrent ? '#0d1117' : isPast ? teamColors[teamIdx] : 'var(--bt-text-3)',
                      border: `2px solid ${isCurrent ? teamColors[teamIdx] : isPast ? `${teamColors[teamIdx]}60` : 'var(--bt-border)'}`,
                      boxShadow: isCurrent ? `0 0 12px ${teamColors[teamIdx]}60` : 'none'
                    }}>
                      {isPast ? '✓' : i + 1}
                    </div>
                    <div style={{ width: 4, height: 4, borderRadius: '50%', background: teamColors[teamIdx], opacity: .6 }} />
                  </div>
                )
              })}
            </div>

            {/* Available players */}
            <p style={{ fontSize: 11, fontWeight: 700, textTransform: 'uppercase', letterSpacing: '.08em', color: 'var(--bt-text-3)', marginBottom: 12 }}>Available players — {draftPool.length} remaining</p>
            <div style={{ display: 'flex', flexDirection: 'column', gap: 8, marginBottom: 24 }}>
              {draftPool.map(m => (
                <button key={m.userId} onClick={() => makePick(m.userId)}
                  style={{ display: 'flex', alignItems: 'center', gap: 12, padding: '12px 14px', borderRadius: 10, background: 'var(--bt-card)', border: '1px solid var(--bt-border)', cursor: 'pointer', textAlign: 'left', transition: 'border-color .15s' }}
                  onMouseEnter={e => { e.currentTarget.style.borderColor = teamColors[currentPickTeam]; e.currentTarget.style.background = `${teamColors[currentPickTeam]}0a` }}
                  onMouseLeave={e => { e.currentTarget.style.borderColor = 'var(--bt-border)'; e.currentTarget.style.background = 'var(--bt-card)' }}>
                  <Avatar name={m.name} size="md" />
                  <div style={{ flex: 1 }}>
                    <div style={{ fontSize: 15, fontWeight: 600, color: 'var(--bt-text-1)' }}>{m.name}</div>
                    <div style={{ fontSize: 12, color: 'var(--bt-text-3)' }}>{m.role}</div>
                  </div>
                  <span style={{ fontSize: 13, fontWeight: 700, padding: '4px 12px', borderRadius: 9999, background: `${teamColors[currentPickTeam]}15`, color: teamColors[currentPickTeam], border: `1px solid ${teamColors[currentPickTeam]}40` }}>
                    Draft → {teamNames[currentPickTeam].split(' ')[0]}
                  </span>
                </button>
              ))}
            </div>

            {/* Teams so far */}
            <p style={{ fontSize: 11, fontWeight: 700, textTransform: 'uppercase', letterSpacing: '.08em', color: 'var(--bt-text-3)', marginBottom: 12 }}>Teams so far</p>
            <div style={{ display: 'grid', gridTemplateColumns: teamIdxs.map(() => '1fr').join(' '), gap: 10 }}>
              {teamIdxs.map(ti => (
                <div key={ti} style={{ borderRadius: 10, padding: '12px 14px', background: 'var(--bt-card)', border: `1px solid ${teamColors[ti]}40` }}>
                  <div style={{ color: teamColors[ti], fontSize: 12, fontWeight: 700, marginBottom: 8 }}>{teamNames[ti]}</div>
                  {roster.filter(m => getDraftTeam(m.userId) === ti).map(m => (
                    <div key={m.userId} style={{ display: 'flex', alignItems: 'center', gap: 6, marginBottom: 4 }}>
                      <Avatar name={m.name} size="sm" />
                      <span style={{ fontSize: 13, color: 'var(--bt-text-1)' }}>{firstName(m.userId)}</span>
                      {captains[ti] === m.userId && <span style={{ fontSize: 10, color: teamColors[ti], fontWeight: 700 }}>© CAP</span>}
                    </div>
                  ))}
                </div>
              ))}
            </div>
          </>
        )}

        {/* ── DRAFT COMPLETE ──────────────────────────────────── */}
        {mode === 'draft' && draftDone && (
          <>
            <div style={{ padding: '14px 16px', borderRadius: 12, marginBottom: 20, background: 'var(--bt-tag-bg)', border: '1px solid var(--bt-accent)40', display: 'flex', alignItems: 'center', gap: 10 }}>
              <span style={{ fontSize: 20 }}>✅</span>
              <div>
                <div style={{ fontWeight: 700, fontSize: 14, color: 'var(--bt-accent)' }}>Draft complete!</div>
                <div style={{ fontSize: 13, color: 'var(--bt-text-2)' }}>All {roster.length} players drafted. Review the teams below.</div>
              </div>
            </div>
            <div style={{ display: 'grid', gridTemplateColumns: teamIdxs.map(() => '1fr').join(' '), gap: 12, marginBottom: 24 }}>
              {teamIdxs.map(ti => (
                <div key={ti} style={{ borderRadius: 12, padding: '16px', background: 'var(--bt-card)', border: `1px solid ${teamColors[ti]}50` }}>
                  <div style={{ color: teamColors[ti], fontSize: 13, fontWeight: 700, marginBottom: 12 }}>{teamNames[ti]}</div>
                  {roster.filter(m => getDraftTeam(m.userId) === ti).map(m => (
                    <div key={m.userId} style={{ display: 'flex', alignItems: 'center', gap: 8, marginBottom: 6 }}>
                      <Avatar name={m.name} size="sm" />
                      <span style={{ fontSize: 14, color: 'var(--bt-text-1)', flex: 1 }}>{firstName(m.userId)}</span>
                      {captains[ti] === m.userId && <span style={{ fontSize: 10, fontWeight: 700, padding: '1px 6px', borderRadius: 4, color: teamColors[ti], background: `${teamColors[ti]}20`, border: `1px solid ${teamColors[ti]}40` }}>CAP</span>}
                    </div>
                  ))}
                </div>
              ))}
            </div>
            <div style={{ display: 'flex', alignItems: 'center', justifyContent: 'space-between' }}>
              <Btn variant="secondary" onClick={() => { setDraftStarted(false); setDraftPicks([]); setDraftDone(false) }}>↺ Redo draft</Btn>
              <button onClick={handleCreate}
                style={{ fontSize: 14, fontWeight: 700, padding: '10px 24px', borderRadius: 8, border: 'none', cursor: 'pointer', background: 'var(--bt-accent)', color: '#0d1117', boxShadow: '0 0 20px var(--bt-accent)40' }}>
                Create Competition →
              </button>
            </div>
          </>
        )}
      </div>
    </div>
  )
}

// ── SCREEN: IdeaComparison ───────────────────────────────────────
function IdeaComparison({ navigate, showToast, tripId, viewerRole, trips, setTrips, notify, notifications, onMarkAllRead, theme, onToggleTheme }) {
  const trip = trips.find(t => t._id === (tripId || 'trip-bbmi')) || trips[1]
  const tripCompleted = getTripStatus(trip) === 'completed'
  const canEdit = !tripCompleted && (viewerRole === 'owner' || viewerRole === 'planner')
  const isOwner = viewerRole === 'owner'
  const isOwnerActive = !tripCompleted && isOwner

  const [localIdeas, setLocalIdeas] = useState(trip.ideas.filter(i => !i.archived))
  const [myVote, setMyVote] = useState(null)
  const [votes, setVotes] = useState(IDEA_VOTES)
  const [mobileIdx, setMobileIdx] = useState(0)
  const [allComments, setAllComments] = useState(IDEA_COMMENTS)
  const [openComments, setOpenComments] = useState(new Set(IDEA_COMMENTS.filter(c => c.tripId === trip._id).map(c => c.ideaId)))
  const [commentTexts, setCommentTexts] = useState({})
  const [lockedIn, setLockedIn] = useState(
    trip.lockedDestination ? (localIdeas.find(i => i.title === trip.lockedDestination?.title)?._id || null) : null
  )
  const [showReopenConfirm, setShowReopenConfirm] = useState(false)
  const [manualDest, setManualDest] = useState('')
  const [showAddIdea, setShowAddIdea] = useState(false)
  const [showLockConfirm, setShowLockConfirm] = useState(false)
  const [ideaDraft, setIdeaDraft] = useState({ title: '', description: '', pros: '', cons: '', golfCourses: '', activities: '' })
  const [aiSuggest, setAiSuggest] = useState(null)
  const [aiAccepted, setAiAccepted] = useState({})

  const fetchIdeaSuggestions = async (destination) => {
    if (!destination || destination.trim().length < 3) return
    setAiSuggest({ loading: true, error: null, result: null })
    setAiAccepted({})
    try {
      const month = new Date().toLocaleString('default', { month: 'long' })
      const prompt = `You are a golf trip planning assistant evaluating "${destination}" as a potential trip destination in ${month}. Return ONLY valid JSON, no markdown:
{
  "vibe": "2-3 sentences on what makes this destination worth considering for a group golf trip",
  "seasonNote": "One sentence on what ${month} is like there — weather, course conditions, crowds",
  "pros": ["Pro 1", "Pro 2", "Pro 3"],
  "cons": ["Con 1", "Con 2", "Con 3"],
  "golfCourses": ["Course 1", "Course 2", "Course 3", "Course 4"]
}
Pros/cons = honest reasons to consider or avoid. Course names must be real and accurate.`
      const res = await fetch('https://api.anthropic.com/v1/messages', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          model: 'claude-sonnet-4-20250514',
          max_tokens: 800,
          messages: [{ role: 'user', content: prompt }]
        })
      })
      const data = await res.json()
      const parsed = JSON.parse((data.content?.[0]?.text || '').replace(/```json|```/g, '').trim())
      setAiSuggest({ loading: false, error: null, result: parsed })
    } catch(e) {
      setAiSuggest({ loading: false, error: "Couldn't load suggestions.", result: null })
    }
  }

  const getCount = ideaId => votes.filter(v => v.tripId === trip._id && v.ideaId === ideaId).length
  const getVoters = ideaId => votes.filter(v => v.tripId === trip._id && v.ideaId === ideaId).map(v => USERS[v.userId]?.name || v.userId)
  const getComments = ideaId => allComments.filter(c => c.tripId === trip._id && c.ideaId === ideaId)
  const maxVotes = Math.max(...localIdeas.map(idea => getCount(idea._id)), 1)
  const leadingIdx = localIdeas.reduce((best, idea, i) => getCount(idea._id) > getCount(localIdeas[best]._id) ? i : best, 0)

  function IdeaCard({ idx }) {
    const idea = localIdeas[idx]
    if (!idea) return null
    const ideaId      = idea._id
    const count       = getCount(ideaId)
    const voters      = getVoters(ideaId)
    const isMyVote    = myVote === ideaId
    const isLeading   = count === maxVotes && count > 0
    const isLocked    = lockedIn === ideaId
    const totalVoters = trip.attendees.length

    const [editingPros, setEditingPros] = useState(false)
    const [editingCons, setEditingCons] = useState(false)
    const [newPro, setNewPro] = useState('')
    const [newCon, setNewCon] = useState('')

    const removePro = (i) => setLocalIdeas(ids => ids.map((d,di) => di!==idx?d:{...d,pros:d.pros.filter((_,pi)=>pi!==i)}))
    const removeCon = (i) => setLocalIdeas(ids => ids.map((d,di) => di!==idx?d:{...d,cons:d.cons.filter((_,ci)=>ci!==i)}))
    const addPro = () => { const v=newPro.trim(); if(!v)return; setLocalIdeas(ids=>ids.map((d,di)=>di!==idx?d:{...d,pros:[...(d.pros||[]),v]})); setNewPro('') }
    const addCon = () => { const v=newCon.trim(); if(!v)return; setLocalIdeas(ids=>ids.map((d,di)=>di!==idx?d:{...d,cons:[...(d.cons||[]),v]})); setNewCon('') }
    const tagBase = { fontSize: 12, padding: '3px 10px', borderRadius: 9999, display: 'inline-flex', alignItems: 'center', gap: 5 }

    return (
      <div style={{ display: 'flex', flexDirection: 'column', borderRadius: 14, overflow: 'hidden', background: 'var(--bt-card)', border: `2px solid ${isLocked ? 'var(--bt-accent)' : isMyVote ? 'var(--bt-accent)80' : 'var(--bt-border)'}`, transition: 'border-color .2s', maxWidth: 600 }}>

        {isLocked && (
          <div style={{ padding: '7px 16px', background: 'var(--bt-accent)', display: 'flex', alignItems: 'center', gap: 7 }}>
            <Ic n="Check" size={14} color="#0d1117" sw={2.5} />
            <span style={{ fontSize: 12, fontWeight: 800, color: '#0d1117', letterSpacing: '.04em' }}>DESTINATION LOCKED IN</span>
          </div>
        )}

        {/* ── Hero with embedded vote bar ── */}
        <div style={{ position: 'relative', flexShrink: 0, height: 170 }}>
          {idea.imageUrl
            ? <div style={{ position: 'absolute', inset: 0, background: `url(${idea.imageUrl}) center/cover` }} />
            : <div style={{ position: 'absolute', inset: 0, background: 'linear-gradient(135deg, #0f2027, #203a43, #2c5364)' }} />
          }
          <div style={{ position: 'absolute', inset: 0, background: 'linear-gradient(to bottom, rgba(0,0,0,.1) 15%, rgba(0,0,0,.88))' }} />

          {/* Status badges */}
          <div style={{ position: 'absolute', top: 10, right: 10, display: 'flex', gap: 6 }}>
            {isMyVote && (
              <span style={{ fontSize: 11, fontWeight: 700, padding: '2px 8px', borderRadius: 9999, background: 'var(--bt-tag-bg)', color: 'var(--bt-accent)', border: '1px solid var(--bt-accent)40', display: 'flex', alignItems: 'center', gap: 4 }}>
                <Ic n="Check" size={11} color="var(--bt-accent)" /> Picked
              </span>
            )}
          </div>

          {/* Title + location + voter avatars */}
          <div style={{ position: 'absolute', bottom: 0, left: 0, right: 0, padding: '0 14px 12px' }}>
            {/* Voter avatars — social proof */}
            {voters.length > 0 && (
              <div style={{ display: 'flex', alignItems: 'center', gap: 7, marginBottom: 8 }}>
                <div style={{ display: 'flex' }}>
                  {voters.slice(0, 5).map((v, i) => (
                    <div key={i} style={{ marginLeft: i > 0 ? -8 : 0, zIndex: 5 - i, borderRadius: '50%', border: '2px solid rgba(0,0,0,.5)' }}>
                      <Avatar name={v} size="sm" />
                    </div>
                  ))}
                </div>
                <span style={{ fontSize: 11, fontWeight: 600, color: 'rgba(255,255,255,.8)' }}>
                  {voters.length > 3
                    ? `${voters.slice(0,2).join(', ')} +${voters.length - 2}`
                    : voters.join(', ')}
                </span>
              </div>
            )}
            <div style={{ fontWeight: 700, color: '#fff', fontSize: 20, marginBottom: 2, lineHeight: 1.2 }}>{idea.title}</div>
            {idea.location && idea.location !== idea.title && (
              <div style={{ fontSize: 12, color: 'rgba(255,255,255,.65)', display: 'flex', alignItems: 'center', gap: 4 }}>
                <Ic n="MapPin" size={11} color="rgba(255,255,255,.65)" /> {idea.location}
              </div>
            )}
          </div>
        </div>

        <div style={{ display: 'flex', flexDirection: 'column', flex: 1, padding: '16px 14px', gap: 14 }}>

          {/* Description — proposer's free-form notes */}
          {(idea.description || canEdit) && (() => {
            const [editingDesc, setEditingDesc] = useState(false)
            const [descDraft, setDescDraft] = useState(idea.description || '')
            return (
              <div>
                {editingDesc ? (
                  <div>
                    <textarea value={descDraft} onChange={e => setDescDraft(e.target.value)}
                      rows={3} autoFocus
                      placeholder="Why this destination? What's the pitch to the group..."
                      style={{ width: '100%', fontSize: 13, lineHeight: 1.65, padding: '8px 10px', borderRadius: 8, background: 'var(--bt-base)', border: '1px solid var(--bt-accent)60', color: 'var(--bt-text-1)', outline: 'none', resize: 'vertical', boxSizing: 'border-box' }} />
                    <div style={{ display: 'flex', gap: 8, marginTop: 6 }}>
                      <button onClick={() => { setLocalIdeas(ids => ids.map((d,di) => di!==idx?d:{...d,description:descDraft})); setEditingDesc(false) }}
                        style={{ fontSize: 12, fontWeight: 700, padding: '5px 12px', borderRadius: 6, border: 'none', cursor: 'pointer', background: 'var(--bt-accent)', color: '#0d1117' }}>Save</button>
                      <button onClick={() => { setDescDraft(idea.description||''); setEditingDesc(false) }}
                        style={{ fontSize: 12, padding: '5px 10px', borderRadius: 6, border: '1px solid var(--bt-border)', cursor: 'pointer', background: 'transparent', color: 'var(--bt-text-3)' }}>Cancel</button>
                    </div>
                  </div>
                ) : idea.description ? (
                  <div style={{ position: 'relative' }}>
                    <p style={{ fontSize: 13, lineHeight: 1.7, color: 'var(--bt-text-2)', margin: 0, paddingRight: canEdit ? 24 : 0 }}>{idea.description}</p>
                    {canEdit && (
                      <button onClick={() => { setDescDraft(idea.description||''); setEditingDesc(true) }}
                        style={{ position: 'absolute', top: 0, right: 0, background: 'none', border: 'none', cursor: 'pointer', padding: 2 }}>
                        <Ic n="Edit2" size={13} color="var(--bt-text-3)" />
                      </button>
                    )}
                  </div>
                ) : canEdit ? (
                  <button onClick={() => setEditingDesc(true)}
                    style={{ width: '100%', padding: '9px 12px', borderRadius: 8, border: '1px dashed var(--bt-border)', background: 'transparent', color: 'var(--bt-text-3)', fontSize: 12, cursor: 'pointer', textAlign: 'left', display: 'flex', alignItems: 'center', gap: 6 }}>
                    <Ic n="Plus" size={13} color="var(--bt-text-3)" /> Add a description — what's the pitch?
                  </button>
                ) : null}
              </div>
            )
          })()}


          {idea.golfCourses?.length > 0 && (
            <div>
              <div style={{ fontSize: 11, fontWeight: 700, textTransform: 'uppercase', letterSpacing: '.07em', color: 'var(--bt-text-3)', marginBottom: 8, display: 'flex', alignItems: 'center', gap: 5 }}>
                <Ic n="Flag" size={12} color="var(--bt-text-3)" /> Courses
              </div>
              <div style={{ display: 'flex', flexWrap: 'wrap', gap: 5 }}>
                {idea.golfCourses.map((c,i) => (
                  <span key={i} style={{ ...tagBase, background: 'var(--bt-tag-bg)', color: 'var(--bt-accent)', border: '1px solid var(--bt-accent)25' }}>
                    {c}
                    {canEdit && <button onClick={() => setLocalIdeas(ids=>ids.map((d,di)=>di!==idx?d:{...d,golfCourses:d.golfCourses.filter((_,j)=>j!==i)}))} style={{ background:'none',border:'none',cursor:'pointer',padding:0,lineHeight:1,opacity:.7 }}><Ic n="X" size={11} color="var(--bt-accent)" /></button>}
                  </span>
                ))}
              </div>
            </div>
          )}

          {idea.activities?.length > 0 && (
            <div>
              <div style={{ fontSize: 11, fontWeight: 700, textTransform: 'uppercase', letterSpacing: '.07em', color: 'var(--bt-text-3)', marginBottom: 8, display: 'flex', alignItems: 'center', gap: 5 }}>
                <Ic n="Target" size={12} color="var(--bt-text-3)" /> Activities
              </div>
              <div style={{ display: 'flex', flexWrap: 'wrap', gap: 5 }}>
                {idea.activities.map((a,i) => (
                  <span key={i} style={{ ...tagBase, background: 'var(--bt-card)', color: 'var(--bt-text-2)', border: '1px solid var(--bt-border)' }}>
                    {a}
                    {canEdit && <button onClick={() => setLocalIdeas(ids=>ids.map((d,di)=>di!==idx?d:{...d,activities:d.activities.filter((_,j)=>j!==i)}))} style={{ background:'none',border:'none',cursor:'pointer',padding:0,lineHeight:1,opacity:.6 }}><Ic n="X" size={11} color="var(--bt-text-3)" /></button>}
                  </span>
                ))}
              </div>
            </div>
          )}

          {(idea.pros?.length > 0 || idea.cons?.length > 0 || canEdit) && (
            <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: 12, paddingTop: (idea.golfCourses?.length||idea.activities?.length) ? 4 : 0, borderTop: (idea.golfCourses?.length||idea.activities?.length) ? '1px solid var(--bt-border)' : 'none' }}>
              <div>
                <div style={{ fontSize: 11, fontWeight: 700, textTransform: 'uppercase', letterSpacing: '.07em', marginBottom: 7, color: 'var(--bt-accent)', display: 'flex', alignItems: 'center', justifyContent: 'space-between' }}>
                  <span style={{ display: 'flex', alignItems: 'center', gap: 4 }}><Ic n="Plus" size={11} color="var(--bt-accent)" sw={2.5} /> Pros</span>
                  {canEdit && <button onClick={() => setEditingPros(e=>!e)} style={{ background:'none',border:'none',cursor:'pointer',padding:0 }}><Ic n={editingPros?'Check':'Edit2'} size={12} color="var(--bt-text-3)" /></button>}
                </div>
                <div style={{ display: 'flex', flexDirection: 'column', gap: 5 }}>
                  {(idea.pros||[]).map((p,i) => (
                    <div key={i} style={{ fontSize: 12, lineHeight: 1.5, display: 'flex', alignItems: 'flex-start', gap: 6, color: 'var(--bt-text-2)' }}>
                      <span style={{ flexShrink:0, fontWeight:700, color:'var(--bt-accent)', marginTop:1 }}>+</span>
                      <span style={{ flex:1 }}>{p}</span>
                      {editingPros && <button onClick={() => removePro(i)} style={{ background:'none',border:'none',cursor:'pointer',padding:0,flexShrink:0 }}><Ic n="X" size={12} color="var(--bt-danger)" /></button>}
                    </div>
                  ))}
                  {editingPros && (
                    <div style={{ display:'flex', gap:5, marginTop:2 }}>
                      <input value={newPro} onChange={e=>setNewPro(e.target.value)} onKeyDown={e=>e.key==='Enter'&&addPro()}
                        placeholder="Add pro…" style={{ flex:1, fontSize:11, padding:'4px 7px', borderRadius:5, background:'var(--bt-input)', border:'1px solid var(--bt-accent)50', color:'var(--bt-text-1)', outline:'none' }} />
                      <button onClick={addPro} style={{ padding:'4px 7px', borderRadius:5, background:'var(--bt-tag-bg)', border:'none', cursor:'pointer' }}><Ic n="Plus" size={12} color="var(--bt-accent)" sw={2.5} /></button>
                    </div>
                  )}
                </div>
              </div>
              <div>
                <div style={{ fontSize: 11, fontWeight: 700, textTransform: 'uppercase', letterSpacing: '.07em', marginBottom: 7, color: 'var(--bt-danger)', display: 'flex', alignItems: 'center', justifyContent: 'space-between' }}>
                  <span style={{ display: 'flex', alignItems: 'center', gap: 4 }}><Ic n="X" size={11} color="var(--bt-danger)" sw={2.5} /> Cons</span>
                  {canEdit && <button onClick={() => setEditingCons(e=>!e)} style={{ background:'none',border:'none',cursor:'pointer',padding:0 }}><Ic n={editingCons?'Check':'Edit2'} size={12} color="var(--bt-text-3)" /></button>}
                </div>
                <div style={{ display: 'flex', flexDirection: 'column', gap: 5 }}>
                  {(idea.cons||[]).map((c,i) => (
                    <div key={i} style={{ fontSize: 12, lineHeight: 1.5, display: 'flex', alignItems: 'flex-start', gap: 6, color: 'var(--bt-text-2)' }}>
                      <span style={{ flexShrink:0, fontWeight:700, color:'var(--bt-danger)', marginTop:1 }}>−</span>
                      <span style={{ flex:1 }}>{c}</span>
                      {editingCons && <button onClick={() => removeCon(i)} style={{ background:'none',border:'none',cursor:'pointer',padding:0,flexShrink:0 }}><Ic n="X" size={12} color="var(--bt-danger)" /></button>}
                    </div>
                  ))}
                  {editingCons && (
                    <div style={{ display:'flex', gap:5, marginTop:2 }}>
                      <input value={newCon} onChange={e=>setNewCon(e.target.value)} onKeyDown={e=>e.key==='Enter'&&addCon()}
                        placeholder="Add con…" style={{ flex:1, fontSize:11, padding:'4px 7px', borderRadius:5, background:'var(--bt-input)', border:'1px solid var(--bt-danger)50', color:'var(--bt-text-1)', outline:'none' }} />
                      <button onClick={addCon} style={{ padding:'4px 7px', borderRadius:5, background:'#2d0f0f', border:'none', cursor:'pointer' }}><Ic n="Plus" size={12} color="var(--bt-danger)" sw={2.5} /></button>
                    </div>
                  )}
                </div>
              </div>
            </div>
          )}

          <div style={{ borderTop: '1px solid var(--bt-border)', paddingTop: 10 }}>
            <button onClick={() => setOpenComments(prev => { const n=new Set(prev); n.has(ideaId)?n.delete(ideaId):n.add(ideaId); return n })}
              style={{ background:'none', border:'none', cursor:'pointer', color:'var(--bt-text-3)', fontSize:12, display:'flex', alignItems:'center', gap:6, padding:'2px 0' }}>
              <Ic n="MessageCircle" size={14} color="var(--bt-text-3)" />
              {getComments(ideaId).length > 0 ? `${getComments(ideaId).length} comment${getComments(ideaId).length!==1?'s':''}` : 'Comments'}
              <Ic n={openComments.has(ideaId) ? 'ChevronUp' : 'ChevronDown'} size={12} color="var(--bt-text-3)" />
            </button>
            {openComments.has(ideaId) && (
              <div style={{ marginTop: 10, display: 'flex', flexDirection: 'column', gap: 8 }}>
                {getComments(ideaId).map(c => (
                  <div key={c._id} style={{ display: 'flex', gap: 8, alignItems: 'flex-start' }}>
                    <Avatar name={USERS[c.userId]?.name || c.userId} size="sm" />
                    <div style={{ flex:1, background:'var(--bt-base)', borderRadius:8, padding:'6px 10px' }}>
                      <div style={{ display:'flex', alignItems:'baseline', gap:6, marginBottom:2 }}>
                        <span style={{ fontSize:11, fontWeight:700, color:'var(--bt-accent)' }}>{USERS[c.userId]?.nickname || c.userId}</span>
                        <span style={{ fontSize:10, color:'var(--bt-text-3)' }}>{c.createdAt ? new Date(c.createdAt).toLocaleDateString('en-US',{month:'short',day:'numeric'}) + ' · ' + new Date(c.createdAt).toLocaleTimeString('en-US',{hour:'numeric',minute:'2-digit'}) : ''}</span>
                      </div>
                      <span style={{ fontSize:12, color:'var(--bt-text-1)' }}>{c.text}</span>
                    </div>
                  </div>
                ))}
                {/* Comment input with send button */}
                <div style={{ display: 'flex', gap: 8, alignItems: 'center' }}>
                  <Avatar name={CURRENT_USER.firstName} size="sm" />
                  <input value={commentTexts[ideaId]||''} onChange={e => setCommentTexts(t=>({...t,[ideaId]:e.target.value}))}
                    onKeyDown={e => {
                      if(e.key!=='Enter') return
                      const text = commentTexts[ideaId]?.trim()
                      if(!text) return
                      setAllComments(c=>[...c,{_id:`ic-${Date.now()}`,tripId:trip._id,ideaId,userId:CURRENT_USER._id,text,createdAt:new Date()}])
                      setCommentTexts(t=>({...t,[ideaId]:''}))
                    }}
                    placeholder="Write a comment…" style={{ flex:1, fontSize:12, padding:'6px 10px', borderRadius:6, outline:'none', background:'var(--bt-input)', border:'1px solid var(--bt-border-input)', color:'var(--bt-text-1)' }}
                    onFocus={e=>e.target.style.borderColor='var(--bt-accent)'}
                    onBlur={e=>e.target.style.borderColor='var(--bt-border-input)'} />
                  <button
                    onClick={() => {
                      const text = commentTexts[ideaId]?.trim()
                      if(!text) return
                      setAllComments(c=>[...c,{_id:`ic-${Date.now()}`,tripId:trip._id,ideaId,userId:CURRENT_USER._id,text,createdAt:new Date()}])
                      setCommentTexts(t=>({...t,[ideaId]:''}))
                    }}
                    style={{ flexShrink:0, padding:'6px 12px', borderRadius:6, border:'none', cursor:'pointer', background:'var(--bt-accent)', color:'#0d1117', fontSize:12, fontWeight:700 }}>
                    Send
                  </button>
                </div>
              </div>
            )}
          </div>

          {localIdeas.length >= 2 && (
            <div style={{ display: 'flex', gap: 8 }}>
              {lockedIn === null && (
                <button onClick={() => { setMyVote(ideaId); setVotes(v => { const f=v.filter(x=>!(x.tripId===trip._id&&x.userId===CURRENT_USER._id)); return [...f,{tripId:trip._id,ideaId,userId:CURRENT_USER._id,createdAt:new Date()}] }); showToast(`Voted for ${idea.title}!`) }}
                  style={{ flex:1, padding:'10px', borderRadius:8, fontSize:14, fontWeight:700, cursor:'pointer', border:'none', background:isMyVote?'var(--bt-accent)':'var(--bt-tag-bg)', color:isMyVote?'#0d1117':'var(--bt-accent)', transition:'all .2s', display:'flex', alignItems:'center', justifyContent:'center', gap:7 }}>
                  <Ic n={isMyVote?'Check':'ThumbsUp'} size={15} color={isMyVote?'#0d1117':'var(--bt-accent)'} />
                  {isMyVote ? 'Your pick' : 'Vote for this'}
                </button>
              )}
              {isOwnerActive && lockedIn === null && (
                <button onClick={() => setShowLockConfirm(ideaId)}
