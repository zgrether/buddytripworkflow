                  <Ic n="Lock" size={14} color="var(--bt-accent)" /> Lock In
                </button>
              )}
              {isOwnerActive && lockedIn === null && (
                <button
                  onClick={() => {
                    if(!window.confirm(`Remove "${idea.title}" from the list?`)) return
                    setLocalIdeas(ids => ids.filter(i => i._id !== ideaId))
                    if(myVote === ideaId) setMyVote(null)
                    setVotes(v => v.filter(x => !(x.tripId===trip._id && x.ideaId===ideaId)))
                    showToast(`"${idea.title}" removed`)
                  }}
                  style={{ padding:'10px 12px', borderRadius:8, fontSize:13, cursor:'pointer', border:'1px solid var(--bt-border)', background:'transparent', color:'var(--bt-text-3)', display:'flex', alignItems:'center', gap:6 }}
                  onMouseEnter={e=>{e.currentTarget.style.borderColor='var(--bt-danger)';e.currentTarget.style.color='var(--bt-danger)'}}
                  onMouseLeave={e=>{e.currentTarget.style.borderColor='var(--bt-border)';e.currentTarget.style.color='var(--bt-text-3)'}}>
                  <Ic n="Trash2" size={14} color="currentColor" />
                </button>
              )}
              {lockedIn !== null && lockedIn !== idx && (
                <div style={{ flex:1, padding:'10px', borderRadius:8, fontSize:13, color:'var(--bt-text-3)', background:'var(--bt-card)', border:'1px solid var(--bt-border)', textAlign:'center' }}>
                  Not selected
                </div>
              )}
            </div>
          )}

          {localIdeas.length < 2 && canEdit && (
            <button onClick={() => setShowAddIdea(true)}
              style={{ width:'100%', padding:'10px', borderRadius:8, fontSize:13, fontWeight:700, cursor:'pointer', background:'transparent', border:'1px dashed var(--bt-accent)50', color:'var(--bt-accent)', display:'flex', alignItems:'center', justifyContent:'center', gap:7 }}>
              <Ic n="Plus" size={14} color="var(--bt-accent)" sw={2.5} /> Add another idea to start the vote
            </button>
          )}
        </div>
      </div>
    )
  }

  const inputStyle = { fontSize: 13, padding: '8px 10px', borderRadius: 7, background: 'var(--bt-input)', border: '1px solid var(--bt-border-input)', color: 'var(--bt-text-1)', outline: 'none', width: '100%' }

  return (
    <div style={{ minHeight: '100vh', paddingBottom: 96, background: 'var(--bt-base)' }}>
      <TopNav navigate={navigate} notifications={notifications} onMarkAllRead={onMarkAllRead} theme={theme} onToggleTheme={onToggleTheme} />

      {/* ── Constrained header ── */}
      <div style={{ maxWidth: 680, margin: '0 auto', padding: '24px 16px 0' }}>
        <Breadcrumb items={[{ label: 'Trips', screen: 'trips' }, { label: trip.title, screen: 'trip-detail', extra: { tripId: trip._id } }, { label: 'Where to?' }]} navigate={navigate} />

        <div style={{ display: 'flex', alignItems: 'flex-start', justifyContent: 'space-between', marginBottom: 16, gap: 12, flexWrap: 'wrap' }}>
          <div>
            <h1 style={{ fontSize: 22, fontWeight: 700, marginBottom: 2, color: 'var(--bt-text-1)', display:'flex', alignItems:'center', gap:8 }}>
              <Ic n="Map" size={20} color="var(--bt-accent)" /> Where should we go?
            </h1>
            <p style={{ fontSize: 13, color: 'var(--bt-text-3)', margin: 0 }}>{trip.title}</p>
          </div>
          <div style={{ display: 'flex', gap: 8 }}>
            {canEdit && lockedIn === null && (
              <button onClick={() => setShowAddIdea(true)}
                style={{ display:'flex', alignItems:'center', gap:6, fontSize: 13, fontWeight: 700, padding: '8px 16px', borderRadius: 8, cursor: 'pointer', background: 'var(--bt-tag-bg)', border: '1px solid var(--bt-accent)50', color: 'var(--bt-accent)' }}>
                <Ic n="Plus" size={14} color="var(--bt-accent)" sw={2.5} /> Add Idea
              </button>
            )}
            {isOwnerActive && lockedIn !== null && (
              <button onClick={() => setShowReopenConfirm(true)}
                style={{ fontSize: 13, fontWeight: 600, padding: '8px 16px', borderRadius: 8, cursor: 'pointer', background: 'transparent', border: '1px solid var(--bt-border)', color: 'var(--bt-text-3)' }}
                onMouseEnter={e => { e.currentTarget.style.borderColor = 'var(--bt-accent)'; e.currentTarget.style.color = 'var(--bt-accent)' }}
                onMouseLeave={e => { e.currentTarget.style.borderColor = 'var(--bt-border)'; e.currentTarget.style.color = 'var(--bt-text-3)' }}>
                Change Destination
              </button>
            )}
            <Btn variant="secondary" onClick={() => navigate('trip-detail', { tripId: trip._id })}><Ic n="ArrowLeft" size={14} color="currentColor" style={{marginRight:5}} />Back</Btn>
          </div>
        </div>

        {/* ── Horse-race vote bar (2+ ideas, not locked) ── */}
        {localIdeas.length >= 2 && lockedIn === null && (() => {
          const tripVotes = votes.filter(v => v.tripId === trip._id)
          const voted = tripVotes.length
          const total = trip.attendees.length
          const SEGMENT_COLORS = ['#00d4aa', '#3b82f6', '#f59e0b', '#a78bfa', '#f472b6']
          return (
            <div style={{ marginBottom: 20 }}>
              {/* Segment labels */}
              <div style={{ display: 'flex', gap: 4, marginBottom: 6, flexWrap: 'wrap' }}>
                {localIdeas.map((idea, i) => {
                  const c = getCount(i)
                  return (
                    <div key={i} style={{ display: 'flex', alignItems: 'center', gap: 5, marginRight: 8 }}>
                      <div style={{ width: 9, height: 9, borderRadius: 2, background: SEGMENT_COLORS[i % SEGMENT_COLORS.length], flexShrink: 0 }} />
                      <span style={{ fontSize: 12, color: c > 0 ? 'var(--bt-text-1)' : 'var(--bt-text-3)', fontWeight: c === maxVotes && c > 0 ? 700 : 400 }}>
                        {idea.title.split(',')[0]}
                      </span>
                      <span style={{ fontSize: 12, fontWeight: 700, color: SEGMENT_COLORS[i % SEGMENT_COLORS.length], opacity: c > 0 ? 1 : 0.3 }}>
                        {c}
                      </span>
                    </div>
                  )
                })}
                <div style={{ marginLeft: 'auto', fontSize: 12, color: 'var(--bt-text-3)', whiteSpace: 'nowrap' }}>
                  {voted}/{total} voted
                </div>
              </div>
              {/* Bar track */}
              <div style={{ height: 8, borderRadius: 9999, background: 'var(--bt-card)', border: '1px solid var(--bt-border)', overflow: 'hidden', display: 'flex' }}>
                {voted === 0
                  ? <div style={{ flex: 1, background: 'transparent' }} />
                  : localIdeas.map((_, i) => {
                      const c = getCount(i)
                      if (c === 0) return null
                      return (
                        <div key={i} style={{
                          width: `${(c / total) * 100}%`,
                          background: SEGMENT_COLORS[i % SEGMENT_COLORS.length],
                          transition: 'width .5s ease',
                          borderRight: '2px solid var(--bt-base)',
                        }} />
                      )
                    })
                }
                {/* Unvoted remainder */}
                {voted < total && (
                  <div style={{ flex: 1, background: 'transparent' }} />
                )}
              </div>
            </div>
          )
        })()}

        {/* Locked destination callout */}
        {lockedIn !== null && (
          <div style={{ marginBottom: 20, padding: '12px 16px', borderRadius: 10, background: 'var(--bt-tag-bg)', border: '1px solid var(--bt-accent)40', display: 'flex', alignItems: 'center', gap: 10 }}>
            <Ic n="CheckCircle" size={16} color="var(--bt-accent)" />
            <span style={{ fontSize: 13, fontWeight: 700, color: 'var(--bt-accent)' }}>Locked in: {localIdeas[lockedIn]?.title}</span>
          </div>
        )}

        {/* Solo — seeding mode banner */}
        {localIdeas.length === 1 && lockedIn === null && (
          <div style={{ marginBottom: 20, padding: '14px 16px', borderRadius: 12, background: 'var(--bt-card)', border: '1px solid var(--bt-border)', display: 'flex', alignItems: 'flex-start', gap: 12 }}>
            <Ic n="MessageCircle" size={20} color="var(--bt-text-3)" style={{flexShrink:0, marginTop:1}} />
            <div>
              <div style={{ fontSize: 13, fontWeight: 700, color: 'var(--bt-text-1)', marginBottom: 3 }}>Just getting started</div>
              <div style={{ fontSize: 12, color: 'var(--bt-text-2)', lineHeight: 1.6 }}>
                One idea on the table. Voting opens once there's something to compare — throw out more options or let your planners weigh in.
              </div>
            </div>
          </div>
        )}
      </div>

      {/* ── Responsive idea grid — auto-fit, cards 480–600px, grow to fill ── */}
      {localIdeas.length >= 1 && (
        <div style={{ width: '100%', padding: '0 20px 28px', boxSizing: 'border-box' }}>
          <div style={{
            display: 'grid',
            gridTemplateColumns: 'repeat(auto-fit, minmax(min(480px, 100%), 600px))',
            justifyContent: 'center',
            gap: 16,
            alignItems: 'start',
          }}>
            {localIdeas.map((_, idx) => <IdeaCard key={idx} idx={idx} />)}
          </div>
        </div>
      )}


      {/* ── Constrained remainder (sheets rendered here) ── */}
      <div style={{ maxWidth: 680, margin: '0 auto', padding: '0 16px' }}>


        {/* ── ADD IDEA SHEET ── */}
        {showAddIdea && (
          <div style={{ position:'fixed', inset:0, zIndex:200, background:'#000b', display:'flex', alignItems:'flex-end', justifyContent:'center' }}
            onClick={() => { setShowAddIdea(false); setAiSuggest(null) }}>
            <div onClick={e=>e.stopPropagation()} style={{ width:'100%', maxWidth:600, maxHeight:'92vh', overflowY:'auto', borderRadius:'16px 16px 0 0', background:'var(--bt-card)', border:'1px solid var(--bt-border)', padding:'24px 20px 44px' }}>

              <div style={{ display:'flex', alignItems:'center', justifyContent:'space-between', marginBottom:20 }}>
                <div style={{ display:'flex', alignItems:'center', gap:8 }}>
                  <Ic n="Map" size={18} color="var(--bt-accent)" />
                  <h2 style={{ fontSize:17, fontWeight:700, color:'var(--bt-text-1)', margin:0 }}>Add a Destination Idea</h2>
                </div>
                <button onClick={() => { setShowAddIdea(false); setAiSuggest(null) }} style={{ background:'none', border:'none', cursor:'pointer', padding:4 }}>
                  <Ic n="X" size={18} color="var(--bt-text-3)" />
                </button>
              </div>

              {/* ── Destination field + Research CTA ── */}
              <div style={{ marginBottom: aiSuggest ? 16 : 20 }}>
                <label style={{ fontSize:11, fontWeight:700, textTransform:'uppercase', letterSpacing:'.07em', color:'var(--bt-text-3)', display:'block', marginBottom:6 }}>
                  Destination <span style={{ color:'var(--bt-danger)' }}>*</span>
                </label>
                <div style={{ display:'flex', gap:8 }}>
                  <input value={ideaDraft.title}
                    onChange={e => { setIdeaDraft(d=>({...d,title:e.target.value})); setAiSuggest(null) }}
                    placeholder="e.g. Bandon Dunes, OR"
                    style={{ flex:1, fontSize:13, padding:'9px 12px', borderRadius:8, background:'var(--bt-input)', border:'1px solid var(--bt-border-input)', color:'var(--bt-text-1)', outline:'none' }}
                    onFocus={e=>e.target.style.borderColor='var(--bt-accent)'}
                    onBlur={e=>e.target.style.borderColor='var(--bt-border-input)'} />
                  <button onClick={() => fetchIdeaSuggestions(ideaDraft.title)}
                    disabled={ideaDraft.title.trim().length < 3}
                    style={{ display:'flex', alignItems:'center', gap:6, padding:'9px 14px', borderRadius:8, fontSize:13, fontWeight:700, cursor:ideaDraft.title.trim().length>=3?'pointer':'default', whiteSpace:'nowrap', transition:'all .15s',
                      background: ideaDraft.title.trim().length>=3 ? 'var(--bt-tag-bg)' : 'transparent',
                      border: `1px solid ${ideaDraft.title.trim().length>=3 ? 'var(--bt-accent)50' : 'var(--bt-border)'}`,
                      color: ideaDraft.title.trim().length>=3 ? 'var(--bt-accent)' : 'var(--bt-text-3)' }}>
                    <Ic n="Sparkles" size={14} color={ideaDraft.title.trim().length>=3 ? 'var(--bt-accent)' : 'var(--bt-text-3)'} />
                    Research
                  </button>
                </div>
                {!aiSuggest && ideaDraft.title.trim().length >= 3 && (
                  <div style={{ fontSize:11, color:'var(--bt-text-3)', marginTop:6, display:'flex', alignItems:'center', gap:5 }}>
                    <Ic n="Sparkles" size={11} color="var(--bt-accent)" />
                    <span>Hit <strong style={{ color:'var(--bt-accent)' }}>Research</strong> and we'll pull courses, activities, pros &amp; cons — you can edit before adding</span>
                  </div>
                )}
              </div>

              {/* ── AI Research panel ── */}
              {aiSuggest && (
                <div style={{ marginBottom:20, borderRadius:12, border:'1px solid var(--bt-accent)30', overflow:'hidden', background:'var(--bt-base)' }}>
                  {aiSuggest.loading && (
                    <div style={{ padding:'24px', textAlign:'center' }}>
                      <div style={{ display:'flex', alignItems:'center', justifyContent:'center', gap:10, color:'var(--bt-text-2)', fontSize:13 }}>
                        <Ic n="Loader2" size={18} color="var(--bt-accent)" style={{ animation:'spin 1s linear infinite' }} />
                        Researching {ideaDraft.title}…
                      </div>
                      <div style={{ fontSize:11, color:'var(--bt-text-3)', marginTop:6 }}>Courses, activities, honest pros &amp; cons</div>
                    </div>
                  )}
                  {aiSuggest.error && (
                    <div style={{ padding:'16px', textAlign:'center', fontSize:13, color:'var(--bt-danger)' }}>
                      {aiSuggest.error}
                      <button onClick={() => fetchIdeaSuggestions(ideaDraft.title)} style={{ display:'block', margin:'8px auto 0', fontSize:12, color:'var(--bt-accent)', background:'none', border:'none', cursor:'pointer' }}>Try again</button>
                    </div>
                  )}
                  {aiSuggest.result && !aiSuggest.loading && (() => {
                    const r = aiSuggest.result
                    return (
                      <div style={{ padding:'16px', display:'flex', flexDirection:'column', gap:14 }}>
                        <div style={{ display:'flex', alignItems:'center', gap:7 }}>
                          <Ic n="Sparkles" size={13} color="var(--bt-accent)" />
                          <span style={{ fontSize:11, fontWeight:700, textTransform:'uppercase', letterSpacing:'.06em', color:'var(--bt-accent)' }}>AI Research · {ideaDraft.title}</span>
                        </div>

                        {(r.vibe || r.seasonNote) && (
                          <div>
                            {r.vibe && <p style={{ fontSize:13, lineHeight:1.65, color:'var(--bt-text-1)', margin:'0 0 6px' }}>{r.vibe}</p>}
                            {r.seasonNote && (
                              <div style={{ fontSize:12, color:'var(--bt-text-3)', display:'flex', alignItems:'flex-start', gap:6 }}>
                                <Ic n="Sun" size={12} color="var(--bt-text-3)" style={{ marginTop:1, flexShrink:0 }} />
                                {r.seasonNote}
                              </div>
                            )}
                          </div>
                        )}

                        {r.pros?.length > 0 && (
                          <div>
                            <div style={{ fontSize:11, fontWeight:700, color:'var(--bt-accent)', marginBottom:7, display:'flex', alignItems:'center', gap:5 }}>
                              <Ic n="Plus" size={11} color="var(--bt-accent)" sw={2.5} />
                              Suggested Pros
                              <span style={{ fontWeight:400, fontSize:10, color:'var(--bt-text-3)' }}>— tap to add</span>
                            </div>
                            <div style={{ display:'flex', flexWrap:'wrap', gap:5 }}>
                              {r.pros.map((p,i) => {
                                const active = ideaDraft.pros.split(',').map(s=>s.trim()).filter(Boolean).includes(p)
                                return (
                                  <button key={i} onClick={() => setIdeaDraft(d => {
                                    const arr = d.pros.split(',').map(s=>s.trim()).filter(Boolean)
                                    const next = active ? arr.filter(x=>x!==p) : [...arr,p]
                                    return {...d, pros: next.join(', ')}
                                  })} style={{ fontSize:12, padding:'4px 11px', borderRadius:9999, cursor:'pointer', transition:'all .15s',
                                    background: active ? 'var(--bt-accent)' : 'transparent',
                                    color: active ? '#0d1117' : 'var(--bt-accent)',
                                    border: '1px solid var(--bt-accent)50',
                                    display:'flex', alignItems:'center', gap:4 }}>
                                    <Ic n={active?'Check':'Plus'} size={10} color={active?'#0d1117':'var(--bt-accent)'} sw={2.5} /> {p}

                              })}

                          </div>

                        {r.cons?.length > 0 && (
                          <div>
                            <div style={{ fontSize:11, fontWeight:700, color:'var(--bt-danger)', marginBottom:7, display:'flex', alignItems:'center', gap:5 }}>
                              <Ic n="X" size={11} color="var(--bt-danger)" sw={2.5} />
                              Suggested Cons
                              <span style={{ fontWeight:400, fontSize:10, color:'var(--bt-text-3)' }}>— tap to add</span>
                            </div>
                            <div style={{ display:'flex', flexWrap:'wrap', gap:5 }}>
                              {r.cons.map((c,i) => {
                                const active = ideaDraft.cons.split(',').map(s=>s.trim()).filter(Boolean).includes(c)
                                return (
                                  <button key={i} onClick={() => setIdeaDraft(d => {
                                    const arr = d.cons.split(',').map(s=>s.trim()).filter(Boolean)
                                    const next = active ? arr.filter(x=>x!==c) : [...arr,c]
                                    return {...d, cons: next.join(', ')}
                                  })} style={{ fontSize:12, padding:'4px 11px', borderRadius:9999, cursor:'pointer', transition:'all .15s',
                                    background: active ? '#3d1010' : 'transparent',
                                    color: 'var(--bt-danger)',
                                    border: '1px solid var(--bt-danger)40',
                                    display:'flex', alignItems:'center', gap:4 }}>
                                    <Ic n={active?'Check':'Plus'} size={10} color="var(--bt-danger)" sw={2.5} /> {c}
                                  </button>
                                )
                              })}
                            </div>
                          </div>
                        )}

                        {r.golfCourses?.length > 0 && (
                          <div>
                            <div style={{ fontSize:11, fontWeight:700, color:'var(--bt-text-3)', marginBottom:7, display:'flex', alignItems:'center', gap:5 }}>
                              <Ic n="Flag" size={11} color="var(--bt-text-3)" /> Courses nearby
                              <span style={{ fontWeight:400, fontSize:10 }}>— added automatically</span>
                            </div>

// ── HoleByHoleEntry — full hole-by-hole scorecard overlay ────────
// Par values for mock 18-hole course — used in groups tab running total display
const PARS_MOCK = [4,4,3,4,5,3,4,5,4, 4,3,5,4,4,3,5,4,4]

function HoleByHoleEntry({ group, round, event, onSubmit, onClose, onOfflineResult, readOnly = false }) {
  const { useState, useMemo } = React
  const PARS = [4,4,3,4,5,3,4,5,4, 4,3,5,4,4,3,5,4,4]
  const { teams } = event
  const teamCount = teams.length
  const groupPlayers = event.players.filter(p => group.playerIds.includes(p._id))
  const teamPlayersMap = teams.map(team => ({
    team,
    players: groupPlayers.filter(p => getTeamId(event._id, p._id) === team._id)
  }))

  // Format determines scoring mode — no toggle exposed to user
  // Scramble/Sabotage/Stableford/Stroke Play = cumulative stroke entry
  // Match Play = hole-by-hole match with winner dots
  const isScramble  = round.format?.toLowerCase() === 'scramble'
  const isSabotage  = round.format?.toLowerCase() === 'sabotage'
  const isStableford = round.format?.toLowerCase() === 'stableford'
  const isStrokePlay = round.format?.toLowerCase() === 'stroke play'
  const isStrokeFamily = isScramble || isSabotage || isStableford || isStrokePlay
  const scoringType = isStrokeFamily ? 'stroke' : 'match'
  const setScoringType = () => {} // no-op — mode is format-derived

  const initHoles = PARS.map((par, i) => ({
    holeNum: i + 1, par,
    strokes: Object.fromEntries(groupPlayers.map(p => [p._id, '']))
  }))
  const saved = HOLE_RESULTS[round._id]?.[group._id]
  const [holes, setHoles] = useState(saved ? saved.holes.map(h => ({...h, strokes: {...h.strokes}})) : initHoles)

  function setStroke(hi, playerId, val) {
    setHoles(hs => hs.map((h, i) => i !== hi ? h : { ...h, strokes: { ...h.strokes, [playerId]: val } }))
  }

  // N-team: compute per-team totals and completion status for a hole.
  // Scramble: one score per team, stored under players[0].
  // All other formats: sum all players on the team.
  function holeTeamTotals(hole) {
    const result = {}
    let complete = true
    teams.forEach(team => {
      const tp = teamPlayersMap.find(t => t.team._id === team._id).players
      if (isScramble) {
        const scorer = tp[0]
        const val = scorer ? hole.strokes[scorer._id] : ''
        const filled = val !== ''
        result[team._id] = { total: filled ? Number(val) : 0, filled }
        if (!filled) complete = false
      } else {
        const filled = tp.every(p => hole.strokes[p._id] !== '')
        const total = tp.reduce((s, p) => s + (Number(hole.strokes[p._id]) || 0), 0)
        result[team._id] = { total, filled }
        if (!filled) complete = false
      }
    })
    result.complete = complete
    return result
  }

  // N-team match state: track holes won per team
  const matchState = useMemo(() => {
    if (scoringType !== 'match') return null
    const holesWon = Object.fromEntries(teams.map(t => [t._id, 0]))
    let played = 0, deadHoles = 0
    holes.forEach(hole => {
      const totals = holeTeamTotals(hole)
      if (!totals.complete) return
      played++
      const teamTotals = teams.map(t => ({ team: t, total: totals[t._id].total }))
      const minTotal = Math.min(...teamTotals.map(tt => tt.total))
      const winners = teamTotals.filter(tt => tt.total === minTotal)
      if (winners.length === 1) {
        holesWon[winners[0].team._id]++
      } else if (winners.length === teamCount) {
        deadHoles++
      }
      // If only some teams tie for lowest, no one wins (dead)
      else { deadHoles++ }
    })
    const remaining = 18 - played
    const sorted = teams.map(t => ({ team: t, won: holesWon[t._id] })).sort((a, b) => b.won - a.won)
    const leadTeam = sorted[0].won > (sorted[1]?.won || 0) ? sorted[0].team : null
    const absUp = leadTeam ? sorted[0].won - sorted[1].won : 0
    const isDormie = !!leadTeam && absUp === remaining && remaining > 0
    const isMatchOver = !!leadTeam && absUp > remaining
    return { holesWon, deadHoles, remaining, played, leadTeam, absUp, isDormie, isMatchOver, sorted }
  }, [holes, scoringType])

  // N-team stroke totals.
  // Scramble: total = sum of players[0] score across all holes.
  // Others: total = sum of all players across all holes.
  const strokeTotals = useMemo(() => {
    const totals = {}
    teamPlayersMap.forEach(({ team, players }) => {
      if (isScramble) {
        const scorer = players[0]
        totals[team._id] = scorer ? holes.reduce((s, h) => s + (Number(h.strokes[scorer._id]) || 0), 0) : 0
      } else {
        totals[team._id] = players.reduce((sum, p) => sum + holes.reduce((s, h) => s + (Number(h.strokes[p._id]) || 0), 0), 0)
      }
    })
    return totals
  }, [holes])

  const anyScored = holes.some(h => groupPlayers.some(p => h.strokes[p._id] !== ''))

  // Carry-over pot values — one per hole. Only computed when modifiers.carryOver is true.
  const carryPots = useMemo(() => {
    if (!round.modifiers?.carryOver) return null
    const pots = []
    let carry = 1
    holes.forEach(hole => {
      pots.push(carry)
      const totals = holeTeamTotals(hole)
      if (totals.complete) {
        const teamTotals = teams.map(t => totals[t._id].total)
        const min = Math.min(...teamTotals)
        const winners = teamTotals.filter(v => v === min)
        carry = winners.length === 1 ? 1 : carry + 1  // single winner resets, tie/dead accumulates
      }
    })
    return pots
  }, [holes, round])

  // Index of the first incomplete hole (the "live" hole) — used for carry-over highlight
  const liveHoleIdx = carryPots ? holes.findIndex(h => !holeTeamTotals(h).complete) : -1

  // Moving tee box state — per-player tee box at each hole. Only computed when movingTees is active.
  const movingTees = round.modifiers?.movingTees?.enabled ? round.modifiers.movingTees : null
  const teeBoxState = useMemo(() => {
    if (!movingTees) return null
    const startIdx = TEE_BOX_IDS.indexOf(movingTees.startBox)
    const state = {} // { [playerId]: string[] } — tee box id per hole (index 0..17)
    groupPlayers.forEach(p => {
      const boxes = []
      let currentIdx = startIdx
      holes.forEach((hole, hi) => {
        boxes.push(TEE_BOX_IDS[currentIdx])
        const strokes = Number(hole.strokes[p._id])
        if (!strokes) { /* no data yet — project par-out for future holes */ return }
        const diff = strokes - hole.par
        let shift = 0
        if (diff <= -2) shift = movingTees.eagleShift
        else if (diff === -1) shift = movingTees.birdieShift
        else if (diff === 0) shift = movingTees.parShift
        else if (diff === 1) shift = movingTees.bogeyShift
        else shift = movingTees.doublePlusShift
        currentIdx = Math.max(0, Math.min(4, currentIdx + shift))
      })
      state[p._id] = boxes
    })
    return state
  }, [holes, movingTees])

  // The first hole without all strokes entered — used for tee box "current" vs "future" styling
  const teeBoxLiveIdx = movingTees ? holes.findIndex(h => groupPlayers.some(p => h.strokes[p._id] === '')) : -1

  // Helper: get tee box color for a player at a hole
  function teeBoxColor(playerId, holeIdx) {
    if (!teeBoxState) return null
    const boxId = teeBoxState[playerId]?.[holeIdx]
    return TEE_BOXES.find(t => t.id === boxId) || null
  }

  function handleSubmit() {
    // Save hole-by-hole data
    if (!HOLE_RESULTS[round._id]) HOLE_RESULTS[round._id] = {}
    HOLE_RESULTS[round._id][group._id] = { holes: holes.map(h => ({ ...h, strokes: { ...h.strokes } })) }
    // Derive team result — N-team compatible
    const teamScores = {}
    if (scoringType === 'match') {
      const lt = matchState?.leadTeam
      if (lt) {
        teams.forEach(t => { teamScores[t._id] = t._id === lt._id ? 1 : 0 })
      } else if (teamCount === 2) {
        teams.forEach(t => { teamScores[t._id] = 0.5 })
      } else {
        teams.forEach(t => { teamScores[t._id] = 0 }) // dead — no leader
      }
    } else {
      // Stroke family (Scramble, Sabotage, etc): lowest total wins
      const vals = teams.map(t => ({ id: t._id, total: strokeTotals[t._id] }))
      // Sort by total ascending (lower = better)
      vals.sort((a, b) => a.total - b.total)
      const minTotal = vals[0].total
      const winners = vals.filter(v => v.total === minTotal)
      if (winners.length === 1) {
        teams.forEach(t => { teamScores[t._id] = t._id === winners[0].id ? 1 : 0 })
      } else if (teamCount === 2) {
        teams.forEach(t => { teamScores[t._id] = 0.5 }) // tie
      } else {
        teams.forEach(t => { teamScores[t._id] = 0 })
      }
    }
    onSubmit({ roundId: round._id, groupId: group._id, teamScores })
  }

  const dormieStyle = matchState?.isDormie
    ? { border: `2px solid ${matchState.leadTeam.color}`, boxShadow: `0 0 18px ${matchState.leadTeam.color}40`, animation: 'none' }
    : {}
  const matchOverStyle = matchState?.isMatchOver
    ? { background: `${matchState.leadTeam.color}15`, border: `2px solid ${matchState.leadTeam.color}` }
    : {}

  return (
    <div style={{ position: 'fixed', inset: 0, zIndex: 200, display: 'flex', flexDirection: 'column', background: 'var(--bt-base)', overflowY: 'auto' }}>
      {/* Header */}
      <div style={{ position: 'sticky', top: 0, zIndex: 10, background: 'var(--bt-card)', borderBottom: '1px solid var(--bt-border)', padding: '14px 16px' }}>
        <div style={{ display: 'flex', alignItems: 'center', gap: 10, marginBottom: 8 }}>
          <button onClick={onClose} style={{ background: 'none', border: 'none', cursor: 'pointer', color: 'var(--bt-text-3)', padding: 4, display: 'flex' }}>
            <Ic n="X" size={18} color="var(--bt-text-3)" />
          </button>
          <div style={{ flex: 1 }}>
            <div style={{ fontSize: 11, color: 'var(--bt-text-3)' }}>Day {round.day} · {round.title} · {round.course}</div>
            <div style={{ fontSize: 16, fontWeight: 700, color: 'var(--bt-text-1)' }}>{readOnly ? `Scorecard — ${group.name}` : `${group.name} — Hole by Hole`}</div>
          </div>
          {/* Format badge */}
          <div style={{ padding: '3px 9px', borderRadius: 9999, background: 'var(--bt-tag-bg)', border: '1px solid var(--bt-accent)30', fontSize: 11, fontWeight: 700, color: 'var(--bt-accent)', flexShrink: 0 }}>
            {round.format}
          </div>
        </div>

        {/* Match play state banner */}
        {scoringType === 'match' && matchState && (
          <div style={{ borderRadius: 10, padding: '10px 14px', ...dormieStyle, ...matchOverStyle, background: matchState.isDormie || matchState.isMatchOver ? undefined : 'var(--bt-base)', border: matchState.isDormie || matchState.isMatchOver ? undefined : '1px solid var(--bt-border)' }}>
            {matchState.isMatchOver ? (
              <div style={{ textAlign: 'center' }}>
                <div style={{ fontSize: 13, fontWeight: 900, color: matchState.leadTeam.color }}>MATCH OVER — {matchState.leadTeam.shortName} wins {matchState.absUp}&UP</div>
                <div style={{ fontSize: 11, color: 'var(--bt-text-3)' }}>with {matchState.remaining} hole{matchState.remaining !== 1 ? 's' : ''} to spare</div>
              </div>
            ) : matchState.isDormie ? (
              <div style={{ textAlign: 'center' }}>
                <div style={{ fontSize: 13, fontWeight: 900, color: matchState.leadTeam.color, letterSpacing: 1 }}>DORMIE — {matchState.leadTeam.shortName} {matchState.absUp}UP</div>
                <div style={{ fontSize: 11, color: 'var(--bt-text-2)', marginTop: 2 }}>{matchState.remaining} hole{matchState.remaining !== 1 ? 's' : ''} left · can't lose · must win every hole</div>
              </div>
            ) : matchState.leadTeam ? (
              <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center' }}>
                <span style={{ fontSize: 13, fontWeight: 700, color: matchState.leadTeam.color }}>{matchState.leadTeam.shortName} {matchState.absUp}UP</span>
                <span style={{ fontSize: 12, color: 'var(--bt-text-3)' }}>thru {matchState.played} · {matchState.remaining} to play</span>
              </div>
            ) : matchState.played > 0 ? (
              <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center' }}>
                <span style={{ fontSize: 13, fontWeight: 600, color: 'var(--bt-text-2)' }}>All Square</span>
                <span style={{ fontSize: 12, color: 'var(--bt-text-3)' }}>thru {matchState.played} · {matchState.remaining} to play</span>
              </div>
            ) : (
              <div style={{ fontSize: 12, color: 'var(--bt-text-3)', textAlign: 'center' }}>Enter strokes to track the match</div>
            )}
          </div>
        )}
        {scoringType === 'stroke' && (
          <div style={{ display: 'flex', gap: 10 }}>
            {teamPlayersMap.map(({ team }) => {
              const total = strokeTotals[team._id]
              const holesPlayed = isScramble
                ? holes.filter(h => {
                    const scorer = teamPlayersMap.find(t => t.team._id === team._id)?.players[0]
                    return scorer && h.strokes[scorer._id] !== ''
                  }).length
                : 0
              const parSoFar = isScramble ? PARS.slice(0, holesPlayed).reduce((s, p) => s + p, 0) : 0
              const toPar = isScramble && holesPlayed > 0 ? total - parSoFar : null
              const toParColor = toPar === null ? team.color : toPar < 0 ? '#3b82f6' : toPar === 0 ? 'var(--bt-text-2)' : '#c0765a'
              return (
                <div key={team._id} style={{ flex: 1, borderRadius: 8, padding: '8px 12px', background: `${team.color}15`, border: `1px solid ${team.color}40`, display: 'flex', justifyContent: 'space-between', alignItems: 'center' }}>
                  <div>
                    <div style={{ fontSize: 12, fontWeight: 700, color: team.color }}>{team.shortName}</div>
                    {isScramble && holesPlayed > 0 && (
                      <div style={{ fontSize: 10, color: 'var(--bt-text-3)' }}>{holesPlayed} holes</div>
                    )}
                  </div>
                  <div style={{ textAlign: 'right' }}>
                    {toPar !== null && (
                      <div style={{ fontSize: 11, fontWeight: 700, color: toParColor }}>
                        {toPar === 0 ? 'E' : toPar > 0 ? `+${toPar}` : `${toPar}`}
                      </div>
                    )}
                    <span style={{ fontSize: 20, fontWeight: 900, color: team.color }}>{total || '—'}</span>
                  </div>
                </div>
              )
            })}
          </div>
        )}
      </div>

      {/* Hole rows */}
      <div style={{ padding: '12px 16px', flex: 1 }}>
        {/* Sabotage card tracker */}
        {isSabotage && (
          <div style={{ marginBottom: 14, borderRadius: 10, background: '#1a0a00', border: '1px solid #f59e0b40', padding: '12px 14px' }}>
            <div style={{ fontSize: 11, fontWeight: 700, color: '#f59e0b', marginBottom: 8, letterSpacing: '.05em' }}>⚡ SABOTAGE CARDS — 3 per team per 9</div>
            <div style={{ display: 'flex', flexDirection: 'column', gap: 6 }}>
              {[
                { label: 'Hit It Again',       desc: 'Opponent must re-hit their last shot from same spot' },
                { label: 'Play With 3 Clubs',  desc: 'Opponent plays the entire hole with only 3 clubs' },
                { label: 'Throw Your Ball',    desc: 'Opponent must throw (not hit) their ball once this hole' },
              ].map(opt => (
                <div key={opt.label} style={{ display: 'flex', gap: 10, alignItems: 'flex-start', padding: '6px 8px', borderRadius: 7, background: '#f59e0b08', border: '1px solid #f59e0b25' }}>
                  <div style={{ width: 6, height: 6, borderRadius: '50%', background: '#f59e0b', marginTop: 5, flexShrink: 0 }} />
                  <div>
                    <div style={{ fontSize: 12, fontWeight: 700, color: '#f59e0b' }}>{opt.label}</div>
                    <div style={{ fontSize: 11, color: 'var(--bt-text-3)', marginTop: 1 }}>{opt.desc}</div>
                  </div>
                </div>
              ))}
            </div>
            <div style={{ fontSize: 10, color: 'var(--bt-text-3)', marginTop: 8, borderTop: '1px solid #f59e0b20', paddingTop: 8 }}>Track card use verbally — no score adjustment. Enter cumulative stroke total below.</div>
          </div>
        )}
        {/* Carry-over legend */}
        {carryPots && (
          <div style={{ display: 'flex', alignItems: 'center', gap: 6, marginBottom: 10, padding: '7px 10px', borderRadius: 8, background: '#1a120030', border: '1px solid #f59e0b30' }}>
            <span style={{ fontSize: 12 }}>⊕</span>
            <span style={{ fontSize: 11, color: '#f59e0b' }}>Carry-over active — halved holes accumulate into the next pot</span>
          </div>
        )}
        {/* Moving tees legend */}
        {movingTees && (
          <div style={{ display: 'flex', alignItems: 'center', gap: 8, marginBottom: 10, padding: '7px 10px', borderRadius: 8, background: 'var(--bt-card)', border: '1px solid var(--bt-border)' }}>
            <span style={{ fontSize: 11, color: 'var(--bt-text-2)', fontWeight: 600, marginRight: 4 }}>Tees:</span>
            {TEE_BOXES.map(box => (
              <span key={box.id} style={{ display: 'inline-flex', alignItems: 'center', gap: 3 }}>
                <span style={{ width: 8, height: 8, borderRadius: '50%', background: box.color, border: box.id === 'white' ? '1px solid var(--bt-text-3)' : 'none', display: 'inline-block' }} />
                <span style={{ fontSize: 9, color: 'var(--bt-text-3)' }}>{box.label}</span>
              </span>
            ))}
          </div>
        )}
        {/* Player name row with current tee box pill (when moving tees active) */}
        {movingTees && (
          <div style={{ display: 'grid', gridTemplateColumns: `36px 28px ${teamPlayersMap.map(() => 'auto').join(' ')} 20px`, gap: 4, marginBottom: 6 }}>
            <span /><span />
            {teamPlayersMap.map(({ team, players }) => (
              <div key={team._id} style={{ display: 'flex', gap: 3, justifyContent: 'center' }}>
                {players.map(p => {
                  const currentHole = teeBoxLiveIdx >= 0 ? teeBoxLiveIdx : 17
                  const box = teeBoxColor(p._id, currentHole)
                  return box ? (
                    <div key={p._id} style={{ width: 36, display: 'flex', flexDirection: 'column', alignItems: 'center', gap: 1 }}>
                      <span style={{ fontSize: 8, fontWeight: 700, color: team.color, lineHeight: 1 }}>{p.nickname.slice(0, 3)}</span>
                      <span style={{ display: 'inline-flex', alignItems: 'center', gap: 2, padding: '1px 4px', borderRadius: 6, background: box.color + '25', border: `1px solid ${box.color}60` }}>
                        <span style={{ width: 6, height: 6, borderRadius: '50%', background: box.color, border: box.id === 'white' ? '1px solid #999' : 'none' }} />
                        <span style={{ fontSize: 7, fontWeight: 700, color: box.id === 'black' ? '#888' : box.color }}>{box.label}</span>
                      </span>
                    </div>
                  ) : null
                })}
              </div>
            ))}
            <span />
          </div>
        )}
        {/* Column headers — Scramble: team name. All others: player name(s). */}
        <div style={{ display: 'grid', gridTemplateColumns: `36px 28px ${teamPlayersMap.map(() => 'auto').join(' ')} 20px`, gap: 4, marginBottom: 4, paddingBottom: 6, borderBottom: '1px solid var(--bt-border)' }}>
          <span style={{ fontSize: 10, color: 'var(--bt-text-3)', fontWeight: 700 }}>HOLE</span>
          <span style={{ fontSize: 10, color: 'var(--bt-text-3)', fontWeight: 700 }}>PAR</span>
          {teamPlayersMap.map(({ team, players }) => {
            if (isScramble) {
              // Whole team plays as one — team name is the column header
              return <span key={team._id} style={{ fontSize: 10, color: team.color, fontWeight: 700, textAlign: 'center' }}>{team.shortName}</span>
            }
            if (players.length === 1) {
              // Solo or 1v1 — just the player's name
              return <span key={team._id} style={{ fontSize: 10, color: team.color, fontWeight: 700, textAlign: 'center' }}>{players[0].nickname}</span>
            }
            // 2v2 or larger — stack player names with a slash separator
            return (
              <div key={team._id} style={{ display: 'flex', flexDirection: 'column', alignItems: 'center', gap: 1 }}>
                {players.map((p, pi) => (
                  <span key={p._id} style={{ fontSize: 9, color: p._id === CURRENT_USER._id ? 'var(--bt-accent)' : team.color, fontWeight: 700, lineHeight: 1.2 }}>
                    {p.nickname}{pi < players.length - 1 ? ' /' : ''}
                  </span>
                ))}
              </div>
            )
          })}
          <span />
        </div>
        {holes.map((hole, hi) => {
          const totals = holeTeamTotals(hole)
          const complete = totals.complete
          let holeWinnerTeam = null, isDead = false
          // Show hole winner for match play AND scramble (lower team score wins the hole)
          if (complete && (scoringType === 'match' || isScramble)) {
            const teamTotals = teams.map(t => ({ team: t, total: totals[t._id].total }))
            const minTotal = Math.min(...teamTotals.map(tt => tt.total))
            const winners = teamTotals.filter(tt => tt.total === minTotal)
            if (winners.length === 1) holeWinnerTeam = winners[0].team
            else isDead = true
          }
          const isDormieHole = matchState?.isDormie && !complete
          const pot = carryPots ? carryPots[hi] : 1
          const isLiveHole = carryPots && hi === liveHoleIdx
          return (
            <div key={hi} style={{ display: 'grid', gridTemplateColumns: `36px 28px ${teamPlayersMap.map(() => 'auto').join(' ')} 20px`, gap: 4, alignItems: 'center', marginBottom: 4, padding: '4px 0', borderBottom: '1px solid var(--bt-base)', background: isDormieHole ? 'rgba(255,80,80,.04)' : isLiveHole ? '#1a120015' : 'transparent', borderLeft: isDormieHole ? '2px solid rgba(255,80,80,.25)' : isLiveHole ? '2px solid #f59e0b60' : '2px solid transparent', paddingLeft: isDormieHole || isLiveHole ? 6 : 0 }}>
              <div style={{ display: 'flex', flexDirection: 'column', alignItems: 'flex-start', gap: 1 }}>
                <span style={{ fontSize: 12, fontWeight: 700, color: isLiveHole ? '#f59e0b' : 'var(--bt-text-3)' }}>#{hole.holeNum}</span>
                {carryPots && pot > 1 && (
                  <span style={{ fontSize: 9, fontWeight: 700, color: '#f59e0b', background: '#f59e0b20', borderRadius: 3, padding: '0 3px', lineHeight: '14px' }}>×{pot}</span>
                )}
              </div>
              <span style={{ fontSize: 11, color: 'var(--bt-text-3)' }}>P{hole.par}</span>
              {/* Per-team inputs — Scramble: 1 input per team. Match Play: 1 per player per team. */}
              {teamPlayersMap.map(({ team, players }, ti) => {
                if (isScramble) {
                  // Scramble: one shared team score stored under first player's id
                  const scorer = players[0]
                  if (!scorer) return <div key={team._id} />
                  const val = hole.strokes[scorer._id]
                  const filled = val !== ''
                  const won = holeWinnerTeam?._id === team._id
                  return (
                    <div key={team._id} style={{ display: 'flex', justifyContent: 'center' }}>
                      {readOnly ? (
                        <div style={{ width: 44, height: 36, fontSize: 16, fontWeight: won ? 900 : 700, textAlign: 'center', lineHeight: '36px', borderRadius: 8, background: won ? `${team.color}25` : 'var(--bt-base)', border: `2px solid ${filled ? team.color + (won ? 'cc' : '50') : 'var(--bt-border)'}`, color: team.color }}>
                          {filled ? val : '—'}
                        </div>
                      ) : (
                        <input type="number" min="1" max="15" value={val} onChange={e => setStroke(hi, scorer._id, e.target.value)} placeholder="—"
                          style={{ width: 44, height: 36, fontSize: 16, fontWeight: 700, textAlign: 'center', borderRadius: 8, background: won ? `${team.color}20` : 'var(--bt-base)', border: `2px solid ${filled ? team.color + (won ? 'cc' : '50') : 'var(--bt-border-input)'}`, color: team.color, outline: 'none' }} />
                      )}
                    </div>
                  )
                }
                // Match Play / Skins / etc: one input per player
                return (
                  <div key={team._id} style={{ display: 'flex', gap: 3, justifyContent: ti === teamPlayersMap.length - 1 ? 'flex-end' : ti === 0 ? 'flex-start' : 'center' }}>
                    {players.map(p => {
                      const box = teeBoxColor(p._id, hi)
                      const isFuture = movingTees && hi > teeBoxLiveIdx && teeBoxLiveIdx >= 0
                      return (
                        <div key={p._id} style={{ position: 'relative', width: 36, height: 32 }}>
                          {readOnly ? (
                            <div title={p.nickname}
                              style={{ width: 36, height: 32, fontSize: 14, fontWeight: 700, textAlign: 'center', lineHeight: '32px', borderRadius: 6, background: 'var(--bt-base)', border: `1px solid ${hole.strokes[p._id] !== '' ? team.color + '60' : 'var(--bt-border)'}`, color: team.color }}>
                              {hole.strokes[p._id] !== '' ? hole.strokes[p._id] : '—'}
                            </div>
                          ) : (
                            <input type="number" min="1" max="15" value={hole.strokes[p._id]} onChange={e => setStroke(hi, p._id, e.target.value)} placeholder="—"
                              title={p.nickname}
                              style={{ width: 36, height: 32, fontSize: 14, fontWeight: 700, textAlign: 'center', borderRadius: 6, background: 'var(--bt-base)', border: `1px solid ${hole.strokes[p._id] !== '' ? team.color + '60' : 'var(--bt-border)'}`, color: team.color, outline: 'none' }} />
                          )}
                          {box && <span style={{ position: 'absolute', bottom: 1, right: 1, width: 8, height: 8, borderRadius: '50%', background: box.color, border: box.id === 'white' ? '1px solid #999' : 'none', opacity: isFuture ? 0.35 : 0.85 }} />}
                        </div>
                      )
                    })}
                  </div>
                )
              })}
              {/* Hole result indicator — hidden for sabotage (no hole winner) */}
              <div style={{ textAlign: 'center' }}>
                {!isSabotage && holeWinnerTeam && <span style={{ fontSize: 10, fontWeight: 700, color: holeWinnerTeam.color }}>●</span>}
                {!isSabotage && isDead && <span style={{ fontSize: 10, color: 'var(--bt-text-3)' }}>–</span>}
              </div>
            </div>
          )
        })}

        {/* Front/back 9 par totals */}
        <div style={{ display: 'flex', gap: 10, marginTop: 8, marginBottom: 20 }}>
          {['Front 9', 'Back 9', 'Total'].map((label, li) => {
            const slice = li === 0 ? PARS.slice(0, 9) : li === 1 ? PARS.slice(9) : PARS
            const par = slice.reduce((s, p) => s + p, 0)
            return (
              <div key={label} style={{ flex: 1, textAlign: 'center', borderRadius: 8, padding: '6px', background: 'var(--bt-card)', border: '1px solid var(--bt-border)' }}>
                <div style={{ fontSize: 10, color: 'var(--bt-text-3)', marginBottom: 2 }}>{label}</div>
                <div style={{ fontSize: 13, fontWeight: 700, color: 'var(--bt-text-2)' }}>Par {par}</div>
              </div>
            )
          })}
        </div>

        {/* Submit / offline (hidden in readOnly) */}
        {readOnly ? (
          <button onClick={onClose}
            style={{ width: '100%', fontSize: 14, fontWeight: 700, padding: '14px', borderRadius: 10, border: '1px solid var(--bt-border)', background: 'var(--bt-card)', color: 'var(--bt-text-1)', cursor: 'pointer', transition: 'all .15s' }}>
            Close
          </button>
        ) : (
          <>
            <button onClick={handleSubmit} disabled={!anyScored}
              style={{ width: '100%', fontSize: 14, fontWeight: 700, padding: '14px', borderRadius: 10, border: 'none', marginBottom: 12, cursor: anyScored ? 'pointer' : 'not-allowed', background: anyScored ? 'var(--bt-accent)' : 'var(--bt-border)', color: anyScored ? '#0d1117' : 'var(--bt-text-3)', boxShadow: anyScored ? '0 0 20px var(--bt-accent)30' : 'none', transition: 'all .15s' }}>
              {matchState?.isMatchOver ? `Submit — ${matchState.leadTeam.shortName} wins` : anyScored ? 'Submit Score' : 'Enter scores above'}
            </button>
            <button onClick={onOfflineResult}
              style={{ width: '100%', fontSize: 13, fontWeight: 500, padding: '10px', borderRadius: 10, border: '1px solid var(--bt-border)', background: 'transparent', color: 'var(--bt-text-3)', cursor: 'pointer' }}>
              Enter offline result instead
            </button>
          </>
        )}
      </div>
    </div>
  )
}

// ── ScoreEntry — bottom-sheet overlay for entering group scores ──
function ScoreEntry({ group, round, event, onSubmit, onClose }) {
  const { useState } = React
  const { teams } = event
  const teamCount = teams.length
  const groupPlayers = event.players.filter(p => group.playerIds.includes(p._id))
  const existingResult = GROUP_RESULTS[round._id]?.[group._id]

  // Determine which team each player in this group is on
  const teamPlayers = teams.map(team => ({
    team,
    players: groupPlayers.filter(p => getTeamId(event._id, p._id) === team._id)
  }))

  // Carry-over: compute current pot from HOLE_RESULTS if available
  const carryOver = !!round.modifiers?.carryOver
  const currentPot = (() => {
    if (!carryOver) return 1
    const holeData = HOLE_RESULTS[round._id]?.[group._id]?.holes
    if (!holeData) return 1
    let carry = 1
    for (const hole of holeData) {
      const teamTotals = teams.map(team => {
        const tp = groupPlayers.filter(p => getTeamId(event._id, p._id) === team._id)
        const filled = tp.every(p => hole.strokes[p._id] !== '')
        const total = tp.reduce((s, p) => s + (Number(hole.strokes[p._id]) || 0), 0)
        return { filled, total }
      })
      if (!teamTotals.every(t => t.filled)) break
      const min = Math.min(...teamTotals.map(t => t.total))
      const winners = teamTotals.filter(t => t.total === min)
      carry = winners.length < teamCount ? 1 : carry + 1
    }
    return carry
  })()

  // Skins: track skins won per team (integer entry instead of 3-way result)
  const isSkins = round.format === 'skins'

  // Result: team ID of winner, 'halve' (2-team only), 'dead' (no winner), or null
  const [result, setResult] = useState(() => {
    if (!existingResult) return null
    if (teamCount === 2) {
      const a = existingResult[teams[0]._id]
      return a === 1 ? teams[0]._id : a === 0.5 ? 'halve' : a === 0 ? teams[1]._id : null
    }
    // N-team: find team with 1 point
    const winner = teams.find(t => existingResult[t._id] === 1)
    if (winner) return winner._id
    // All zeros means dead hole
    if (teams.every(t => existingResult[t._id] === 0)) return 'dead'
    return null
  })

  // For skins: per-team skin counts
  const [skinCounts, setSkinCounts] = useState(() =>
    Object.fromEntries(teams.map(t => [t._id, existingResult ? String(existingResult[t._id] ?? '') : '']))
  )
  const skinsValid = teams.every(t => skinCounts[t._id] !== '' && Number(skinCounts[t._id]) >= 0)

  const handleSubmit = () => {
    if (isSkins) {
      if (!skinsValid) return
      const teamScores = Object.fromEntries(teams.map(t => [t._id, Number(skinCounts[t._id])]))
      onSubmit({ roundId: round._id, groupId: group._id, teamScores })
    } else {
      if (!result) return
      const teamScores = {}
      if (result === 'halve') {
        teams.forEach(t => { teamScores[t._id] = 0.5 })
      } else if (result === 'dead') {
        teams.forEach(t => { teamScores[t._id] = 0 })
      } else {
        teams.forEach(t => { teamScores[t._id] = t._id === result ? 1 : 0 })
      }
      onSubmit({ roundId: round._id, groupId: group._id, teamScores })
    }
  }

  return (
    <div style={{ position: 'fixed', inset: 0, zIndex: 200, background: '#000a', display: 'flex', alignItems: 'flex-end', justifyContent: 'center' }}
      onClick={onClose}>
      <div onClick={e => e.stopPropagation()} style={{ width: '100%', maxWidth: 600, borderRadius: '16px 16px 0 0', background: 'var(--bt-card)', border: '1px solid var(--bt-border)', padding: '24px 20px 40px' }}>

        {/* Header */}
        <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'flex-start', marginBottom: 20 }}>
          <div>
            <div style={{ fontSize: 11, textTransform: 'uppercase', letterSpacing: '.08em', color: 'var(--bt-text-3)', marginBottom: 4 }}>
              Day {round.day} · {round.title} · {round.course}
            </div>
            <div style={{ fontSize: 18, fontWeight: 700, color: 'var(--bt-text-1)' }}>{group.name} Scorecard</div>
          </div>
          <button onClick={onClose} style={{ background: 'none', border: 'none', cursor: 'pointer', color: 'var(--bt-text-3)', fontSize: 18, padding: 4 }}>
            <Ic n="X" size={18} color="var(--bt-text-3)" />
          </button>
        </div>

        {/* Players in this group by team */}
        <div style={{ display: 'grid', gridTemplateColumns: teams.map(() => '1fr').join(' '), gap: 12, marginBottom: 20 }}>
          {teamPlayers.map(({ team, players }) => (
            <div key={team._id} style={{ borderRadius: 10, padding: '10px 12px', background: team.colorDim, border: `1px solid ${team.color}30` }}>
              <div style={{ fontSize: 11, fontWeight: 700, color: team.color, marginBottom: 6 }}>{team.shortName}</div>
              {players.map(p => (
                <div key={p._id} style={{ display: 'flex', alignItems: 'center', gap: 6, marginBottom: 3 }}>
                  <div style={{ width: 16, height: 16, borderRadius: '50%', background: team.color, display: 'flex', alignItems: 'center', justifyContent: 'center', fontSize: 7, fontWeight: 700, color: '#0d1117' }}>{p.nickname.slice(0, 2).toUpperCase()}</div>
                  <span style={{ fontSize: 12, color: 'var(--bt-text-1)' }}>{p.nickname}</span>
                  <span style={{ fontSize: 10, color: 'var(--bt-text-3)', marginLeft: 'auto' }}>+{p.handicap}</span>
                </div>
              ))}
            </div>
          ))}
        </div>

        {isSkins ? (
          /* Skins: enter skin counts per team */
          <>
            <div style={{ marginBottom: 20 }}>
              <div style={{ fontSize: 12, fontWeight: 700, color: 'var(--bt-text-2)', marginBottom: 12 }}>Skins won by each team</div>
              <div style={{ display: 'grid', gridTemplateColumns: teams.map(() => '1fr').join(' '), gap: 12 }}>
                {teams.map(team => (
                  <div key={team._id} style={{ borderRadius: 10, padding: '14px', background: team.colorDim, border: `1px solid ${team.color}30`, textAlign: 'center' }}>
                    <div style={{ fontSize: 12, fontWeight: 700, color: team.color, marginBottom: 8 }}>{team.shortName}</div>
                    <input type="number" min="0" value={skinCounts[team._id]} onChange={e => setSkinCounts(sc => ({ ...sc, [team._id]: e.target.value }))}
                      placeholder="0"
                      style={{ width: 72, fontSize: 28, fontWeight: 900, textAlign: 'center', padding: '8px', borderRadius: 8, background: 'var(--bt-base)', border: `2px solid ${team.color}60`, color: team.color, outline: 'none' }} />
                    <div style={{ fontSize: 11, color: 'var(--bt-text-3)', marginTop: 4 }}>skins</div>
                  </div>
                ))}
              </div>
              <div style={{ fontSize: 11, color: 'var(--bt-text-3)', marginTop: 10, textAlign: 'center' }}>
                Total skins are split across all holes in this round — each hole's lowest net score wins a skin.
              </div>
            </div>
            <button onClick={handleSubmit} disabled={!skinsValid}
              style={{ width: '100%', fontSize: 14, fontWeight: 700, padding: '14px', borderRadius: 10, border: 'none', cursor: skinsValid ? 'pointer' : 'not-allowed',
                background: skinsValid ? 'var(--bt-accent)' : 'var(--bt-border)', color: skinsValid ? '#0d1117' : 'var(--bt-text-3)', transition: 'all .15s',
                boxShadow: skinsValid ? '0 0 20px var(--bt-accent)30' : 'none' }}>
              <span style={{ display: 'flex', alignItems: 'center', justifyContent: 'center', gap: 8 }}>
                <Ic n="Check" size={16} color={skinsValid ? '#0d1117' : 'var(--bt-text-3)'} />
                {existingResult ? 'Update Score' : 'Submit Score'}
              </span>
            </button>
            {round.status === 'submitted' && (
              <div style={{ marginTop: 10, fontSize: 11, color: '#f59e0b', textAlign: 'center', padding: '8px 12px', borderRadius: 8, background: '#1a120030', border: '1px solid #f59e0b30' }}>
                ⚠ This round is submitted but not yet closed. Corrections are still allowed.
              </div>
            )}
          </>
        ) : (
          <>
            {/* Result selector — N team winner buttons + halve (2-team) / dead hole (3+) */}
            <div style={{ marginBottom: 20 }}>
              <div style={{ fontSize: 12, fontWeight: 700, color: 'var(--bt-text-2)', marginBottom: 4 }}>Who won this group?</div>
              {round.format === 'sabotage' && (
                <div style={{ fontSize: 11, color: 'var(--bt-text-3)', marginBottom: 10 }}>
                  Sabotage: record the net group result after any sabotage plays were used.
                </div>
              )}
              <div style={{ display: 'grid', gridTemplateColumns: teams.map(() => '1fr').join(' '), gap: 8 }}>
                {teams.map(team => {
                  const selected = result === team._id
                  return (
                    <button key={team._id} onClick={() => setResult(team._id)}
                      style={{ padding: '14px 8px', borderRadius: 10, cursor: 'pointer', textAlign: 'center',
                        background: selected ? team.colorDim : 'var(--bt-base)',
                        border: `2px solid ${selected ? team.color : 'var(--bt-border)'}`,
                        color: selected ? team.color : 'var(--bt-text-3)', transition: 'all .15s' }}>
                      <div style={{ fontSize: 20, marginBottom: 4 }}>🏆</div>
                      <div style={{ fontSize: 12, fontWeight: selected ? 700 : 400 }}>{team.shortName} wins</div>
                    </button>
                  )
                })}
              </div>
              {/* Halve (2-team) or Dead hole (3+) */}
              <div style={{ display: 'grid', gridTemplateColumns: teamCount === 2 ? '1fr 1fr' : '1fr', gap: 8, marginTop: 8 }}>
                {teamCount === 2 && (() => {
                  const selected = result === 'halve'
                  return (
                    <button onClick={() => setResult('halve')}
                      style={{ padding: '12px 8px', borderRadius: 10, cursor: 'pointer', textAlign: 'center',
                        background: selected ? 'var(--bt-border)' : 'var(--bt-base)',
                        border: `2px solid ${selected ? 'var(--bt-text-2)' : 'var(--bt-border)'}`,
                        color: selected ? 'var(--bt-text-2)' : 'var(--bt-text-3)', transition: 'all .15s' }}>
                      <div style={{ fontSize: 16, marginBottom: 2 }}>🤝</div>
                      <div style={{ fontSize: 12, fontWeight: selected ? 700 : 400 }}>Halved</div>
                    </button>
                  )
                })()}
                {(() => {
                  const selected = result === 'dead'
                  return (
                    <button onClick={() => setResult('dead')}
                      style={{ padding: '12px 8px', borderRadius: 10, cursor: 'pointer', textAlign: 'center',
                        background: selected ? 'var(--bt-border)' : 'var(--bt-base)',
                        border: `2px solid ${selected ? 'var(--bt-text-2)' : 'var(--bt-border)'}`,
                        color: selected ? 'var(--bt-text-2)' : 'var(--bt-text-3)', transition: 'all .15s' }}>
                      <div style={{ fontSize: 16, marginBottom: 2 }}>💀</div>
                      <div style={{ fontSize: 12, fontWeight: selected ? 700 : 400 }}>Dead hole</div>
                    </button>
                  )
                })()}
              </div>
            </div>

            {/* Carry-over note */}
            {carryOver && (
              <div style={{ display: 'flex', alignItems: 'center', justifyContent: 'space-between', marginBottom: 12, padding: '8px 12px', borderRadius: 8, background: '#1a120030', border: '1px solid #f59e0b30' }}>
                <span style={{ fontSize: 11, color: '#f59e0b' }}>⊕ {teamCount === 2 ? 'Halved' : 'Dead'} holes carry over.</span>
                <span style={{ fontSize: 12, fontWeight: 700, color: '#f59e0b' }}>Current pot: ×{currentPot}</span>
              </div>
            )}

            {/* Points preview */}
            {result && (
              <div style={{ display: 'flex', justifyContent: 'center', gap: 16, marginBottom: 20, padding: '12px', borderRadius: 10, background: 'var(--bt-base)' }}>
                {teams.map(team => (
                  <div key={team._id} style={{ textAlign: 'center' }}>
                    <div style={{ fontSize: 10, color: team.color, fontWeight: 700 }}>{team.shortName}</div>
                    <div style={{ fontSize: 28, fontWeight: 900, color: team.color }}>
                      {result === team._id ? '1' : result === 'halve' ? '½' : '0'}
                    </div>
                  </div>
                ))}
                <div style={{ display: 'flex', alignItems: 'center', color: 'var(--bt-text-3)', fontSize: 12 }}>pt</div>
              </div>
            )}

            {/* Submit button */}
            <button onClick={handleSubmit} disabled={!result}
              style={{ width: '100%', fontSize: 14, fontWeight: 700, padding: '14px', borderRadius: 10, border: 'none', cursor: result ? 'pointer' : 'not-allowed',
                background: result ? 'var(--bt-accent)' : 'var(--bt-border)', color: result ? '#0d1117' : 'var(--bt-text-3)', transition: 'all .15s',
                boxShadow: result ? '0 0 20px var(--bt-accent)30' : 'none' }}>
              <span style={{ display: 'flex', alignItems: 'center', justifyContent: 'center', gap: 8 }}>
                <Ic n="Check" size={16} color={result ? '#0d1117' : 'var(--bt-text-3)'} />
                {existingResult ? 'Update Score' : 'Submit Score'}
              </span>
            </button>
            {round.status === 'submitted' && (
              <div style={{ marginTop: 10, fontSize: 11, color: '#f59e0b', textAlign: 'center', padding: '8px 12px', borderRadius: 8, background: '#1a120030', border: '1px solid #f59e0b30' }}>
                ⚠ This round is submitted but not yet closed. Corrections are still allowed.
              </div>
            )}
          </>
        )}
      </div>
    </div>
  )
}

// ── SCREEN: LiveLeaderboard (compact) ────────────────────────────
function LiveLeaderboard({ navigate, showToast, tripId, notify, notifications, onMarkAllRead, viewerRole = 'planner', theme, onToggleTheme }) {
  const canScore = viewerRole === 'owner' || viewerRole === 'planner'
  const event = getEventForTrip(tripId) || BBMI_EVENT
  const { teams, rounds, sides } = event
  const teamCount = teams.length
  const [tab, setTab] = useState('overview')
  const [scoreNonce, setScoreNonce] = useState(0)
  const scores = computeScores(event, ROUND_RESULTS)
  const [scoreEntryGroup, setScoreEntryGroup] = useState(null)
  const [scoreEntryRound, setScoreEntryRound] = useState(null)
  const [holeByHoleGroup, setHoleByHoleGroup] = useState(null)
  const [roundSummaryId, setRoundSummaryId] = useState(null)
  const [viewingScorecardGroup, setViewingScorecardGroup] = useState(null)
  const [viewingScorecardRound, setViewingScorecardRound] = useState(null)
  const [editMode, setEditMode] = useState(false)
  const [showModifiers, setShowModifiers] = useState(false)
  const [handicapOn, setHandicapOn] = useState(false)
  const [roundEdits, setRoundEdits] = useState({}) // { [roundId]: { [teamId]: string } }
  const [roundMultipliers, setRoundMultipliers] = useState(Object.fromEntries((event.rounds || []).map(r => [r._id, '1'])))
  const activeRound = rounds.find(r => r.status === 'active') || rounds[rounds.length - 1]

  const handleScoreSubmit = ({ roundId, groupId, teamScores }) => {
    if (!GROUP_RESULTS[roundId]) GROUP_RESULTS[roundId] = {}
    const result = { submittedBy: CURRENT_USER._id, createdAt: new Date() }
    Object.entries(teamScores).forEach(([tid, pts]) => { result[tid] = pts })
    GROUP_RESULTS[roundId][groupId] = result
    aggregateGroupResults(roundId)
    if (notify) notify({ type: 'score_submitted', tripId, actorId: CURRENT_USER._id, payload: { roundTitle: activeRound.title } })
    setScoreEntryGroup(null)
    setScoreNonce(n => n + 1)
    const group = event.groups.find(g => g._id === groupId)
    showToast(`${group.name} score submitted`)
  }
  const teamPts = teams.map(t => ({ team: t, pts: scores[t._id] || 0 }))
  const totalPts = teamPts.reduce((s, tp) => s + tp.pts, 0)
  const remaining = scores.remaining
  const sortedTeams = [...teamPts].sort((a, b) => b.pts - a.pts)
  const leader = sortedTeams[0]
  const leadMargin = sortedTeams.length > 1 ? sortedTeams[0].pts - sortedTeams[1].pts : 0

  const HISTORY = [
    { year: 2025, team: 'Ham, Egg & Cheese Biscuit', location: 'Bandon Dunes, OR' },
    { year: 2022, team: 'Spearmint Rhino', location: 'Baltusrol, NJ' },
    { year: 2021, team: 'JDDD', location: 'Erin Hills, WI' },
    { year: 2019, team: 'Bone Thugs-N-HarbourTown', location: 'Harbour Town, SC' },
    { year: 2018, team: 'Those Who Showed', location: 'Streamsong, FL' },
  ]

  return (
    <div style={{ minHeight: '100vh', paddingBottom: 96, background: 'var(--bt-base)' }}>
      <TopNav navigate={navigate} notifications={notifications} onMarkAllRead={onMarkAllRead} theme={theme} onToggleTheme={onToggleTheme} />
      <div style={{ maxWidth: 540, margin: '0 auto', padding: '0 0 24px' }}>
        <div style={{ padding: '16px 16px 0', borderBottom: '1px solid var(--bt-border)' }}>
          <div style={{ display: 'flex', alignItems: 'center', justifyContent: 'space-between', marginBottom: 4 }}>
            <div style={{ display: 'flex', alignItems: 'center', gap: 8 }}>
              <LiveDot />
              <span style={{ fontSize: 11, fontFamily: 'monospace', letterSpacing: 2, color: 'var(--bt-accent)' }}>LIVE · {event.title}</span>
            </div>
            <button onClick={() => navigate('trip-detail', { tripId: tripId || 'trip-bbmi-live' })}
              style={{ fontSize: 11, fontFamily: 'monospace', letterSpacing: 1, color: 'var(--bt-text-3)', background: 'none', border: 'none', cursor: 'pointer', padding: '2px 0', display: 'flex', alignItems: 'center', gap: 4 }}
              onMouseEnter={e => e.currentTarget.style.color = 'var(--bt-accent)'}
              onMouseLeave={e => e.currentTarget.style.color = 'var(--bt-text-3)'}>
              ← TRIP HOME
            </button>
          </div>
          <h1 style={{ fontSize: 18, fontWeight: 700, color: 'var(--bt-text-1)', marginBottom: 12 }}>Day {activeRound.day} of {rounds.length} · {activeRound.course}</h1>
          <div style={{ display: 'flex' }}>
            {[{ id: 'overview', label: 'Overview' }, { id: 'groups', label: 'Groups' }, { id: 'info', label: 'Trip Info' }, { id: 'history', label: 'History' }].map(t => (
              <button key={t.id} onClick={() => setTab(t.id)} style={{ flex: 1, padding: '10px 4px', border: 'none', cursor: 'pointer', background: 'transparent', borderBottom: `2px solid ${tab === t.id ? 'var(--bt-accent)' : 'transparent'}`, color: tab === t.id ? 'var(--bt-accent)' : 'var(--bt-text-2)', fontSize: 12, fontWeight: tab === t.id ? 700 : 400 }}>{t.label}</button>
            ))}
          </div>
        </div>

        <div style={{ padding: '16px' }}>
          {tab === 'overview' && (
            <>
              {/* Hero — N-team score display */}
              <Card style={{ marginBottom: 12 }}>
                <div style={{ display: 'flex', alignItems: 'flex-start', gap: 4, marginBottom: 14 }}>
                  {teamPts.map((tp, idx) => (
                    <div key={tp.team._id} style={{ flex: 1, textAlign: teamCount === 2 ? (idx === 0 ? 'left' : 'right') : 'center' }}>
                      <div style={{ color: tp.team.color, fontSize: 12, fontWeight: 800 }}>{tp.team.name.toUpperCase()}</div>
                      <div style={{ color: tp.team.color, fontSize: teamCount <= 3 ? 48 : 36, fontWeight: 900, lineHeight: 1 }}>{tp.pts}</div>
                      <div style={{ color: 'var(--bt-text-3)', fontSize: 11 }}>points</div>
                    </div>
                  ))}
                </div>
                {/* Lead bar — proportional segments per team */}
                <div style={{ height: 6, borderRadius: 3, overflow: 'hidden', background: 'var(--bt-border)', display: 'flex', marginBottom: 8 }}>
                  {teamPts.map(tp => (
                    <div key={tp.team._id} style={{ width: `${(tp.pts / Math.max(totalPts, 1)) * 100}%`, background: tp.team.color, transition: 'width .6s', minWidth: totalPts > 0 ? 4 : 0 }} />
                  ))}
                </div>
                <div style={{ display: 'flex', justifyContent: 'space-between', fontSize: 12 }}>
                  <span style={{ color: 'var(--bt-text-3)' }}>{remaining} pts still in play</span>
                  {leadMargin > 0 && <span style={{ color: leader.team.color, fontWeight: 700 }}>{leader.team.shortName} leads +{leadMargin}</span>}
                  {leadMargin === 0 && totalPts > 0 && <span style={{ color: 'var(--bt-text-2)', fontWeight: 600 }}>Tied</span>}
                </div>
              </Card>

              {/* Rounds — edit toolbar */}
              {canScore && (
                <div style={{ display: 'flex', alignItems: 'center', gap: 8, marginBottom: 10 }}>
                  <button onClick={() => { setEditMode(e => !e); setShowModifiers(false) }}
                    style={{ fontSize: 12, fontWeight: 700, padding: '5px 14px', borderRadius: 8, border: `1px solid ${editMode ? 'var(--bt-accent)' : 'var(--bt-border)'}`, background: editMode ? 'var(--bt-tag-bg)' : 'transparent', color: editMode ? 'var(--bt-accent)' : 'var(--bt-text-3)', cursor: 'pointer', transition: 'all .15s' }}>
                    {editMode ? '✓ Editing' : '✏ Edit Scores'}
                  </button>
                  {editMode && (
                    <>
                      <button onClick={() => {
                        rounds.filter(r => !ROUND_RESULTS[r._id]).forEach(r => {
                          if (!GROUP_RESULTS[r._id]) GROUP_RESULTS[r._id] = {}
                          event.groups.forEach(g => {
                            const result = { submittedBy: 'sim', createdAt: new Date() }
                            if (teamCount === 2) {
                              const toss = Math.random()
                              const a = toss < .4 ? 1 : toss < .6 ? 0.5 : 0
                              result[teams[0]._id] = a; result[teams[1]._id] = 1 - a
                            } else {
                              const winner = teams[Math.floor(Math.random() * teamCount)]
                              teams.forEach(t => { result[t._id] = t._id === winner._id ? 1 : 0 })
                            }
                            GROUP_RESULTS[r._id][g._id] = result
                          })
                          aggregateGroupResults(r._id)
                        })
                        setScoreNonce(n => n + 1)
                      }}
                        style={{ fontSize: 12, fontWeight: 700, padding: '5px 14px', borderRadius: 8, border: '1px solid var(--bt-border)', background: 'transparent', color: 'var(--bt-text-2)', cursor: 'pointer' }}>
                        ⚡ Simulate
                      </button>
                      <button onClick={() => setShowModifiers(m => !m)}
                        style={{ fontSize: 12, fontWeight: 700, padding: '5px 14px', borderRadius: 8, border: `1px solid ${showModifiers ? 'var(--bt-border)' : 'var(--bt-border)'}`, background: 'transparent', color: 'var(--bt-text-3)', cursor: 'pointer' }}>
                        ⚙ Modifiers
                      </button>
                    </>
                  )}
                </div>
              )}

              {/* Modifiers panel */}
              {editMode && showModifiers && (
                <Card style={{ marginBottom: 10 }}>
                  <div style={{ fontSize: 11, fontWeight: 700, color: 'var(--bt-text-3)', textTransform: 'uppercase', letterSpacing: '.08em', marginBottom: 12 }}>Modifiers</div>
                  <div style={{ display: 'flex', alignItems: 'center', justifyContent: 'space-between', marginBottom: 14 }}>
                    <div>
                      <div style={{ fontSize: 13, fontWeight: 600, color: 'var(--bt-text-1)' }}>Apply Handicaps</div>
                      <div style={{ fontSize: 11, color: 'var(--bt-text-3)' }}>Adjust scores using player handicap indices</div>
                    </div>
                    <button onClick={() => setHandicapOn(h => !h)}
                      style={{ width: 42, height: 24, borderRadius: 12, border: 'none', cursor: 'pointer', background: handicapOn ? 'var(--bt-accent)' : 'var(--bt-border)', transition: 'background .2s', position: 'relative' }}>
                      <span style={{ position: 'absolute', top: 3, left: handicapOn ? 20 : 4, width: 18, height: 18, borderRadius: '50%', background: '#fff', transition: 'left .2s' }} />
                    </button>
                  </div>
                  <div style={{ fontSize: 12, fontWeight: 600, color: 'var(--bt-text-2)', marginBottom: 8 }}>Points multiplier per round</div>
                  <div style={{ display: 'flex', flexDirection: 'column', gap: 6 }}>
                    {rounds.map(r => (
                      <div key={r._id} style={{ display: 'flex', alignItems: 'center', justifyContent: 'space-between' }}>
                        <span style={{ fontSize: 13, color: 'var(--bt-text-1)' }}>Day {r.day}: {r.title}</span>
                        <div style={{ display: 'flex', gap: 4 }}>
                          {['0.5', '1', '1.5', '2'].map(m => (
                            <button key={m} onClick={() => setRoundMultipliers(rm => ({ ...rm, [r._id]: m }))}
                              style={{ width: 36, height: 28, borderRadius: 6, fontSize: 11, fontWeight: 700, cursor: 'pointer', border: `1px solid ${roundMultipliers[r._id] === m ? 'var(--bt-accent)' : 'var(--bt-border)'}`, background: roundMultipliers[r._id] === m ? 'var(--bt-tag-bg)' : 'transparent', color: roundMultipliers[r._id] === m ? 'var(--bt-accent)' : 'var(--bt-text-3)' }}>
                              {m}×
                            </button>
                          ))}
                        </div>
                      </div>
                    ))}
                  </div>
                </Card>
              )}

              <Card style={{ padding: 0, overflow: 'hidden', marginBottom: 12 }}>
                {rounds.map((r, i) => {
                  const res = ROUND_RESULTS[r._id]
                  const isActive = r.status === 'active'
                  const isSubmitted = r.status === 'submitted'
                  const isClosed = r.status === 'closed'
                  const isClickable = !editMode && (isActive || isSubmitted || isClosed)
                  const edit = roundEdits[r._id] || {}
                  const rowBg = isActive ? '#0d1a10' : isSubmitted ? '#1a120008' : 'transparent'
                  const borderColor = isActive ? 'var(--bt-accent)' : isSubmitted ? '#f59e0b' : isClosed ? 'var(--bt-border)' : 'transparent'
                  const teamCols = teams.map(() => '54px').join(' ')
                  return (
                    <div key={r._id}
                      onClick={isClickable ? () => { if (isActive) setTab('groups'); else setRoundSummaryId(r._id) } : undefined}
                      style={{ display: 'grid', gridTemplateColumns: `1fr ${teamCols} 40px`, padding: isActive ? '12px 14px' : '10px 14px', borderBottom: i < rounds.length - 1 ? '1px solid var(--bt-base)' : 'none', alignItems: 'center', opacity: r.status === 'upcoming' && !editMode ? .4 : 1, background: rowBg, borderLeft: `3px solid ${borderColor}`, cursor: isClickable ? 'pointer' : 'default', transition: 'background .15s' }}
                      onMouseEnter={e => { if (isClickable) e.currentTarget.style.background = isActive ? '#112518' : 'var(--bt-base)' }}
                      onMouseLeave={e => { e.currentTarget.style.background = rowBg }}>
                      <div>
                        <div style={{ display: 'flex', alignItems: 'center', gap: 6 }}>
                          {isActive && <LiveDot />}
                          {isClosed && <span style={{ fontSize: 10, color: 'var(--bt-text-3)' }}>✓</span>}
                          <span style={{ fontSize: 14, color: isClosed ? 'var(--bt-text-3)' : 'var(--bt-text-1)' }}>Day {r.day}: {r.title}</span>
                          {isSubmitted && <span style={{ fontSize: 10, fontWeight: 700, color: '#f59e0b', marginLeft: 4 }}>⚠ Pending close</span>}
                          {isClickable && !isSubmitted && <span style={{ fontSize: 11, color: 'var(--bt-text-3)', marginLeft: 'auto' }}>{isActive ? 'Groups →' : '›'}</span>}
                          {isSubmitted && <span style={{ fontSize: 11, color: '#f59e0b', marginLeft: 'auto' }}>›</span>}
                          {editMode && res && (
                            <button onClick={() => { delete ROUND_RESULTS[r._id]; delete GROUP_RESULTS[r._id]; setRoundEdits(e => ({ ...e, [r._id]: {} })); setScoreNonce(n => n + 1) }}
                              style={{ marginLeft: 'auto', fontSize: 10, padding: '2px 6px', borderRadius: 4, border: '1px solid var(--bt-border)', background: 'transparent', color: 'var(--bt-text-3)', cursor: 'pointer' }}>
                              Clear
                            </button>
                          )}
                        </div>
                        <div style={{ display: 'flex', alignItems: 'center', gap: 6, fontSize: 11, color: isActive ? 'var(--bt-accent)' : isSubmitted ? '#f59e0b80' : 'var(--bt-text-3)', paddingLeft: isActive || isClosed || isSubmitted ? 14 : 0 }}>
