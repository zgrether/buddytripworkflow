// Recompute ROUND_RESULTS from GROUP_RESULTS for a given round.
function aggregateGroupResults(roundId) {
  const groups = GROUP_RESULTS[roundId]
  if (!groups) return
  const totals = { 'team-a': 0, 'team-b': 0 }
  let latestSubmitter = null, latestTime = null
  Object.values(groups).forEach(g => {
    if (typeof g['team-a'] === 'number') totals['team-a'] += g['team-a']
    if (typeof g['team-b'] === 'number') totals['team-b'] += g['team-b']
    if (!latestTime || g.createdAt > latestTime) { latestTime = g.createdAt; latestSubmitter = g.submittedBy }
  })
  ROUND_RESULTS[roundId] = { ...totals, submittedBy: latestSubmitter, createdAt: latestTime }
}

// Derive trip status from data rather than a stored field.
// planning → ready:    destination locked AND dates known/locked
// ready    → active:   today >= effectiveStartDate
// active   → completed: today > effectiveEndDate
function getTripStatus(trip) {
  const today = new Date()
  today.setHours(0, 0, 0, 0)

  const datePoll     = trip.datePoll
  const lockedWindow = datePoll?.lockedId
    ? datePoll.windows?.find(w => w._id === datePoll.lockedId)
    : null

  const effectiveStart = lockedWindow?.start || trip.startDate || null
  const effectiveEnd   = lockedWindow?.end   || trip.endDate   || null

  if (effectiveEnd   && today > new Date(effectiveEnd))   return 'completed'
  if (effectiveStart && today >= new Date(effectiveStart)) return 'active'

  const hasLockedDest  = !!trip.lockedDestination || (!trip.comparisonMode && !!trip.location)
  const hasLockedDates = !!datePoll?.lockedId || !!trip.startDate

  if (hasLockedDest && hasLockedDates) return 'ready'
  return 'planning'
}

// Compute total team scores from round results + side event results.
// Pure function — reads only from the arguments passed in, no globals.
// Returns { teamId: totalPoints, remaining: pointsStillAvailable }.
function computeScores(event, roundResults) {
  const totals = {}
  event.teams.forEach(t => { totals[t._id] = 0 })
  Object.values(roundResults).forEach(res => {
    Object.entries(res).forEach(([teamId, pts]) => {
      if (teamId in totals) totals[teamId] += pts
    })
  })
  event.sides.forEach(side => {
    Object.entries(side.result).forEach(([teamId, pts]) => {
      if (teamId in totals) totals[teamId] += pts
    })
  })
  const totalPossible = event.rounds.reduce((s, r) => s + r.pointsAvailable, 0)
                      + event.sides.reduce((s, sd) => s + sd.pointsAvailable, 0)
  const awarded = Object.values(totals).reduce((s, v) => s + v, 0)
  return { ...totals, remaining: totalPossible - awarded }
}

// Push a new notification event. Callers pass type, tripId, actorId, and a payload object.
// Returns the created event object.
function pushNotification({ type, tripId, actorId, payload }) {
  const event = {
    _id: `notif-${Date.now()}-${Math.random().toString(36).slice(2, 6)}`,
    type,
    tripId,
    actorId,
    payload: payload || {},
    createdAt: new Date(),
    readAt: null,
  }
  NOTIFICATION_EVENTS.push(event)
  return event
}

// Format a notification event into a human-readable string.
function formatNotification(ev) {
  const actor = USERS[ev.actorId]?.nickname || ev.actorId
  switch (ev.type) {
    case 'destination_locked': return `${actor} locked the destination: ${ev.payload.destination}`
    case 'dates_locked':       return `${actor} locked the dates: ${ev.payload.dateRange}`
    case 'crew_added':         return `${ev.payload.memberName} was added to the trip by ${actor}`
    case 'chat_message':       return `${actor}: ${(ev.payload.preview || '').slice(0, 60)}${(ev.payload.preview || '').length > 60 ? '…' : ''}`
    case 'score_submitted':    return `${actor} submitted scores for ${ev.payload.roundTitle}`
    default:                   return `${actor} performed an action`
  }
}

// Icon name for each notification type (used in the dropdown).
function notificationIcon(type) {
  switch (type) {
    case 'destination_locked': return 'MapPin'
    case 'dates_locked':       return 'Calendar'
    case 'crew_added':         return 'Users'
    case 'chat_message':       return 'MessageCircle'
    case 'score_submitted':    return 'Trophy'
    default:                   return 'Bell'
  }
}

// Accent color for each notification type.
function notificationColor(type) {
  switch (type) {
    case 'destination_locked': return 'var(--bt-accent)'
    case 'dates_locked':       return '#7c93d4'
    case 'crew_added':         return 'var(--bt-owner)'
    case 'chat_message':       return 'var(--bt-text-2)'
    case 'score_submitted':    return '#f0a84a'
    default:                   return 'var(--bt-text-3)'
  }
}

function TopNav({ navigate, notifications, onMarkAllRead }) {
  const { useState, useRef, useEffect } = React
  const [open, setOpen] = useState(false)
  const panelRef = useRef(null)

  // Close panel when clicking outside
  useEffect(() => {
    if (!open) return
    const handler = (e) => { if (panelRef.current && !panelRef.current.contains(e.target)) setOpen(false) }
    document.addEventListener('mousedown', handler)
    return () => document.removeEventListener('mousedown', handler)
  }, [open])

  const unreadCount = (notifications || []).filter(n => !n.readAt).length

  const togglePanel = () => {
    const wasOpen = open
    setOpen(!wasOpen)
    // Mark all as read when opening
    if (!wasOpen && unreadCount > 0 && onMarkAllRead) onMarkAllRead()
  }

  const fmtNotifTime = (d) => {
    const now = new Date(), dt = new Date(d)
    const diffMs = now - dt
    const diffMin = Math.floor(diffMs / 60000)
    if (diffMin < 1) return 'just now'
    if (diffMin < 60) return `${diffMin}m ago`
    const diffHrs = Math.floor(diffMin / 60)
    if (diffHrs < 24) return `${diffHrs}h ago`
    const diffDays = Math.floor(diffHrs / 24)
    if (diffDays < 7) return `${diffDays}d ago`
    return dt.toLocaleDateString('en-US', { month: 'short', day: 'numeric' })
  }

  const recentNotifs = (notifications || []).slice().sort((a, b) => new Date(b.createdAt) - new Date(a.createdAt)).slice(0, 20)

  return (
    <nav style={{ position: 'sticky', top: 0, zIndex: 50, display: 'flex', alignItems: 'center', height: 56, padding: '0 16px', borderBottom: '1px solid var(--bt-border)', background: 'var(--bt-base)' }}>

      <div style={{ display: 'flex', alignItems: 'center', gap: 8 }}>
        <button onClick={() => navigate('trips')} style={{ background: 'none', border: '1px solid var(--bt-border)', borderRadius: 6, cursor: 'pointer', color: 'var(--bt-text-1)', fontSize: 13, padding: '6px 12px' }}><Ic n="LayoutGrid" size={14} color="currentColor" style={{marginRight:5}} /> Dashboard</button>

        {/* ── Bell icon with unread badge ── */}
        <div ref={panelRef} style={{ position: 'relative' }}>
          <button onClick={togglePanel} style={{ position: 'relative', background: 'none', border: 'none', cursor: 'pointer', padding: '6px 8px', display: 'flex', alignItems: 'center' }}>

function BottomNav({ active, navigate, currentTripId, unreadCount = 0 }) {
  const baseItems = [
    { id: 'trips', icon: 'Home', label: 'Home' },
  ]
  const tripItems = currentTripId ? [
    { id: 'trip-home',     icon: 'Flag', label: 'Trip Home' },
    { id: 'trip-messages', icon: 'MessageCircle',   label: 'Messages', badge: unreadCount },
    { id: 'live-leaderboard', icon: 'Trophy',       label: 'Live' },

    { id: 'trip-new',        icon: 'PlusCircle', label: 'New Trip' },
    { id: 'live-leaderboard', icon: 'Trophy',    label: 'Live' },

  const items = [...baseItems, ...tripItems]

// ── Helpers ──────────────────────────────────────────────────────
function fmtDate(d, opts) {
  return new Date(d).toLocaleDateString('en-US', opts || { weekday: 'short', month: 'short', day: 'numeric' })
}
function fmtDateRange(start, end) {
  if (!start) return null
  const s = new Date(start), e = end ? new Date(end) : null
  const mo = d => d.toLocaleDateString('en-US', { month: 'short' })
  const dy = d => d.toLocaleDateString('en-US', { day: 'numeric' })
  if (!e) return `${mo(s)} ${dy(s)}`
  if (s.getMonth() === e.getMonth()) return `${mo(s)} ${dy(s)}–${dy(e)}`
  return `${mo(s)} ${dy(s)} – ${mo(e)} ${dy(e)}`
}

// ── SCREEN: TripNew — 2-step creation flow ───────────────────────
function TripNew({ navigate, showToast, setTrips, notifications, onMarkAllRead }) {
  const [step, setStep]               = useState(1)   // 1 = basics, 2 = destination
  const [tripName, setTripName]       = useState('')
  const [inviteInput, setInviteInput] = useState('')
  const [invites, setInvites]         = useState([])
  const inviteRef = useRef(null)

  // Step 2 — destination
  const [destKnown, setDestKnown]     = useState(null)   // true | false | null
  const [knownDest, setKnownDest]     = useState('')
  // Step 2 — vote path unified idea list
  const [destInput, setDestInput]     = useState('')     // the add-a-destination text field
  const [ideaList, setIdeaList]       = useState([])     // [{title, ai: bool}]
  const [crewDesc, setCrewDesc]       = useState('')
  const [aiSeeding, setAiSeeding]     = useState(false)
  const [hasAiRun, setHasAiRun]       = useState(false)
  const destInputRef = useRef(null)

  const addManualIdea = () => {
    const val = destInput.trim()
    if (!val) return
    if (ideaList.find(i => i.title.toLowerCase() === val.toLowerCase())) { showToast('Already in the list'); return }
    setIdeaList(l => [...l, { title: val, ai: false }])
    setDestInput('')
    destInputRef.current?.focus()
  }

  const [seriesId, setSeriesId]           = useState(null)   // null | series._id | 'new'
  const [newSeriesName, setNewSeriesName] = useState('')
  const linkedSeries = MOCK_SERIES.find(s => s._id === seriesId)

  const inputStyle = {
    width: '100%', fontSize: 14, padding: '10px 12px', borderRadius: 8, outline: 'none',
    background: 'var(--bt-input)', border: '1px solid var(--bt-border-input)', color: 'var(--bt-text-1)',
    boxSizing: 'border-box',
  }

  function Label({ children, required }) {
    return (
      <label style={{ display: 'block', fontSize: 11, fontWeight: 700, textTransform: 'uppercase', letterSpacing: '.08em', marginBottom: 7, color: 'var(--bt-text-3)' }}>
        {children}{required && <span style={{ color: 'var(--bt-danger)' }}> *</span>}
      </label>
    )
  }

  const addInvite = () => {
    const val = inviteInput.trim()
    if (!val) return
    if (invites.includes(val)) { showToast('Already added'); return }
    setInvites(p => [...p, val])
    setInviteInput('')
    inviteRef.current?.focus()
  }

  const canAdvance = tripName.trim().length > 0

  const canFinish = destKnown === true
    ? knownDest.trim().length > 0
    : destKnown === false && ideaList.length >= 1

  const handleFinish = () => {
    const now = new Date()
    const id  = 'trip-' + Date.now()
    const comparisonMode = destKnown === false && ideaList.length >= 2

    const newTrip = {
      _id: id,
      title: tripName.trim(),
      location: destKnown ? knownDest.trim() : null,
      costTier: null,
      imageUrl: null,
      description: '',
      startDate: null, endDate: null,
      accommodation: null, notes: null,
      activities: [], golfCourses: [],
      attendees: [
        { name: CURRENT_USER.name, userId: CURRENT_USER._id, status: 'in', role: 'Owner', joinedAt: now },
        ...invites.map(inv => {
          const knownUser = Object.values(USERS).find(u => u.name.toLowerCase() === inv.toLowerCase() || u.nickname.toLowerCase() === inv.toLowerCase())
          return {
            name: knownUser?.name || inv,
            userId: knownUser?._id || ('ghost-' + inv.toLowerCase().replace(/\s+/g, '-')),
            status: 'invited', role: 'Planner', joinedAt: now,
          }
        }),
      ],
      comparisonMode,
      ideas: comparisonMode
        ? ideaList.map((idea, i) => ({
            _id: `idea-${Date.now()}-${i}`,
            title: idea.title,
            description: idea.desc || '',
            location: idea.title,
            golfCourses: [], activities: [],
            costTier: null, proposedDates: [],
            pros: [], cons: [],
            imageUrl: null, archived: false,
          }))
        : [],
      proposedDates: [],
      eventId: null,
      lockedDestination: destKnown ? { title: knownDest.trim(), location: knownDest.trim(), createdAt: now } : null,
      datePoll: null,
    }

    setTrips(ts => [...ts, newTrip])
    showToast(`"${newTrip.title}" created!`)
    navigate('trip-detail', { tripId: id })
  }

  const handleAiSeed = async () => {
    if (aiSeeding) return
    setAiSeeding(true)
    try {
      const existing = ideaList.map(i => i.title).join(', ')
      const prompt = `We're planning a golf trip.${crewDesc.trim() ? ` Crew context: "${crewDesc.trim()}".` : ''} ${existing ? `We already have these options: ${existing}. Suggest 3 different ones.` : 'Suggest exactly 3 golf trip destinations.'} Return ONLY a JSON array of exactly 3 objects with fields "title" (destination name + state, e.g. "Bandon Dunes, OR") and "desc" (one sentence why it fits). No markdown, no extra text.`
      const res = await fetch('https://api.anthropic.com/v1/messages', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ model: 'claude-sonnet-4-20250514', max_tokens: 500, messages: [{ role: 'user', content: prompt }] })
      })
      const data = await res.json()
      const raw = data.content?.find(b => b.type === 'text')?.text || '[]'
      const suggestions = JSON.parse(raw.replace(/```json|```/g, '').trim())
      setIdeaList(l => {
        const existing = new Set(l.map(i => i.title.toLowerCase()))
        const fresh = suggestions.filter(s => !existing.has(s.title.toLowerCase()))
        return [...l, ...fresh.map(s => ({ title: s.title, desc: s.desc, ai: true }))]
      })
      setHasAiRun(true)
    } catch {
      showToast('Could not get suggestions — try again')
    } finally {
      setAiSeeding(false)
    }
  }

  // Step dots
  function StepDots() {
    return (
      <div style={{ display: 'flex', alignItems: 'center', gap: 6, marginBottom: 28 }}>
        {[1, 2].map(n => (
          <div key={n} style={{ width: n === step ? 20 : 7, height: 7, borderRadius: 9999, transition: 'all .25s', background: n === step ? 'var(--bt-accent)' : n < step ? 'var(--bt-accent)60' : 'var(--bt-border)' }} />
        ))}
        <span style={{ fontSize: 11, color: 'var(--bt-text-3)', marginLeft: 4 }}>Step {step} of 2</span>
      </div>
    )
  }

  return (
    <div style={{ minHeight: '100vh', paddingBottom: 96, background: 'var(--bt-base)' }}>
      <TopNav navigate={navigate} notifications={notifications} onMarkAllRead={onMarkAllRead} />
      <div style={{ maxWidth: 512, margin: '0 auto', padding: '24px 16px' }}>
        <Breadcrumb items={[{ label: 'Trips', screen: 'trips' }, { label: 'New Trip' }]} navigate={navigate} />

        {/* ── STEP 1: BASICS ─────────────────────────────────────── */}
        {step === 1 && (
          <>
            <div style={{ marginBottom: 24 }}>
              <h1 style={{ fontSize: 24, fontWeight: 700, color: 'var(--bt-text-1)', marginBottom: 4 }}>Plan a Trip</h1>
              <p style={{ fontSize: 14, color: 'var(--bt-text-2)' }}>Name it and grab your crew. Everything else waits.</p>
            </div>

            <StepDots />

            <Card style={{ display: 'flex', flexDirection: 'column', gap: 24 }}>

              {/* Trip Name */}
              <div>
                <Label required>Trip Name</Label>
                <input autoFocus value={tripName} onChange={e => setTripName(e.target.value)}
                  onKeyDown={e => e.key === 'Enter' && canAdvance && setStep(2)}
                  placeholder="e.g. BBMI 2027"
                  style={inputStyle}
                  onFocus={e => e.target.style.borderColor = 'var(--bt-accent)'}
                  onBlur={e => e.target.style.borderColor = 'var(--bt-border-input)'} />
              </div>

              {/* Co-Planners */}
              <div>
                <Label>Invite Co-Planners</Label>
                {invites.length > 0 && (
                  <div style={{ display: 'flex', flexWrap: 'wrap', gap: 8, marginBottom: 10 }}>
                    {invites.map(name => (
                      <span key={name} style={{ display: 'inline-flex', alignItems: 'center', gap: 5, fontSize: 12, fontWeight: 600, padding: '4px 8px 4px 4px', borderRadius: 9999, background: 'var(--bt-tag-bg)', border: '1px solid var(--bt-accent)33', color: 'var(--bt-accent)' }}>
                        <Avatar name={name} size="sm" />
                        {name}
                        <span style={{ fontSize: 10, fontWeight: 700, padding: '1px 5px', borderRadius: 4, background: 'var(--bt-accent)20', color: 'var(--bt-accent)', border: '1px solid var(--bt-accent)40', marginLeft: 2 }}>Planner</span>
                        <button onClick={() => setInvites(p => p.filter(n => n !== name))} style={{ background: 'none', border: 'none', cursor: 'pointer', color: 'var(--bt-text-3)', fontSize: 14, lineHeight: 1, padding: 0 }}>×</button>
                      </span>
                    ))}
                  </div>
                )}
                <div style={{ display: 'flex', gap: 8 }}>
                  <input ref={inviteRef} value={inviteInput} onChange={e => setInviteInput(e.target.value)}
                    onKeyDown={e => e.key === 'Enter' && addInvite()}
                    placeholder="Name or email — optional"
                    style={{ ...inputStyle, flex: 1 }}
                    onFocus={e => e.target.style.borderColor = 'var(--bt-accent)'}
                    onBlur={e => e.target.style.borderColor = 'var(--bt-border-input)'} />
                  <button onClick={addInvite} disabled={!inviteInput.trim()}
                    style={{ fontSize: 13, fontWeight: 700, padding: '10px 14px', borderRadius: 8, flexShrink: 0, cursor: inviteInput.trim() ? 'pointer' : 'default', background: inviteInput.trim() ? 'var(--bt-tag-bg)' : 'transparent', border: `1px solid ${inviteInput.trim() ? 'var(--bt-accent)' : 'var(--bt-border)'}`, color: inviteInput.trim() ? 'var(--bt-accent)' : 'var(--bt-text-3)' }}>
                    + Add
                  </button>
                </div>
                <p style={{ fontSize: 11, marginTop: 7, color: 'var(--bt-text-3)', lineHeight: 1.5 }}>
                  Your inner circle — auto-assigned <strong style={{ color: 'var(--bt-accent)' }}>Planner</strong> role. Add the rest of the crew later.
                </p>
              </div>

              {/* Series */}
              <div>
                <Label>Part of a recurring series?</Label>

                {/* Welcome-back callout when a series is selected */}
                {linkedSeries && (
                  <div style={{ marginBottom: 12, padding: '12px 14px', borderRadius: 10, background: '#0a1a14', border: '1px solid var(--bt-accent)40' }} className="animate-slide-up">
                    <div style={{ fontSize: 13, fontWeight: 700, color: 'var(--bt-accent)', marginBottom: 3 }}>
                      Welcome back, {linkedSeries.name}!
                    </div>
                    <div style={{ fontSize: 12, color: 'var(--bt-text-2)', lineHeight: 1.5 }}>
                      {linkedSeries.fullName} · {linkedSeries.trips} trips since {linkedSeries.years.split('–')[0]} — can't wait to see where you're going this time.
                    </div>
                  </div>
                )}

                <div style={{ display: 'flex', flexDirection: 'column', gap: 7 }}>
                  {/* Existing series chips */}
                  <div style={{ display: 'flex', flexWrap: 'wrap', gap: 7 }}>
                    {MOCK_SERIES.map(s => {
                      const isSelected = seriesId === s._id
                      return (
                        <button key={s._id} onClick={() => setSeriesId(isSelected ? null : s._id)}
                          style={{ display: 'flex', alignItems: 'center', gap: 8, padding: '8px 14px', borderRadius: 9999, cursor: 'pointer', fontSize: 13, fontWeight: 600, transition: 'all .15s', border: `1px solid ${isSelected ? 'var(--bt-accent)' : 'var(--bt-border)'}`, background: isSelected ? 'var(--bt-tag-bg)' : 'transparent', color: isSelected ? 'var(--bt-accent)' : 'var(--bt-text-2)' }}>
                          <span>{s.name}</span>
                          <span style={{ fontSize: 11, color: isSelected ? 'var(--bt-accent)80' : 'var(--bt-text-3)', fontWeight: 400 }}>{s.trips} trips</span>
                          {isSelected && <span style={{ fontSize: 12 }}>✓</span>}
                        </button>
                      )
                    })}
                    {/* Start new series */}
                    <button onClick={() => setSeriesId(seriesId === 'new' ? null : 'new')}
                      style={{ display: 'flex', alignItems: 'center', gap: 6, padding: '8px 14px', borderRadius: 9999, cursor: 'pointer', fontSize: 13, fontWeight: 600, transition: 'all .15s', border: `1px solid ${seriesId === 'new' ? 'var(--bt-accent)' : 'var(--bt-border)'}`, background: seriesId === 'new' ? 'var(--bt-tag-bg)' : 'transparent', color: seriesId === 'new' ? 'var(--bt-accent)' : 'var(--bt-text-3)' }}>
                      + New series
                    </button>
                  </div>

                  {/* New series name input */}
                  {seriesId === 'new' && (
                    <div className="animate-slide-up">
                      <input autoFocus value={newSeriesName} onChange={e => setNewSeriesName(e.target.value)}
                        placeholder="Series name (e.g. Lake Crew Annual)"
                        style={{ ...inputStyle, fontSize: 13 }}
                        onFocus={e => e.target.style.borderColor = 'var(--bt-accent)'}
                        onBlur={e => e.target.style.borderColor = 'var(--bt-border-input)'} />
                    </div>
                  )}

                  {seriesId === null && (
                    <p style={{ fontSize: 11, color: 'var(--bt-text-3)', lineHeight: 1.5 }}>
                      Linking to a series tracks history, records, and past crew across trips.
                    </p>
                  )}
                </div>
              </div>

            </Card>

            <div style={{ display: 'flex', justifyContent: 'space-between', marginTop: 24, gap: 12 }}>
              <Btn variant="secondary" onClick={() => navigate('trips')}>Cancel</Btn>
              <button onClick={() => setStep(2)} disabled={!canAdvance}
                style={{ fontSize: 14, fontWeight: 700, padding: '11px 28px', borderRadius: 8, border: 'none', cursor: canAdvance ? 'pointer' : 'not-allowed', background: canAdvance ? 'var(--bt-accent)' : 'var(--bt-border)', color: canAdvance ? '#0d1117' : 'var(--bt-text-3)', boxShadow: canAdvance ? '0 0 20px var(--bt-accent)30' : 'none', transition: 'all .2s' }}>
                Next →
              </button>
            </div>
          </>
        )}

        {/* ── STEP 2: DESTINATION ────────────────────────────────── */}
        {step === 2 && (
          <>
            <div style={{ marginBottom: 20 }}>
              <h1 style={{ fontSize: 24, fontWeight: 700, color: 'var(--bt-text-1)', marginBottom: 4 }}>Where to?</h1>
              <p style={{ fontSize: 14, color: 'var(--bt-text-2)' }}>
                <span style={{ color: 'var(--bt-accent)', fontWeight: 600 }}>{tripName}</span>
              </p>
            </div>

            <StepDots />

            {/* ── Single decision panel ── */}
            <div style={{ borderRadius: 14, background: 'var(--bt-card)', border: '1px solid var(--bt-border)', overflow: 'hidden', marginBottom: 20 }}>

              {/* Question + toggle */}
              <div style={{ padding: '16px 16px 14px', borderBottom: '1px solid var(--bt-border)' }}>
                <div style={{ fontSize: 13, fontWeight: 700, color: 'var(--bt-text-2)', marginBottom: 10 }}>
                  Do you know where you're headed?
                </div>
                <div style={{ display: 'flex', gap: 8 }}>
                  {[
                    { val: true,  label: 'Yes — we have a spot' },
                    { val: false, label: "Let's put it to a vote" },
                  ].map(opt => {
                    const active = destKnown === opt.val
                    return (
                      <button key={String(opt.val)} onClick={() => setDestKnown(opt.val)}
                        style={{ flex: 1, padding: '9px 10px', borderRadius: 8, fontSize: 13, fontWeight: 700, cursor: 'pointer', border: `2px solid ${active ? 'var(--bt-accent)' : 'var(--bt-border)'}`, background: active ? 'var(--bt-tag-bg)' : 'transparent', color: active ? 'var(--bt-accent)' : 'var(--bt-text-3)', transition: 'all .15s' }}>
                        {active && <Ic n="Check" size={12} color="var(--bt-accent)" sw={2.5} style={{ marginRight: 5 }} />}
                        {opt.label}
                      </button>
                    )
                  })}
                </div>
              </div>

              {/* Known: single destination input */}
              {destKnown === true && (
                <div style={{ padding: '16px' }}>
                  <input autoFocus value={knownDest} onChange={e => setKnownDest(e.target.value)}
                    onKeyDown={e => e.key === 'Enter' && canFinish && handleFinish()}
                    placeholder="e.g. Bandon Dunes, OR"
                    style={{ ...inputStyle }}
                    onFocus={e => e.target.style.borderColor = 'var(--bt-accent)'}
                    onBlur={e => e.target.style.borderColor = 'var(--bt-border-input)'} />
                  <p style={{ fontSize: 11, color: 'var(--bt-text-3)', marginTop: 8, lineHeight: 1.5 }}>
                    You can still open up a destination vote from the trip page later.
                  </p>
                </div>
              )}

              {/* Vote path: add destinations + AI */}
              {destKnown === false && (
                <div style={{ padding: '16px', display: 'flex', flexDirection: 'column', gap: 14 }}>

                  {/* Manual add row */}
                  <div>
                    <div style={{ fontSize: 11, fontWeight: 700, textTransform: 'uppercase', letterSpacing: '.07em', color: 'var(--bt-text-3)', marginBottom: 7 }}>
                      Add destinations to compare
                    </div>
                    <div style={{ display: 'flex', gap: 8 }}>
                      <input ref={destInputRef} value={destInput} onChange={e => setDestInput(e.target.value)}
                        onKeyDown={e => e.key === 'Enter' && addManualIdea()}
                        placeholder="e.g. Scottsdale, AZ"
                        style={{ ...inputStyle, flex: 1, fontSize: 13 }}
                        onFocus={e => e.target.style.borderColor = 'var(--bt-accent)'}
                        onBlur={e => e.target.style.borderColor = 'var(--bt-border-input)'} />
                      <button onClick={addManualIdea} disabled={!destInput.trim()}
                        style={{ flexShrink: 0, padding: '10px 14px', borderRadius: 8, border: 'none', cursor: destInput.trim() ? 'pointer' : 'not-allowed', background: destInput.trim() ? 'var(--bt-accent)' : 'var(--bt-border)', color: destInput.trim() ? '#0d1117' : 'var(--bt-text-3)', fontWeight: 700, fontSize: 13, display: 'flex', alignItems: 'center', gap: 5 }}>
                        <Ic n="Plus" size={14} color={destInput.trim() ? '#0d1117' : 'var(--bt-text-3)'} sw={2.5} /> Add
                      </button>
                    </div>
                  </div>

                  {/* Idea chips — manual entries */}
                  {ideaList.filter(i => !i.ai).length > 0 && (
                    <div style={{ display: 'flex', flexWrap: 'wrap', gap: 7 }}>
                      {ideaList.map((idea, i) => !idea.ai ? (
                        <div key={i} style={{ display: 'flex', alignItems: 'center', gap: 6, padding: '5px 10px 5px 9px', borderRadius: 9999, background: 'var(--bt-base)', border: '1px solid var(--bt-border)' }}>
                          <span style={{ fontSize: 13, fontWeight: 600, color: 'var(--bt-text-1)' }}>{idea.title}</span>
                          <button onClick={() => setIdeaList(l => l.filter((_,j) => j !== i))}
                            style={{ background: 'none', border: 'none', cursor: 'pointer', padding: 0, lineHeight: 1, marginLeft: 2, display: 'flex' }}>
                            <Ic n="X" size={12} color="var(--bt-text-3)" />
                          </button>
                        </div>
                      ) : null)}
                    </div>
                  )}

                  {/* AI suggestion cards — vertical list with description */}
                  {ideaList.filter(i => i.ai).length > 0 && (
                    <div style={{ display: 'flex', flexDirection: 'column', gap: 8 }}>
                      <div style={{ fontSize: 11, fontWeight: 700, textTransform: 'uppercase', letterSpacing: '.07em', color: 'var(--bt-text-3)', display: 'flex', alignItems: 'center', gap: 5 }}>
                        <Ic n="Sparkles" size={11} color="var(--bt-text-3)" /> BuddyTrip suggestions
                      </div>
                      {ideaList.map((idea, i) => !idea.ai ? null : (
                        <div key={i} style={{ display: 'flex', alignItems: 'flex-start', gap: 10, padding: '10px 12px', borderRadius: 9, background: 'rgba(0,212,170,.06)', border: '1px solid var(--bt-accent)25' }}>
                          <Ic n="MapPin" size={14} color="var(--bt-accent)" style={{ flexShrink: 0, marginTop: 2 }} />
                          <div style={{ flex: 1, minWidth: 0 }}>
                            <div style={{ fontSize: 13, fontWeight: 700, color: 'var(--bt-text-1)', marginBottom: 2 }}>{idea.title}</div>
                            {idea.desc && <div style={{ fontSize: 12, color: 'var(--bt-text-3)', lineHeight: 1.55 }}>{idea.desc}</div>}
                          </div>
                          <button onClick={() => setIdeaList(l => l.filter((_,j) => j !== i))}
                            style={{ background: 'none', border: 'none', cursor: 'pointer', padding: 2, flexShrink: 0, display: 'flex' }}>
                            <Ic n="X" size={13} color="var(--bt-text-3)" />
                          </button>
                        </div>
                      ))}
                    </div>
                  )}

                  {/* Divider */}
                  <div style={{ display: 'flex', alignItems: 'center', gap: 10 }}>
                    <div style={{ flex: 1, height: 1, background: 'var(--bt-border)' }} />
                    <span style={{ fontSize: 11, color: 'var(--bt-text-3)', fontWeight: 600 }}>tell us a little about your trip and we'll tailor the suggestions</span>
                    <div style={{ flex: 1, height: 1, background: 'var(--bt-border)' }} />
                  </div>

                  {/* Crew description + AI button */}
                  <div>
                    <textarea value={crewDesc} onChange={e => setCrewDesc(e.target.value)}
                      rows={2} placeholder="e.g. 6 guys, links lovers, mid-range budget, did Bandon last year…"
                      style={{ ...inputStyle, fontSize: 13, resize: 'none', lineHeight: 1.6, marginBottom: 8 }}
                      onFocus={e => e.target.style.borderColor = 'var(--bt-accent)'}
                      onBlur={e => e.target.style.borderColor = 'var(--bt-border-input)'} />
                    <div style={{ display: 'flex', alignItems: 'center', gap: 10 }}>
                      <button onClick={handleAiSeed} disabled={aiSeeding}
                        style={{ display: 'flex', alignItems: 'center', gap: 7, padding: '8px 14px', borderRadius: 8, border: 'none', cursor: aiSeeding ? 'default' : 'pointer', background: 'var(--bt-tag-bg)', color: 'var(--bt-accent)', fontSize: 13, fontWeight: 700, opacity: aiSeeding ? .7 : 1 }}>
                        {aiSeeding
                          ? <><Ic n="Loader2" size={13} color="var(--bt-accent)" style={{ animation: 'spin 1s linear infinite' }} /> Thinking…</>
                          : <><Ic n="Sparkles" size={13} color="var(--bt-accent)" /> {hasAiRun ? '3 More Ideas' : 'Suggest 3 Ideas'}</>}
                      </button>
                      {ideaList.length === 0 && (
                        <span style={{ fontSize: 11, color: 'var(--bt-text-3)', lineHeight: 1.4 }}>
                          Add at least one — more can be added from the trip page
                        </span>
                      )}
                    </div>
                  </div>
                </div>
              )}
            </div>

            <div style={{ display: 'flex', justifyContent: 'space-between', gap: 12 }}>
              <button onClick={() => setStep(1)}
                style={{ fontSize: 13, fontWeight: 600, padding: '10px 18px', borderRadius: 8, border: '1px solid var(--bt-border)', background: 'transparent', color: 'var(--bt-text-3)', cursor: 'pointer' }}>
                ← Back
              </button>
              <button onClick={handleFinish} disabled={!canFinish}
                style={{ fontSize: 14, fontWeight: 700, padding: '11px 28px', borderRadius: 8, border: 'none', cursor: canFinish ? 'pointer' : 'not-allowed', background: canFinish ? 'var(--bt-accent)' : 'var(--bt-border)', color: canFinish ? '#0d1117' : 'var(--bt-text-3)', boxShadow: canFinish ? '0 0 20px var(--bt-accent)30' : 'none', transition: 'all .2s' }}>
                {destKnown === true
                  ? "Let's Go →"
                  : destKnown === false
                    ? ideaList.length > 1
                      ? `Start the Vote (${ideaList.length}) →`
                      : 'Create Trip →'
                    : 'Continue →'}
              </button>
            </div>
          </>
        )}
      </div>
      <BottomNav active="trip-new" navigate={navigate} />
    </div>
  )
}

// ── COMPONENT: TripSettingsPanel ────────────────────────────────
const MOCK_SERIES = [
  { _id: 'series-bbmi', name: 'BBMI', fullName: 'Buddy Banks Memorial Invitational', years: '2019–present', trips: 6 },
  { _id: 'series-ryder', name: 'Ryder Knockoff', fullName: 'The Ryder Knockoff Cup', years: '2022–present', trips: 3 },
]

function TripSettingsPanel({ trip, showToast, navigate, notify }) {
  const [open, setOpen] = React.useState(null)  // 'series' | 'transfer' | 'archive' | 'delete'
  const toggle = key => setOpen(o => o === key ? null : key)

  // Series state
  const [linkedSeries, setLinkedSeries] = React.useState(trip._id === 'trip-bbmi-live' || trip._id === 'trip-bbmi' ? 'series-bbmi' : null)
  const [newSeriesName, setNewSeriesName] = React.useState('')
  const [creatingNew, setCreatingNew] = React.useState(false)

  // Transfer state
  const crew = (trip.attendees || []).filter(m => m.userId !== 'brad')
  const [selectedNew, setSelectedNew] = React.useState(null)
  const [confirmTransfer, setConfirmTransfer] = React.useState(false)

  // Competition toggle (passed down as prop in real app; simulate locally)
  const [compEnabled, setCompEnabled] = React.useState(true)

  // Archive state
  const [archiveConfirm, setArchiveConfirm] = React.useState(false)

  // Delete state
  const [deleteInput, setDeleteInput] = React.useState('')
  const deleteMatch = deleteInput.trim().toLowerCase() === trip.title.trim().toLowerCase()

  function handleSeriesSave(seriesId) {
    setLinkedSeries(seriesId)
    showToast(seriesId ? `Linked to ${MOCK_SERIES.find(s => s._id === seriesId)?.name}` : 'Series unlinked')
    setOpen(null)
  }

  function handleCreateSeries() {
    if (!newSeriesName.trim()) return
    showToast(`Series "${newSeriesName}" created & linked!`)
    setLinkedSeries('series-new')
    setCreatingNew(false)
    setNewSeriesName('')
    setOpen(null)
  }

  function handleTransfer() {
    if (!selectedNew) return
    const name = crew.find(m => m.userId === selectedNew)?.name || 'them'
    showToast(`Ownership transferred to ${name.split(' ')[0]}`)
    setConfirmTransfer(false)
    setSelectedNew(null)
    setOpen(null)
  }

  function handleArchive() {
    showToast('Trip archived — moved to Past Trips')
    navigate('trips')
  }

  function handleDelete() {
    if (!deleteMatch) return
    showToast('Trip deleted')
    navigate('trips')
  }

  // ── Shared row shell ─────────────────────────────────────────────
  const isOpen = key => open === key

  function SettingRow({ id, label, sublabel, icon, danger, toggle: onToggle, isToggle, toggleVal, children }) {
    const expanded = isOpen(id)
    return (
      <div style={{ borderRadius: 10, overflow: 'hidden', border: `1px solid ${expanded ? (danger ? 'var(--bt-danger)' : 'var(--bt-accent)') : danger ? '#f8514930' : 'var(--bt-border)'}`, transition: 'border-color .2s' }}>
        {isToggle ? (
          <div style={{ display: 'flex', alignItems: 'center', gap: 12, padding: '12px 16px', background: 'var(--bt-card)' }}>
            <Ic n={icon} size={18} color="var(--bt-accent)" />
            <div style={{ flex: 1 }}>
              <div style={{ fontSize: 14, fontWeight: 600, color: 'var(--bt-text-1)' }}>{label}</div>
              {sublabel && <div style={{ fontSize: 12, color: 'var(--bt-text-3)', marginTop: 2 }}>{sublabel}</div>}
            </div>
            <button onClick={onToggle}
              style={{ width: 44, height: 24, borderRadius: 9999, border: 'none', cursor: 'pointer', transition: 'background .2s', position: 'relative', background: toggleVal ? 'var(--bt-accent)' : '#333', flexShrink: 0 }}>
              <div style={{ position: 'absolute', top: 2, left: toggleVal ? 22 : 2, width: 20, height: 20, borderRadius: '50%', background: '#fff', transition: 'left .2s' }} />
            </button>
          </div>
        ) : (
          <button onClick={() => toggle(id)}
            style={{ width: '100%', display: 'flex', alignItems: 'center', gap: 12, padding: '12px 16px', background: 'var(--bt-card)', border: 'none', cursor: 'pointer', textAlign: 'left' }}>
            <Ic n={icon} size={18} color="var(--bt-accent)" />
            <div style={{ flex: 1 }}>
              <div style={{ fontSize: 14, fontWeight: 600, color: danger ? 'var(--bt-danger)' : 'var(--bt-text-1)' }}>{label}</div>
              {sublabel && <div style={{ fontSize: 12, color: 'var(--bt-text-3)', marginTop: 2 }}>{sublabel}</div>}
            </div>
            <span style={{ color: 'var(--bt-text-3)', fontSize: 18, transition: 'transform .2s', transform: expanded ? 'rotate(90deg)' : 'none' }}>›</span>
          </button>
        )}
        {expanded && (
          <div style={{ padding: '0 16px 16px', background: 'var(--bt-base)', borderTop: `1px solid ${danger ? '#f8514920' : 'var(--bt-border)'}` }}>
            {children}
          </div>
        )}
      </div>
    )
  }

  const currentSeries = MOCK_SERIES.find(s => s._id === linkedSeries)

  return (
    <div style={{ borderRadius: 12, border: '1px solid #f8514930', overflow: 'hidden' }}>
      {/* Header */}
      <div style={{ padding: '14px 16px', background: 'var(--bt-card)', borderBottom: '1px solid var(--bt-border)' }}>
        <div style={{ fontSize: 11, fontWeight: 700, textTransform: 'uppercase', letterSpacing: '.08em', color: 'var(--bt-text-3)' }}>Trip Settings</div>
      </div>

      <div style={{ display: 'flex', flexDirection: 'column', gap: 1, background: 'var(--bt-base)', padding: '12px 12px' }}>

        {/* 1 — Assign to Series */}
        <SettingRow id="series" icon="Trophy" label="Assign to Series"
          sublabel={currentSeries ? `Linked to ${currentSeries.name}` : 'Not linked to a series'}>
          <div style={{ paddingTop: 14 }}>
            {currentSeries && (
              <div style={{ marginBottom: 14, padding: '12px 14px', borderRadius: 10, background: 'var(--bt-card)', border: '1px solid var(--bt-accent)40', display: 'flex', alignItems: 'center', gap: 12 }}>
                <span style={{ fontSize: 22, display:"flex", alignItems:"center", justifyContent:"center" }}><Ic n="Trophy" size={22} color="var(--bt-accent)" /></span>
                <div style={{ flex: 1 }}>
                  <div style={{ fontSize: 14, fontWeight: 700, color: 'var(--bt-accent)' }}>{currentSeries.name}</div>
                  <div style={{ fontSize: 12, color: 'var(--bt-text-3)' }}>{currentSeries.fullName} · {currentSeries.trips} trips · {currentSeries.years}</div>
                </div>
                <button onClick={() => handleSeriesSave(null)} style={{ fontSize: 12, padding: '4px 10px', borderRadius: 6, background: 'transparent', border: '1px solid var(--bt-border)', color: 'var(--bt-text-3)', cursor: 'pointer' }}>Unlink</button>
              </div>
            )}
            {!creatingNew ? (
              <>
                <p style={{ fontSize: 12, color: 'var(--bt-text-3)', marginBottom: 10 }}>Select a series to link this trip to, or create a new one.</p>
                <div style={{ display: 'flex', flexDirection: 'column', gap: 6, marginBottom: 12 }}>
                  {MOCK_SERIES.map(s => (
                    <button key={s._id} onClick={() => handleSeriesSave(s._id)}
                      style={{ display: 'flex', alignItems: 'center', gap: 12, padding: '10px 14px', borderRadius: 8, background: linkedSeries === s._id ? 'var(--bt-tag-bg)' : 'var(--bt-card)', border: `1px solid ${linkedSeries === s._id ? 'var(--bt-accent)' : 'var(--bt-border)'}`, cursor: 'pointer', textAlign: 'left' }}>
                      <div style={{ flex: 1 }}>
                        <span style={{ fontSize: 14, fontWeight: 600, color: linkedSeries === s._id ? 'var(--bt-accent)' : 'var(--bt-text-1)' }}>{s.name}</span>
                        <span style={{ fontSize: 12, color: 'var(--bt-text-3)', marginLeft: 8 }}>{s.trips} trips · {s.years}</span>
                      </div>
                      {linkedSeries === s._id && <span style={{ color: 'var(--bt-accent)' }}>✓</span>}
                    </button>
                  ))}
                </div>
                <button onClick={() => setCreatingNew(true)} style={{ fontSize: 13, fontWeight: 600, padding: '8px 14px', borderRadius: 8, background: 'transparent', border: '1px dashed var(--bt-accent)60', color: 'var(--bt-accent)', cursor: 'pointer' }}>+ Create new series</button>
              </>
            ) : (
              <div>
                <p style={{ fontSize: 12, color: 'var(--bt-text-3)', marginBottom: 10 }}>A series is a named recurring event. The series owns the historical record — ownership of trips within it can change independently.</p>
                <input autoFocus placeholder="Series name (e.g. BBMI)" value={newSeriesName} onChange={e => setNewSeriesName(e.target.value)}

// ── TripChat — scrollable message board with new-message indicator ──
function TripChat({ messages, setMessages, msgDraft, setMsgDraft, maxHeight = 320, onSend }) {
  const { useRef, useEffect, useState } = React
  const scrollRef = useRef(null)
  const [atBottom, setAtBottom] = useState(true)
  const [unread, setUnread] = useState(0)

  const fmtMsgTime = (d) => {
    const now = new Date(), dt = new Date(d)
    const diffDays = Math.floor((now - dt) / 86400000)
    if (diffDays === 0) return dt.toLocaleTimeString('en-US', { hour: 'numeric', minute: '2-digit' })
    if (diffDays === 1) return 'Yesterday · ' + dt.toLocaleTimeString('en-US', { hour: 'numeric', minute: '2-digit' })
    return dt.toLocaleDateString('en-US', { month: 'short', day: 'numeric' }) + ' · ' + dt.toLocaleTimeString('en-US', { hour: 'numeric', minute: '2-digit' })
  }

  const scrollToBottom = (smooth = true) => {
    if (scrollRef.current) scrollRef.current.scrollTo({ top: scrollRef.current.scrollHeight, behavior: smooth ? 'smooth' : 'instant' })
  }

  // On mount, jump to bottom without animation
  useEffect(() => { scrollToBottom(false) }, [])

  // When messages change: if already at bottom, follow; otherwise show unread badge
  useEffect(() => {
    if (atBottom) { scrollToBottom(); setUnread(0) }
    else setUnread(u => u + 1)
  }, [messages.length])

  const handleScroll = (e) => {
    const el = e.currentTarget
    const isNearBottom = el.scrollHeight - el.scrollTop - el.clientHeight < 40
    setAtBottom(isNearBottom)
    if (isNearBottom) setUnread(0)
  }

  const sendMsg = () => {
    const text = msgDraft.trim()
    if (!text) return
    setMessages(m => [...m, { _id: `msg-${Date.now()}`, userId: CURRENT_USER._id, text, createdAt: new Date() }])
    if (onSend) onSend(text)
    setMsgDraft('')
    setAtBottom(true)
  }

  return (
    <Card>
      <div style={{ display: 'flex', alignItems: 'center', gap: 8, marginBottom: 12 }}>
        <Ic n="MessageCircle" size={15} color="var(--bt-accent)" />
        <span style={{ fontSize: 13, fontWeight: 700, color: 'var(--bt-text-1)' }}>Trip Chat</span>
        {messages.length > 0 && <span style={{ fontSize: 11, color: 'var(--bt-text-3)' }}>{messages.length} message{messages.length !== 1 ? 's' : ''}</span>}
      </div>

      {/* Scrollable message window */}
      <div style={{ position: 'relative' }}>
        <div ref={scrollRef} onScroll={handleScroll}
          style={{ maxHeight, overflowY: 'auto', display: 'flex', flexDirection: 'column', gap: 10, marginBottom: 12,
            scrollbarWidth: 'thin', scrollbarColor: 'var(--bt-border) transparent' }}>
          {messages.length === 0 ? (
            <p style={{ fontSize: 13, color: 'var(--bt-text-3)', margin: '12px 0', textAlign: 'center' }}>No messages yet — say something.</p>
          ) : messages.map(m => {
            const isMe = m.userId === CURRENT_USER._id
            return (
              <div key={m._id} style={{ display: 'flex', gap: 8, alignItems: 'flex-start', flexDirection: isMe ? 'row-reverse' : 'row' }}>
                {!isMe && <Avatar name={USERS[m.userId]?.name || m.userId} size="sm" />}
                <div style={{ maxWidth: '78%' }}>
                  {!isMe && (
                    <div style={{ display: 'flex', alignItems: 'baseline', gap: 6, marginBottom: 3, paddingLeft: 2 }}>
                      <span style={{ fontSize: 11, fontWeight: 700, color: 'var(--bt-accent)' }}>{USERS[m.userId]?.nickname || m.userId}</span>
                      <span style={{ fontSize: 10, color: 'var(--bt-text-3)' }}>{fmtMsgTime(m.createdAt)}</span>
                    </div>
                  )}
                  <div style={{ fontSize: 13, padding: '8px 11px', lineHeight: 1.45,
                    borderRadius: isMe ? '12px 12px 4px 12px' : '12px 12px 12px 4px',
                    background: isMe ? 'var(--bt-accent)' : 'var(--bt-base)',
                    color: isMe ? '#0d1117' : 'var(--bt-text-1)' }}>
                    {m.text}
                  </div>
                  {isMe && <div style={{ fontSize: 10, color: 'var(--bt-text-3)', textAlign: 'right', marginTop: 3, paddingRight: 2 }}>{fmtMsgTime(m.createdAt)}</div>}
                </div>
              </div>
            )
          })}
        </div>

        {/* New messages indicator — floats above input when scrolled up */}
        {!atBottom && unread > 0 && (
          <button onClick={() => { scrollToBottom(); setUnread(0) }}
            style={{ position: 'absolute', bottom: 16, left: '50%', transform: 'translateX(-50%)', display: 'flex', alignItems: 'center', gap: 5,
              fontSize: 11, fontWeight: 700, padding: '5px 12px', borderRadius: 9999, border: 'none', cursor: 'pointer',
              background: 'var(--bt-accent)', color: '#0d1117', boxShadow: '0 2px 8px rgba(0,0,0,.4)', zIndex: 10 }}>
            ↓ {unread} new message{unread !== 1 ? 's' : ''}
          </button>
        )}
      </div>

      {/* Input row */}
      <div style={{ display: 'flex', gap: 8, alignItems: 'center' }}>
        <input value={msgDraft} onChange={e => setMsgDraft(e.target.value)}
          onKeyDown={e => { if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMsg() } }}
          placeholder="Message the crew…"
          style={{ flex: 1, fontSize: 13, padding: '8px 11px', borderRadius: 8, background: 'var(--bt-input)', border: '1px solid var(--bt-border-input)', color: 'var(--bt-text-1)', outline: 'none' }}
          onFocus={e => e.target.style.borderColor = 'var(--bt-accent)'}
          onBlur={e => e.target.style.borderColor = 'var(--bt-border-input)'} />
        <button onClick={sendMsg} disabled={!msgDraft.trim()}
          style={{ padding: '8px 12px', borderRadius: 8, border: 'none', cursor: msgDraft.trim() ? 'pointer' : 'default',
            background: msgDraft.trim() ? 'var(--bt-accent)' : 'var(--bt-card)',
            color: msgDraft.trim() ? '#0d1117' : 'var(--bt-text-3)', transition: 'all .15s', display: 'flex', alignItems: 'center' }}>
          <Ic n="Send" size={14} color="currentColor" />
        </button>
      </div>
    </Card>
  )
}

              action: () => effectiveComparisonMode ? setDestVoteOpen(v => !v) : navigate('idea-comparison', { tripId: trip._id }),

                    background: s.done ? 'var(--bt-tag-bg)' : s.inProgress ? '#1a1200' : 'var(--bt-card)',

                  onMouseEnter={e => e.currentTarget.style.borderColor = s.done ? 'var(--bt-accent)' : s.inProgress ? '#f59e0b' : 'var(--bt-accent)50'}

                </button>

        <AboutCard trip={trip} canEdit={canEdit} />

        {/* ── Messages teaser ── */}
        {(() => {
          const unread = messages.filter(m => m.userId !== CURRENT_USER._id).length
          const teamUnread = teamMessages.filter(m => m.userId !== CURRENT_USER._id).length
          const totalUnread = unread + teamUnread
          const lastMsg = [...messages, ...teamMessages].sort((a, b) => new Date(b.createdAt) - new Date(a.createdAt))[0]
          return (
            <div onClick={() => navigate('trip-messages', { tripId })}
              style={{ borderRadius: 12, padding: '12px 14px', background: 'var(--bt-card)', border: `1px solid ${totalUnread > 0 ? 'var(--bt-accent)50' : 'var(--bt-border)'}`, cursor: 'pointer', display: 'flex', alignItems: 'center', gap: 12, transition: 'border-color .15s' }}
              onMouseEnter={e => e.currentTarget.style.borderColor = 'var(--bt-accent)'}
              onMouseLeave={e => e.currentTarget.style.borderColor = totalUnread > 0 ? 'var(--bt-accent)50' : 'var(--bt-border)'}>
              <div style={{ position: 'relative', flexShrink: 0 }}>
                <Ic n="MessageCircle" size={22} color={totalUnread > 0 ? 'var(--bt-accent)' : 'var(--bt-text-3)'} />
                {totalUnread > 0 && <span style={{ position: 'absolute', top: -4, right: -5, minWidth: 14, height: 14, borderRadius: 9999, background: 'var(--bt-danger)', color: '#fff', fontSize: 9, fontWeight: 800, display: 'flex', alignItems: 'center', justifyContent: 'center', padding: '0 3px' }}>{totalUnread > 9 ? '9+' : totalUnread}</span>}
              </div>
              <div style={{ flex: 1, minWidth: 0 }}>
                <div style={{ display: 'flex', alignItems: 'center', justifyContent: 'space-between', marginBottom: 2 }}>
                  <span style={{ fontSize: 13, fontWeight: 700, color: 'var(--bt-text-1)' }}>Messages</span>
                  {totalUnread > 0 && <span style={{ fontSize: 11, fontWeight: 700, color: 'var(--bt-danger)' }}>{totalUnread} unread</span>}
                </div>
                {lastMsg
                  ? <p style={{ margin: 0, fontSize: 12, color: 'var(--bt-text-3)', overflow: 'hidden', textOverflow: 'ellipsis', whiteSpace: 'nowrap' }}><span style={{ color: 'var(--bt-text-2)', fontWeight: 600 }}>{USERS[lastMsg.userId]?.nickname || lastMsg.userId}:</span> {lastMsg.text}</p>
                  : <p style={{ margin: 0, fontSize: 12, color: 'var(--bt-text-3)' }}>No messages yet — start the conversation</p>

      </div>

  function CrewTab() {
    // ── "Frequently trips with" — BBMI series history ────────────
    const BBMI_HISTORY = [
      { userId: 'kevin',  name: 'Kevin Stoll',   hasAccount: true  },
      { userId: 'matt',   name: 'Matt Siders',   hasAccount: true  },
      { userId: 'derek',  name: 'Derek Lund',    hasAccount: false },
      { userId: 'scott',  name: 'Scott Harwick', hasAccount: true  },
      { userId: 'nick',   name: 'Nick Paulson',  hasAccount: false },
    ]

    // ── Email-only account lookup ────────────────────────────────
    const KNOWN_ACCOUNTS = [
      { userId: 'mike',  name: 'Mike Donovan',  email: 'mike.donovan@gmail.com' },
      { userId: 'paul',  name: 'Paul Schaefer', email: 'paul.s@outlook.com'     },
      { userId: 'lance', name: 'Lance Watts',   email: 'lwatts@gmail.com'       },
    ]

    // ── Local roster state now lifted to TripDetail ──────────────
    const currentIds = new Set(roster.map(a => a.userId))

    // ── Add-to-roster form ────────────────────────────────────────
    const [addName,  setAddName]  = useState('')
    const [addEmail, setAddEmail] = useState('')
    const [addError, setAddError] = useState('')

    function handleAddToRoster() {
      const name = addName.trim()
      if (!name) { setAddError('Name is required'); return }
      const id = 'ghost-' + Date.now()
      const emailTrimmed = addEmail.trim()
      // Check if email matches a known account
      const account = emailTrimmed ? KNOWN_ACCOUNTS.find(a => a.email.toLowerCase() === emailTrimmed.toLowerCase()) : null
      setRoster(r => [...r, {
        name,
        userId: account ? account.userId : id,
        status: 'maybe',
        role: 'Member',
        hasAccount: !!account,
        isGhost: !account,
        email: emailTrimmed || null,
        inviteSent: false,
      }])
      setAddName('')
      setAddEmail('')
      setAddError('')
      if (notify) notify({ type: 'crew_added', tripId: trip._id, actorId: CURRENT_USER._id, payload: { memberName: name.split(' ')[0] } })
      showToast(name.split(' ')[0] + ' added to roster')
    }

    // ── Frequently trips with quick-add ──────────────────────────
    const freqSuggestions = BBMI_HISTORY.filter(h => !currentIds.has(h.userId))

    function quickAdd(person) {
      setRoster(r => [...r, {
        name: person.name,
        userId: person.userId,
        status: 'maybe',
        role: 'Member',
        hasAccount: person.hasAccount,
        isGhost: !person.hasAccount,
        inviteSent: false,
      }])
      if (notify) notify({ type: 'crew_added', tripId: trip._id, actorId: CURRENT_USER._id, payload: { memberName: person.name.split(' ')[0] } })
      showToast(person.name.split(' ')[0] + ' added')
    }

    // ── Per-person expand panel ───────────────────────────────────
    const [expandedId, setExpandedId] = useState(null)
    const [editEmailId, setEditEmailId] = useState(null)
    const [editEmailVal, setEditEmailVal] = useState('')

    function saveEmail(userId) {
      setRoster(r => r.map(m => m.userId === userId ? { ...m, email: editEmailVal.trim() || m.email } : m))
      setEditEmailId(null)
      showToast('Email saved')
    }

    function sendInvite(member) {
      setRoster(r => r.map(m => m.userId === member.userId ? { ...m, inviteSent: true } : m))
      const msg = member.hasAccount
        ? `${member.name.split(' ')[0]} invited to join this trip`
        : `Email invite sent to ${member.email}`
      showToast(msg)
    }

    function promoteToPlanner(userId) {
      setRoster(r => r.map(m => m.userId === userId ? { ...m, role: 'Planner' } : m))
      showToast('Promoted to Planner')
    }
    function demoteToMember(userId) {
      setRoster(r => r.map(m => m.userId === userId ? { ...m, role: 'Member' } : m))
      showToast('Moved to Member')
    }
    function removeMember(userId) {
      setRoster(r => r.filter(m => m.userId !== userId))
      setExpandedId(null)
      showToast('Removed from trip')
    }

    const confirmed = roster.filter(a => a.status === 'in')
    const pending   = roster.filter(a => a.status !== 'in')

    // ── Member row component ──────────────────────────────────────
    // ── Mock BBMI series history per person ──────────────────────
    const SERIES_HISTORY = {
      'brad':    { years: ['2019','2020','2021','2022','2023','2024','2025'], wins: 3, losses: 4, hcp: 8  },
      'zach':    { years: ['2019','2020','2021','2022','2023','2024','2025'], wins: 4, losses: 3, hcp: 12 },
      'jd':      { years: ['2020','2021','2022','2023','2024','2025'],        wins: 2, losses: 4, hcp: 18 },
      'rob':     { years: ['2021','2022','2023','2024','2025'],               wins: 1, losses: 4, hcp: 22 },
      'tyler':   { years: ['2022','2023','2024','2025'],                      wins: 2, losses: 2, hcp: 15 },
      'charlie': { years: ['2023','2024','2025'],                             wins: 1, losses: 2, hcp: 20 },
      'bj':      { years: ['2021','2022','2023','2024','2025'],               wins: 3, losses: 2, hcp: 10 },
      'ben':     { years: ['2024','2025'],                                    wins: 0, losses: 2, hcp: 24 },
    }

    function MemberRow({ member }) {
      const isExpanded = expandedId === member.userId
      const isMe = (viewerRole === 'Owner' && member.userId === 'brad') ||
                   (viewerRole === 'Planner' && member.userId === 'zach') ||
                   (viewerRole === 'Member' && member.userId === 'rob')
      const history = SERIES_HISTORY[member.userId]

      return (
        <div style={{ borderRadius: 10, overflow: 'hidden', border: `1px solid ${isExpanded ? 'var(--bt-accent)40' : 'transparent'}`, marginBottom: 2, transition: 'border-color .2s' }}>
          {/* Main row */}
          <div
            onClick={() => setExpandedId(isExpanded ? null : member.userId)}
            style={{ display: 'flex', alignItems: 'center', gap: 12, padding: '10px 8px', borderRadius: isExpanded ? '10px 10px 0 0' : 10, cursor: 'pointer', background: isExpanded ? 'var(--bt-card)' : 'transparent' }}>
            {/* Avatar — ghost gets faded */}

                      <div style={{ fontSize: 18, fontWeight: 800, color: 'var(--bt-text-1)', fontFamily: 'monospace' }}>{history.hcp}</div>

                    </div>
                  </div>
                  <div style={{ display: 'flex', gap: 4, flexWrap: 'wrap' }}>
                    {history.years.map(y => (

                  </div>

              {canEdit && !isMe && (

                      <div style={{ fontSize: 13, color: 'var(--bt-accent)', fontWeight: 600 }}>✓ Invite already sent</div>
                    ) : (
                      <button onClick={() => sendInvite(member)}
                        style={{ fontSize: 13, fontWeight: 700, padding: '7px 18px', borderRadius: 8, border: 'none', cursor: 'pointer', background: 'var(--bt-accent)', color: '#0d1117' }}>
                        {member.hasAccount ? '📲 Send Trip Invite' : '📧 Send Email Invite'}
                      </button>
                    )
                  ) : (
                    <div>
                      <div style={{ fontSize: 12, color: 'var(--bt-text-3)', marginBottom: 8 }}>Add an email address to send an invite.</div>
                      {editEmailId === member.userId ? (
                        <div style={{ display: 'flex', gap: 6 }}>
                          <input autoFocus placeholder="email@example.com" value={editEmailVal}
                            onChange={e => setEditEmailVal(e.target.value)}
                            onKeyDown={e => e.key === 'Enter' && saveEmail(member.userId)}
                            style={{ flex: 1, fontSize: 13, padding: '7px 10px', borderRadius: 7, background: 'var(--bt-input)', border: '1px solid var(--bt-accent)', color: 'var(--bt-text-1)', outline: 'none' }} />
                          <button onClick={() => saveEmail(member.userId)}
                            style={{ fontSize: 12, fontWeight: 700, padding: '7px 14px', borderRadius: 7, border: 'none', cursor: 'pointer', background: 'var(--bt-accent)', color: '#0d1117' }}>Save</button>
                          <button onClick={() => setEditEmailId(null)}
                            style={{ fontSize: 12, padding: '7px 10px', borderRadius: 7, background: 'transparent', border: '1px solid var(--bt-border)', color: 'var(--bt-text-3)', cursor: 'pointer' }}>✕</button>
                        </div>
                      ) : (
                        <button onClick={() => { setEditEmailId(member.userId); setEditEmailVal('') }}
                          style={{ fontSize: 12, fontWeight: 600, padding: '6px 12px', borderRadius: 7, background: 'transparent', border: '1px dashed var(--bt-accent)60', color: 'var(--bt-accent)', cursor: 'pointer' }}>
                          + Add email
                        </button>
                      )}
                    </div>
                  )}
                </div>
              )}

              {/* Role management — owner only, not self */}
              {isOwner && !isMe && (
                <div style={{ display: 'flex', gap: 6, flexWrap: 'wrap', paddingTop: canEdit ? 10 : 0, borderTop: canEdit ? '1px solid var(--bt-border)' : 'none' }}>
                  {member.role === 'Member' && (
                    <button onClick={() => promoteToPlanner(member.userId)}
                      style={{ fontSize: 12, fontWeight: 600, padding: '5px 12px', borderRadius: 7, cursor: 'pointer', background: 'transparent', border: '1px solid var(--bt-border)', color: 'var(--bt-text-2)' }}>

                    </button>
                  )}
                  {member.role === 'Planner' && (
                    <button onClick={() => demoteToMember(member.userId)}
                      style={{ fontSize: 12, fontWeight: 600, padding: '5px 12px', borderRadius: 7, cursor: 'pointer', background: 'transparent', border: '1px solid var(--bt-border)', color: 'var(--bt-text-2)' }}>
                      ⬇️ Move to Member
                    </button>
                  )}
                  <button onClick={() => removeMember(member.userId)}
                    style={{ fontSize: 12, fontWeight: 600, padding: '5px 12px', borderRadius: 7, cursor: 'pointer', background: 'transparent', border: '1px solid var(--bt-danger)40', color: 'var(--bt-danger)' }}>
                    🚫 Remove
                  </button>
                </div>
              )}
            </div>
          )}
        </div>
      )
    }

    return (
      <div style={{ display: 'flex', flexDirection: 'column', gap: 18 }}>

        {/* BuddyTrip account legend */}
        <div style={{ display: 'flex', alignItems: 'center', gap: 6, padding: '6px 10px', borderRadius: 7, background: 'var(--bt-card)', border: '1px solid var(--bt-border)', alignSelf: 'flex-start' }}>
          <span style={{ fontSize: 11, color: '#3b82f6', fontWeight: 900 }}>●</span>
          <span style={{ fontSize: 11, color: 'var(--bt-text-3)' }}>BuddyTrip account</span>
          <span style={{ fontSize: 11, color: 'var(--bt-text-3)', margin: '0 4px' }}>·</span>
          <Ic n="Ghost" size={14} color="var(--bt-text-3)" />
          <span style={{ fontSize: 11, color: 'var(--bt-text-3)' }}>No account (ghost)</span>
        </div>

        {/* ── ADD TO ROSTER ─────────────────────────────────────── */}
        {canEdit && (
          <Card>
            <SectionLabel>Add to Roster</SectionLabel>
            <p style={{ fontSize: 12, marginBottom: 12, color: 'var(--bt-text-3)' }}>
              Add anyone — name only is fine. Email is optional and only used to send an invite.
            </p>
            <div style={{ display: 'flex', gap: 8, marginBottom: 8 }}>
              <input
                placeholder="Full name *"
                value={addName}
                onChange={e => { setAddName(e.target.value); setAddError('') }}
                onKeyDown={e => e.key === 'Enter' && handleAddToRoster()}
                style={{ flex: 2, fontSize: 14, padding: '9px 12px', borderRadius: 8, outline: 'none', background: 'var(--bt-input)', border: `1px solid ${addError ? 'var(--bt-danger)' : 'var(--bt-border-input)'}`, color: 'var(--bt-text-1)', transition: 'border-color .15s' }}
                onFocus={e => e.target.style.borderColor = 'var(--bt-accent)'}
                onBlur={e => e.target.style.borderColor = addError ? 'var(--bt-danger)' : 'var(--bt-border-input)'}
              />
              <input
                placeholder="Email (optional)"
                value={addEmail}
                onChange={e => setAddEmail(e.target.value)}
                onKeyDown={e => e.key === 'Enter' && handleAddToRoster()}
                style={{ flex: 3, fontSize: 14, padding: '9px 12px', borderRadius: 8, outline: 'none', background: 'var(--bt-input)', border: '1px solid var(--bt-border-input)', color: 'var(--bt-text-1)', transition: 'border-color .15s' }}
                onFocus={e => e.target.style.borderColor = 'var(--bt-accent)'}
                onBlur={e => e.target.style.borderColor = 'var(--bt-border-input)'}
              />
              <button onClick={handleAddToRoster}
                style={{ fontSize: 13, fontWeight: 700, padding: '9px 16px', borderRadius: 8, border: 'none', cursor: 'pointer', background: 'var(--bt-accent)', color: '#0d1117', flexShrink: 0 }}>
                Add
              </button>
            </div>
            {addError && <div style={{ fontSize: 12, color: 'var(--bt-danger)', marginBottom: 8 }}>{addError}</div>}

            {/* Frequently trips with */}
            {freqSuggestions.length > 0 && (
              <div style={{ marginTop: 10 }}>
                <div style={{ fontSize: 11, fontWeight: 700, textTransform: 'uppercase', letterSpacing: '.07em', color: 'var(--bt-text-3)', marginBottom: 8 }}>Frequently trips with (BBMI)</div>
                <div style={{ display: 'flex', flexWrap: 'wrap', gap: 6 }}>
                  {freqSuggestions.map(p => (
                    <button key={p.userId} onClick={() => quickAdd(p)}
                      style={{ display: 'flex', alignItems: 'center', gap: 6, fontSize: 12, fontWeight: 600, padding: '5px 10px', borderRadius: 9999, cursor: 'pointer', background: 'var(--bt-card)', border: '1px solid var(--bt-border)', color: 'var(--bt-text-2)', transition: 'border-color .15s, color .15s' }}
                      onMouseEnter={e => { e.currentTarget.style.borderColor = 'var(--bt-accent)'; e.currentTarget.style.color = 'var(--bt-accent)' }}
                      onMouseLeave={e => { e.currentTarget.style.borderColor = 'var(--bt-border)'; e.currentTarget.style.color = 'var(--bt-text-2)' }}>
                      <Avatar name={p.name} size="xs" />
                      {p.name.split(' ')[0]}
                      {p.hasAccount && <span style={{ fontSize: 10, color: '#3b82f6' }}>●</span>}
                    </button>
                  ))}
                </div>

              </div>
            )}
          </Card>
        )}

        {/* ── CONFIRMED ROSTER ──────────────────────────────────── */}
        <div>
          <SectionLabel>Roster ({confirmed.length})</SectionLabel>
          {confirmed.map(a => <MemberRow key={a.userId} member={a} />)}
        </div>

        {/* ── PENDING / AWAITING ─────────────────────────────────── */}
        {pending.filter(m => m.status !== 'out').length > 0 && (
          <div>
            <SectionLabel>Awaiting ({pending.filter(m => m.status !== 'out').length})</SectionLabel>
            {pending.filter(m => m.status !== 'out').map(a => <MemberRow key={a.userId} member={a} />)}
          </div>
        )}
      </div>
    )
  }

    function CompetitionTab() {
      const [compOn, setCompOn] = useState(!!trip.eventId)

      const [openSection, setOpenSection] = useState(null)
      const toggleSection = id => setOpenSection(o => o === id ? null : id)

      // Mock team/round/course data for bbmi-live
      const hasTeams   = !!trip.eventId
      const hasRounds  = !!trip.eventId
      const hasCourses = !!trip.eventId

      const statusColor  = s => s === 'set' ? 'var(--bt-accent)' : s === 'draft' ? '#f59e0b' : 'var(--bt-text-3)'
      const statusBg     = s => s === 'set' ? 'var(--bt-tag-bg)' : s === 'draft' ? '#1a1200' : 'var(--bt-card)'
      const statusBorder = s => s === 'set' ? 'var(--bt-accent)30' : s === 'draft' ? '#f59e0b30' : 'var(--bt-border)'
      const statusLabel  = s => s === 'set' ? 'Set ✓' : s === 'draft' ? 'Draft' : 'Not set'

      function SectionAccordion({ id, icon, label, status, summary, children }) {
        const isOpen = openSection === id
        return (
          <div style={{ borderRadius: 12, overflow: 'hidden', border: `1px solid ${isOpen ? 'var(--bt-accent)50' : statusBorder(status)}`, transition: 'border-color .2s' }}>
            <button onClick={() => toggleSection(id)}
              style={{ width: '100%', display: 'flex', alignItems: 'center', gap: 14, padding: '14px 16px', background: isOpen ? 'var(--bt-card)' : statusBg(status), border: 'none', cursor: 'pointer', textAlign: 'left' }}>
              <Ic n={icon} size={20} color="var(--bt-accent)" />
              <div style={{ flex: 1, minWidth: 0 }}>
                <div style={{ display: 'flex', alignItems: 'center', gap: 8, marginBottom: summary ? 3 : 0 }}>
                  <span style={{ fontSize: 14, fontWeight: 700, color: 'var(--bt-text-1)' }}>{label}</span>
                  <span style={{ fontSize: 10, fontWeight: 700, padding: '2px 7px', borderRadius: 9999, background: 'var(--bt-base)', color: statusColor(status), border: `1px solid ${statusBorder(status)}` }}>
                    {statusLabel(status)}
                  </span>
                </div>
                {summary && <div style={{ fontSize: 12, color: 'var(--bt-text-2)', overflow: 'hidden', textOverflow: 'ellipsis', whiteSpace: 'nowrap' }}>{summary}</div>}
              </div>
              <span style={{ color: 'var(--bt-text-3)', fontSize: 14, transition: 'transform .2s', transform: isOpen ? 'rotate(90deg)' : 'none', flexShrink: 0 }}>›</span>
            </button>
            {isOpen && (
              <div style={{ padding: '14px 16px 16px', background: 'var(--bt-base)', borderTop: '1px solid var(--bt-border)' }}>
                {children}
              </div>
            )}
          </div>
        )
      }

      // Inline mock state for rounds
      const [rounds, setRounds] = useState(hasRounds ? [
        { id: 'r1', name: 'Scramble',   format: 'Scramble',   course: 'Bandon Dunes',   pts: 4 },
        { id: 'r2', name: 'Stableford', format: 'Stableford', course: 'Bandon Trails',  pts: 4 },
        { id: 'r3', name: 'Sabotage',   format: 'Sabotage',   course: 'Pacific Dunes',  pts: 4 },
        { id: 'r4', name: 'Skins',      format: 'Skins',      course: 'Old Macdonald',  pts: 4 },
      ] : [])
      const [addingRound, setAddingRound] = useState(false)
      const [roundDraft, setRoundDraft] = useState({ name: '', format: 'Scramble', course: '', pts: 4 })
      const FORMATS = ['Scramble', 'Stableford', 'Skins', 'Sabotage', 'Match Play', 'Stroke Play']

      // Inline mock state for sides
      const [sides, setSides] = useState([])
      const [addingSide, setAddingSide] = useState(false)
      const [sideDraft, setSideDraft] = useState({ name: '', pts: 2 })

      return (
        <div style={{ display: 'flex', flexDirection: 'column', gap: 12 }}>

          {/* Header strip */}
          <div style={{ display: 'flex', alignItems: 'center', justifyContent: 'space-between', padding: '10px 14px', borderRadius: 10, background: 'var(--bt-tag-bg)', border: '1px solid var(--bt-accent)30' }}>
            <div style={{ display: 'flex', alignItems: 'center', gap: 8 }}>
              {trip.eventId && <LiveDot />}
              <span style={{ fontSize: 13, fontWeight: 700, color: 'var(--bt-accent)' }}>
                {trip.eventId ? 'Competition Active' : 'Competition — In Progress'}
              </span>
            </div>
            {trip.eventId ? (
              <button onClick={() => navigate('live-leaderboard', { tripId: trip._id })}
                style={{ fontSize: 11, fontWeight: 700, padding: '4px 12px', borderRadius: 6, border: '1px solid var(--bt-accent)60', background: 'transparent', color: 'var(--bt-accent)', cursor: 'pointer' }}>
                Leaderboard →
              </button>
            ) : canEdit ? (
              <button onClick={() => showToast('Lock in competition — complete all sections first')}
                style={{ fontSize: 11, fontWeight: 700, padding: '4px 12px', borderRadius: 6, border: '1px solid var(--bt-accent)60', background: 'transparent', color: 'var(--bt-accent)', cursor: 'pointer' }}>
                Lock In →
              </button>
            ) : null}
          </div>

          {/* ── TEAMS ── */}
          <SectionAccordion id="teams" icon="Users" label="Teams" status={hasTeams ? 'set' : 'not-set'}
            summary={hasTeams ? `${BBMI_EVENT.teams.length} teams · ${trip.attendees.filter(a => a.status === 'in').length} players` : 'Not configured yet'}>
            {hasTeams ? (
              <div>
                <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: 10, marginBottom: 12 }}>
                  {BBMI_EVENT.teams.map(team => (
                    <div key={team._id} style={{ borderRadius: 8, padding: '10px 12px', background: 'var(--bt-card)', border: `1px solid ${team.color}40` }}>
                      <div style={{ color: team.color, fontWeight: 700, fontSize: 13, marginBottom: 6 }}>{team.name}</div>
                      {BBMI_EVENT.players.filter(p => getTeamId(BBMI_EVENT._id, p._id) === team._id).map(p => (
                        <div key={p._id} style={{ fontSize: 12, color: 'var(--bt-text-2)', marginBottom: 2 }}>{p.name}</div>
                      ))}
                    </div>
                  ))}
                </div>
                {canEdit && <Btn variant="secondary" onClick={() => navigate('comp-setup', { tripId: trip._id })}>Edit Teams</Btn>}
              </div>
            ) : canEdit ? (
              <div>
                <p style={{ fontSize: 13, color: 'var(--bt-text-2)', marginBottom: 14, lineHeight: 1.5 }}>Choose how to split your crew into teams — assign manually or run a captain's draft.</p>
                <button onClick={() => navigate('comp-setup', { tripId: trip._id })}
                  style={{ fontSize: 13, fontWeight: 700, padding: '9px 20px', borderRadius: 8, border: 'none', cursor: 'pointer', background: 'var(--bt-accent)', color: '#0d1117' }}>
                  Set Up Teams →
                </button>
              </div>
            ) : <p style={{ fontSize: 13, color: 'var(--bt-text-3)' }}>Teams not configured yet.</p>}
          </SectionAccordion>

          {/* ── ROUNDS ── */}
          <SectionAccordion id="rounds" icon="Flag" label="Rounds & Format" status={rounds.length > 0 ? 'set' : 'not-set'}
            summary={rounds.length > 0 ? rounds.map(r => r.format).join(' · ') : 'No rounds added yet'}>
            <div style={{ display: 'flex', flexDirection: 'column', gap: 6, marginBottom: rounds.length > 0 ? 12 : 0 }}>
              {rounds.map((r, i) => (
                <div key={r.id} style={{ display: 'flex', alignItems: 'center', gap: 10, padding: '10px 12px', borderRadius: 8, background: 'var(--bt-card)', border: '1px solid var(--bt-border)' }}>
                  <span style={{ fontSize: 11, fontWeight: 800, fontFamily: 'monospace', color: 'var(--bt-text-3)', width: 20, flexShrink: 0 }}>R{i + 1}</span>
                  <div style={{ flex: 1, minWidth: 0 }}>
                    <div style={{ fontSize: 13, fontWeight: 700, color: 'var(--bt-text-1)' }}>{r.name}</div>
                    <div style={{ fontSize: 11, color: 'var(--bt-text-3)' }}>{r.format}{r.course ? ` · ${r.course}` : ''} · {r.pts} pts</div>
                  </div>
                  {canEdit && !trip.eventId && (
                    <button onClick={() => setRounds(rs => rs.filter(x => x.id !== r.id))}
                      style={{ fontSize: 12, background: 'none', border: 'none', cursor: 'pointer', color: 'var(--bt-text-3)', padding: '2px 6px' }}>×</button>
                  )}
                </div>
              ))}
            </div>
            {canEdit && !trip.eventId && !addingRound && (
              <button onClick={() => setAddingRound(true)}
                style={{ fontSize: 12, fontWeight: 600, padding: '7px 14px', borderRadius: 8, background: 'transparent', border: '1px dashed var(--bt-accent)60', color: 'var(--bt-accent)', cursor: 'pointer' }}>
                + Add Round
              </button>
            )}
            {addingRound && (
              <div style={{ marginTop: 10, padding: '12px', borderRadius: 8, background: 'var(--bt-card)', border: '1px solid var(--bt-accent)40', display: 'flex', flexDirection: 'column', gap: 8 }}>
                <input placeholder="Round name (e.g. Day 1 Scramble)" value={roundDraft.name} onChange={e => setRoundDraft(d => ({...d, name: e.target.value}))}
                  style={{ fontSize: 13, padding: '7px 10px', borderRadius: 7, background: 'var(--bt-input)', border: '1px solid var(--bt-border-input)', color: 'var(--bt-text-1)', outline: 'none' }} />
                <div style={{ display: 'flex', gap: 8 }}>
                  <select value={roundDraft.format} onChange={e => setRoundDraft(d => ({...d, format: e.target.value}))}
                    style={{ flex: 1, fontSize: 13, padding: '7px 10px', borderRadius: 7, background: 'var(--bt-input)', border: '1px solid var(--bt-border-input)', color: 'var(--bt-text-1)', outline: 'none' }}>
                    {FORMATS.map(f => <option key={f} value={f}>{f}</option>)}
                  </select>
                  <input placeholder="Course (optional)" value={roundDraft.course} onChange={e => setRoundDraft(d => ({...d, course: e.target.value}))}
                    style={{ flex: 1.5, fontSize: 13, padding: '7px 10px', borderRadius: 7, background: 'var(--bt-input)', border: '1px solid var(--bt-border-input)', color: 'var(--bt-text-1)', outline: 'none' }} />
                  <input type="number" min="1" max="20" value={roundDraft.pts} onChange={e => setRoundDraft(d => ({...d, pts: +e.target.value}))}
                    style={{ width: 52, fontSize: 13, padding: '7px 8px', borderRadius: 7, background: 'var(--bt-input)', border: '1px solid var(--bt-border-input)', color: 'var(--bt-text-1)', outline: 'none', textAlign: 'center' }} />
                </div>
                <div style={{ display: 'flex', gap: 8 }}>
                  <button onClick={() => { if (!roundDraft.name.trim()) return; setRounds(rs => [...rs, { id: `r${Date.now()}`, ...roundDraft }]); setRoundDraft({ name: '', format: 'Scramble', course: '', pts: 4 }); setAddingRound(false); showToast('Round added') }}
                    style={{ fontSize: 13, fontWeight: 700, padding: '7px 18px', borderRadius: 8, border: 'none', cursor: 'pointer', background: 'var(--bt-accent)', color: '#0d1117' }}>Save</button>
                  <button onClick={() => setAddingRound(false)}
                    style={{ fontSize: 13, padding: '7px 12px', borderRadius: 8, border: '1px solid var(--bt-border)', background: 'transparent', color: 'var(--bt-text-3)', cursor: 'pointer' }}>Cancel</button>
                </div>
              </div>
            )}
          </SectionAccordion>

          {/* ── COURSES ── */}
          <SectionAccordion id="courses" icon="Flag" label="Courses" status={hasCourses || rounds.some(r => r.course) ? 'set' : 'not-set'}
            summary={rounds.filter(r => r.course).map(r => r.course).join(' · ') || 'Assign courses to rounds above'}>
            {rounds.length === 0 ? (
              <p style={{ fontSize: 13, color: 'var(--bt-text-3)' }}>Add rounds first — courses are assigned per round.</p>
            ) : (
