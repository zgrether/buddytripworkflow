                      color: isCurrent ? '#0d1117' : isPast ? teamColors[teamIdx] : 'var(--bt-text-3)',
                      border: `2px solid ${isCurrent ? teamColors[teamIdx] : isPast ? `${teamColors[teamIdx]}60` : 'var(--bt-border)'}`,
                      boxShadow: isCurrent ? `0 0 12px ${teamColors[teamIdx]}60` : 'none'
                    }}>
                      {isPast ? '✓' : i + 1}
                    </div>
                    <div style={{ width: 4, height: 4, borderRadius: '50%', background: teamColors[teamIdx], opacity: .6 }} />
                  </div>
                )
              })}
            </div>

            {/* Available players */}
            <p style={{ fontSize: 11, fontWeight: 700, textTransform: 'uppercase', letterSpacing: '.08em', color: 'var(--bt-text-3)', marginBottom: 12 }}>Available players — {draftPool.length} remaining</p>
            <div style={{ display: 'flex', flexDirection: 'column', gap: 8, marginBottom: 24 }}>
              {draftPool.map(m => (
                <button key={m.userId} onClick={() => makePick(m.userId)}
                  style={{ display: 'flex', alignItems: 'center', gap: 12, padding: '12px 14px', borderRadius: 10, background: 'var(--bt-card)', border: '1px solid var(--bt-border)', cursor: 'pointer', textAlign: 'left', transition: 'border-color .15s' }}
                  onMouseEnter={e => { e.currentTarget.style.borderColor = teamColors[currentPickTeam]; e.currentTarget.style.background = `${teamColors[currentPickTeam]}0a` }}
                  onMouseLeave={e => { e.currentTarget.style.borderColor = 'var(--bt-border)'; e.currentTarget.style.background = 'var(--bt-card)' }}>
                  <Avatar name={m.name} size="md" />
                  <div style={{ flex: 1 }}>
                    <div style={{ fontSize: 15, fontWeight: 600, color: 'var(--bt-text-1)' }}>{m.name}</div>
                    <div style={{ fontSize: 12, color: 'var(--bt-text-3)' }}>{m.role}</div>
                  </div>
                  <span style={{ fontSize: 13, fontWeight: 700, padding: '4px 12px', borderRadius: 9999, background: `${teamColors[currentPickTeam]}15`, color: teamColors[currentPickTeam], border: `1px solid ${teamColors[currentPickTeam]}40` }}>
                    Draft → {teamNames[currentPickTeam].split(' ')[0]}
                  </span>
                </button>
              ))}
            </div>

            {/* Teams so far */}
            <p style={{ fontSize: 11, fontWeight: 700, textTransform: 'uppercase', letterSpacing: '.08em', color: 'var(--bt-text-3)', marginBottom: 12 }}>Teams so far</p>
            <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: 10 }}>
              {[0, 1].map(ti => (
                <div key={ti} style={{ borderRadius: 10, padding: '12px 14px', background: 'var(--bt-card)', border: `1px solid ${teamColors[ti]}40` }}>
                  <div style={{ color: teamColors[ti], fontSize: 12, fontWeight: 700, marginBottom: 8 }}>{teamNames[ti]}</div>
                  {roster.filter(m => getDraftTeam(m.userId) === ti).map(m => (
                    <div key={m.userId} style={{ display: 'flex', alignItems: 'center', gap: 6, marginBottom: 4 }}>
                      <Avatar name={m.name} size="sm" />
                      <span style={{ fontSize: 13, color: 'var(--bt-text-1)' }}>{firstName(m.userId)}</span>
                      {captains[ti] === m.userId && <span style={{ fontSize: 10, color: teamColors[ti], fontWeight: 700 }}>© CAP</span>}
                    </div>
                  ))}
                </div>
              ))}
            </div>
          </>
        )}

        {/* ── DRAFT COMPLETE ──────────────────────────────────── */}
        {mode === 'draft' && draftDone && (
          <>
            <div style={{ padding: '14px 16px', borderRadius: 12, marginBottom: 20, background: 'var(--bt-tag-bg)', border: '1px solid var(--bt-accent)40', display: 'flex', alignItems: 'center', gap: 10 }}>
              <span style={{ fontSize: 20 }}>✅</span>
              <div>
                <div style={{ fontWeight: 700, fontSize: 14, color: 'var(--bt-accent)' }}>Draft complete!</div>
                <div style={{ fontSize: 13, color: 'var(--bt-text-2)' }}>All {roster.length} players drafted. Review the teams below.</div>
              </div>
            </div>
            <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: 12, marginBottom: 24 }}>
              {[0, 1].map(ti => (
                <div key={ti} style={{ borderRadius: 12, padding: '16px', background: 'var(--bt-card)', border: `1px solid ${teamColors[ti]}50` }}>
                  <div style={{ color: teamColors[ti], fontSize: 13, fontWeight: 700, marginBottom: 12 }}>{teamNames[ti]}</div>
                  {roster.filter(m => getDraftTeam(m.userId) === ti).map(m => (
                    <div key={m.userId} style={{ display: 'flex', alignItems: 'center', gap: 8, marginBottom: 6 }}>
                      <Avatar name={m.name} size="sm" />
                      <span style={{ fontSize: 14, color: 'var(--bt-text-1)', flex: 1 }}>{firstName(m.userId)}</span>
                      {captains[ti] === m.userId && <span style={{ fontSize: 10, fontWeight: 700, padding: '1px 6px', borderRadius: 4, color: teamColors[ti], background: `${teamColors[ti]}20`, border: `1px solid ${teamColors[ti]}40` }}>CAP</span>}
                    </div>
                  ))}
                </div>
              ))}
            </div>
            <div style={{ display: 'flex', alignItems: 'center', justifyContent: 'space-between' }}>
              <Btn variant="secondary" onClick={() => { setDraftStarted(false); setDraftPicks([]); setDraftDone(false) }}>↺ Redo draft</Btn>
              <button onClick={handleCreate}
                style={{ fontSize: 14, fontWeight: 700, padding: '10px 24px', borderRadius: 8, border: 'none', cursor: 'pointer', background: 'var(--bt-accent)', color: '#0d1117', boxShadow: '0 0 20px var(--bt-accent)40' }}>
                Create Competition →
              </button>
            </div>
          </>
        )}
      </div>
    </div>
  )
}

// ── SCREEN: IdeaComparison ───────────────────────────────────────
function IdeaComparison({ navigate, showToast, tripId, viewerRole, trips, setTrips, notify, notifications, onMarkAllRead }) {
  const trip = trips.find(t => t._id === (tripId || 'trip-bbmi')) || trips[1]
  const canEdit = viewerRole === 'owner' || viewerRole === 'planner'
  const isOwner = viewerRole === 'owner'

  const [localIdeas, setLocalIdeas] = useState(trip.ideas.filter(i => !i.archived))
  const [myVote, setMyVote] = useState(null)
  const [votes, setVotes] = useState(IDEA_VOTES)
  const [mobileIdx, setMobileIdx] = useState(0)
  const [allComments, setAllComments] = useState(IDEA_COMMENTS)
  const [openComments, setOpenComments] = useState(new Set(IDEA_COMMENTS.filter(c => c.tripId === trip._id).map(c => c.ideaId)))
  const [commentTexts, setCommentTexts] = useState({})
  const [lockedIn, setLockedIn] = useState(
    trip.lockedDestination ? (localIdeas.find(i => i.title === trip.lockedDestination?.title)?._id || null) : null
  )
  const [showReopenConfirm, setShowReopenConfirm] = useState(false)
  const [manualDest, setManualDest] = useState('')
  const [showAddIdea, setShowAddIdea] = useState(false)
  const [showLockConfirm, setShowLockConfirm] = useState(false)
  const [ideaDraft, setIdeaDraft] = useState({ title: '', description: '', pros: '', cons: '', golfCourses: '', activities: '' })
  const [aiSuggest, setAiSuggest] = useState(null)
  const [aiAccepted, setAiAccepted] = useState({})

  const fetchIdeaSuggestions = async (destination) => {
    if (!destination || destination.trim().length < 3) return
    setAiSuggest({ loading: true, error: null, result: null })
    setAiAccepted({})
    try {
      const month = new Date().toLocaleString('default', { month: 'long' })
      const prompt = `You are a golf trip planning assistant evaluating "${destination}" as a potential trip destination in ${month}. Return ONLY valid JSON, no markdown:
{
  "vibe": "2-3 sentences on what makes this destination worth considering for a group golf trip",
  "seasonNote": "One sentence on what ${month} is like there — weather, course conditions, crowds",
  "pros": ["Pro 1", "Pro 2", "Pro 3"],
  "cons": ["Con 1", "Con 2", "Con 3"],
  "golfCourses": ["Course 1", "Course 2", "Course 3", "Course 4"]
}
Pros/cons = honest reasons to consider or avoid. Course names must be real and accurate.`
      const res = await fetch('https://api.anthropic.com/v1/messages', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          model: 'claude-sonnet-4-20250514',
          max_tokens: 800,
          messages: [{ role: 'user', content: prompt }]
        })
      })
      const data = await res.json()
      const parsed = JSON.parse((data.content?.[0]?.text || '').replace(/```json|```/g, '').trim())
      setAiSuggest({ loading: false, error: null, result: parsed })
    } catch(e) {
      setAiSuggest({ loading: false, error: "Couldn't load suggestions.", result: null })
    }
  }

  const getCount = ideaId => votes.filter(v => v.tripId === trip._id && v.ideaId === ideaId).length
  const getVoters = ideaId => votes.filter(v => v.tripId === trip._id && v.ideaId === ideaId).map(v => USERS[v.userId]?.name || v.userId)
  const getComments = ideaId => allComments.filter(c => c.tripId === trip._id && c.ideaId === ideaId)
  const maxVotes = Math.max(...localIdeas.map(idea => getCount(idea._id)), 1)
  const leadingIdx = localIdeas.reduce((best, idea, i) => getCount(idea._id) > getCount(localIdeas[best]._id) ? i : best, 0)

  function IdeaCard({ idx }) {
    const idea = localIdeas[idx]
    if (!idea) return null
    const ideaId      = idea._id
    const count       = getCount(ideaId)
    const voters      = getVoters(ideaId)
    const isMyVote    = myVote === ideaId
    const isLeading   = count === maxVotes && count > 0
    const isLocked    = lockedIn === ideaId
    const totalVoters = trip.attendees.length

    const [editingPros, setEditingPros] = useState(false)
    const [editingCons, setEditingCons] = useState(false)
    const [newPro, setNewPro] = useState('')
    const [newCon, setNewCon] = useState('')

    const removePro = (i) => setLocalIdeas(ids => ids.map((d,di) => di!==idx?d:{...d,pros:d.pros.filter((_,pi)=>pi!==i)}))
    const removeCon = (i) => setLocalIdeas(ids => ids.map((d,di) => di!==idx?d:{...d,cons:d.cons.filter((_,ci)=>ci!==i)}))
    const addPro = () => { const v=newPro.trim(); if(!v)return; setLocalIdeas(ids=>ids.map((d,di)=>di!==idx?d:{...d,pros:[...(d.pros||[]),v]})); setNewPro('') }
    const addCon = () => { const v=newCon.trim(); if(!v)return; setLocalIdeas(ids=>ids.map((d,di)=>di!==idx?d:{...d,cons:[...(d.cons||[]),v]})); setNewCon('') }
    const tagBase = { fontSize: 12, padding: '3px 10px', borderRadius: 9999, display: 'inline-flex', alignItems: 'center', gap: 5 }

    return (
      <div style={{ display: 'flex', flexDirection: 'column', borderRadius: 14, overflow: 'hidden', background: 'var(--bt-card)', border: `2px solid ${isLocked ? 'var(--bt-accent)' : isMyVote ? 'var(--bt-accent)80' : 'var(--bt-border)'}`, transition: 'border-color .2s', maxWidth: 600 }}>

        {isLocked && (
          <div style={{ padding: '7px 16px', background: 'var(--bt-accent)', display: 'flex', alignItems: 'center', gap: 7 }}>
            <Ic n="Check" size={14} color="#0d1117" sw={2.5} />

          }

          {/* Status badges */}
          <div style={{ position: 'absolute', top: 10, right: 10, display: 'flex', gap: 6 }}>
            {isMyVote && (
              <span style={{ fontSize: 11, fontWeight: 700, padding: '2px 8px', borderRadius: 9999, background: 'var(--bt-tag-bg)', color: 'var(--bt-accent)', border: '1px solid var(--bt-accent)40', display: 'flex', alignItems: 'center', gap: 4 }}>
                <Ic n="Check" size={11} color="var(--bt-accent)" /> Picked
              </span>
            )}

          {/* Title + location + voter avatars */}
          <div style={{ position: 'absolute', bottom: 0, left: 0, right: 0, padding: '0 14px 12px' }}>
            {/* Voter avatars — social proof */}
            {voters.length > 0 && (
              <div style={{ display: 'flex', alignItems: 'center', gap: 7, marginBottom: 8 }}>
                <div style={{ display: 'flex' }}>
                  {voters.slice(0, 5).map((v, i) => (
                    <div key={i} style={{ marginLeft: i > 0 ? -8 : 0, zIndex: 5 - i, borderRadius: '50%', border: '2px solid rgba(0,0,0,.5)' }}>

            <div style={{ fontWeight: 700, color: '#fff', fontSize: 20, marginBottom: 2, lineHeight: 1.2 }}>{idea.title}</div>

                    <div style={{ display: 'flex', gap: 8, marginTop: 6 }}>

                        style={{ fontSize: 12, fontWeight: 700, padding: '5px 12px', borderRadius: 6, border: 'none', cursor: 'pointer', background: 'var(--bt-accent)', color: '#0d1117' }}>Save</button>

                  <span key={i} style={{ ...tagBase, background: 'var(--bt-tag-bg)', color: 'var(--bt-accent)', border: '1px solid var(--bt-accent)25' }}>
                    {c}
                    {canEdit && <button onClick={() => setLocalIdeas(ids=>ids.map((d,di)=>di!==idx?d:{...d,golfCourses:d.golfCourses.filter((_,j)=>j!==i)}))} style={{ background:'none',border:'none',cursor:'pointer',padding:0,lineHeight:1,opacity:.7 }}><Ic n="X" size={11} color="var(--bt-accent)" /></button>}
                  </span>
                ))}
              </div>
            </div>
          )}

          {idea.activities?.length > 0 && (
            <div>
              <div style={{ fontSize: 11, fontWeight: 700, textTransform: 'uppercase', letterSpacing: '.07em', color: 'var(--bt-text-3)', marginBottom: 8, display: 'flex', alignItems: 'center', gap: 5 }}>
                <Ic n="Target" size={12} color="var(--bt-text-3)" /> Activities
              </div>
              <div style={{ display: 'flex', flexWrap: 'wrap', gap: 5 }}>
                {idea.activities.map((a,i) => (
                  <span key={i} style={{ ...tagBase, background: 'var(--bt-card)', color: 'var(--bt-text-2)', border: '1px solid var(--bt-border)' }}>
                    {a}
                    {canEdit && <button onClick={() => setLocalIdeas(ids=>ids.map((d,di)=>di!==idx?d:{...d,activities:d.activities.filter((_,j)=>j!==i)}))} style={{ background:'none',border:'none',cursor:'pointer',padding:0,lineHeight:1,opacity:.6 }}><Ic n="X" size={11} color="var(--bt-text-3)" /></button>}
                  </span>
                ))}
              </div>
            </div>
          )}

          {(idea.pros?.length > 0 || idea.cons?.length > 0 || canEdit) && (
            <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: 12, paddingTop: (idea.golfCourses?.length||idea.activities?.length) ? 4 : 0, borderTop: (idea.golfCourses?.length||idea.activities?.length) ? '1px solid var(--bt-border)' : 'none' }}>
              <div>
                <div style={{ fontSize: 11, fontWeight: 700, textTransform: 'uppercase', letterSpacing: '.07em', marginBottom: 7, color: 'var(--bt-accent)', display: 'flex', alignItems: 'center', justifyContent: 'space-between' }}>
                  <span style={{ display: 'flex', alignItems: 'center', gap: 4 }}><Ic n="Plus" size={11} color="var(--bt-accent)" sw={2.5} /> Pros</span>
                  {canEdit && <button onClick={() => setEditingPros(e=>!e)} style={{ background:'none',border:'none',cursor:'pointer',padding:0 }}><Ic n={editingPros?'Check':'Edit2'} size={12} color="var(--bt-text-3)" /></button>}
                </div>
                <div style={{ display: 'flex', flexDirection: 'column', gap: 5 }}>
                  {(idea.pros||[]).map((p,i) => (
                    <div key={i} style={{ fontSize: 12, lineHeight: 1.5, display: 'flex', alignItems: 'flex-start', gap: 6, color: 'var(--bt-text-2)' }}>
                      <span style={{ flexShrink:0, fontWeight:700, color:'var(--bt-accent)', marginTop:1 }}>+</span>
                      <span style={{ flex:1 }}>{p}</span>
                      {editingPros && <button onClick={() => removePro(i)} style={{ background:'none',border:'none',cursor:'pointer',padding:0,flexShrink:0 }}><Ic n="X" size={12} color="var(--bt-danger)" /></button>}
                    </div>
                  ))}
                  {editingPros && (
                    <div style={{ display:'flex', gap:5, marginTop:2 }}>
                      <input value={newPro} onChange={e=>setNewPro(e.target.value)} onKeyDown={e=>e.key==='Enter'&&addPro()}
                        placeholder="Add pro…" style={{ flex:1, fontSize:11, padding:'4px 7px', borderRadius:5, background:'var(--bt-input)', border:'1px solid var(--bt-accent)50', color:'var(--bt-text-1)', outline:'none' }} />
                      <button onClick={addPro} style={{ padding:'4px 7px', borderRadius:5, background:'var(--bt-tag-bg)', border:'none', cursor:'pointer' }}><Ic n="Plus" size={12} color="var(--bt-accent)" sw={2.5} /></button>
                    </div>
                  )}
                </div>
              </div>
              <div>
                <div style={{ fontSize: 11, fontWeight: 700, textTransform: 'uppercase', letterSpacing: '.07em', marginBottom: 7, color: 'var(--bt-danger)', display: 'flex', alignItems: 'center', justifyContent: 'space-between' }}>
                  <span style={{ display: 'flex', alignItems: 'center', gap: 4 }}><Ic n="X" size={11} color="var(--bt-danger)" sw={2.5} /> Cons</span>
                  {canEdit && <button onClick={() => setEditingCons(e=>!e)} style={{ background:'none',border:'none',cursor:'pointer',padding:0 }}><Ic n={editingCons?'Check':'Edit2'} size={12} color="var(--bt-text-3)" /></button>}
                </div>
                <div style={{ display: 'flex', flexDirection: 'column', gap: 5 }}>
                  {(idea.cons||[]).map((c,i) => (
                    <div key={i} style={{ fontSize: 12, lineHeight: 1.5, display: 'flex', alignItems: 'flex-start', gap: 6, color: 'var(--bt-text-2)' }}>
                      <span style={{ flexShrink:0, fontWeight:700, color:'var(--bt-danger)', marginTop:1 }}>−</span>
                      <span style={{ flex:1 }}>{c}</span>
                      {editingCons && <button onClick={() => removeCon(i)} style={{ background:'none',border:'none',cursor:'pointer',padding:0,flexShrink:0 }}><Ic n="X" size={12} color="var(--bt-danger)" /></button>}
                    </div>
                  ))}
                  {editingCons && (
                    <div style={{ display:'flex', gap:5, marginTop:2 }}>
                      <input value={newCon} onChange={e=>setNewCon(e.target.value)} onKeyDown={e=>e.key==='Enter'&&addCon()}
                        placeholder="Add con…" style={{ flex:1, fontSize:11, padding:'4px 7px', borderRadius:5, background:'var(--bt-input)', border:'1px solid var(--bt-danger)50', color:'var(--bt-text-1)', outline:'none' }} />
                      <button onClick={addCon} style={{ padding:'4px 7px', borderRadius:5, background:'#2d0f0f', border:'none', cursor:'pointer' }}><Ic n="Plus" size={12} color="var(--bt-danger)" sw={2.5} /></button>
                    </div>
                  )}
                </div>
              </div>
            </div>
          )}

          <div style={{ borderTop: '1px solid var(--bt-border)', paddingTop: 10 }}>
            <button onClick={() => setOpenComments(prev => { const n=new Set(prev); n.has(ideaId)?n.delete(ideaId):n.add(ideaId); return n })}
              style={{ background:'none', border:'none', cursor:'pointer', color:'var(--bt-text-3)', fontSize:12, display:'flex', alignItems:'center', gap:6, padding:'2px 0' }}>
              <Ic n="MessageCircle" size={14} color="var(--bt-text-3)" />
              {getComments(ideaId).length > 0 ? `${getComments(ideaId).length} comment${getComments(ideaId).length!==1?'s':''}` : 'Comments'}
              <Ic n={openComments.has(ideaId) ? 'ChevronUp' : 'ChevronDown'} size={12} color="var(--bt-text-3)" />
            </button>
            {openComments.has(ideaId) && (
              <div style={{ marginTop: 10, display: 'flex', flexDirection: 'column', gap: 8 }}>
                {getComments(ideaId).map(c => (
                  <div key={c._id} style={{ display: 'flex', gap: 8, alignItems: 'flex-start' }}>
                    <Avatar name={USERS[c.userId]?.name || c.userId} size="sm" />
                    <div style={{ flex:1, background:'var(--bt-base)', borderRadius:8, padding:'6px 10px' }}>
                      <div style={{ display:'flex', alignItems:'baseline', gap:6, marginBottom:2 }}>
                        <span style={{ fontSize:11, fontWeight:700, color:'var(--bt-accent)' }}>{USERS[c.userId]?.nickname || c.userId}</span>
                        <span style={{ fontSize:10, color:'var(--bt-text-3)' }}>{c.createdAt ? new Date(c.createdAt).toLocaleDateString('en-US',{month:'short',day:'numeric'}) + ' · ' + new Date(c.createdAt).toLocaleTimeString('en-US',{hour:'numeric',minute:'2-digit'}) : ''}</span>
                      </div>
                      <span style={{ fontSize:12, color:'var(--bt-text-1)' }}>{c.text}</span>
                    </div>
                  </div>
                ))}
                {/* Comment input with send button */}
                <div style={{ display: 'flex', gap: 8, alignItems: 'center' }}>
                  <Avatar name={CURRENT_USER.firstName} size="sm" />
                  <input value={commentTexts[ideaId]||''} onChange={e => setCommentTexts(t=>({...t,[ideaId]:e.target.value}))}
                    onKeyDown={e => {
                      if(e.key!=='Enter') return
                      const text = commentTexts[ideaId]?.trim()
                      if(!text) return
                      setAllComments(c=>[...c,{_id:`ic-${Date.now()}`,tripId:trip._id,ideaId,userId:CURRENT_USER._id,text,createdAt:new Date()}])
                      setCommentTexts(t=>({...t,[ideaId]:''}))
                    }}
                    placeholder="Write a comment…" style={{ flex:1, fontSize:12, padding:'6px 10px', borderRadius:6, outline:'none', background:'var(--bt-input)', border:'1px solid var(--bt-border-input)', color:'var(--bt-text-1)' }}
                    onFocus={e=>e.target.style.borderColor='var(--bt-accent)'}
                    onBlur={e=>e.target.style.borderColor='var(--bt-border-input)'} />
                  <button
                    onClick={() => {
                      const text = commentTexts[ideaId]?.trim()
                      if(!text) return
                      setAllComments(c=>[...c,{_id:`ic-${Date.now()}`,tripId:trip._id,ideaId,userId:CURRENT_USER._id,text,createdAt:new Date()}])
                      setCommentTexts(t=>({...t,[ideaId]:''}))
                    }}
                    style={{ flexShrink:0, padding:'6px 12px', borderRadius:6, border:'none', cursor:'pointer', background:'var(--bt-accent)', color:'#0d1117', fontSize:12, fontWeight:700 }}>
                    Send
                  </button>
                </div>
              </div>
            )}
          </div>

          {localIdeas.length >= 2 && (
            <div style={{ display: 'flex', gap: 8 }}>
              {lockedIn === null && (
                <button onClick={() => { setMyVote(ideaId); setVotes(v => { const f=v.filter(x=>!(x.tripId===trip._id&&x.userId===CURRENT_USER._id)); return [...f,{tripId:trip._id,ideaId,userId:CURRENT_USER._id,createdAt:new Date()}] }); showToast(`Voted for ${idea.title}!`) }}
                  style={{ flex:1, padding:'10px', borderRadius:8, fontSize:14, fontWeight:700, cursor:'pointer', border:'none', background:isMyVote?'var(--bt-accent)':'var(--bt-tag-bg)', color:isMyVote?'#0d1117':'var(--bt-accent)', transition:'all .2s', display:'flex', alignItems:'center', justifyContent:'center', gap:7 }}>
                  <Ic n={isMyVote?'Check':'ThumbsUp'} size={15} color={isMyVote?'#0d1117':'var(--bt-accent)'} />
                  {isMyVote ? 'Your pick' : 'Vote for this'}
                </button>
              )}
              {isOwner && lockedIn === null && (
                <button onClick={() => setShowLockConfirm(ideaId)}
                  style={{ padding:'10px 14px', borderRadius:8, fontSize:13, fontWeight:700, cursor:'pointer', border:'1px solid var(--bt-accent)40', background:'transparent', color:'var(--bt-accent)', display:'flex', alignItems:'center', gap:6 }}>
                  <Ic n="Lock" size={14} color="var(--bt-accent)" /> Lock In
                </button>
              )}
              {isOwner && lockedIn === null && (
                <button
                  onClick={() => {
                    if(!window.confirm(`Remove "${idea.title}" from the list?`)) return
                    setLocalIdeas(ids => ids.filter(i => i._id !== ideaId))
                    if(myVote === ideaId) setMyVote(null)
                    setVotes(v => v.filter(x => !(x.tripId===trip._id && x.ideaId===ideaId)))
                    showToast(`"${idea.title}" removed`)
                  }}
                  style={{ padding:'10px 12px', borderRadius:8, fontSize:13, cursor:'pointer', border:'1px solid var(--bt-border)', background:'transparent', color:'var(--bt-text-3)', display:'flex', alignItems:'center', gap:6 }}
                  onMouseEnter={e=>{e.currentTarget.style.borderColor='var(--bt-danger)';e.currentTarget.style.color='var(--bt-danger)'}}
                  onMouseLeave={e=>{e.currentTarget.style.borderColor='var(--bt-border)';e.currentTarget.style.color='var(--bt-text-3)'}}>
                  <Ic n="Trash2" size={14} color="currentColor" />
                </button>
              )}
              {lockedIn !== null && lockedIn !== idx && (
                <div style={{ flex:1, padding:'10px', borderRadius:8, fontSize:13, color:'var(--bt-text-3)', background:'var(--bt-card)', border:'1px solid var(--bt-border)', textAlign:'center' }}>
                  Not selected
                </div>
              )}
            </div>
          )}

          {localIdeas.length < 2 && canEdit && (
            <button onClick={() => setShowAddIdea(true)}
              style={{ width:'100%', padding:'10px', borderRadius:8, fontSize:13, fontWeight:700, cursor:'pointer', background:'transparent', border:'1px dashed var(--bt-accent)50', color:'var(--bt-accent)', display:'flex', alignItems:'center', justifyContent:'center', gap:7 }}>
              <Ic n="Plus" size={14} color="var(--bt-accent)" sw={2.5} /> Add another idea to start the vote
            </button>
          )}
        </div>
      </div>
    )
  }

  const inputStyle = { fontSize: 13, padding: '8px 10px', borderRadius: 7, background: 'var(--bt-input)', border: '1px solid var(--bt-border-input)', color: 'var(--bt-text-1)', outline: 'none', width: '100%' }

  return (
    <div style={{ minHeight: '100vh', paddingBottom: 96, background: 'var(--bt-base)' }}>
      <TopNav navigate={navigate} notifications={notifications} onMarkAllRead={onMarkAllRead} />

      {/* ── Constrained header ── */}
      <div style={{ maxWidth: 680, margin: '0 auto', padding: '24px 16px 0' }}>
        <Breadcrumb items={[{ label: 'Trips', screen: 'trips' }, { label: trip.title, screen: 'trip-detail', extra: { tripId: trip._id } }, { label: 'Where to?' }]} navigate={navigate} />

        <div style={{ display: 'flex', alignItems: 'flex-start', justifyContent: 'space-between', marginBottom: 16, gap: 12, flexWrap: 'wrap' }}>
          <div>
            <h1 style={{ fontSize: 22, fontWeight: 700, marginBottom: 2, color: 'var(--bt-text-1)', display:'flex', alignItems:'center', gap:8 }}>
              <Ic n="Map" size={20} color="var(--bt-accent)" /> Where should we go?
            </h1>
            <p style={{ fontSize: 13, color: 'var(--bt-text-3)', margin: 0 }}>{trip.title}</p>
          </div>
          <div style={{ display: 'flex', gap: 8 }}>
            {canEdit && lockedIn === null && (
              <button onClick={() => setShowAddIdea(true)}
                style={{ display:'flex', alignItems:'center', gap:6, fontSize: 13, fontWeight: 700, padding: '8px 16px', borderRadius: 8, cursor: 'pointer', background: 'var(--bt-tag-bg)', border: '1px solid var(--bt-accent)50', color: 'var(--bt-accent)' }}>
                <Ic n="Plus" size={14} color="var(--bt-accent)" sw={2.5} /> Add Idea
              </button>
            )}
            {isOwner && lockedIn !== null && (
              <button onClick={() => setShowReopenConfirm(true)}
                style={{ fontSize: 13, fontWeight: 600, padding: '8px 16px', borderRadius: 8, cursor: 'pointer', background: 'transparent', border: '1px solid var(--bt-border)', color: 'var(--bt-text-3)' }}
                onMouseEnter={e => { e.currentTarget.style.borderColor = 'var(--bt-accent)'; e.currentTarget.style.color = 'var(--bt-accent)' }}
                onMouseLeave={e => { e.currentTarget.style.borderColor = 'var(--bt-border)'; e.currentTarget.style.color = 'var(--bt-text-3)' }}>
                Change Destination
              </button>
            )}
            <Btn variant="secondary" onClick={() => navigate('trip-detail', { tripId: trip._id })}><Ic n="ArrowLeft" size={14} color="currentColor" style={{marginRight:5}} />Back</Btn>
          </div>
        </div>

        {/* ── Horse-race vote bar (2+ ideas, not locked) ── */}
        {localIdeas.length >= 2 && lockedIn === null && (() => {
          const tripVotes = votes.filter(v => v.tripId === trip._id)
          const voted = tripVotes.length
          const total = trip.attendees.length
          const SEGMENT_COLORS = ['#00d4aa', '#3b82f6', '#f59e0b', '#a78bfa', '#f472b6']
          return (
            <div style={{ marginBottom: 20 }}>
              {/* Segment labels */}
              <div style={{ display: 'flex', gap: 4, marginBottom: 6, flexWrap: 'wrap' }}>
                {localIdeas.map((idea, i) => {
                  const c = getCount(i)
                  return (
                    <div key={i} style={{ display: 'flex', alignItems: 'center', gap: 5, marginRight: 8 }}>
                      <div style={{ width: 9, height: 9, borderRadius: 2, background: SEGMENT_COLORS[i % SEGMENT_COLORS.length], flexShrink: 0 }} />
                      <span style={{ fontSize: 12, color: c > 0 ? 'var(--bt-text-1)' : 'var(--bt-text-3)', fontWeight: c === maxVotes && c > 0 ? 700 : 400 }}>
                        {idea.title.split(',')[0]}
                      </span>
                      <span style={{ fontSize: 12, fontWeight: 700, color: SEGMENT_COLORS[i % SEGMENT_COLORS.length], opacity: c > 0 ? 1 : 0.3 }}>
                        {c}
                      </span>
                    </div>
                  )
                })}
                <div style={{ marginLeft: 'auto', fontSize: 12, color: 'var(--bt-text-3)', whiteSpace: 'nowrap' }}>
                  {voted}/{total} voted
                </div>
              </div>
              {/* Bar track */}
              <div style={{ height: 8, borderRadius: 9999, background: 'var(--bt-card)', border: '1px solid var(--bt-border)', overflow: 'hidden', display: 'flex' }}>
                {voted === 0
                  ? <div style={{ flex: 1, background: 'transparent' }} />
                  : localIdeas.map((_, i) => {
                      const c = getCount(i)
                      if (c === 0) return null
                      return (
                        <div key={i} style={{
                          width: `${(c / total) * 100}%`,
                          background: SEGMENT_COLORS[i % SEGMENT_COLORS.length],
                          transition: 'width .5s ease',
                          borderRight: '2px solid var(--bt-base)',
                        }} />
                      )
                    })
                }
                {/* Unvoted remainder */}
                {voted < total && (
                  <div style={{ flex: 1, background: 'transparent' }} />
                )}
              </div>
            </div>
          )
        })()}

        {/* Locked destination callout */}
        {lockedIn !== null && (
          <div style={{ marginBottom: 20, padding: '12px 16px', borderRadius: 10, background: 'var(--bt-tag-bg)', border: '1px solid var(--bt-accent)40', display: 'flex', alignItems: 'center', gap: 10 }}>
            <Ic n="CheckCircle" size={16} color="var(--bt-accent)" />
            <span style={{ fontSize: 13, fontWeight: 700, color: 'var(--bt-accent)' }}>Locked in: {localIdeas[lockedIn]?.title}</span>
          </div>
        )}

        {/* Solo — seeding mode banner */}
        {localIdeas.length === 1 && lockedIn === null && (
          <div style={{ marginBottom: 20, padding: '14px 16px', borderRadius: 12, background: 'var(--bt-card)', border: '1px solid var(--bt-border)', display: 'flex', alignItems: 'flex-start', gap: 12 }}>
            <Ic n="MessageCircle" size={20} color="var(--bt-text-3)" style={{flexShrink:0, marginTop:1}} />
            <div>
              <div style={{ fontSize: 13, fontWeight: 700, color: 'var(--bt-text-1)', marginBottom: 3 }}>Just getting started</div>
              <div style={{ fontSize: 12, color: 'var(--bt-text-2)', lineHeight: 1.6 }}>
                One idea on the table. Voting opens once there's something to compare — throw out more options or let your planners weigh in.
              </div>
            </div>
          </div>
        )}
      </div>

      {/* ── Responsive idea grid — auto-fit, cards 480–600px, grow to fill ── */}
      {localIdeas.length >= 1 && (
        <div style={{ width: '100%', padding: '0 20px 28px', boxSizing: 'border-box' }}>
          <div style={{
            display: 'grid',
            gridTemplateColumns: 'repeat(auto-fit, minmax(min(480px, 100%), 600px))',
            justifyContent: 'center',
            gap: 16,
            alignItems: 'start',
          }}>
            {localIdeas.map((_, idx) => <IdeaCard key={idx} idx={idx} />)}
          </div>
        </div>
      )}


      {/* ── Constrained remainder (sheets rendered here) ── */}
      <div style={{ maxWidth: 680, margin: '0 auto', padding: '0 16px' }}>


        {/* ── ADD IDEA SHEET ── */}
        {showAddIdea && (
          <div style={{ position:'fixed', inset:0, zIndex:200, background:'#000b', display:'flex', alignItems:'flex-end', justifyContent:'center' }}
            onClick={() => { setShowAddIdea(false); setAiSuggest(null) }}>
            <div onClick={e=>e.stopPropagation()} style={{ width:'100%', maxWidth:600, maxHeight:'92vh', overflowY:'auto', borderRadius:'16px 16px 0 0', background:'var(--bt-card)', border:'1px solid var(--bt-border)', padding:'24px 20px 44px' }}>

              <div style={{ display:'flex', alignItems:'center', justifyContent:'space-between', marginBottom:20 }}>
                <div style={{ display:'flex', alignItems:'center', gap:8 }}>
                  <Ic n="Map" size={18} color="var(--bt-accent)" />
                  <h2 style={{ fontSize:17, fontWeight:700, color:'var(--bt-text-1)', margin:0 }}>Add a Destination Idea</h2>
                </div>
                <button onClick={() => { setShowAddIdea(false); setAiSuggest(null) }} style={{ background:'none', border:'none', cursor:'pointer', padding:4 }}>
                  <Ic n="X" size={18} color="var(--bt-text-3)" />
                </button>
              </div>

              {/* ── Destination field + Research CTA ── */}
              <div style={{ marginBottom: aiSuggest ? 16 : 20 }}>
                <label style={{ fontSize:11, fontWeight:700, textTransform:'uppercase', letterSpacing:'.07em', color:'var(--bt-text-3)', display:'block', marginBottom:6 }}>
                  Destination <span style={{ color:'var(--bt-danger)' }}>*</span>
                </label>
                <div style={{ display:'flex', gap:8 }}>
                  <input value={ideaDraft.title}
                    onChange={e => { setIdeaDraft(d=>({...d,title:e.target.value})); setAiSuggest(null) }}
                    placeholder="e.g. Bandon Dunes, OR"
                    style={{ flex:1, fontSize:13, padding:'9px 12px', borderRadius:8, background:'var(--bt-input)', border:'1px solid var(--bt-border-input)', color:'var(--bt-text-1)', outline:'none' }}
                    onFocus={e=>e.target.style.borderColor='var(--bt-accent)'}
                    onBlur={e=>e.target.style.borderColor='var(--bt-border-input)'} />
                  <button onClick={() => fetchIdeaSuggestions(ideaDraft.title)}
                    disabled={ideaDraft.title.trim().length < 3}
                    style={{ display:'flex', alignItems:'center', gap:6, padding:'9px 14px', borderRadius:8, fontSize:13, fontWeight:700, cursor:ideaDraft.title.trim().length>=3?'pointer':'default', whiteSpace:'nowrap', transition:'all .15s',
                      background: ideaDraft.title.trim().length>=3 ? 'var(--bt-tag-bg)' : 'transparent',
                      border: `1px solid ${ideaDraft.title.trim().length>=3 ? 'var(--bt-accent)50' : 'var(--bt-border)'}`,
                      color: ideaDraft.title.trim().length>=3 ? 'var(--bt-accent)' : 'var(--bt-text-3)' }}>
                    <Ic n="Sparkles" size={14} color={ideaDraft.title.trim().length>=3 ? 'var(--bt-accent)' : 'var(--bt-text-3)'} />
                    Research
                  </button>
                </div>
                {!aiSuggest && ideaDraft.title.trim().length >= 3 && (
                  <div style={{ fontSize:11, color:'var(--bt-text-3)', marginTop:6, display:'flex', alignItems:'center', gap:5 }}>
                    <Ic n="Sparkles" size={11} color="var(--bt-accent)" />
                    <span>Hit <strong style={{ color:'var(--bt-accent)' }}>Research</strong> and we'll pull courses, activities, pros &amp; cons — you can edit before adding</span>
                  </div>
                )}
              </div>

              {/* ── AI Research panel ── */}
              {aiSuggest && (
                <div style={{ marginBottom:20, borderRadius:12, border:'1px solid var(--bt-accent)30', overflow:'hidden', background:'var(--bt-base)' }}>
                  {aiSuggest.loading && (
                    <div style={{ padding:'24px', textAlign:'center' }}>
                      <div style={{ display:'flex', alignItems:'center', justifyContent:'center', gap:10, color:'var(--bt-text-2)', fontSize:13 }}>
                        <Ic n="Loader2" size={18} color="var(--bt-accent)" style={{ animation:'spin 1s linear infinite' }} />
                        Researching {ideaDraft.title}…
                      </div>

                    location: ideaDraft.title.trim(),
                    description: ideaDraft.description.trim(),

                  Cancel

              </div>
            </div>
          </div>

        {/* ── REOPEN VOTE CONFIRM ── */}
        {showReopenConfirm && (
          <div style={{ position: 'fixed', inset: 0, zIndex: 200, background: '#000a', display: 'flex', alignItems: 'flex-end', justifyContent: 'center' }}
            onClick={() => { setShowReopenConfirm(false); setManualDest('') }}>
            <div onClick={e => e.stopPropagation()} style={{ width: '100%', maxWidth: 600, borderRadius: '16px 16px 0 0', background: 'var(--bt-card)', border: '1px solid var(--bt-border)', padding: '24px 20px 40px' }}>
              <div style={{ textAlign: "center", marginBottom: 12 }}><Ic n="LockOpen" size={36} color="var(--bt-accent)" /></div>
              <h2 style={{ fontSize: 18, fontWeight: 700, color: 'var(--bt-text-1)', textAlign: 'center', marginBottom: 4 }}>Change the destination?</h2>
              <p style={{ fontSize: 13, color: 'var(--bt-text-2)', textAlign: 'center', lineHeight: 1.6, marginBottom: 20 }}>

              </p>

              {/* Option A — Reopen vote */}
              <div style={{ borderRadius: 10, padding: '14px 16px', background: 'var(--bt-base)', border: '1px solid var(--bt-border)', marginBottom: 10 }}>
                <div style={{ fontSize: 13, fontWeight: 700, color: "var(--bt-text-1)", marginBottom: 4, display:"flex", alignItems:"center", gap:6 }}><Ic n="Vote" size={14} color="var(--bt-accent)" />Reopen the vote</div>
                <div style={{ fontSize: 12, color: 'var(--bt-text-3)', lineHeight: 1.5, marginBottom: 10 }}>

                </div>
                <button onClick={() => {
                  setTrips(ts => ts.map(t => t._id === trip._id ? { ...t, lockedDestination: null } : t))

                  setShowReopenConfirm(false)
                  setManualDest('')
                  showToast('Destination reopened — vote is back on')
                }}
                  style={{ width: '100%', fontSize: 13, fontWeight: 700, padding: '10px', borderRadius: 8, border: '1px solid var(--bt-border)', cursor: 'pointer', background: 'var(--bt-card)', color: 'var(--bt-text-2)' }}>
                  Reopen the Vote
                </button>
              </div>

              {/* Option B — Manual override */}
              <div style={{ borderRadius: 10, padding: '14px 16px', background: 'var(--bt-base)', border: '1px solid var(--bt-border)', marginBottom: 16 }}>
                <div style={{ fontSize: 13, fontWeight: 700, color: 'var(--bt-text-1)', marginBottom: 4 }}>⚡ Override — just change it</div>
                <div style={{ fontSize: 12, color: 'var(--bt-text-3)', lineHeight: 1.5, marginBottom: 10 }}>
                  Set a new destination directly. No vote, no discussion. Crew gets notified of the change.
                </div>
                <div style={{ display: 'flex', gap: 8 }}>
                  <input value={manualDest} onChange={e => setManualDest(e.target.value)}
                    placeholder="e.g. Pinehurst, NC"
                    style={{ flex: 1, fontSize: 13, padding: '8px 10px', borderRadius: 7, background: 'var(--bt-input)', border: `1px solid ${manualDest ? 'var(--bt-accent)' : 'var(--bt-border-input)'}`, color: 'var(--bt-text-1)', outline: 'none' }} />
                  <button onClick={() => {
                    if (!manualDest.trim()) return
                    setTrips(ts => ts.map(t => t._id === trip._id ? { ...t, lockedDestination: { title: manualDest.trim(), location: manualDest.trim(), createdAt: new Date() } } : t))
                    setLockedIn(null)
                    setShowReopenConfirm(false)
                    if (notify) notify({ type: 'destination_locked', tripId: trip._id, actorId: CURRENT_USER._id, payload: { destination: manualDest.trim() } })
                    setManualDest('')
                    showToast(`📍 Destination changed to ${manualDest.trim()}`)
                    navigate('trip-detail', { tripId: trip._id })
                  }}
                    style={{ padding: '8px 14px', borderRadius: 8, fontSize: 13, fontWeight: 700, border: 'none', cursor: 'pointer', background: manualDest.trim() ? 'var(--bt-accent)' : 'var(--bt-border)', color: manualDest.trim() ? '#0d1117' : 'var(--bt-text-3)', transition: 'all .15s' }}>
                    Set It
                  </button>
                </div>
              </div>

              <button onClick={() => { setShowReopenConfirm(false); setManualDest('') }}
                style={{ width: '100%', padding: '11px', borderRadius: 10, border: '1px solid var(--bt-border)', background: 'transparent', color: 'var(--bt-text-3)', cursor: 'pointer', fontSize: 14 }}>
                Never mind
              </button>
            </div>
          </div>
        )}
      </div>{/* end constrained remainder */}
      <BottomNav active="trip-home" navigate={navigate} currentTripId={tripId} />
    </div>
  )
}

// ── ScoreEntry — bottom-sheet overlay for entering group scores ──
function ScoreEntry({ group, round, event, onSubmit, onClose }) {
  const { useState } = React
  const groupPlayers = event.players.filter(p => group.playerIds.includes(p._id))
  const [teamA, teamB] = event.teams
  const existingResult = GROUP_RESULTS[round._id]?.[group._id]

  // Determine which team each player in this group is on
  const teamAPlayers = groupPlayers.filter(p => getTeamId(event._id, p._id) === teamA._id)
  const teamBPlayers = groupPlayers.filter(p => getTeamId(event._id, p._id) === teamB._id)

  // Supported formats: scramble and stableford are team-point entry;
  // sabotage and skins get a stub.
  const isSupported = round.format === 'scramble' || round.format === 'stableford'

  // Each group is worth 1 point. Result is one of: 1-0 (win), 0.5-0.5 (halve), 0-1 (loss).
  const [result, setResult] = useState(
    existingResult ? (existingResult['team-a'] === 1 ? 'team-a' : existingResult['team-a'] === 0.5 ? 'halve' : 'team-b')
      : null
  )

  const handleSubmit = () => {
    if (!result) return
    const teamAPts = result === 'team-a' ? 1 : result === 'halve' ? 0.5 : 0
    const teamBPts = result === 'team-b' ? 1 : result === 'halve' ? 0.5 : 0
    onSubmit({
      roundId: round._id,
      groupId: group._id,
      teamA: teamAPts,
      teamB: teamBPts,
    })
  }

  return (
    <div style={{ position: 'fixed', inset: 0, zIndex: 200, background: '#000a', display: 'flex', alignItems: 'flex-end', justifyContent: 'center' }}
      onClick={onClose}>
      <div onClick={e => e.stopPropagation()} style={{ width: '100%', maxWidth: 600, borderRadius: '16px 16px 0 0', background: 'var(--bt-card)', border: '1px solid var(--bt-border)', padding: '24px 20px 40px' }}>

        {/* Header */}
        <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'flex-start', marginBottom: 20 }}>
          <div>
            <div style={{ fontSize: 11, textTransform: 'uppercase', letterSpacing: '.08em', color: 'var(--bt-text-3)', marginBottom: 4 }}>
              Day {round.day} · {round.title} · {round.course}
            </div>
            <div style={{ fontSize: 18, fontWeight: 700, color: 'var(--bt-text-1)' }}>{group.name} Scorecard</div>
          </div>
          <button onClick={onClose} style={{ background: 'none', border: 'none', cursor: 'pointer', color: 'var(--bt-text-3)', fontSize: 18, padding: 4 }}>
            <Ic n="X" size={18} color="var(--bt-text-3)" />
          </button>
        </div>

        {/* Players in this group by team */}
        <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: 12, marginBottom: 20 }}>
          {[{ team: teamA, players: teamAPlayers }, { team: teamB, players: teamBPlayers }].map(({ team, players }) => (
            <div key={team._id} style={{ borderRadius: 10, padding: '10px 12px', background: team.colorDim, border: `1px solid ${team.color}30` }}>
              <div style={{ fontSize: 11, fontWeight: 700, color: team.color, marginBottom: 6 }}>{team.shortName}</div>
              {players.map(p => (
                <div key={p._id} style={{ display: 'flex', alignItems: 'center', gap: 6, marginBottom: 3 }}>
                  <div style={{ width: 16, height: 16, borderRadius: '50%', background: team.color, display: 'flex', alignItems: 'center', justifyContent: 'center', fontSize: 7, fontWeight: 700, color: '#0d1117' }}>{p.nickname.slice(0, 2).toUpperCase()}</div>
                  <span style={{ fontSize: 12, color: 'var(--bt-text-1)' }}>{p.nickname}</span>
                  <span style={{ fontSize: 10, color: 'var(--bt-text-3)', marginLeft: 'auto' }}>+{p.handicap}</span>
                </div>
              ))}
            </div>
          ))}
        </div>

        {!isSupported ? (
          /* Stub for unsupported formats */
          <div style={{ textAlign: 'center', padding: '24px 16px' }}>
            <Ic n="AlertCircle" size={32} color="var(--bt-text-3)" />
            <div style={{ fontSize: 14, color: 'var(--bt-text-2)', marginTop: 8 }}>
              {round.title} scoring is not yet implemented
            </div>
            <div style={{ fontSize: 12, color: 'var(--bt-text-3)', marginTop: 4 }}>
              {round.format === 'sabotage' ? 'Sabotage elimination tracking coming soon' : 'Skins payouts coming soon'}
            </div>
          </div>
        ) : (
          <>
            {/* Result selector */}
            <div style={{ marginBottom: 20 }}>
              <div style={{ fontSize: 12, fontWeight: 700, color: 'var(--bt-text-2)', marginBottom: 8 }}>Who won this group?</div>
              <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr 1fr', gap: 8 }}>
                {[
                  { id: 'team-a', label: teamA.shortName + ' wins', color: teamA.color, icon: '🏆' },
                  { id: 'halve', label: 'Halved', color: 'var(--bt-text-2)', icon: '🤝' },
                  { id: 'team-b', label: teamB.shortName + ' wins', color: teamB.color, icon: '🏆' },
                ].map(opt => {
                  const selected = result === opt.id
                  return (
                    <button key={opt.id} onClick={() => setResult(opt.id)}
                      style={{ padding: '14px 8px', borderRadius: 10, cursor: 'pointer', textAlign: 'center',
                        background: selected ? (opt.id === 'halve' ? 'var(--bt-border)' : (opt.id === 'team-a' ? teamA.colorDim : teamB.colorDim)) : 'var(--bt-base)',
                        border: `2px solid ${selected ? opt.color : 'var(--bt-border)'}`,
                        color: selected ? opt.color : 'var(--bt-text-3)', transition: 'all .15s' }}>
                      <div style={{ fontSize: 20, marginBottom: 4 }}>{opt.icon}</div>
                      <div style={{ fontSize: 12, fontWeight: selected ? 700 : 400 }}>{opt.label}</div>
                    </button>
                  )
                })}
              </div>
            </div>

            {/* Points preview */}
            {result && (
              <div style={{ display: 'flex', justifyContent: 'center', gap: 16, marginBottom: 20, padding: '12px', borderRadius: 10, background: 'var(--bt-base)' }}>
                <div style={{ textAlign: 'center' }}>
                  <div style={{ fontSize: 10, color: teamA.color, fontWeight: 700 }}>{teamA.shortName}</div>
                  <div style={{ fontSize: 28, fontWeight: 900, color: teamA.color }}>{result === 'team-a' ? '1' : result === 'halve' ? '½' : '0'}</div>
                </div>
                <div style={{ display: 'flex', alignItems: 'center', color: 'var(--bt-text-3)', fontSize: 12 }}>pt</div>
                <div style={{ textAlign: 'center' }}>
                  <div style={{ fontSize: 10, color: teamB.color, fontWeight: 700 }}>{teamB.shortName}</div>
                  <div style={{ fontSize: 28, fontWeight: 900, color: teamB.color }}>{result === 'team-b' ? '1' : result === 'halve' ? '½' : '0'}</div>
                </div>
              </div>
            )}

            {/* Submit button */}
            <button onClick={handleSubmit} disabled={!result}
              style={{ width: '100%', fontSize: 14, fontWeight: 700, padding: '14px', borderRadius: 10, border: 'none', cursor: result ? 'pointer' : 'not-allowed',
                background: result ? 'var(--bt-accent)' : 'var(--bt-border)', color: result ? '#0d1117' : 'var(--bt-text-3)', transition: 'all .15s',
                boxShadow: result ? '0 0 20px var(--bt-accent)30' : 'none' }}>
              <span style={{ display: 'flex', alignItems: 'center', justifyContent: 'center', gap: 8 }}>
                <Ic n="Check" size={16} color={result ? '#0d1117' : 'var(--bt-text-3)'} />
                {existingResult ? 'Update Score' : 'Submit Score'}
              </span>
            </button>
          </>
        )}
      </div>
    </div>
  )
}

    GROUP_RESULTS[roundId][groupId] = { 'team-a': taPts, 'team-b': tbPts, submittedBy: CURRENT_USER._id, createdAt: new Date() }

      {scoreEntryGroup && (
        <ScoreEntry
          group={scoreEntryGroup}
          round={activeRound}
          event={BBMI_EVENT}
          onSubmit={handleScoreSubmit}
          onClose={() => setScoreEntryGroup(null)}
        />
      )}
    </div>
  )
}

// ── SCREEN: TripMessages ─────────────────────────────────────────
function TripMessages({ navigate, showToast, tripId, viewerRole, trips, notify, notifications, onMarkAllRead }) {
  const { useState } = React
  const trip = trips.find(t => t._id === tripId) || trips[0]
  const hasComp = !!trip.eventId
  const hasTeams = hasComp && BBMI_EVENT.teams.length > 0

  // Determine the current user's team for this event. Team is fixed by TEAM_ASSIGNMENTS
  // regardless of which dev role is active — the role switcher changes viewerRole, not team.
  const myTeamId = hasTeams ? getTeamId(BBMI_EVENT._id, CURRENT_USER._id) : null
  const myTeam   = myTeamId ? BBMI_EVENT.teams.find(t => t._id === myTeamId) : null

  // Team messages are keyed by teamId. Only load messages for the current user's team.
  const myTeamMsgs = myTeamId ? (TRIP_MESSAGES[tripId]?.team?.[myTeamId] || []) : []

  const [tripMsgs, setTripMsgs]   = useState(TRIP_MESSAGES[tripId]?.trip || [])
  const [teamMsgs, setTeamMsgs]   = useState(myTeamMsgs)
  const [tripDraft, setTripDraft] = useState('')
  const [teamDraft, setTeamDraft] = useState('')

  return (
    <div style={{ minHeight: '100vh', paddingBottom: 96, background: 'var(--bt-base)' }}>
      <TopNav navigate={navigate} notifications={notifications} onMarkAllRead={onMarkAllRead} />
      <div style={{ maxWidth: 680, margin: '0 auto', padding: '16px 16px 0' }}>
        <Breadcrumb items={[{ label: 'Trips', screen: 'trips' }, { label: trip.title, screen: 'trip-detail', extra: { tripId } }, { label: 'Messages' }]} navigate={navigate} />
        <h1 style={{ fontSize: 20, fontWeight: 700, color: 'var(--bt-text-1)', margin: '12px 0 16px' }}>Messages</h1>
      </div>

      <div style={{ maxWidth: 680, margin: '0 auto', padding: '0 16px', display: 'flex', flexDirection: 'column', gap: 16 }}>

        {/* ── Trip Chat ── */}
        <div>
          <div style={{ display: 'flex', alignItems: 'center', gap: 8, marginBottom: 8 }}>
            <Ic n="Users" size={14} color="var(--bt-text-3)" />
            <span style={{ fontSize: 12, fontWeight: 700, textTransform: 'uppercase', letterSpacing: '.07em', color: 'var(--bt-text-3)' }}>Trip Chat</span>
            <span style={{ fontSize: 11, color: 'var(--bt-text-3)' }}>· Everyone</span>
          </div>
          <TripChat messages={tripMsgs} setMessages={setTripMsgs} msgDraft={tripDraft} setMsgDraft={setTripDraft} maxHeight={280}
            onSend={(text) => { if (notify) notify({ type: 'chat_message', tripId, actorId: CURRENT_USER._id, payload: { preview: text } }) }} />
        </div>

        {/* ── Team Chat ── */}
        {hasTeams && (
          <div>
            <div style={{ display: 'flex', alignItems: 'center', gap: 8, marginBottom: 8 }}>
              <Ic n="Lock" size={14} color="#a78bfa" />
              <span style={{ fontSize: 12, fontWeight: 700, textTransform: 'uppercase', letterSpacing: '.07em', color: '#a78bfa' }}>
                {myTeam?.name || 'Team Chat'}
              </span>
              <span style={{ fontSize: 11, color: 'var(--bt-text-3)' }}>· Teammates only</span>
            </div>
            {myTeamId ? (
              <TripChat messages={teamMsgs} setMessages={setTeamMsgs} msgDraft={teamDraft} setMsgDraft={setTeamDraft} maxHeight={280}
                onSend={(text) => { if (notify) notify({ type: 'chat_message', tripId, actorId: CURRENT_USER._id, payload: { preview: text } }) }} />
            ) : (
              <div style={{ padding: '20px 16px', textAlign: 'center', color: 'var(--bt-text-3)', fontSize: 13, background: 'var(--bt-card)', borderRadius: 10, border: '1px solid var(--bt-border)' }}>
                You're not on a team yet — check back once teams are assigned.
              </div>
            )}
          </div>
        )}

      </div>
      <BottomNav active="trip-messages" navigate={navigate} currentTripId={tripId} />
    </div>
  )
}

  member:  { name: 'Rob',     desc: 'Read-only' },
}

function App() {
  const [screen, setScreen] = useState('trips')
  const [tripId, setTripId] = useState(null)
  const [toast, setToast] = useState(null)
  const [viewerRole, setViewerRole] = useState('planner')
  const [trips, setTrips] = useState(MOCK_TRIPS)
  // Notification state — backed by module-level NOTIFICATION_EVENTS array.
  // The nonce counter forces re-renders when new notifications are pushed.
  const [notifNonce, setNotifNonce] = useState(0)
  const notifyAndRefresh = (opts) => { pushNotification(opts); setNotifNonce(n => n + 1) }
  const markAllRead = () => {
    const now = new Date()
    NOTIFICATION_EVENTS.forEach(ev => { if (!ev.readAt) ev.readAt = now })
    setNotifNonce(n => n + 1)
  }

  const navigate = (s, extra = {}) => {
    setScreen(s)
    setTripId(extra.tripId || null)
    window.scrollTo(0, 0)
  }

  const showToast = msg => {
    setToast(msg)
    setTimeout(() => setToast(null), 2800)
  }

  // Common props passed to every screen that renders TopNav
  const navProps = { notifications: NOTIFICATION_EVENTS, onMarkAllRead: markAllRead }

  return (
    <>
      {screen === 'trips'            && <Dashboard navigate={navigate} viewerRole={viewerRole} trips={trips} {...navProps} />}
      {screen === 'trip-new'         && <TripNew navigate={navigate} showToast={showToast} setTrips={setTrips} {...navProps} />}
      {screen === 'trip-detail'      && <TripDetail navigate={navigate} showToast={showToast} tripId={tripId} viewerRole={viewerRole} trips={trips} setTrips={setTrips} notify={notifyAndRefresh} {...navProps} />}
      {screen === 'comp-setup'       && <CompetitionSetup navigate={navigate} showToast={showToast} tripId={tripId} viewerRole={viewerRole} trips={trips} {...navProps} />}
      {screen === 'idea-comparison'  && <IdeaComparison navigate={navigate} showToast={showToast} tripId={tripId} viewerRole={viewerRole} trips={trips} setTrips={setTrips} notify={notifyAndRefresh} {...navProps} />}
      {screen === 'trip-messages'    && <TripMessages navigate={navigate} showToast={showToast} tripId={tripId} viewerRole={viewerRole} trips={trips} notify={notifyAndRefresh} {...navProps} />}
      {screen === 'live-leaderboard' && <LiveLeaderboard navigate={navigate} showToast={showToast} tripId={tripId} notify={notifyAndRefresh} {...navProps} />}

      {/* Dev role switcher */}
      <div style={{ position: 'fixed', bottom: 80, right: 16, zIndex: 200, display: 'flex', flexDirection: 'column', gap: 6 }}>
        <div style={{ background: '#161b22', border: '1px solid #21262d', borderRadius: 8, overflow: 'hidden', boxShadow: '0 4px 16px #000' }}>
          <div style={{ padding: '4px 10px', fontSize: 9, fontWeight: 700, color: 'var(--bt-text-3)', textTransform: 'uppercase', letterSpacing: '.08em', borderBottom: '1px solid var(--bt-border)' }}>Viewing as</div>
          {Object.entries(ROLE_USERS).map(([role, info]) => (
            <button key={role} onClick={() => setViewerRole(role)}
              style={{ display: 'block', width: '100%', textAlign: 'left', padding: '6px 10px', border: 'none', cursor: 'pointer', fontSize: 12, background: viewerRole === role ? '#0d2a22' : 'transparent', color: viewerRole === role ? 'var(--bt-accent)' : 'var(--bt-text-2)', fontWeight: viewerRole === role ? 700 : 400, borderLeft: `2px solid ${viewerRole === role ? 'var(--bt-accent)' : 'transparent'}` }}>
              {info.name} <span style={{ opacity: .6, fontSize: 10 }}>({info.desc})</span>
            </button>
          ))}
        </div>
      </div>

      {toast && (
        <div className="animate-slide-up" style={{ position: 'fixed', zIndex: 200, left: '50%', transform: 'translateX(-50%)', bottom: 88, display: 'flex', alignItems: 'center', gap: 8, fontSize: 14, fontWeight: 500, padding: '12px 20px', borderRadius: 12, boxShadow: '0 8px 32px rgba(0,0,0,.4)', background: 'var(--bt-card)', color: 'var(--bt-text-1)', border: '1px solid var(--bt-accent)50', whiteSpace: 'nowrap' }}>
          <span style={{ color: 'var(--bt-accent)' }}>✓</span> {toast}
        </div>
      )}
    </>
  )
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />)
</script>
</body>
</html>
